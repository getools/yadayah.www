services:
  web:
    build: .
    restart: always
    # NO container-level mem/cpu caps on the web tier — see docker-compose.yml
    # for rationale. Per-worker ulimits in api/spawn-helpers.php + the
    # cpu-watchdog cron are the surgical tool that protects the box.
    volumes:
      - ./public:/var/www/html
      - ./api:/var/www/html/api
      # Persist Claude Code auth across container restarts
      - ./claude-home:/var/www/.claude-home
    environment:
      PG_HOST: postgres
      PG_PORT: 5432
      PG_DB: yada
      PG_USER: postgres
      PG_PASS: yada_password
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY}
      # PO Token provider (bgutil) — yt-dlp reads this and passes it via
      # --extractor-args youtubepot-bgutilhttp:base_url=...
      POT_PROVIDER_URL: http://pot-provider:4416
    depends_on:
      postgres:
        condition: service_healthy
      pot-provider:
        condition: service_started

  # PO Token provider for yt-dlp. Mints fresh Botguard challenge tokens on
  # demand so YouTube treats yt-dlp requests as a real browser instead of a
  # bot. Internal-only — never exposed to the public internet.
  pot-provider:
    image: brainicism/bgutil-ytdlp-pot-provider:latest
    restart: always
    mem_limit: 256m
    cpus: 0.25
    pids_limit: 64
    expose:
      - "4416"

  nginx:
    image: nginx:alpine
    restart: always
    mem_limit: 128m
    cpus: 0.5
    pids_limit: 64
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - web

  certbot:
    image: certbot/certbot
    mem_limit: 256m
    cpus: 0.5
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot

  postgres:
    # pgvector/pgvector:pg15 = official Postgres 15 + pgvector extension
    # pre-built. Drop-in replacement for postgres:15 — same data layout
    # (PG15), same default port, just adds the vector type/operators that
    # api/ask-rag.php requires for similarity search.
    image: pgvector/pgvector:pg15
    container_name: yada-postgres-prod
    restart: always
    # NO container-level caps on Postgres — see docker-compose.yml for
    # rationale.
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: yada_password
      POSTGRES_DB: yada
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    external: true
    name: yada-translations_postgres_data
  caddy_data:
  caddy_config:
