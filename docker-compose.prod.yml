services:
  web:
    build: .
    restart: always
    # Hard cap so a runaway worker (yt-dlp, ffmpeg, embed-paragraphs) cannot
    # peg the host or get the box flagged for abuse. cpus=1.5 lets workers
    # use 1.5 cores while user-facing PHP-FPM still has scheduling headroom
    # on the remaining 0.5. mem_limit=2g matches the per-worker ulimit -v
    # (1.5g) plus headroom for FPM master + concurrent requests. Sized for
    # a 4GB / 2-core VPS; bump alongside an instance upgrade.
    mem_limit: 2g
    cpus: 1.5
    pids_limit: 512
    volumes:
      - ./public:/var/www/html
      - ./api:/var/www/html/api
      # Persist Claude Code auth across container restarts
      - ./claude-home:/var/www/.claude-home
    environment:
      PG_HOST: postgres
      PG_PORT: 5432
      PG_DB: yada
      PG_USER: postgres
      PG_PASS: yada_password
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY}
      # PO Token provider (bgutil) — yt-dlp reads this and passes it via
      # --extractor-args youtubepot-bgutilhttp:base_url=...
      POT_PROVIDER_URL: http://pot-provider:4416
    depends_on:
      postgres:
        condition: service_healthy
      pot-provider:
        condition: service_started

  # PO Token provider for yt-dlp. Mints fresh Botguard challenge tokens on
  # demand so YouTube treats yt-dlp requests as a real browser instead of a
  # bot. Internal-only — never exposed to the public internet.
  pot-provider:
    image: brainicism/bgutil-ytdlp-pot-provider:latest
    restart: always
    mem_limit: 256m
    cpus: 0.25
    pids_limit: 64
    expose:
      - "4416"

  nginx:
    image: nginx:alpine
    restart: always
    mem_limit: 128m
    cpus: 0.5
    pids_limit: 64
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - web

  certbot:
    image: certbot/certbot
    mem_limit: 256m
    cpus: 0.5
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot

  postgres:
    # pgvector/pgvector:pg15 = official Postgres 15 + pgvector extension
    # pre-built. Drop-in replacement for postgres:15 — same data layout
    # (PG15), same default port, just adds the vector type/operators that
    # api/ask-rag.php requires for similarity search.
    image: pgvector/pgvector:pg15
    container_name: yada-postgres-prod
    restart: always
    # Postgres benefits from a generous shared_buffers (PG defaults work
    # within whatever cgroup it gets). 1g cap leaves room for the OS page
    # cache to absorb large queries; bump if pg_stat_statements shows
    # hot-set spilling to disk.
    mem_limit: 1g
    cpus: 1.0
    pids_limit: 256
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: yada_password
      POSTGRES_DB: yada
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    external: true
    name: yada-translations_postgres_data
  caddy_data:
  caddy_config:
