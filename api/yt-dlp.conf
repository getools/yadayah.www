# yt-dlp defaults for yadayah.com production container.
# Loaded by the yt-dlp-plugin wrapper via --config-location so these
# settings survive container restarts (this file is bind-mounted from the host).

# Route the bgutil PO Token HTTP provider to the Docker-network sidecar.
# Without this it defaults to 127.0.0.1:4416 which is unreachable inside
# the web container, causing the provider to be silently skipped and
# bot-detection errors on YouTube caption downloads.
--extractor-args youtubepot-bgutilhttp:base_url=http://pot-provider:4416
