<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="page-version" content="1778824802">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comments - Yada Yah</title>
    <link rel="stylesheet" href="css/app.css?v=12">
    <link rel="stylesheet" href="css/login.css">
    <style>
        .setting-row { display: flex; align-items: baseline; gap: 16px; margin-bottom: 14px; }
        .setting-row label { flex: 0 0 200px; font-weight: 600; font-size: 0.875rem; color: #555; text-align: right; }
        .setting-row .setting-input { flex: 1; }
        .setting-row input[type=text] {
            width: 100%; padding: 7px 10px; border: 1px solid #ccc; border-radius: 4px;
            font-size: 0.9rem; box-sizing: border-box;
        }
        .setting-row input:focus { outline: none; border-color: #3498db; box-shadow: 0 0 0 2px rgba(52,152,219,0.2); }
        .section-box { background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); padding: 24px; margin-bottom: 20px; }
        .section-box h2 { margin: 0 0 20px; font-size: 1.1rem; color: #31345A; border-bottom: 1px solid #e8e8e8; padding-bottom: 10px; }
    </style>
</head>
<body>

<div id="login-screen" class="login-screen">
    <div class="login-card">
        <h1>Admin</h1>
        <div class="field">
            <label for="login-user">Login</label>
            <input type="text" id="login-user" autocomplete="username">
        </div>
        <div class="field">
            <label for="login-pass">Password</label>
            <div class="pass-wrap">
                <input type="password" id="login-pass" autocomplete="current-password">
                <button type="button" class="pass-toggle" onclick="togglePassword()" title="Show/hide password">&#128065;</button>
            </div>
        </div>
        <div id="login-error" class="error-messages" style="display:none"></div>
        <button class="btn btn-primary" style="width:100%" onclick="doLogin()">Login</button>
    </div>
</div>

<div id="app" class="container" style="display:none">
    <div class="app-header">
        <nav class="nav-tabs"></nav>
<script src="/js/admin-nav.js?v=13"></script>
        <div class="user-info">
            <span id="user-display"></span>
            <button class="btn btn-secondary btn-sm" onclick="doLogout()">Logout</button>
        </div>
    </div>

    <h1>Comments</h1>

    <div class="section-box">
        <h2>Comments Settings</h2>
        <div id="comments-fields"></div>
        <div class="button-row" style="margin-top:20px">
            <button class="btn btn-primary" onclick="saveComments()">Save</button>
            <span id="save-status" style="display:none;font-size:0.875rem;color:#27ae60">Saved!</span>
            <span id="save-error" style="display:none;font-size:0.875rem;color:#c0392b"></span>
        </div>
    </div>

    <div class="section-box">
        <h2>Reply Notification Email</h2>
        <p style="font-size:0.85rem;color:#888;margin:-12px 0 16px;">Email sent to users watching a topic when a new reply is posted. Use merge fields to insert dynamic data.</p>

        <div class="setting-row">
            <label>Subject</label>
            <div class="setting-input"><input type="text" id="notify-subject" placeholder="New reply: {{topic_title}}"></div>
        </div>

        <div class="setting-row" style="align-items:flex-start;">
            <label>Body (HTML)</label>
            <div class="setting-input">
                <div style="margin-bottom:8px;">
                    <label style="font-size:0.8rem;color:#888;font-weight:normal;">Insert field:</label>
                    <select id="merge-field-select" style="padding:4px 8px;border:1px solid #ccc;border-radius:4px;font-size:0.85rem;" onchange="insertMergeField()">
                        <option value="">— Select —</option>
                        <option value="{{topic_title}}">Topic Title</option>
                        <option value="{{topic_id}}">Topic ID</option>
                        <option value="{{topic_url}}">Topic URL</option>
                        <option value="{{reply_body}}">Reply Body</option>
                        <option value="{{reply_author}}">Reply Author</option>
                        <option value="{{reply_time}}">Reply Time</option>
                        <option value="{{topic_author}}">Topic Author</option>
                        <option value="{{recipient_name}}">Recipient Name</option>
                    </select>
                </div>
                <textarea id="notify-body" rows="10" style="width:100%;padding:8px 10px;border:1px solid #ccc;border-radius:4px;font-size:0.85rem;font-family:monospace;box-sizing:border-box;resize:vertical;"></textarea>
            </div>
        </div>

        <div class="button-row" style="margin-top:20px">
            <button class="btn btn-primary" onclick="saveNotifyTemplate()">Save Template</button>
            <span id="notify-status" style="display:none;font-size:0.875rem;color:#27ae60">Saved!</span>
            <span id="notify-error" style="display:none;font-size:0.875rem;color:#c0392b"></span>
        </div>
    </div>

    <div class="section-box">
        <h2>Private Message Notification Email</h2>
        <p style="font-size:0.85rem;color:#888;margin:-12px 0 16px;">Email sent when a user receives a private message.</p>

        <div class="setting-row">
            <label>Subject</label>
            <div class="setting-input"><input type="text" id="dm-notify-subject" placeholder="New message from {{sender_name}}"></div>
        </div>

        <div class="setting-row" style="align-items:flex-start;">
            <label>Body (HTML)</label>
            <div class="setting-input">
                <div style="margin-bottom:8px;">
                    <label style="font-size:0.8rem;color:#888;font-weight:normal;">Insert field:</label>
                    <select id="dm-merge-field-select" style="padding:4px 8px;border:1px solid #ccc;border-radius:4px;font-size:0.85rem;" onchange="insertDmMergeField()">
                        <option value="">— Select —</option>
                        <option value="{{sender_name}}">Sender Name</option>
                        <option value="{{message_body}}">Message Body</option>
                        <option value="{{message_url}}">Message URL</option>
                        <option value="{{message_time}}">Message Time</option>
                        <option value="{{recipient_name}}">Recipient Name</option>
                    </select>
                </div>
                <textarea id="dm-notify-body" rows="10" style="width:100%;padding:8px 10px;border:1px solid #ccc;border-radius:4px;font-size:0.85rem;font-family:monospace;box-sizing:border-box;resize:vertical;"></textarea>
            </div>
        </div>

        <div class="button-row" style="margin-top:20px">
            <button class="btn btn-primary" onclick="saveDmTemplate()">Save Template</button>
            <span id="dm-notify-status" style="display:none;font-size:0.875rem;color:#27ae60">Saved!</span>
            <span id="dm-notify-error" style="display:none;font-size:0.875rem;color:#c0392b"></span>
        </div>
    </div>
</div>

<script src="js/admin-links.js?v=4"></script>
<script>
var API = '/api';
var _settings = {};

var FIELDS = [
    { code: 'comments-empty-text',   label: 'No Comments Text',    defaultVal: 'No comments yet. Be the first!' },
    { code: 'comments-expand-text',  label: 'Comments Button',     defaultVal: 'Comments' },
    { code: 'comments-content-text', label: 'Show Content Button', defaultVal: 'Show Content' },
    { code: 'comments-save-text',    label: 'Save Button Text',    defaultVal: 'Comment' },
    { code: 'comments-notify-help',  label: 'Notifications Help',  defaultVal: 'When enabled, you will receive email notifications for topics you create or reply to.' }
];

function checkAuth() {
    fetch(API + '/auth.php', {credentials:'include'}).then(function(r){return safeJson(r);}).then(function(d) {
        if (d.authenticated) {
            document.getElementById('app').style.display = '';
            document.getElementById('user-display').textContent = d.user_name;
            applyPagePermissions(d.pages);
            loadSettings();
        } else {
            document.getElementById('login-screen').classList.add('visible');
        }
    });
}

function doLogin() {
    var user = document.getElementById('login-user').value;
    var pass = document.getElementById('login-pass').value;
    var errEl = document.getElementById('login-error');
    errEl.style.display = 'none';
    fetch(API + '/auth.php', {
        method: 'POST', credentials: 'include',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({login: user, password: pass})
    }).then(function(r){return safeJson(r);}).then(function(d) {
        if (d.authenticated) {
            document.getElementById('login-screen').classList.remove('visible');
            document.getElementById('app').style.display = '';
            document.getElementById('user-display').textContent = d.user_name;
            applyPagePermissions(d.pages);
            loadSettings();
        } else {
            errEl.textContent = d.error || 'Login failed';
            errEl.style.display = '';
        }
    });
}

function doLogout() {
    fetch(API + '/auth.php', {method:'DELETE', credentials:'include'}).then(function() { location.reload(); });
}

function togglePassword() {
    var input = document.getElementById('login-pass');
    input.type = input.type === 'password' ? 'text' : 'password';
}

function esc(s) { var d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
function escAttr(s) { return (s || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function loadSettings() {
    fetch(API + '/admin-config-settings.php', {credentials:'include'})
        .then(function(r){return safeJson(r);})
        .then(function(rows) {
            _settings = {};
            rows.forEach(function(r) {
                if (r.setting_group_code === 'comments') _settings[r.setting_code] = r;
            });
            renderFields();
            renderNotifyTemplate();
            renderDmTemplate();
        });
}

var DEFAULT_SUBJECT = 'New reply: {{topic_title}}';
var DEFAULT_BODY = '<h2 style="color:#31345A;">New Reply</h2>\n'
    + '<p><strong>{{reply_author}}</strong> replied to <strong>{{topic_title}}</strong></p>\n'
    + '<blockquote style="border-left:3px solid #31345A;padding:8px 12px;margin:12px 0;color:#333;">{{reply_body}}</blockquote>\n'
    + '<p><a href="{{topic_url}}" style="color:#31345A;font-weight:600;">View Topic</a></p>';

function renderNotifyTemplate() {
    var subj = _settings['notify-reply-subject'];
    var body = _settings['notify-reply-body'];
    document.getElementById('notify-subject').value = subj ? (subj.setting_value || '') : DEFAULT_SUBJECT;
    document.getElementById('notify-body').value = body ? (body.setting_value || '') : DEFAULT_BODY;
}

function insertMergeField() {
    var sel = document.getElementById('merge-field-select');
    var field = sel.value;
    if (!field) return;
    var ta = document.getElementById('notify-body');
    var start = ta.selectionStart;
    var end = ta.selectionEnd;
    var text = ta.value;
    ta.value = text.substring(0, start) + field + text.substring(end);
    ta.selectionStart = ta.selectionEnd = start + field.length;
    ta.focus();
    sel.value = '';
}

function saveNotifyTemplate() {
    var statusEl = document.getElementById('notify-status');
    var errorEl = document.getElementById('notify-error');
    statusEl.style.display = 'none';
    errorEl.style.display = 'none';

    var fields = [
        { code: 'notify-reply-subject', label: 'Reply Notification Subject', value: document.getElementById('notify-subject').value },
        { code: 'notify-reply-body', label: 'Reply Notification Body', value: document.getElementById('notify-body').value }
    ];

    var promises = fields.map(function(f) {
        var s = _settings[f.code];
        var key = s ? s.setting_key : '';
        var method = key ? 'PUT' : 'POST';
        var url = key ? API + '/admin-config-settings.php?key=' + key : API + '/admin-config-settings.php';
        return fetch(url, {
            method: method, credentials: 'include',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({
                setting_group_code: 'comments',
                setting_label: f.label,
                setting_code: f.code,
                setting_value_code: 'text',
                setting_sort: 10,
                setting_value: f.value
            })
        }).then(function(res){return res.json();});
    });

    Promise.all(promises).then(function(results) {
        var err = results.filter(Boolean).map(function(d){return d.error;}).filter(Boolean)[0];
        if (err) { errorEl.textContent = err; errorEl.style.display = ''; }
        else { statusEl.style.display = ''; setTimeout(function(){ statusEl.style.display = 'none'; }, 3000); loadSettings(); }
    });
}

var DM_DEFAULT_SUBJECT = 'New message from {{sender_name}}';
var DM_DEFAULT_BODY = '<h2 style="color:#31345A;">New Message</h2>\n'
    + '<p><strong>{{sender_name}}</strong> sent you a private message:</p>\n'
    + '<blockquote style="border-left:3px solid #31345A;padding:8px 12px;margin:12px 0;color:#333;">{{message_body}}</blockquote>\n'
    + '<p><a href="{{message_url}}" style="color:#31345A;font-weight:600;">View Message</a></p>';

function renderDmTemplate() {
    var subj = _settings['notify-dm-subject'];
    var body = _settings['notify-dm-body'];
    document.getElementById('dm-notify-subject').value = subj ? (subj.setting_value || '') : DM_DEFAULT_SUBJECT;
    document.getElementById('dm-notify-body').value = body ? (body.setting_value || '') : DM_DEFAULT_BODY;
}

function insertDmMergeField() {
    var sel = document.getElementById('dm-merge-field-select');
    var field = sel.value;
    if (!field) return;
    var ta = document.getElementById('dm-notify-body');
    var start = ta.selectionStart;
    var end = ta.selectionEnd;
    var text = ta.value;
    ta.value = text.substring(0, start) + field + text.substring(end);
    ta.selectionStart = ta.selectionEnd = start + field.length;
    ta.focus();
    sel.value = '';
}

function saveDmTemplate() {
    var statusEl = document.getElementById('dm-notify-status');
    var errorEl = document.getElementById('dm-notify-error');
    statusEl.style.display = 'none';
    errorEl.style.display = 'none';

    var fields = [
        { code: 'notify-dm-subject', label: 'DM Notification Subject', value: document.getElementById('dm-notify-subject').value },
        { code: 'notify-dm-body', label: 'DM Notification Body', value: document.getElementById('dm-notify-body').value }
    ];

    var promises = fields.map(function(f) {
        var s = _settings[f.code];
        var key = s ? s.setting_key : '';
        var method = key ? 'PUT' : 'POST';
        var url = key ? API + '/admin-config-settings.php?key=' + key : API + '/admin-config-settings.php';
        return fetch(url, {
            method: method, credentials: 'include',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({
                setting_group_code: 'comments',
                setting_label: f.label,
                setting_code: f.code,
                setting_value_code: 'text',
                setting_sort: 20,
                setting_value: f.value
            })
        }).then(function(res){return res.json();});
    });

    Promise.all(promises).then(function(results) {
        var err = results.filter(Boolean).map(function(d){return d.error;}).filter(Boolean)[0];
        if (err) { errorEl.textContent = err; errorEl.style.display = ''; }
        else { statusEl.style.display = ''; setTimeout(function(){ statusEl.style.display = 'none'; }, 3000); loadSettings(); }
    });
}

function renderFields() {
    var container = document.getElementById('comments-fields');
    var html = '';
    FIELDS.forEach(function(f) {
        var s = _settings[f.code];
        var val = s ? (s.setting_value || '') : '';
        var displayVal = val || f.defaultVal;
        var key = s ? s.setting_key : '';
        html += '<div class="setting-row">';
        html += '<label>' + esc(f.label) + '</label>';
        html += '<div class="setting-input"><input type="text" id="input-' + f.code + '" data-key="' + key + '" value="' + escAttr(displayVal) + '"></div>';
        html += '</div>';
    });
    container.innerHTML = html;
}

function saveComments() {
    var statusEl = document.getElementById('save-status');
    var errorEl  = document.getElementById('save-error');
    statusEl.style.display = 'none';
    errorEl.style.display  = 'none';

    var promises = FIELDS.map(function(f) {
        var input = document.getElementById('input-' + f.code);
        if (!input) return Promise.resolve(null);
        var key = input.getAttribute('data-key');
        var s = _settings[f.code];
        var method = key ? 'PUT' : 'POST';
        var url = key ? API + '/admin-config-settings.php?key=' + key : API + '/admin-config-settings.php';
        return fetch(url, {
            method: method, credentials: 'include',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({
                setting_group_code: 'comments',
                setting_label: f.label,
                setting_code: f.code,
                setting_value_code: 'text',
                setting_sort: 1,
                setting_value: input.value
            })
        }).then(function(res){return res.json();});
    });

    Promise.all(promises).then(function(results) {
        var err = results.filter(Boolean).map(function(d){return d.error;}).filter(Boolean)[0];
        if (err) { errorEl.textContent = err; errorEl.style.display = ''; }
        else { statusEl.style.display = ''; setTimeout(function(){ statusEl.style.display = 'none'; }, 3000); loadSettings(); }
    });
}

checkAuth();
</script>
<script src="/js/error-reporter.js?v=2"></script>
</body>
</html>
