<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Misc - Yada Yah</title>
    <link rel="stylesheet" href="css/app.css">
</head>
<body>

<div id="login-screen" class="login-screen">
    <div class="login-card">
        <h1>Admin</h1>
        <div class="field">
            <label for="login-user">Login</label>
            <input type="text" id="login-user" autocomplete="username">
        </div>
        <div class="field">
            <label for="login-pass">Password</label>
            <div class="pass-wrap">
                <input type="password" id="login-pass" autocomplete="current-password">
                <button type="button" class="pass-toggle" onclick="togglePassword()" title="Show/hide password">&#128065;</button>
            </div>
        </div>
        <div id="login-error" class="error-messages" style="display:none"></div>
        <button class="btn btn-primary" style="width:100%" onclick="doLogin()">Login</button>
    </div>
</div>

<div id="app" class="container" style="display:none">
    <div class="app-header">
        <nav class="nav-tabs">
            <a href="admin-site.html" class="nav-tab">Site</a>
            <a href="admin-translation.html" class="nav-tab">Translation</a>
            <a href="admin-word.html" class="nav-tab">Word</a>
            <a href="admin-lookups.html" class="nav-tab">Lookups</a>
            <a href="admin-ask.html" class="nav-tab">Ask</a>
            <a href="admin-transcripts.html" class="nav-tab">Transcripts</a>
            <a href="admin-timeline.html" class="nav-tab">Timeline</a>
            <a href="admin-memorial.html" class="nav-tab">Memorial</a>
            <a href="admin-media.html" class="nav-tab">Media</a>
            <a href="admin-music.html" class="nav-tab">Music</a>
            <a href="admin-invite.html" class="nav-tab">Invite</a>
            <a href="admin-doyouyada.html" class="nav-tab">DoYou?</a>
            <a href="admin-backgrounds.html" class="nav-tab">Backgrounds</a>
            <a href="admin-feeds.html" class="nav-tab">Feeds</a>
            <a href="admin-redirects.html" class="nav-tab">Redirects</a>
            <a href="admin-pages.html" class="nav-tab">Pages</a>
            <a href="admin-resources.html" class="nav-tab">Resources</a>
            <a href="admin-users.html" class="nav-tab">Users</a>
            <a href="admin-misc.html" class="nav-tab active">Misc</a>
        </nav>
        <div class="user-info">
            <span id="user-display"></span>
            <button class="btn btn-secondary btn-sm" onclick="doLogout()">Logout</button>
        </div>
    </div>

    <h1>Misc</h1>
    <div class="misc-links" style="padding:20px 0;">
        <a href="modifier-words.html" class="btn btn-primary">Modifier Words</a>
    </div>
</div>

<script src="js/admin-pages.js?v=2"></script>
<script>
var API = '/api';

function checkAuth() {
    fetch(API + '/auth.php', {credentials:'include'}).then(r=>r.json()).then(function(d) {
        if (d.authenticated) {
            document.getElementById('app').style.display = '';
            document.getElementById('user-display').textContent = d.user_name;
            applyPagePermissions(d.pages);
        } else {
            document.getElementById('login-screen').classList.add('visible');
        }
    });
}

function doLogin() {
    var user = document.getElementById('login-user').value;
    var pass = document.getElementById('login-pass').value;
    var errEl = document.getElementById('login-error');
    errEl.style.display = 'none';
    fetch(API + '/auth.php', {
        method: 'POST', credentials: 'include',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({login: user, password: pass})
    }).then(r=>r.json()).then(function(d) {
        if (d.authenticated) {
            document.getElementById('login-screen').classList.remove('visible');
            document.getElementById('app').style.display = '';
            document.getElementById('user-display').textContent = d.user_name;
            applyPagePermissions(d.pages);
        } else {
            errEl.textContent = d.error || 'Login failed';
            errEl.style.display = '';
        }
    });
}

function doLogout() {
    fetch(API + '/auth.php', {method:'DELETE', credentials:'include'}).then(function() {
        location.reload();
    });
}

function togglePassword() {
    var input = document.getElementById('login-pass');
    input.type = input.type === 'password' ? 'text' : 'password';
}

document.getElementById('login-pass').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
});

checkAuth();
</script>
</body>
</html>
