<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transcripts - Yada Yah</title>
    <link rel="stylesheet" href="css/app.css">
    <style>
        .upload-area { display: flex; gap: 12px; align-items: center; padding: 16px; background: #f8f8f8; border: 2px dashed #ccc; border-radius: 8px; margin-bottom: 20px; }
        .upload-area.dragover { border-color: #31345A; background: #f0f4ff; }
        .upload-area input[type="file"] { flex: 1; }
        .upload-status { font-size: 0.85rem; color: #27ae60; margin-left: 8px; }
        .upload-error { color: #c0392b; }

        .files-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        .files-table th, .files-table td { padding: 8px 12px; text-align: left; border-bottom: 1px solid #e0e0e0; }
        .files-table th { background: #f5f5f5; font-weight: 600; position: sticky; top: 0; }
        .files-table tr:hover { background: #f0f4ff; cursor: pointer; }
        .files-table tr.selected { background: #e8edff; }

        .transcript-detail { margin-top: 20px; border: 1px solid #ddd; border-radius: 8px; background: #fff; }
        .transcript-header { padding: 14px 20px; background: #31345A; color: #fff; font-weight: 600; font-size: 0.95rem; border-radius: 8px 8px 0 0; display: flex; justify-content: space-between; align-items: center; }
        .transcript-header button { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4); color: #fff; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
        .transcript-header button:hover { background: rgba(255,255,255,0.3); }
        .transcript-body { padding: 20px; font-size: 0.9rem; line-height: 1.8; white-space: pre-wrap; word-wrap: break-word; max-height: 600px; overflow-y: auto; }
        .files-table .num { text-align: right; }
        .files-table .actions { text-align: center; width: 80px; }
        .delete-btn { background: none; border: none; color: #c0392b; cursor: pointer; font-size: 0.85rem; padding: 4px 8px; border-radius: 4px; }
        .delete-btn:hover { background: #fde8e8; }

        .stats-bar { display: flex; gap: 24px; padding: 12px 0; font-size: 0.85rem; color: #666; }
        .stats-bar strong { color: #333; }
        .empty-state { text-align: center; padding: 40px; color: #999; }
        .loading { text-align: center; padding: 20px; color: #888; }
    </style>
</head>
<body>

<div id="login-screen" class="login-screen">
    <div class="login-card">
        <h1>Admin</h1>
        <div class="field">
            <label for="login-user">Login</label>
            <input type="text" id="login-user" autocomplete="username">
        </div>
        <div class="field">
            <label for="login-pass">Password</label>
            <div class="pass-wrap">
                <input type="password" id="login-pass" autocomplete="current-password">
                <button type="button" class="pass-toggle" onclick="togglePassword()" title="Show/hide password">&#128065;</button>
            </div>
        </div>
        <div id="login-error" class="error-messages" style="display:none"></div>
        <button class="btn btn-primary" style="width:100%" onclick="doLogin()">Login</button>
    </div>
</div>

<div id="app" class="container" style="display:none">
    <div class="app-header">
        <nav class="nav-tabs">
            <a href="admin-translation.html" class="nav-tab">Translation</a>
            <a href="admin-word.html" class="nav-tab">Word</a>
            <a href="admin-lookups.html" class="nav-tab">Lookups</a>
            <a href="admin-ask.html" class="nav-tab">Ask</a>
            <a href="admin-transcripts.html" class="nav-tab active">Transcripts</a>
            <a href="admin-timeline.html" class="nav-tab">Timeline</a>
            <a href="admin-misc.html" class="nav-tab">Misc</a>
            <a href="admin-backgrounds.html" class="nav-tab">Backgrounds</a>
        </nav>
        <div class="user-info">
            <span id="user-display"></span>
            <button class="btn btn-secondary btn-sm" onclick="doLogout()">Logout</button>
        </div>
    </div>

    <h1>Transcripts</h1>

    <div class="upload-area" id="upload-area">
        <input type="file" id="file-input" accept=".vtt" multiple>
        <button class="btn btn-primary btn-sm" onclick="uploadFiles()">Upload</button>
        <span class="upload-status" id="upload-status"></span>
    </div>

    <div class="stats-bar" id="stats-bar"></div>

    <div id="detail-container"></div>

    <div id="files-container">
        <div class="loading">Loading files...</div>
    </div>
</div>

<script>
var API = '/api';

function checkAuth() {
    fetch(API + '/auth.php', {credentials:'include'}).then(r=>r.json()).then(function(d) {
        if (d.authenticated) {
            document.getElementById('app').style.display = '';
            document.getElementById('user-display').textContent = d.user_name;
            loadFiles();
        } else {
            document.getElementById('login-screen').classList.add('visible');
        }
    });
}

function loadFiles() {
    document.getElementById('files-container').innerHTML = '<div class="loading">Loading files...</div>';
    fetch(API + '/transcripts.php', {credentials:'include'})
        .then(r => r.json())
        .then(function(d) {
            if (d.error) { document.getElementById('files-container').innerHTML = '<div class="empty-state">' + esc(d.error) + '</div>'; return; }
            document.getElementById('stats-bar').innerHTML = '<span><strong>' + d.count + '</strong> transcript files</span>';
            renderFiles(d.files);
        });
}

function renderFiles(files) {
    if (!files.length) {
        document.getElementById('files-container').innerHTML = '<div class="empty-state">No transcript files found.</div>';
        return;
    }
    var html = '<table class="files-table"><thead><tr>' +
        '<th>Filename</th><th class="num">Size</th><th>Modified</th><th class="actions">Actions</th>' +
        '</tr></thead><tbody>';
    for (var i = 0; i < files.length; i++) {
        var f = files[i];
        var size = formatSize(f.size);
        var safeName = f.name.replace(/'/g, "\\'");
        html += '<tr onclick="viewFile(\'' + safeName + '\', this)">' +
            '<td>' + esc(f.name) + '</td>' +
            '<td class="num">' + size + '</td>' +
            '<td>' + f.modified + '</td>' +
            '<td class="actions"><button class="delete-btn" onclick="event.stopPropagation(); deleteFile(\'' + safeName + '\')">Delete</button></td>' +
            '</tr>';
    }
    html += '</tbody></table>';
    document.getElementById('files-container').innerHTML = html;
}

function viewFile(name, row) {
    // Highlight selected row
    var rows = document.querySelectorAll('.files-table tr');
    for (var i = 0; i < rows.length; i++) rows[i].classList.remove('selected');
    if (row) row.classList.add('selected');

    document.getElementById('detail-container').innerHTML = '<div class="loading">Loading transcript...</div>';

    fetch(API + '/transcripts.php?file=' + encodeURIComponent(name), {credentials:'include'})
        .then(r => r.json())
        .then(function(d) {
            if (d.error) { document.getElementById('detail-container').innerHTML = '<div class="empty-state">' + esc(d.error) + '</div>'; return; }
            var title = d.name.replace(/^\d{6}-/, '').replace(/\.vtt$/, '').replace(/_/g, "'");
            var html = '<div class="transcript-detail">';
            html += '<div class="transcript-header"><span>' + esc(title) + '</span><button onclick="document.getElementById(\'detail-container\').innerHTML=\'\'">Close</button></div>';
            html += '<div class="transcript-body">' + esc(d.text) + '</div>';
            html += '</div>';
            document.getElementById('detail-container').innerHTML = html;
            document.getElementById('detail-container').scrollIntoView({behavior: 'smooth'});
        })
        .catch(function(err) {
            document.getElementById('detail-container').innerHTML = '<div class="empty-state">Error: ' + esc(err.message) + '</div>';
        });
}

function uploadFiles() {
    var input = document.getElementById('file-input');
    if (!input.files.length) return;
    var statusEl = document.getElementById('upload-status');
    statusEl.textContent = 'Uploading...';
    statusEl.className = 'upload-status';
    var total = input.files.length;
    var done = 0;
    var errors = [];

    for (var i = 0; i < total; i++) {
        (function(file) {
            var fd = new FormData();
            fd.append('file', file);
            fetch(API + '/transcripts.php', {
                method: 'POST', credentials: 'include', body: fd
            }).then(r => r.json()).then(function(d) {
                done++;
                if (d.error) errors.push(file.name + ': ' + d.error);
                if (done === total) {
                    if (errors.length) {
                        statusEl.textContent = errors.join('; ');
                        statusEl.className = 'upload-status upload-error';
                    } else {
                        statusEl.textContent = done + ' file(s) uploaded!';
                        setTimeout(function() { statusEl.textContent = ''; }, 3000);
                    }
                    input.value = '';
                    loadFiles();
                }
            });
        })(input.files[i]);
    }
}

function deleteFile(name) {
    if (!confirm('Delete ' + name + '?')) return;
    fetch(API + '/transcripts.php', {
        method: 'DELETE', credentials: 'include',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({name: name})
    }).then(r => r.json()).then(function(d) {
        if (d.error) alert(d.error);
        loadFiles();
    });
}

function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / 1048576).toFixed(1) + ' MB';
}

function doLogin() {
    var user = document.getElementById('login-user').value;
    var pass = document.getElementById('login-pass').value;
    var errEl = document.getElementById('login-error');
    errEl.style.display = 'none';
    fetch(API + '/auth.php', {
        method: 'POST', credentials: 'include',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({login: user, password: pass})
    }).then(r=>r.json()).then(function(d) {
        if (d.authenticated) {
            document.getElementById('login-screen').classList.remove('visible');
            document.getElementById('app').style.display = '';
            document.getElementById('user-display').textContent = d.user_name;
            loadFiles();
        } else {
            errEl.textContent = d.error || 'Login failed';
            errEl.style.display = '';
        }
    });
}

function doLogout() {
    fetch(API + '/auth.php', {method:'DELETE', credentials:'include'}).then(function() { location.reload(); });
}

function togglePassword() {
    var input = document.getElementById('login-pass');
    input.type = input.type === 'password' ? 'text' : 'password';
}

function esc(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}

// Drag and drop
var dropArea = document.getElementById('upload-area');
['dragenter', 'dragover'].forEach(function(ev) {
    dropArea.addEventListener(ev, function(e) { e.preventDefault(); dropArea.classList.add('dragover'); });
});
['dragleave', 'drop'].forEach(function(ev) {
    dropArea.addEventListener(ev, function(e) { e.preventDefault(); dropArea.classList.remove('dragover'); });
});
dropArea.addEventListener('drop', function(e) {
    document.getElementById('file-input').files = e.dataTransfer.files;
    uploadFiles();
});

document.getElementById('login-pass').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
});

checkAuth();
</script>
</body>
</html>
