    <link rel="stylesheet" href="css/login.css">
    <style>
        .upload-area { display: flex; gap: 12px; align-items: center; padding: 16px; background: #f8f8f8; border: 2px dashed #ccc; border-radius: 8px; margin-bottom: 20px; }

        .upload-status { font-size: 0.85rem; margin-left: 8px; }
        .upload-status.success { color: #27ae60; }
        .upload-status.error { color: #c0392b; }
        .upload-status.info { color: #2980b9; }

        .files-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        .files-table th, .files-table td { padding: 8px 12px; text-align: left; border-bottom: 1px solid #e0e0e0; }
        .files-table th { background: #f5f5f5; font-weight: 600; position: sticky; top: 0; cursor: pointer; user-select: none; }

        .transcript-header button { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4); color: #fff; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
        .transcript-header button:hover { background: rgba(255,255,255,0.3); }

        .files-table .num { text-align: right; }

        .files-table .status { text-align: center; width: 100px; }
        .delete-btn { background: none; border: none; color: #c0392b; cursor: pointer; font-size: 0.85rem; padding: 4px 8px; border-radius: 4px; }
        .delete-btn:hover { background: #fde8e8; }

        .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.75rem; font-weight: 600; }

        .stats-bar { display: flex; gap: 24px; padding: 12px 0; font-size: 0.85rem; color: #666; }

        .empty-state { text-align: center; padding: 40px; color: #999; }
        .loading { text-align: center; padding: 20px; color: #888; }

        .progress-bar { height: 4px; background: #e0e0e0; border-radius: 2px; margin-top: 8px; overflow: hidden; display: none; }

        .modal-overlay { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.4); z-index:1000; align-items:center; justify-content:center; }
        .modal-overlay.visible { display:flex; }
        .modal-box { background:#fff; border-radius:8px; padding:24px; max-width:480px; width:90%; box-shadow:0 4px 20px rgba(0,0,0,0.3); }
        .modal-box h3 { margin:0 0 12px; font-size:1rem; }
        .modal-box .file-list { font-size:0.85rem; color:#555; margin:8px 0 16px; max-height:200px; overflow-y:auto; white-space:pre-wrap; }
        .modal-box .modal-buttons { display:flex; gap:10px; justify-content:flex-end; }
        .modal-box .modal-buttons button { padding:8px 20px; border-radius:4px; border:1px solid #ccc; cursor:pointer; font-size:0.9rem; font-weight:600; }
        .modal-box .btn-update { background:#31345A; color:#fff; border-color:#31345A; }
        .modal-box .btn-update:hover { background:#252850; }
        .modal-box .btn-skip { background:#f8f8f8; }
        .modal-box .btn-skip:hover { background:#e8e8e8; }
    </style>
</head>
<body>

<div id="login-screen" class="login-screen">
    <div class="login-card">
        <h1>Admin</h1>
        <div class="field">
            <label for="login-user">Login</label>
            <input type="text" id="login-user" autocomplete="username">
        </div>
        <div class="field">
            <label for="login-pass">Password</label>
            <div class="pass-wrap">
                <input type="password" id="login-pass" autocomplete="current-password">
                <button type="button" class="pass-toggle" onclick="togglePassword()" title="Show/hide password">&#128065;</button>
            </div>
        </div>
        <div id="login-error" class="error-messages" style="display:none"></div>
        <button class="btn btn-primary" style="width:100%" onclick="doLogin()">Login</button>
    </div>
</div>

<div id="app" class="container" style="display:none">
    <div class="app-header">
        <nav class="nav-tabs"></nav>
<script src="/js/admin-nav.js?v=13"></script>
        <div class="user-info">
            <span id="user-display"></span>
            <button class="btn btn-secondary btn-sm" onclick="doLogout()">Logout</button>
        </div>
    </div>

    <h1>Transcripts</h1>

    <div class="upload-area" id="upload-area">
        <input type="file" id="file-input" accept=".vtt" multiple onchange="if(this.files.length)uploadFiles()">
        <input type="file" id="folder-input" webkitdirectory style="display:none">
        <button class="btn btn-secondary btn-sm" onclick="document.getElementById('folder-input').click()">Select Folder</button>
        <button class="btn btn-secondary btn-sm" onclick="dedupFiles()" id="dedup-btn">Dedup</button>
        <span class="upload-status" id="upload-status"></span>
    </div>
    <div class="progress-bar" id="progress-bar"><div class="fill" id="progress-fill"></div></div>

    <div class="modal-overlay" id="existing-modal">
        <div class="modal-box">
            <h3>Existing files detected</h3>
            <div class="file-list" id="existing-file-list"></div>
            <div class="modal-buttons">
                <button class="btn-skip" id="modal-skip">Skip</button>
                <button class="btn-update" id="modal-update">Update</button>
            </div>
        </div>
    </div>

    <div class="stats-bar" id="stats-bar"></div>

    <div id="detail-container"></div>

    <div id="files-container">
        <div class="loading">Loading files...</div>
    </div>
</div>

<script src="js/admin-links.js?v=2"></script>
<script>
var API = '/api';

function checkAuth() {
    fetch(API + '/auth.php', {credentials:'include'}).then(r=>r.json()).then(function(d) {
        if (d.authenticated) {
            document.getElementById('app').style.display = '';
            document.getElementById('user-display').textContent = d.user_name;
            applyPagePermissions(d.pages);
            loadFiles();
        } else {
            document.getElementById('login-screen').classList.add('visible');
        }
    });
}

function loadFiles() {
    document.getElementById('files-container').innerHTML = '<div class="loading">Loading files...</div>';
    fetch(API + '/transcripts.php', {credentials:'include'})
        .then(r => r.json())
        .then(function(d) {
            if (d.error) { document.getElementById('files-container').innerHTML = '<div class="empty-state">' + esc(d.error) + '</div>'; return; }
            var parsed = 0, unparsed = 0;
            for (var i = 0; i < d.files.length; i++) {
                if (d.files[i].in_database) parsed++; else unparsed++;
            }
            var stats = '<span><strong>' + d.count + '</strong> files</span>';
            stats += '<span><strong>' + parsed + '</strong> in database</span>';
            if (unparsed > 0) stats += '<span style="color:#856404"><strong>' + unparsed + '</strong> not yet processed</span>';
            document.getElementById('stats-bar').innerHTML = stats;
            renderFiles(d.files);
        });
}

var _allFiles = [];
var _sortCol = 'name';
var _sortDir = 1; // 1 = asc, -1 = desc

function sortFiles(col) {
    if (_sortCol === col) {
        _sortDir *= -1;
    } else {
        _sortCol = col;
        _sortDir = 1;
    }
    renderFiles(_allFiles);
}

function renderFiles(files) {
    _allFiles = files;
    if (!files.length) {
        document.getElementById('files-container').innerHTML = '<div class="empty-state">No transcript files found.</div>';
        return;
    }

    // Sort
    var sorted = files.slice().sort(function(a, b) {
        var va, vb;
        switch (_sortCol) {
            case 'name': va = (a.name || '').toLowerCase(); vb = (b.name || '').toLowerCase(); break;
            case 'status': va = a.in_database ? 1 : 0; vb = b.in_database ? 1 : 0; break;
            case 'size': va = a.size || 0; vb = b.size || 0; break;
            case 'uploaded': va = a.uploaded || ''; vb = b.uploaded || ''; break;
            case 'modified': va = a.modified || ''; vb = b.modified || ''; break;
            default: va = ''; vb = '';
        }
        if (va < vb) return -1 * _sortDir;
        if (va > vb) return 1 * _sortDir;
        return 0;
    });

    function thSort(col, label, cls) {
        var arrow = _sortCol === col ? (_sortDir === 1 ? '&#9650;' : '&#9660;') : '&#9650;';
        var active = _sortCol === col ? ' sorted' : '';
        return '<th class="' + (cls || '') + active + '" onclick="sortFiles(\'' + col + '\')">' + label + '<span class="sort-arrow">' + arrow + '</span></th>';
    }

    var html = '<table class="files-table"><thead><tr>' +
        thSort('name', 'Filename') +
        thSort('status', 'Status', 'status') +
        thSort('size', 'Size', 'num') +
        thSort('uploaded', 'Uploaded') +
        thSort('modified', 'Modified') +
        '<th class="actions">Actions</th>' +
        '</tr></thead><tbody>';
    for (var i = 0; i < sorted.length; i++) {
        var f = sorted[i];
        var size = formatSize(f.size);
        var safeName = f.name.replace(/'/g, "\\'");
        var badge = f.in_database
            ? '<span class="badge badge-parsed">Parsed</span>'
            : '<span class="badge badge-new">New</span>';
        var uploaded = f.uploaded ? f.uploaded.replace('T', ' ').replace(/\.\d+.*$/, '').replace(/\+.*$/, '') : '';
        html += '<tr onclick="viewFile(\'' + safeName + '\', this)">' +
            '<td>' + esc(f.name) + '</td>' +
            '<td class="status">' + badge + '</td>' +
            '<td class="num">' + size + '</td>' +
            '<td>' + uploaded + '</td>' +
            '<td>' + f.modified + '</td>' +
            '<td class="actions"><button class="delete-btn" onclick="event.stopPropagation(); deleteFile(\'' + safeName + '\')">Delete</button></td>' +
            '</tr>';
    }
    html += '</tbody></table>';
    document.getElementById('files-container').innerHTML = html;
}

function viewFile(name, row) {
    var rows = document.querySelectorAll('.files-table tr');
    for (var i = 0; i < rows.length; i++) rows[i].classList.remove('selected');
    if (row) row.classList.add('selected');

    document.getElementById('detail-container').innerHTML = '<div class="loading">Loading transcript...</div>';

    fetch(API + '/transcripts.php?file=' + encodeURIComponent(name), {credentials:'include'})
        .then(r => r.json())
        .then(function(d) {
            if (d.error) { document.getElementById('detail-container').innerHTML = '<div class="empty-state">' + esc(d.error) + '</div>'; return; }
            var title = d.name.replace(/^\d{6}-/, '').replace(/\.vtt$/, '').replace(/_/g, "'");
            var html = '<div class="transcript-detail">';
            html += '<div class="transcript-header"><span>' + esc(title) + '</span><button onclick="document.getElementById(\'detail-container\').innerHTML=\'\'">Close</button></div>';
            html += '<div class="transcript-body">' + esc(d.text) + '</div>';
            html += '</div>';
            document.getElementById('detail-container').innerHTML = html;
            document.getElementById('detail-container').scrollIntoView({behavior: 'smooth'});
        })
        .catch(function(err) {
            document.getElementById('detail-container').innerHTML = '<div class="empty-state">Error: ' + esc(err.message) + '</div>';
        });
}

// Collect .vtt files from a list of FileSystemEntry items (handles directories recursively)
function collectVttFiles(entries) {
    return new Promise(function(resolve) {
        var files = [];
        var pending = entries.length;
        if (pending === 0) { resolve(files); return; }
        function checkDone() { if (--pending === 0) resolve(files); }
        entries.forEach(function(entry) {
            if (entry.isFile) {
                entry.file(function(f) {
                    if (f.name.toLowerCase().endsWith('.vtt')) files.push(f);
                    checkDone();
                });
            } else if (entry.isDirectory) {
                var reader = entry.createReader();
                var allEntries = [];
                (function readAll() {
                    reader.readEntries(function(batch) {
                        if (batch.length === 0) {
                            collectVttFiles(allEntries).then(function(subFiles) {
                                files = files.concat(subFiles);
                                checkDone();
                            });
                        } else {
                            allEntries = allEntries.concat(Array.from(batch));
                            readAll();
                        }
                    });
                })();
            } else {
                checkDone();
            }
        });
    });
}

function uploadFiles(fileList) {
    var input = document.getElementById('file-input');
    var filesToUpload = fileList || null;
    if (!filesToUpload) {
        if (!input.files.length) return;
        // Filter to .vtt only (in case of folder input)
        filesToUpload = [];
        for (var i = 0; i < input.files.length; i++) {
            if (input.files[i].name.toLowerCase().endsWith('.vtt')) filesToUpload.push(input.files[i]);
        }
    }
    if (!filesToUpload.length) {
        document.getElementById('upload-status').textContent = 'No .vtt files found.';
        document.getElementById('upload-status').className = 'upload-status info';
        return;
    }

    // First, check which files already exist on the server
    var statusEl = document.getElementById('upload-status');
    statusEl.textContent = 'Checking for existing files...';
    statusEl.className = 'upload-status info';

    fetch(API + '/transcripts.php', {credentials:'include'})
        .then(r => r.json())
        .then(function(d) {
            var existingFiles = {};
            for (var i = 0; i < d.files.length; i++) {
                existingFiles[d.files[i].name] = d.files[i].in_database;
            }

            // Check which selected files already exist
            var newFiles = [];
            var existingSelected = [];
            for (var i = 0; i < filesToUpload.length; i++) {
                var name = filesToUpload[i].name;
                // Apply same yyyyMM- prefix logic as server
                if (!/^\d{6}-/.test(name)) {
                    var now = new Date();
                    var prefix = String(now.getFullYear()) + String(now.getMonth() + 1).padStart(2, '0');
                    name = prefix + '-' + name;
                }
                if (existingFiles.hasOwnProperty(name)) {
                    existingSelected.push({file: filesToUpload[i], serverName: name, inDb: existingFiles[name]});
                } else {
                    newFiles.push(filesToUpload[i]);
                }
            }

            if (existingSelected.length > 0) {
                var names = existingSelected.map(function(e) { return e.serverName; }).join('\n');
                document.getElementById('existing-file-list').textContent = existingSelected.length + ' file(s) already exist:\n' + names;
                var modal = document.getElementById('existing-modal');
                modal.classList.add('visible');
                statusEl.textContent = '';

                document.getElementById('modal-update').onclick = function() {
                    modal.classList.remove('visible');
                    var reuploadFiles = existingSelected.map(function(e) { return e.file; });
                    doUpload(newFiles.concat(reuploadFiles), true, 0);
                };
                document.getElementById('modal-skip').onclick = function() {
                    modal.classList.remove('visible');
                    if (newFiles.length === 0) {
                        statusEl.textContent = 'No new files to upload. Existing files skipped.';
                        statusEl.className = 'upload-status info';
                        return;
                    }
                    doUpload(newFiles, false, existingSelected.length);
                };
                input.value = '';
                return;
            }

            if (newFiles.length === 0) {
                statusEl.textContent = 'No new files to upload. All selected files already exist.';
                statusEl.className = 'upload-status info';
                input.value = '';
                return;
            }

            doUpload(newFiles, false, 0);
            input.value = '';
        });
}

function doUpload(files, reprocess, skippedCount) {
    var statusEl = document.getElementById('upload-status');
    var progressBar = document.getElementById('progress-bar');
    var progressFill = document.getElementById('progress-fill');

    statusEl.textContent = 'Uploading ' + files.length + ' file(s)...';
    statusEl.className = 'upload-status info';
    progressBar.style.display = 'block';
    progressFill.style.width = '0%';

    var total = files.length;
    var done = 0;
    var uploaded = [];
    var skipped = skippedCount || 0;
    var errors = [];

    for (var i = 0; i < total; i++) {
        (function(file) {
            var fd = new FormData();
            fd.append('file', file);
            var uploadUrl = API + '/transcripts.php' + (reprocess ? '?overwrite=1' : '');
            fetch(uploadUrl, {
                method: 'POST', credentials: 'include', body: fd
            }).then(r => r.json()).then(function(d) {
                done++;
                progressFill.style.width = Math.round((done / total) * 50) + '%';
                if (d.error) {
                    errors.push(file.name + ': ' + d.error);
                } else if (d.skipped) {
                    // File existed on disk but user didn't choose to reprocess
                    skipped++;
                } else if (d.saved) {
                    uploaded.push(d.name);
                }
                if (done === total) {
                    finishUpload(uploaded, skipped, errors, statusEl, progressFill, reprocess);
                }
            }).catch(function(err) {
                done++;
                errors.push(file.name + ': ' + err.message);
                if (done === total) {
                    finishUpload(uploaded, skipped, errors, statusEl, progressFill, reprocess);
                }
            });
        })(files[i]);
    }
}

function finishUpload(uploaded, skipped, errors, statusEl, progressFill, reprocess) {
    if (uploaded.length === 0) {
        var msg = [];
        if (skipped > 0) msg.push(skipped + ' already existed (skipped)');
        if (errors.length > 0) msg.push(errors.join('; '));
        statusEl.textContent = msg.join('. ') || 'No new files to upload.';
        statusEl.className = 'upload-status ' + (errors.length ? 'error' : 'info');
        progressFill.style.width = '100%';
        setTimeout(function() { document.getElementById('progress-bar').style.display = 'none'; }, 1500);
        loadFiles();
        return;
    }

    // Process newly uploaded files
    statusEl.textContent = 'Processing ' + uploaded.length + ' file(s)...';
    statusEl.className = 'upload-status info';
    progressFill.style.width = '60%';

    fetch(API + '/transcripts.php?action=process', {
        method: 'POST', credentials: 'include',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({files: uploaded, reprocess: !!reprocess})
    }).then(r => r.json()).then(function(d) {
        progressFill.style.width = '100%';
        if (d.error) {
            statusEl.textContent = 'Process error: ' + d.error;
            statusEl.className = 'upload-status error';
        } else {
            var processed = 0, chunks = 0;
            for (var i = 0; i < d.results.length; i++) {
                if (d.results[i].processed) { processed++; chunks += d.results[i].chunks; }
            }
            var msg = processed + ' file(s) processed (' + chunks + ' chunks)';
            if (skipped > 0) msg += ', ' + skipped + ' skipped (already existed)';
            if (errors.length > 0) msg += ', ' + errors.length + ' error(s)';
            statusEl.textContent = msg;
            statusEl.className = 'upload-status success';
        }
        setTimeout(function() { document.getElementById('progress-bar').style.display = 'none'; }, 2000);
        loadFiles();
    }).catch(function(err) {
        statusEl.textContent = 'Process error: ' + err.message;
        statusEl.className = 'upload-status error';
        document.getElementById('progress-bar').style.display = 'none';
        loadFiles();
    });
}

function dedupFiles() {
    var btn = document.getElementById('dedup-btn');
    var status = document.getElementById('upload-status');
    btn.disabled = true; btn.textContent = 'Deduplicating...';
    status.textContent = ''; status.className = 'upload-status';
    fetch(API + '/transcripts.php?action=dedup', {credentials:'include'})
        .then(r => r.json())
        .then(function(d) {
            btn.disabled = false; btn.textContent = 'Dedup';
            if (d.error) {
                status.textContent = d.error; status.className = 'upload-status error';
            } else {
                status.textContent = d.removed + ' duplicate(s) removed' + (d.kept ? ', kept ' + d.kept + ' unique files' : '');
                status.className = 'upload-status success';
                loadFiles();
            }
            setTimeout(function() { status.textContent = ''; }, 5000);
        });
}

function deleteFile(name) {
    if (!confirm('Delete ' + name + '?\nThis will also remove it from the database.')) return;
    fetch(API + '/transcripts.php', {
        method: 'DELETE', credentials: 'include',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({name: name})
    }).then(r => r.json()).then(function(d) {
        if (d.error) alert(d.error);
        loadFiles();
    });
}

function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / 1048576).toFixed(1) + ' MB';
}

function doLogin() {
    var user = document.getElementById('login-user').value;
    var pass = document.getElementById('login-pass').value;
    var errEl = document.getElementById('login-error');
    errEl.style.display = 'none';
    fetch(API + '/auth.php', {
        method: 'POST', credentials: 'include',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({login: user, password: pass})
    }).then(r=>r.json()).then(function(d) {
        if (d.authenticated) {
            document.getElementById('login-screen').classList.remove('visible');
            document.getElementById('app').style.display = '';
            document.getElementById('user-display').textContent = d.user_name;
            applyPagePermissions(d.pages);
            loadFiles();
        } else {
            errEl.textContent = d.error || 'Login failed';
            errEl.style.display = '';
        }
    });
}

function doLogout() {
    fetch(API + '/auth.php', {method:'DELETE', credentials:'include'}).then(function() { location.reload(); });
}

function togglePassword() {
    var input = document.getElementById('login-pass');
    input.type = input.type === 'password' ? 'text' : 'password';
}

function esc(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}

// Folder input handler
document.getElementById('folder-input').addEventListener('change', function() {
    var files = [];
    for (var i = 0; i < this.files.length; i++) {
        if (this.files[i].name.toLowerCase().endsWith('.vtt')) files.push(this.files[i]);
    }
    this.value = '';
    if (files.length) uploadFiles(files);
    else {
        document.getElementById('upload-status').textContent = 'No .vtt files found in folder.';
        document.getElementById('upload-status').className = 'upload-status info';
    }
});

// Drag and drop (supports files and folders)
var dropArea = document.getElementById('upload-area');
['dragenter', 'dragover'].forEach(function(ev) {
    dropArea.addEventListener(ev, function(e) { e.preventDefault(); dropArea.classList.add('dragover'); });
});
['dragleave', 'drop'].forEach(function(ev) {
    dropArea.addEventListener(ev, function(e) { e.preventDefault(); dropArea.classList.remove('dragover'); });
});
dropArea.addEventListener('drop', function(e) {
    var items = e.dataTransfer.items;
    if (items && items.length > 0) {
        var entries = [];
        for (var i = 0; i < items.length; i++) {
            var entry = items[i].webkitGetAsEntry ? items[i].webkitGetAsEntry() : null;
            if (entry) entries.push(entry);
        }
        if (entries.length > 0) {
            collectVttFiles(entries).then(function(files) {
                if (files.length) uploadFiles(files);
                else {
                    document.getElementById('upload-status').textContent = 'No .vtt files found.';
                    document.getElementById('upload-status').className = 'upload-status info';
                }
            });
            return;
        }
    }
    // Fallback: plain file drop
    var files = [];
    for (var i = 0; i < e.dataTransfer.files.length; i++) {
        if (e.dataTransfer.files[i].name.toLowerCase().endsWith('.vtt')) files.push(e.dataTransfer.files[i]);
    }
    if (files.length) uploadFiles(files);
});

document.getElementById('login-pass').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
});

checkAuth();
</script>
