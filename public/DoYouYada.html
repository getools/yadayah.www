    <style>
        html { height: 100%; }
        body {
            font-family: 'Maven Pro', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: var(--doyou-bg, #373737);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Site header */
        header {
            display: flex; flex-direction: column; align-items: center;
            padding: 0;
            background: url('/images/yy-bg-bluewave.jpg') center/cover no-repeat;
            position: relative; overflow: hidden;
        }
        header .header-video {
            position: absolute; top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            transform: translate(-50%, -50%);
            object-fit: cover; z-index: 0;
        }
        header .header-inner {
            display: flex; flex-direction: column; align-items: center;
            width: 100%; max-width: 1140px; margin: 0 auto;
            position: relative; z-index: 1;
        }
        header .header-logos { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        header .header-logos img { width: auto; height: auto; }
        header nav { display: flex; flex-direction: column; align-items: center; gap: 0; padding: 0; }
        header nav .nav-row {
            display: flex; flex-direction: row; justify-content: center;
            gap: 0 30px; padding: 4px 0; flex-wrap: wrap;
        }
        header nav a {
            text-decoration: none; color: #E5C86C;
            font-family: "Julius Sans One", sans-serif;
            font-size: 1.1em; font-weight: 700;
        }
        header nav a:hover { color: #fff; }
        header nav a.active { color: #fff; text-decoration: underline; text-underline-offset: 5px; }

        /* ── Sub-toolbar ── */
        .sub-toolbar {
            display: flex; justify-content: center; align-items: center;
            gap: 30px; padding: 8px 0;
            background: var(--toolbar-bg, #0A333A);
        }
        .sub-toolbar a {
            text-decoration: none; color: var(--toolbar-text, #8ED0EC);
            font-family: "Julius Sans One", sans-serif;
            font-size: 0.95em; font-weight: 700;
        }
        .sub-toolbar a:hover { color: #fff; }
        .sub-toolbar a.active { color: #fff; text-decoration: underline; text-underline-offset: 5px; }
        /* Page tabs */
        .page-tabs {
            display: flex;
            justify-content: center;
            gap: 0;
            margin: 0 -20px 0 -20px;
            background: #f0f0f0;
            border-bottom: 2px solid #ddd;
        }
        .page-tabs a {
            padding: 12px 32px;
            text-decoration: none;
            font-family: "Julius Sans One", sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: #666;
            border-bottom: 3px solid transparent;
            transition: color 0.2s, border-color 0.2s;
        }
        .page-tabs a:hover { color: #31345A; }
        .page-tabs a.active {
            color: #31345A;
            border-bottom-color: #31345A;
        }

        /* Content */
        .content {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px 60px;
            flex: 1;
            box-sizing: border-box;
        html, body { overflow-x: hidden; }
        }
        /* page heading styles now in site-nav.js */

        /* Video grid */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(var(--grid-cols, 3), 1fr);
            column-gap: var(--grid-gap-h, 16px);
            row-gap: var(--grid-gap-v, 16px);
        }
        .video-card {
            border-radius: 8px;
            overflow: hidden;
            background: rgba(255,255,255,0.07);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .video-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        }
        .video-thumb {
            position: relative;
            width: 100%;
            background: #000;
        }
        .video-thumb img {
            width: 100%;
            height: auto;
            display: block;
        }
        .play-btn {
            position: absolute;
            bottom: 8px; right: 8px;
            width: 39px; height: 39px;
            background: rgba(0,0,0,0.35);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            transition: background 0.2s;
        }
        .video-card:hover .play-btn { background: rgba(20,27,56,0.5); }
        .play-btn svg {
            width: 24px; height: 24px;
            fill: #fff;
        }
        .video-title {
            padding: 10px 12px 2px;
            font-size: var(--label-size, 0.85rem);
            font-weight: 500;
            color: var(--label-color, rgba(255,255,255,0.85));
            line-height: 1.3;
            max-height: 4rem;
            overflow: hidden;
        }
        .video-date {
            padding: 0 12px 10px;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.45);
        }

        /* Loading / status */
        .grid-status {
            text-align: center;
            padding: 40px 20px;
            font-size: 1rem;
            color: rgba(255,255,255,0.5);
        }
        .grid-status.error { color: #e57373; }
        .spinner {
            display: inline-block;
            width: 32px; height: 32px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top-color: #E5C86C;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

    </style>
<script src="/js/site-nav.js"></script>

<script src="/js/video-lightbox.js?v=15"></script>
<script>
var allVideos = [];
var currentPage = 0;
var totalPages = 1;
var loading = false;
var DOYOU_RECORDS = 0;

VideoLightbox.configure({
    pageCode: 'doyouyada',
    videoSource: 'facebook',
    getId: function(v) { return v.feed_key || v.feed_video_id || ''; },
    getTitle: function(v) { return v.feed_title || ''; },
    getThumbnail: function(v) { return v.feed_thumbnail || ''; },
    renderContent: function(item, el) {
        var img = document.createElement('img');
        img.src = '/' + (item.feed_thumbnail || '').replace(/^\//, '');
        img.alt = item.feed_title || '';
        el.appendChild(img);
    }
});

function escHtml(s) {
    var d = document.createElement('div');
    d.textContent = s || '';
    return d.innerHTML;
}

function formatDate(d) {
    if (!d) return '';
    var dt = new Date(d);
    if (isNaN(dt)) return '';
    return dt.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
}

function renderCard(v, idx) {
    var thumb = v.feed_thumbnail || '';
    var date = formatDate(v.feed_create);
    var isVideo = (v.feed_type === 'video' || v.feed_type === 'video_inline');
    var playBtn = isVideo ? '<div class="play-btn"><svg viewBox="0 0 24 24"><polygon points="8,5 19,12 8,19"/></svg></div>' : '';
    return '<div class="video-card" onclick="VideoLightbox.open(' + idx + ')">'
        + '<div class="video-thumb">'
        + '<img src="' + escHtml(thumb) + '" alt="" loading="lazy">'
        + playBtn
        + '</div>'
        + (date ? '<div class="video-date">' + date + '</div>' : '')
        + '</div>';
}

function loadPage() {
    if (loading || currentPage >= totalPages) return;
    loading = true;
    var nextPage = currentPage + 1;
    var status = document.getElementById('grid-status');
    status.innerHTML = '<div class="spinner"></div>';
    status.className = 'grid-status';

    var url = DOYOU_RECORDS > 0 ? '/api/doyouyada-videos.php?limit=' + DOYOU_RECORDS : '/api/doyouyada-videos.php?page=' + nextPage;
    fetch(url)
        .then(function(r) { return r.json(); })
        .then(function(data) {
            var grid = document.getElementById('video-grid');
            var html = '';
            for (var i = 0; i < data.videos.length; i++) {
                var globalIdx = allVideos.length;
                allVideos.push(data.videos[i]);
                html += renderCard(data.videos[i], globalIdx);
            }
            grid.insertAdjacentHTML('beforeend', html);
            currentPage = data.page;
            totalPages = data.total_pages;
            loading = false;
            VideoLightbox.setVideos(allVideos);

            // Pre-create inactive comment topics for displayed items
            var ensureItems = data.videos.map(function(v) {
                return { video_id: String(v.feed_key || v.feed_video_id || ''), title: v.feed_title || '', thumbnail: v.feed_thumbnail || '' };
            });
            if (ensureItems.length) {
                fetch('/api/video-comments.php', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'ensure_topics', page_code: 'doyouyada', video_source: 'facebook', items: ensureItems })
                }).catch(function() {});
            }

            if (currentPage >= totalPages) {
                status.textContent = data.total === 0 ? 'No videos found.' : '';
            } else {
                status.innerHTML = '';
            }
        })
        .catch(function(err) {
            document.getElementById('grid-status').textContent = 'Error loading videos.';
            document.getElementById('grid-status').className = 'grid-status error';
            loading = false;
        });
}

// Infinite scroll via IntersectionObserver
var sentinel = document.getElementById('scroll-sentinel');
var observer = new IntersectionObserver(function(entries) {
    if (entries[0].isIntersecting && !loading) {
        loadPage();
    }
}, { rootMargin: '200px' });
observer.observe(sentinel);

// Load doyouyada config then start
(function(){fetch('/api/page-doyouyada-config.php').then(function(r){return r.json();}).then(function(cfg){
    var r=document.documentElement;
    if(cfg['background'])r.style.setProperty('--doyou-bg',cfg['background']);
    if(cfg['heading-color'])r.style.setProperty('--heading-color',cfg['heading-color']);
    if(cfg['heading-bg'])r.style.setProperty('--heading-bg',cfg['heading-bg']);
    if(cfg['label-color'])r.style.setProperty('--label-color',cfg['label-color']);
    if(cfg['label-size'])r.style.setProperty('--label-size',cfg['label-size']+'em');
    if(cfg['columns'])r.style.setProperty('--grid-cols',cfg['columns']);
    if(cfg['spacing-horizontal'])r.style.setProperty('--grid-gap-h',cfg['spacing-horizontal']+'px');
    if(cfg['spacing-vertical'])r.style.setProperty('--grid-gap-v',cfg['spacing-vertical']+'px');
    if(cfg['heading'])document.getElementById('doyou-heading').textContent=cfg['heading'];
    DOYOU_RECORDS=parseInt(cfg['records'])||0;
    loadPage();
}).catch(function(){loadPage();});})();
</script>
<script src="/js/bg-video.js"></script>
<script>
(function(){fetch('/api/site-config.php').then(function(r){return r.json();}).then(function(cfg){
    var r=document.documentElement;
    if(cfg['toolbar-color-bg'])r.style.setProperty('--toolbar-bg','#'+cfg['toolbar-color-bg']);
    if(cfg['toolbar-color-text'])r.style.setProperty('--toolbar-text','#'+cfg['toolbar-color-text']);
    document.querySelectorAll('[data-config]').forEach(function(el){var k=el.getAttribute('data-config');if(cfg[k]!=null)el.textContent=cfg[k];});
});})();
</script>
