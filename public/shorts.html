        html { height: 100%; }
        body {
            font-family: 'Maven Pro', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #373737;
            color: #fff;
            min-height: 100vh;

        }

        /* Site header */
        header {

            padding: 0;

            position: relative; overflow: hidden;

            position: absolute; top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            transform: translate(-50%, -50%);
            object-fit: cover; z-index: 0;

        header .header-inner {

            width: 100%; max-width: 1140px; margin: 0 auto;
            position: relative; z-index: 1;
        }
        header .header-logos { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        header .header-logos img { width: auto; height: auto; }
        header nav { display: flex; flex-direction: column; align-items: center; gap: 0; padding: 0; }
        header nav .nav-row {
            display: flex; flex-direction: row; justify-content: center;
            gap: 0 30px; padding: 4px 0; flex-wrap: wrap;
        }
        header nav a {
            text-decoration: none; color: #E5C86C;
            font-family: "Julius Sans One", sans-serif;
            font-size: 1.1em; font-weight: 700;
        }
        header nav a:hover { color: #fff; }
        header nav a.active { color: #fff; text-decoration: underline; text-underline-offset: 2px; }

        /* ── Sub-toolbar ── */
        .sub-toolbar {
            display: flex; justify-content: center; align-items: center;
            gap: 30px; padding: 8px 0;
            background: var(--toolbar-bg, #0A333A);
        }
        .sub-toolbar a {
            text-decoration: none; color: var(--toolbar-text, #8ED0EC);
            font-family: "Julius Sans One", sans-serif;
            font-size: 0.95em; font-weight: 700;
        }
        .sub-toolbar a:hover { color: #fff; }
        .sub-toolbar a.active { color: #fff; text-decoration: underline; text-underline-offset: 2px; }
        /* Page tabs — matches Media: transparent background, gold text + gold underline on active. */
        .page-tabs {
            display: flex;
            justify-content: center;
            gap: 0;
            margin: 0 -20px 0 -20px;
            background: transparent;
        }
        .page-tabs a {
            padding: 12px 32px 4px;
            text-decoration: none;
            font-family: "Julius Sans One", sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: #E5C86C;
            border-bottom: 3px solid transparent;
            transition: color 0.2s, border-color 0.2s;
        }
        .page-tabs a:hover { color: #E5C86C; }
        .page-tabs a.active {
            color: #E5C86C;
            border-bottom-color: #E5C86C;
        }


        /* Content */
        .content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px 60px;
            flex: 1;
        }
        /* page heading styles now in site-nav.js */

        /* Video grid */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 16px;
        }
        .video-card {
            border-radius: 8px;
            overflow: hidden;
            background: rgba(255,255,255,0.07);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .video-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        }
        .video-thumb {
            position: relative;
            width: 100%;
            aspect-ratio: 9/16;
            overflow: hidden;
            background: #000;
        }
        .video-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .play-btn {
            position: absolute;
            bottom: 8px; right: 8px;
            width: 39px; height: 39px;
            background: rgba(0,0,0,0.35);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            transition: background 0.2s;
        }
        .video-card:hover .play-btn { background: rgba(20,27,56,0.5); }
        .play-btn svg {
            width: 24px; height: 24px;
            fill: #fff;
        }
        .video-title {
            padding: 10px 12px 2px;
            font-size: 0.85rem;
            font-weight: 500;
            color: rgba(255,255,255,0.85);
            line-height: 1.3;
            max-height: 4rem;
            overflow: hidden;
        }
        .video-date {
            padding: 0 12px 10px;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.45);
        }

        /* Loading / status */
        .grid-status {
            text-align: center;
            padding: 40px 20px;
            font-size: 1rem;
            color: rgba(255,255,255,0.5);
        }
        .grid-status.error { color: #e57373; }
        .spinner {
            display: inline-block;
            width: 32px; height: 32px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top-color: #E5C86C;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

    </style>

<script>
var allVideos = [];

VideoLightbox.configure({
    pageCode: 'shorts',
    videoSource: 'youtube',
    getVideoId: function(v) { return v.id || ''; },
    getTitle: function(v) { return v.title || ''; },
    getThumbnail: function(v) { return v.thumbnail || 'https://i.ytimg.com/vi/' + v.id + '/hqdefault.jpg'; },
    getEmbedUrl: function(v) { return 'https://www.youtube.com/embed/' + (v.id || '') + '?autoplay=1'; }
});

function escHtml(s) {
    var d = document.createElement('div');
    d.textContent = s || '';
    return d.innerHTML;
}

function formatDate(d) {
    if (!d) return '';
    var dt = new Date(d);
    if (isNaN(dt)) return '';
    return dt.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
}

function renderCard(v, idx) {
    var thumb = v.thumbnail || '';
    var title = v.title || 'Short';
    var date = formatDate(v.published);
    return '<div class="video-card" onclick="VideoLightbox.open(' + idx + ')">'
        + '<div class="video-thumb">'
        + '<img src="' + escHtml(thumb) + '" alt="' + escHtml(title) + '" loading="lazy">'
        + '<div class="play-btn"><svg viewBox="0 0 24 24"><polygon points="8,5 19,12 8,19"/></svg></div>'
        + '</div>'
        + '<div class="video-title">' + escHtml(title) + '</div>'
        + (date ? '<div class="video-date">' + date + '</div>' : '')
        + '</div>';
}

function loadShorts() {
    var status = document.getElementById('grid-status');
    status.innerHTML = '<div class="spinner"></div>';

    fetch('/api/youtube-feed.php?type=shorts&limit=50')
        .then(function(r) { return r.json(); })
        .then(function(data) {
            var vids = data.videos || [];
            allVideos = vids;
            VideoLightbox.setVideos(allVideos);
            var grid = document.getElementById('video-grid');
            var html = '';
            for (var i = 0; i < vids.length; i++) {
                html += renderCard(vids[i], i);
            }
            grid.innerHTML = html;
            status.textContent = vids.length === 0 ? 'No shorts found.' : '';
        })
        .catch(function() {
            status.textContent = 'Error loading shorts.';
            status.className = 'grid-status error';
        });
}

// Load all shorts
loadShorts();
</script>

<script>
(function(){fetch('/api/site-config.php').then(function(r){return r.json();}).then(function(cfg){

    document.querySelectorAll('[data-config]').forEach(function(el){var k=el.getAttribute('data-config');if(cfg[k]!=null)el.textContent=cfg[k];});
});})();
</script>
