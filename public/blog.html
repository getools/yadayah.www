    <title>Blog</title>

    <link href="https://fonts.googleapis.com/css2?family=Julius+Sans+One&family=Maven+Pro:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        html { height: 100%; }
        body {
            font-family: 'Maven Pro', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #fff;
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Site header */
        header {
            display: flex; flex-direction: column; align-items: center;
            padding: 0;
            background: url('/images/yy-bg-bluewave.jpg') center/cover no-repeat;
            position: relative; overflow: hidden;
        }
        header .header-video {
            position: absolute; top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            transform: translate(-50%, -50%);
            object-fit: cover; z-index: 0;
        }
        header .header-inner {
            display: flex; flex-direction: column; align-items: center;
            width: 100%; max-width: 1140px; margin: 0 auto;
            position: relative; z-index: 1;
        }
        header .header-logos { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        header .header-logos img { width: auto; height: auto; }
        header nav { display: flex; flex-direction: column; align-items: center; gap: 0; padding: 0; }
        header nav .nav-row {
            display: flex; flex-direction: row; justify-content: center;
            gap: 0 30px; padding: 4px 0; flex-wrap: wrap;
        }
        header nav a {
            text-decoration: none; color: #E5C86C;
            font-family: "Julius Sans One", sans-serif;
            font-size: 1.1em; font-weight: 700;
        }
        header nav a:hover { color: #fff; }
        header nav a.active { color: #fff; text-decoration: underline; text-underline-offset: 2px; }



        /* ── Sub-toolbar ── */
        .sub-toolbar {
            display: flex; justify-content: center; align-items: center;
            gap: 30px; padding: 8px 0;
            background: var(--toolbar-bg, #0A333A);
        }
        .sub-toolbar a {
            text-decoration: none; color: var(--toolbar-text, #8ED0EC);
            font-family: "Julius Sans One", sans-serif;
            font-size: 0.95em; font-weight: 700;
        }
        .sub-toolbar a:hover { color: #fff; }
        .sub-toolbar a.active { color: #fff; text-decoration: underline; text-underline-offset: 2px; }
        /* Content */
        .content {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px 60px;
            flex: 1;
            box-sizing: border-box;
        html, body { overflow-x: hidden; }
        }
        /* page heading styles in site-nav.js */

        /* Post masonry - 3 columns with natural heights */
        .post-grid {
            column-count: 3;
            column-gap: 16px;
        }
        @media (max-width: 900px) {
            .post-grid { column-count: 2; }
        }
        @media (max-width: 580px) {
            .post-grid { column-count: 1; }
        }

        /* Post card */
        .post-card {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 4px;
            overflow: hidden;
            break-inside: avoid;
            margin-bottom: 16px;
        }
        .post-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 14px 0;
        }
        .post-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
        }
        .post-author-info { flex: 1;
            box-sizing: border-box; }
        html, body { overflow-x: hidden; }
        .post-author {
            font-weight: 700;
            font-size: 0.85rem;
            color: #141B38;
        }
        .post-author a {
            color: #141B38;
            text-decoration: none;
        }
        .post-author a:hover { text-decoration: underline; }
        .post-time {
            font-size: 0.75rem;
            color: #888;
        }
        .post-message {
            padding: 10px 14px;
            font-size: 0.85rem;
            line-height: 1.45;
            color: #333;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .post-message.truncated {
            max-height: 7.5em;
            overflow: hidden;
            position: relative;
        }
        .post-message.truncated::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 2.5em;
            background: linear-gradient(transparent, #fff);
            pointer-events: none;
        }
        .read-more-btn {
            display: block;
            background: none;
            border: none;
            color: #141B38;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            padding: 0 14px 8px;
            font-family: inherit;
        }
        .read-more-btn:hover { color: #0d47a1; }
        .post-image {
            width: 100%;
            display: block;
        }
        .post-video-wrap {
            width: 100%;
            position: relative;
            padding-bottom: 56.25%;
            overflow: hidden;
        }
        .post-video-wrap.vertical { padding-bottom: 178%; }
        .post-video {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: none;
            display: block;
        }
        .post-footer {
            padding: 8px 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #eee;
        }
        .post-fb-link {
            color: #141B38;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .post-fb-link:hover { text-decoration: underline; }
        .post-comments-link { color: #31345A; text-decoration: none; font-size: 0.75rem; font-weight: 600; cursor: pointer; }
        .post-comments-link:hover { text-decoration: underline; }
        .blog-comments { padding: 0 14px 14px; border-top: 1px solid #eee; }
        .blog-comments .blog-signin-bar { text-align: center; padding: 12px 0; }
        .blog-comments .blog-signin-bar button { padding: 8px 20px; background: #31345A; color: #fff; border: none; border-radius: 6px; font-size: 0.85rem; font-weight: 600; cursor: pointer; }
        .blog-comments .blog-signin-bar button:hover { background: #4a4e7a; }
        .post-share-btn {
            color: #888;
            text-decoration: none;
            font-size: 0.75rem;
        }
        .post-share-btn:hover { color: #141B38; }

        /* Loading / status */
        .grid-status {
            text-align: center;
            padding: 40px 20px;
            font-size: 1rem;
            color: #888;
        }
        .grid-status.error { color: #e57373; }
        .spinner {
            display: inline-block;
            width: 32px; height: 32px;
            border: 3px solid #ddd;
            border-top-color: #141B38;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

    </style>

    <div class="page-heading-wrap"><h1 class="page-heading">Blog</h1></div>
    <div class="content">
        <div id="post-grid" class="post-grid"></div>
        <div id="grid-status" class="grid-status"><div class="spinner"></div></div>
        <div id="scroll-sentinel" style="height:1px;"></div>

<script>
var allPosts = [];
var currentPage = 0;
var totalPages = 1;
var loading = false;

var AVATAR_URL = '/images/yy-logo-80x90.png';

function escHtml(s) {
    var d = document.createElement('div');
    d.textContent = s || '';
    return d.innerHTML;
}

function timeAgo(dateStr) {
    var now = new Date();
    var then = new Date(dateStr);
    var diff = Math.floor((now - then) / 1000);
    if (diff < 60) return 'Just now';
    if (diff < 3600) return Math.floor(diff / 60) + ' minutes ago';
    if (diff < 86400) return Math.floor(diff / 3600) + ' hours ago';
    if (diff < 2592000) return Math.floor(diff / 86400) + ' days ago';
    if (diff < 31536000) return Math.floor(diff / 2592000) + ' months ago';
    return Math.floor(diff / 31536000) + ' years ago';
}

function fbPostUrl(postId) {
    var parts = postId.split('_');
    if (parts.length === 2) {
        return 'https://www.facebook.com/' + parts[0] + '/posts/' + parts[1];
    }
    return 'https://www.facebook.com/' + postId;
}

function renderPost(p, idx) {
    var message = escHtml(p.blog_message || '');
    var needsTruncate = (p.blog_message || '').length > 300;
    var cardId = 'post-' + idx;
    var html = '<div class="post-card" id="' + cardId + '">'
        + '<div class="post-header">'
        + '<img class="post-avatar" src="' + AVATAR_URL + '" alt="">'
        + '<div class="post-author-info"><div class="post-author"><a href="https://www.facebook.com/profile.php?id=100067968232160" target="_blank" rel="noopener">Yada Yah</a></div>'
        + '<div class="post-time">' + timeAgo(p.blog_create_dtime) + '</div></div>'
        + '</div>'
        + '<div class="post-message' + (needsTruncate ? ' truncated' : '') + '" id="msg-' + idx + '">'
        + message + '</div>';

    if (needsTruncate) {
        html += '<button class="read-more-btn" onclick="expandPost(' + idx + ')">... See More</button>';
    }

    if (p.blog_video_id) {
        var videoUrl = encodeURIComponent('https://www.facebook.com/reel/' + p.blog_video_id + '/');
        var wrapId = 'vid-wrap-' + idx;
        html += '<div class="post-video-wrap" id="' + wrapId + '">'
            + '<iframe class="post-video" src="https://www.facebook.com/plugins/video.php?href=' + videoUrl + '&width=500&show_text=false" scrolling="no" allowfullscreen allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share"></iframe>'
            + '</div>';
        // Use thumbnail aspect ratio to determine orientation
        if (p.blog_image) {
            (function(wid, src) {
                var probe = new Image();
                probe.onload = function() {
                    var wrap = document.getElementById(wid);
                    if (wrap && this.naturalHeight > this.naturalWidth) {
                        wrap.classList.add('vertical');
                    }
                };
                probe.src = src;
            })(wrapId, p.blog_image);
        }
    } else if (p.blog_image) {
        html += '<a href="' + fbPostUrl(p.blog_post_id) + '" target="_blank" rel="noopener">'
            + '<img class="post-image" src="' + escHtml(p.blog_image) + '" alt="" loading="lazy">'
            + '</a>';
    }

    html += '<div class="post-footer">'
        + '<a class="post-fb-link" href="' + fbPostUrl(p.blog_post_id) + '" target="_blank" rel="noopener">View on Facebook</a>'
        + '<a href="javascript:void(0)" class="post-comments-link" id="comment-link-' + idx + '" onclick="toggleBlogComments(\'' + escHtml(p.blog_post_id) + '\',' + idx + ',this)">' + (p.comment_count > 0 ? p.comment_count + ' Comment' + (p.comment_count !== 1 ? 's' : '') : 'Comments') + '</a>'
        + '</div>'
        + '<div class="blog-comments" id="blog-comments-' + idx + '" style="display:none;"></div>'
        + '</div>';

    return html;
}

function expandPost(idx) {
    var msg = document.getElementById('msg-' + idx);
    if (msg) {
        msg.classList.remove('truncated');
        var btn = msg.nextElementSibling;
        if (btn && btn.classList.contains('read-more-btn')) {
            btn.remove();
        }
    }
}

function loadPage() {
    if (loading || currentPage >= totalPages) return;
    loading = true;
    var nextPage = currentPage + 1;
    var status = document.getElementById('grid-status');
    status.innerHTML = '<div class="spinner"></div>';
    status.className = 'grid-status';

    fetch('/api/blog-posts.php?page=' + nextPage)
        .then(function(r) { return r.json(); })
        .then(function(data) {
            var grid = document.getElementById('post-grid');
            var html = '';
            for (var i = 0; i < data.posts.length; i++) {
                var globalIdx = allPosts.length;
                allPosts.push(data.posts[i]);
                html += renderPost(data.posts[i], globalIdx);
            }
            grid.insertAdjacentHTML('beforeend', html);
            currentPage = data.page;
            totalPages = data.total_pages;
            loading = false;

            if (currentPage >= totalPages) {
                status.textContent = data.total === 0 ? 'No posts found.' : '';
            } else {
                status.innerHTML = '';
            }
        })
        .catch(function(err) {
            document.getElementById('grid-status').textContent = 'Error loading posts.';
            document.getElementById('grid-status').className = 'grid-status error';
            loading = false;
        });
}

// Infinite scroll
var sentinel = document.getElementById('scroll-sentinel');
var observer = new IntersectionObserver(function(entries) {
    if (entries[0].isIntersecting && !loading) {
        loadPage();
    }
}, { rootMargin: '200px' });
observer.observe(sentinel);

// Initial load
loadPage();

// ── Blog comments ──
var _blogCommentLoaded = {};

function toggleBlogComments(postId, idx, linkEl) {
    var container = document.getElementById('blog-comments-' + idx);
    if (!container) return;

    if (container.style.display !== 'none') {
        container.style.display = 'none';
        return;
    }
    container.style.display = '';

    if (_blogCommentLoaded[idx]) return;
    _blogCommentLoaded[idx] = true;

    // Check if user is logged in
    fetch('/api/community-session.php', {credentials:'include'})
        .then(function(r) { return r.json(); })
        .then(function(session) {
            if (typeof VideoComments !== 'undefined') {
                VideoComments.openInline(postId, 'blog', 'facebook', 'blog-comments-' + idx, allPosts[idx].blog_message || '', allPosts[idx].blog_image || '');
            }
            if (!session.user) {
                // Add sign-in bar below comments
                var signin = document.createElement('div');
                signin.className = 'blog-signin-bar';
                signin.innerHTML = '<button onclick="blogSignIn()">Sign In to Leave a Comment</button>';
                container.appendChild(signin);
            }
        });
}

function blogSignIn() {
    if (typeof CommunityAuth !== 'undefined') {
        CommunityAuth.openLoginModal('login');
        window.addEventListener('message', function handler(e) {
            if (e.origin !== window.location.origin) return;
            if (e.data && e.data.type === 'oauth_complete') {
                window.removeEventListener('message', handler);
                location.reload();
            }
        });
        var checkInterval = setInterval(function() {
            var modal = document.getElementById('login-modal');
            if (!modal || !modal.classList.contains('active')) {
                clearInterval(checkInterval);
                fetch('/api/community-session.php', {credentials:'include'}).then(function(r){return r.json();}).then(function(d) {
                    if (d.user) location.reload();
                });
            }
        }, 500);
        setTimeout(function() { clearInterval(checkInterval); }, 120000);
    } else {
        window.location.href = '/chat#topics';
    }
}
</script>

<script>
(function(){fetch('/api/site-config.php').then(function(r){return r.json();}).then(function(cfg){
    var r=document.documentElement;
    if(cfg['toolbar-color-bg'])r.style.setProperty('--toolbar-bg','#'+cfg['toolbar-color-bg']);
    if(cfg['toolbar-color-text'])r.style.setProperty('--toolbar-text','#'+cfg['toolbar-color-text']);
    document.querySelectorAll('[data-config]').forEach(function(el){var k=el.getAttribute('data-config');if(cfg[k]!=null)el.textContent=cfg[k];});
});})();
</script>
