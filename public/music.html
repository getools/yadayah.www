<script>
var allVideos = [];
var currentPage = 0;
var totalPages = 1;
var loading = false;
var MUSIC_RECORDS = 0; // 0 = infinite scroll; >0 = load this many then stop

VideoLightbox.configure({
    pageCode: 'music',
    videoSource: 'youtube',
    getVideoId: function(v) { return v.music_video_id || ''; },
    getTitle: function(v) { return v.music_title || ''; },
    getThumbnail: function(v) { return v.music_thumbnail || 'https://i.ytimg.com/vi/' + v.music_video_id + '/hqdefault.jpg'; },
    // Auto-play through the rest of the song list once the current track
    // ends. YouTube's embed honours a `playlist=ID2,ID3,…` param: when the
    // main video finishes, the player advances through that list in order.
    // We rebuild the param on each open so it reflects whichever song the
    // user picked (anything BEFORE that song is dropped). The user can
    // still use the prev/next arrows or YouTube's own skip buttons.
    getEmbedUrl: function(v) {
        // Build the ordered ID list from the clicked song through the end
        // of the loaded list. YouTube's embed plays the `playlist` param
        // starting at its FIRST entry — so the current song MUST be the
        // first element. Previously the playlist held only the SONGS
        // AFTER the current one, so the player skipped the clicked song
        // and started on the next (off-by-one: song N played song N+1,
        // and the last two both played the final song).
        var idx = allVideos.indexOf(v);
        var ids = [];
        if (idx >= 0) {
            for (var i = idx; i < allVideos.length; i++) {
                if (allVideos[i].music_video_id) ids.push(allVideos[i].music_video_id);
            }
        } else if (v.music_video_id) {
            ids.push(v.music_video_id);
        }
        var first = ids[0] || (v.music_video_id || '');
        var url = 'https://www.youtube.com/embed/' + first + '?autoplay=1&rel=0';
        // playlist must lead with `first` so playback begins on the
        // clicked song, then continues through the rest in order.
        if (ids.length > 1) url += '&playlist=' + ids.join(',');
        return url;
    }
});

function escHtml(s) {
    var d = document.createElement('div');
    d.textContent = s || '';
    return d.innerHTML;
}

function formatDate(d) {
    if (!d) return '';
    var dt = new Date(d);
    if (isNaN(dt)) return '';
    return dt.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
}

function renderCard(v, idx) {
    var thumb = v.music_thumbnail || '';
    var title = v.music_title || 'Music';
    var date = formatDate(v.music_create);
    return '<div class="video-card" onclick="VideoLightbox.open(' + idx + ')">'
        + '<div class="video-thumb">'
        + '<img src="' + escHtml(thumb) + '" alt="' + escHtml(title) + '" loading="lazy">'
        + '<div class="play-btn"><svg viewBox="0 0 24 24"><polygon points="8,5 19,12 8,19"/></svg></div>'
        + '</div>'
        + '<div class="video-title">' + escHtml(title) + '</div>'
        + (date ? '<div class="video-date">' + date + '</div>' : '')
        + '</div>';
}

function loadPage() {
    if (loading || currentPage >= totalPages) return;
    loading = true;
    var status = document.getElementById('grid-status');
    status.innerHTML = '<div class="spinner"></div>';
    status.className = 'grid-status';

    var url = MUSIC_RECORDS > 0
        ? '/api/music-videos.php?limit=' + MUSIC_RECORDS
        : '/api/music-videos.php?page=' + (currentPage + 1);

    fetch(url)
        .then(function(r) { return r.json(); })
        .then(function(data) {
            var grid = document.getElementById('video-grid');
            var html = '';
            for (var i = 0; i < data.videos.length; i++) {
                var globalIdx = allVideos.length;
                allVideos.push(data.videos[i]);
                html += renderCard(data.videos[i], globalIdx);
            }
            grid.insertAdjacentHTML('beforeend', html);
            currentPage = data.page;
            totalPages = data.total_pages;
            loading = false;

            VideoLightbox.setVideos(allVideos);
            if (currentPage >= totalPages) {
                status.textContent = data.total === 0 ? 'No videos found.' : '';
            } else {
                status.innerHTML = '';
            }
        })
        .catch(function(err) {
            document.getElementById('grid-status').textContent = 'Error loading videos.';
            document.getElementById('grid-status').className = 'grid-status error';
            loading = false;
        });
}

// Load page config (cached 24h, busted on admin save)
fetch('/api/page-music-config.php')
    .then(function(r) { return r.json(); })
    .then(function(cfg) {
        var root = document.documentElement;
        if (cfg['background'])         root.style.setProperty('--music-bg',     cfg['background']);
        if (cfg['heading-color'])      root.style.setProperty('--heading-color', cfg['heading-color']);
        if (cfg['heading-bg'])         root.style.setProperty('--heading-bg',    cfg['heading-bg']);
        if (cfg['label-color'])        root.style.setProperty('--label-color',   cfg['label-color']);
        if (cfg['label-size'])         root.style.setProperty('--label-size',    cfg['label-size'] + 'em');
        if (cfg['columns'])            root.style.setProperty('--grid-cols',      cfg['columns']);
        if (cfg['spacing-horizontal']) root.style.setProperty('--grid-gap-h',    cfg['spacing-horizontal'] + 'px');
        if (cfg['spacing-vertical'])   root.style.setProperty('--grid-gap-v',    cfg['spacing-vertical'] + 'px');
        if (cfg['heading'])            document.getElementById('music-heading').textContent = cfg['heading'];
        if (cfg['records'])            MUSIC_RECORDS = parseInt(cfg['records']) || 0;
    });

// Infinite scroll via IntersectionObserver
var sentinel = document.getElementById('scroll-sentinel');
var observer = new IntersectionObserver(function(entries) {
    if (entries[0].isIntersecting && !loading) {
        loadPage();
    }
}, { rootMargin: '200px' });
observer.observe(sentinel);

// Initial load
loadPage();
</script>

<script>

    document.querySelectorAll('[data-config]').forEach(function(el){var k=el.getAttribute('data-config');if(cfg[k]!=null)el.textContent=cfg[k];});
});})();
</script>
