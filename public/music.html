<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Julius+Sans+One&family=Maven+Pro:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/video-comments.css">
    <link rel="stylesheet" href="/css/login-modal.css">
    <style>
        html { height: 100%; }
        body {
            font-family: 'Maven Pro', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: var(--music-bg, #373737);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Site header */
        header {
            display: flex; flex-direction: column; align-items: center;
            padding: 0;
            background: url('/images/yy-bg-bluewave.jpg') center/cover no-repeat;
            position: relative; overflow: hidden;
        }
        header .header-video {
            position: absolute; top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            transform: translate(-50%, -50%);
            object-fit: cover; z-index: 0;
        }
        header .header-inner {
            display: flex; flex-direction: column; align-items: center;
            width: 100%; max-width: 1140px; margin: 0 auto;
            position: relative; z-index: 1;
        }
        header .header-logos { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        header .header-logos img { width: auto; height: auto; }
        header nav { display: flex; flex-direction: column; align-items: center; gap: 0; padding: 0; }
        header nav .nav-row {
            display: flex; flex-direction: row; justify-content: center;
            gap: 0 30px; padding: 4px 0; flex-wrap: wrap;
        }
        header nav a {
            text-decoration: none; color: #E5C86C;
            font-family: "Julius Sans One", sans-serif;
            font-size: 1.1em; font-weight: 700;
        }
        header nav a:hover { color: #fff; }
        header nav a.active { color: #fff; text-decoration: underline; text-underline-offset: 5px; }



        /* ── Sub-toolbar ── */
        .sub-toolbar {
            display: flex; justify-content: center; align-items: center;
            gap: 30px; padding: 8px 0;
            background: var(--toolbar-bg, #0A333A);
        }
        .sub-toolbar a {
            text-decoration: none; color: var(--toolbar-text, #8ED0EC);
            font-family: "Julius Sans One", sans-serif;
            font-size: 0.95em; font-weight: 700;
        }
        .sub-toolbar a:hover { color: #fff; }
        .sub-toolbar a.active { color: #fff; text-decoration: underline; text-underline-offset: 5px; }
        /* Content */
        .content {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 24px 60px;
            flex: 1;
            box-sizing: border-box;
        html, body { overflow-x: hidden; }
        }
        .content h1 {
            font-family: 'Julius Sans One', sans-serif;
            font-size: 2.2em;
            font-weight: 700;
            color: var(--heading-color, #E5C86C);
            text-align: center;
            margin: 0 0 30px;
        }

        /* Video grid */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(var(--grid-cols, 4), 1fr);
            column-gap: var(--grid-gap-h, 16px);
            row-gap: var(--grid-gap-v, 16px);
        }
        .video-card {
            border-radius: 8px;
            overflow: hidden;
            background: rgba(255,255,255,0.07);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .video-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        }
        .video-thumb {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            overflow: hidden;
            background: #000;
        }
        .video-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .play-btn {
            position: absolute;
            bottom: 8px; right: 8px;
            width: 39px; height: 39px;
            background: rgba(0,0,0,0.35);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            transition: background 0.2s;
        }
        .video-card:hover .play-btn { background: rgba(20,27,56,0.5); }
        .play-btn svg {
            width: 17px; height: 17px;
            fill: rgba(255,255,255,0.75);
        }
        .video-title {
            padding: 10px 12px 2px;
            font-size: var(--label-size, 0.85em);
            font-weight: 500;
            color: var(--label-color, rgba(255,255,255,0.85));
            line-height: 1.3;
            max-height: 4rem;
            overflow: hidden;
        }
        .video-date {
            padding: 0 12px 10px;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.45);
        }

        /* Loading / status */
        .grid-status {
            text-align: center;
            padding: 40px 20px;
            font-size: 1rem;
            color: rgba(255,255,255,0.5);
        }
        .grid-status.error { color: #e57373; }
        .spinner {
            display: inline-block;
            width: 32px; height: 32px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top-color: #E5C86C;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Lightbox */
        .lightbox-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.92);
            z-index: 10000;
            justify-content: center;
            align-items: center;
        }
        .lightbox-overlay.active { display: flex; }
        .lightbox-container {
            position: relative;
            width: 90%;
            max-width: 900px;
        }
        .lightbox-video {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 6px;
            overflow: hidden;
        }
        .lightbox-video iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .lightbox-close {
            position: absolute;
            top: -40px; right: 0;
            color: #fff;
            font-size: 2rem;
            cursor: pointer;
            background: none;
            border: none;
            padding: 4px 10px;
            line-height: 1;
            opacity: 0.8;
            transition: opacity 0.2s;
        }
        .lightbox-close:hover { opacity: 1; color: #E5C86C; }
        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: #fff;
            font-size: 2.5rem;
            cursor: pointer;
            background: rgba(0,0,0,0.5);
            border: none;
            border-radius: 50%;
            width: 48px; height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.7;
            transition: opacity 0.2s, background 0.2s;
        }
        .lightbox-nav:hover { opacity: 1; background: rgba(0,0,0,0.8); }
        .lightbox-prev { left: -60px; }
        .lightbox-next { right: -60px; }
        .lightbox-caption {
            text-align: center;
            color: rgba(255,255,255,0.8);
            font-size: 0.9rem;
            margin-top: 12px;
            line-height: 1.4;
        }
        @media (max-width: 1024px) {
            .lightbox-prev { left: 8px; }
            .lightbox-next { right: 8px; }
        }

    </style>
<script src="/js/site-nav.js"></script>
</head>
<body>
    <header>
    <video class="header-video" autoplay muted loop playsinline>
    </video>
    <div class="header-inner">
        <div class="header-logos">
            <a href="/"><img src="/images/yy-logo-80x90.png" alt="Yada Yah"></a>
        </div>
        <nav>
            <div class="nav-row">
                <a href="books">Books</a>
                <a href="blog">Blog</a>
                <a href="resources">Resources</a>
                <a href="/Craig_Winn">Winn</a>
                <a href="/timeline">Timeline</a>
            </div>
            <div class="nav-row">
                <a href="/translations">Translations</a>
                <a href="/media">Media</a>
                <a href="/music">Music</a>
                <a href="/ask">Ask</a>
            </div>
        </nav>
    </div>
</header>


    <div class="content">
        <h1 id="music-heading">Music</h1>
        <div id="video-grid" class="video-grid"></div>
        <div id="grid-status" class="grid-status"><div class="spinner"></div></div>
        <div id="scroll-sentinel" style="height:1px;"></div>
    </div>

    <!-- Lightbox -->
    <div id="lightbox" class="lightbox-overlay" onclick="if(event.target===this)closeLightbox()">
        <div class="lightbox-container">
            <button class="lightbox-close" onclick="closeLightbox()">&times;</button>
            <button class="lightbox-nav lightbox-prev" onclick="navLightbox(-1)">&#8249;</button>
            <button class="lightbox-nav lightbox-next" onclick="navLightbox(1)">&#8250;</button>
            <div class="lightbox-video">
                <iframe id="lb-iframe" src="" allowfullscreen allow="autoplay; encrypted-media"></iframe>
            </div>
            <div id="lb-caption" class="lightbox-caption"></div>
            <div id="video-comments"></div>
        </div>
    </div>

    <div class="login-modal" id="login-modal" onclick="if(event.target===this)CommunityAuth.closeLoginModal()"></div>
    <footer></footer>

<script src="/js/community-auth.js"></script>
<script src="/js/video-comments.js"></script>
<script>
var allVideos = [];
var currentPage = 0;
var totalPages = 1;
var loading = false;
var lbIndex = -1;
var MUSIC_RECORDS = 0; // 0 = infinite scroll; >0 = load this many then stop

function escHtml(s) {
    var d = document.createElement('div');
    d.textContent = s || '';
    return d.innerHTML;
}

function formatDate(d) {
    if (!d) return '';
    var dt = new Date(d);
    if (isNaN(dt)) return '';
    return dt.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
}

function renderCard(v, idx) {
    var thumb = v.music_thumbnail || '';
    var title = v.music_title || 'Music';
    var date = formatDate(v.music_create);
    return '<div class="video-card" onclick="openLightbox(' + idx + ')">'
        + '<div class="video-thumb">'
        + '<img src="' + escHtml(thumb) + '" alt="' + escHtml(title) + '" loading="lazy">'
        + '<div class="play-btn"><svg viewBox="0 0 24 24"><polygon points="8,5 19,12 8,19"/></svg></div>'
        + '</div>'
        + '<div class="video-title">' + escHtml(title) + '</div>'
        + (date ? '<div class="video-date">' + date + '</div>' : '')
        + '</div>';
}

function loadPage() {
    if (loading || currentPage >= totalPages) return;
    loading = true;
    var status = document.getElementById('grid-status');
    status.innerHTML = '<div class="spinner"></div>';
    status.className = 'grid-status';

    var url = MUSIC_RECORDS > 0
        ? '/api/music-videos.php?limit=' + MUSIC_RECORDS
        : '/api/music-videos.php?page=' + (currentPage + 1);

    fetch(url)
        .then(function(r) { return r.json(); })
        .then(function(data) {
            var grid = document.getElementById('video-grid');
            var html = '';
            for (var i = 0; i < data.videos.length; i++) {
                var globalIdx = allVideos.length;
                allVideos.push(data.videos[i]);
                html += renderCard(data.videos[i], globalIdx);
            }
            grid.insertAdjacentHTML('beforeend', html);
            currentPage = data.page;
            totalPages = data.total_pages;
            loading = false;

            if (currentPage >= totalPages) {
                status.textContent = data.total === 0 ? 'No videos found.' : '';
            } else {
                status.innerHTML = '';
            }
        })
        .catch(function(err) {
            document.getElementById('grid-status').textContent = 'Error loading videos.';
            document.getElementById('grid-status').className = 'grid-status error';
            loading = false;
        });
}

// Load page config (cached 24h, busted on admin save)
fetch('/api/page-music-config.php')
    .then(function(r) { return r.json(); })
    .then(function(cfg) {
        var root = document.documentElement;
        if (cfg['background'])         root.style.setProperty('--music-bg',     cfg['background']);
        if (cfg['heading-color'])      root.style.setProperty('--heading-color', cfg['heading-color']);
        if (cfg['label-color'])        root.style.setProperty('--label-color',   cfg['label-color']);
        if (cfg['label-size'])         root.style.setProperty('--label-size',    cfg['label-size'] + 'em');
        if (cfg['columns'])            root.style.setProperty('--grid-cols',      cfg['columns']);
        if (cfg['spacing-horizontal']) root.style.setProperty('--grid-gap-h',    cfg['spacing-horizontal'] + 'px');
        if (cfg['spacing-vertical'])   root.style.setProperty('--grid-gap-v',    cfg['spacing-vertical'] + 'px');
        if (cfg['heading'])            document.getElementById('music-heading').textContent = cfg['heading'];
        if (cfg['records'])            MUSIC_RECORDS = parseInt(cfg['records']) || 0;
    });

// Infinite scroll via IntersectionObserver
var sentinel = document.getElementById('scroll-sentinel');
var observer = new IntersectionObserver(function(entries) {
    if (entries[0].isIntersecting && !loading) {
        loadPage();
    }
}, { rootMargin: '200px' });
observer.observe(sentinel);

// Lightbox
function ytEmbedUrl(videoId) {
    return 'https://www.youtube.com/embed/' + videoId + '?autoplay=1&rel=0';
}

function openLightbox(idx) {
    lbIndex = idx;
    var v = allVideos[idx];
    if (!v) return;
    document.getElementById('lb-iframe').src = ytEmbedUrl(v.music_video_id);
    document.getElementById('lb-caption').textContent = v.music_title || '';
    document.getElementById('lightbox').classList.add('active');
    document.body.style.overflow = 'hidden';
    VideoComments.open(v.music_video_id, 'youtube');
}

function closeLightbox() {
    document.getElementById('lightbox').classList.remove('active');
    document.getElementById('lb-iframe').src = '';
    document.body.style.overflow = '';
    VideoComments.close();
}

function navLightbox(dir) {
    var next = lbIndex + dir;
    if (next < 0 || next >= allVideos.length) return;
    openLightbox(next);
}

document.addEventListener('keydown', function(e) {
    if (!document.getElementById('lightbox').classList.contains('active')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') navLightbox(-1);
    if (e.key === 'ArrowRight') navLightbox(1);
});

// Swipe support
(function() {
    var lb = document.getElementById('lightbox');
    var startX = 0;
    lb.addEventListener('touchstart', function(e) { startX = e.touches[0].clientX; });
    lb.addEventListener('touchend', function(e) {
        var diff = e.changedTouches[0].clientX - startX;
        if (Math.abs(diff) > 50) {
            navLightbox(diff > 0 ? -1 : 1);
        }
    });
})();

// Initial load
loadPage();
</script>
<script src="/js/bg-video.js"></script>
<script>
(function(){fetch('/api/site-config.php').then(function(r){return r.json();}).then(function(cfg){
    var r=document.documentElement;
    if(cfg['toolbar-color-bg'])r.style.setProperty('--toolbar-bg','#'+cfg['toolbar-color-bg']);
    if(cfg['toolbar-color-text'])r.style.setProperty('--toolbar-text','#'+cfg['toolbar-color-text']);
    document.querySelectorAll('[data-config]').forEach(function(el){var k=el.getAttribute('data-config');if(cfg[k]!=null)el.textContent=cfg[k];});
});})();
</script>
<script src="/js/site-footer.js"></script>
</body>
</html>
