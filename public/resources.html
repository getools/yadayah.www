<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resources</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Julius+Sans+One&family=Maven+Pro:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        html { height: 100%; }
        body {
            font-family: 'Maven Pro', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #fff;
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Site header */
        header {
            display: flex; flex-direction: column; align-items: center;
            padding: 0;
            background: url('/images/yy-bg-bluewave.jpg') center/cover no-repeat;
            position: relative; overflow: hidden;
        }
        header .header-video {
            position: absolute; top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            transform: translate(-50%, -50%);
            object-fit: cover; z-index: 0;
        }
        header .header-inner {
            display: flex; flex-direction: column; align-items: center;
            width: 100%; max-width: 1140px; margin: 0 auto;
            position: relative; z-index: 1;
        }
        header .header-logos { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        header .header-logos img { width: auto; height: auto; }
        header nav { display: flex; flex-direction: column; align-items: center; gap: 0; padding: 0; }
        header nav .nav-row {
            display: flex; flex-direction: row; justify-content: center;
            gap: 0 30px; padding: 4px 0; flex-wrap: wrap;
        }
        header nav a {
            text-decoration: none; color: #E5C86C;
            font-family: "Julius Sans One", sans-serif;
            font-size: 1.1em; font-weight: 700;
        }
        header nav a:hover { color: #fff; }
        header nav a.active { color: #fff; text-decoration: underline; text-underline-offset: 5px; }



        /* ── Sub-toolbar ── */
        .sub-toolbar {
            display: flex; justify-content: center; align-items: center;
            gap: 30px; padding: 8px 0;
            background: var(--toolbar-bg, #0A333A);
        }
        .sub-toolbar a {
            text-decoration: none; color: var(--toolbar-text, #8ED0EC);
            font-family: "Julius Sans One", sans-serif;
            font-size: 0.95em; font-weight: 700;
        }
        .sub-toolbar a:hover { color: #fff; }
        .sub-toolbar a.active { color: #fff; text-decoration: underline; text-underline-offset: 5px; }
        /* Content area */
        .content {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 24px 60px;
            flex: 1;
        }
        /* page heading styles in site-nav.js */

        /* Resource card */
        .resource-card {
            display: flex;
            gap: 20px;
            padding: 24px;
            margin-bottom: 30px;
            background: #f8f8f8;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
        }
        .resource-card .resource-icon {
            flex-shrink: 0;
            width: 75px;
            display: block;
        }
        .resource-card .resource-icon img {
            width: 75px;
            height: auto;
            object-fit: contain;
        }
        .resource-card .resource-body {
            flex: 1;
        }
        .resource-card h2 {
            font-family: 'Julius Sans One', sans-serif;
            font-size: 1.4em;
            font-weight: 700;
            color: #222;
            margin: 0 0 4px;
        }
        .resource-card .resource-date {
            font-size: 0.85em;
            color: #888;
            margin: 0 0 10px;
        }
        .resource-card p {
            font-size: 0.95em;
            line-height: 1.5;
            color: #444;
            margin: 0 0 12px;
        }
        .resource-card .download-link {
            display: inline-block;
            margin-top: 8px;
            color: #1a73e8;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95em;
        }
        .resource-card .download-link:hover {
            color: #0d47a1;
            text-decoration: underline;
        }
        @media (max-width: 500px) {
            .resource-card { flex-direction: column; align-items: center; text-align: center; }
        }

    </style>
<script src="/js/site-nav.js?v=17"></script>
    <link rel="stylesheet" href="/css/page-heading.css?v=2">
</head>
<body>
    <header>
    <video class="header-video" autoplay muted loop playsinline>
    </video>
    <div class="header-inner">
        <div class="header-logos">
            <a href="/"><img src="/images/yy-logo-80x90.png" alt="Yada Yah"></a>
        </div>
        <nav>
            <div class="nav-row">
                <a href="books">Books</a>
                <a href="blog">Blog</a>
                <a href="resources">Resources</a>
                <a href="/Craig_Winn">Winn</a>
                <a href="/timeline">Timeline</a>
            </div>
            <div class="nav-row">
                <a href="/translations">Translations</a>
                <a href="/media">Media</a>
                <a href="/music">Music</a>
                <a href="/ask">Ask</a>
            </div>
        </nav>
    </div>
</header>


    <div class="page-heading-wrap"><h1 class="page-heading">Resources</h1></div>
    <div class="content">
        <div id="resources-container"><div style="text-align:center;padding:40px;color:#888">Loading resources...</div></div>
    </div>

<script>
function esc(s) {
    if (!s) return '';
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}

fetch('/api/resources.php')
    .then(function(r) { return r.json(); })
    .then(function(data) {
        var resources = data.resources || [];
        var html = '';
        for (var i = 0; i < resources.length; i++) {
            var r = resources[i];
            html += '<div class="resource-card">';
            if (r.resource_image) {
                html += '<a href="' + esc(r.resource_link_url || '#') + '" class="resource-icon">';
                html += '<img src="' + esc(r.resource_image) + '" alt="' + esc(r.resource_title) + '">';
                html += '</a>';
            } else {
                html += '<div class="resource-icon"></div>';
            }
            html += '<div class="resource-body">';
            html += '<h2><a href="' + esc(r.resource_link_url || '#') + '" style="color:inherit;text-decoration:none">' + esc(r.resource_title) + '</a></h2>';
            if (r.resource_subtitle) html += '<div class="resource-date">' + esc(r.resource_subtitle) + '</div>';
            if (r.resource_summary) html += '<div class="resource-summary">' + r.resource_summary + '</div>';
            if (r.resource_link_url && r.resource_link_title) {
                html += '<a href="' + esc(r.resource_link_url) + '" class="download-link">[' + esc(r.resource_link_title) + ']</a>';
            }
            html += '</div></div>';
        }
        document.getElementById('resources-container').innerHTML = html || '<div style="text-align:center;padding:40px;color:#999">No resources found.</div>';
    });
</script>

    <footer></footer>
<script src="/js/bg-video.js"></script>
<script>
(function(){fetch('/api/site-config.php').then(function(r){return r.json();}).then(function(cfg){
    var r=document.documentElement;
    if(cfg['toolbar-color-bg'])r.style.setProperty('--toolbar-bg','#'+cfg['toolbar-color-bg']);
    if(cfg['toolbar-color-text'])r.style.setProperty('--toolbar-text','#'+cfg['toolbar-color-text']);
    document.querySelectorAll('[data-config]').forEach(function(el){var k=el.getAttribute('data-config');if(cfg[k]!=null)el.textContent=cfg[k];});
});})();
</script>
<script src="/js/site-footer.js?v=127"></script>
</body>
</html>
