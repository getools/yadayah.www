    <style>
        html { height: 100%; }
        body {
            font-family: 'Maven Pro', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: var(--basics-bg, #373737);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Site header */
        header {
            display: flex; flex-direction: column; align-items: center;
            padding: 0;
            background: url('/images/yy-bg-bluewave.jpg') center/cover no-repeat;
            position: relative; overflow: hidden;
        }
        header .header-video {
            position: absolute; top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            transform: translate(-50%, -50%);
            object-fit: cover; z-index: 0;
        }
        header .header-inner {
            display: flex; flex-direction: column; align-items: center;
            width: 100%; max-width: 1140px; margin: 0 auto;
            position: relative; z-index: 1;
        }
        header .header-logos { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        header .header-logos img { width: auto; height: auto; }
        header nav { display: flex; flex-direction: column; align-items: center; gap: 0; padding: 0; }
        header nav .nav-row {
            display: flex; flex-direction: row; justify-content: center;
            gap: 0 30px; padding: 4px 0; flex-wrap: wrap;
        }
        header nav a {
            text-decoration: none; color: #E5C86C;
            font-family: "Julius Sans One", sans-serif;
            font-size: 1.1em; font-weight: 700;
        }
        header nav a:hover { color: #fff; }
        header nav a.active { color: #fff; text-decoration: underline; text-underline-offset: 2px; }



        /* ── Sub-toolbar ── */
        .sub-toolbar {
            display: flex; justify-content: center; align-items: center;
            gap: 30px; padding: 8px 0;
            background: var(--toolbar-bg, #0A333A);
        }
        .sub-toolbar a {
            text-decoration: none; color: var(--toolbar-text, #8ED0EC);
            font-family: "Julius Sans One", sans-serif;
            font-size: 0.95em; font-weight: 700;
        }
        .sub-toolbar a:hover { color: #fff; }
        .sub-toolbar a.active { color: #fff; text-decoration: underline; text-underline-offset: 2px; }
        /* Content */
        .content {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px 60px;
            flex: 1;
            box-sizing: border-box;
        }
        /* page heading styles now in site-nav.js */

        /* Video grid */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(var(--grid-cols, 4), 1fr);
            column-gap: var(--grid-gap-h, 16px);
            row-gap: var(--grid-gap-v, 16px);
        }
        .video-card {
            border-radius: 8px;
            overflow: hidden;
            background: rgba(255,255,255,0.07);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .video-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        }
        .video-thumb {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            overflow: hidden;
            background: #000;
        }
        .video-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .play-btn {
            position: absolute;
            bottom: 8px; right: 8px;
            width: 39px; height: 39px;
            background: rgba(0,0,0,0.35);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            transition: background 0.2s;
        }
        .video-card:hover .play-btn { background: rgba(20,27,56,0.5); }
        .play-btn svg {
            width: 17px; height: 17px;
            fill: rgba(255,255,255,0.75);
        }
        .video-title {
            padding: 10px 12px 2px;
            font-size: var(--label-size, 0.85em);
            font-weight: 500;
            color: var(--label-color, rgba(255,255,255,0.85));
            line-height: 1.3;
            max-height: 4rem;
            overflow: hidden;
        }
        .video-date {
            padding: 0 12px 10px;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.45);
        }

        /* Loading / status */
        .grid-status {
            text-align: center;
            padding: 40px 20px;
            font-size: 1rem;
            color: rgba(255,255,255,0.5);
        }
        .grid-status.error { color: #e57373; }
        .spinner {
            display: inline-block;
            width: 32px; height: 32px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top-color: #E5C86C;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Lightbox */
        .lightbox-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.92);
            z-index: 10000;
            justify-content: center;
            align-items: center;
        }
        .lightbox-overlay.active { display: flex; }
        .lightbox-container {
            position: relative;
            width: 90%;
            max-width: 900px;
        }
        .lightbox-video {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 6px;
            overflow: hidden;
        }
        .lightbox-video iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .lightbox-close {
            position: absolute;
            top: -40px; right: 0;
            color: #fff;
            font-size: 2rem;
            cursor: pointer;
            background: none;
            border: none;
            padding: 4px 10px;
            line-height: 1;
            opacity: 0.8;
            transition: opacity 0.2s;
        }
        .lightbox-close:hover { opacity: 1; color: #E5C86C; }
        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: #fff;
            font-size: 2.5rem;
            cursor: pointer;
            background: rgba(0,0,0,0.5);
            border: none;
            border-radius: 50%;
            width: 48px; height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.7;
            transition: opacity 0.2s, background 0.2s;
        }
        .lightbox-nav:hover { opacity: 1; background: rgba(0,0,0,0.8); }
        .lightbox-prev { left: -60px; }
        .lightbox-next { right: -60px; }
        .lightbox-caption {
            text-align: center;
            color: rgba(255,255,255,0.8);
            font-size: 0.9rem;
            margin-top: 12px;
            line-height: 1.4;
        }
        .vc-toggle-bar { width: 100%; background: rgba(255,255,255,0.1); border: none; border-top: 1px solid rgba(255,255,255,0.2); padding: 6px 0; cursor: pointer; font-size: 0.78rem; font-weight: 600; color: rgba(255,255,255,0.7); text-align: center; transition: background 0.15s; margin-top: 6px; border-radius: 4px 4px 0 0; }
        .vc-toggle-bar:hover { background: rgba(255,255,255,0.2); color: #fff; }
        .lightbox-container.comments-expanded .lightbox-video { height: 0; overflow: hidden; }
        .lightbox-container.comments-expanded #lb-caption { display: none; }
        .lightbox-container.comments-expanded #video-comments { max-height: 70vh; }
        #video-comments {
            background: #fff;
            border-radius: 0 0 8px 8px;
            max-height: 250px;
            overflow-y: auto;
            padding: 12px 16px;
        }
        @media (max-width: 1024px) {
            .lightbox-prev { left: 8px; }
            .lightbox-next { right: 8px; }
        }

    </style>

<script>
var allVideos = [];
var currentPage = 0;
var totalPages = 1;
var loading = false;
var BASICS_RECORDS = 0; // 0 = infinite scroll; >0 = load this many then stop

function escHtml(s) {
    var d = document.createElement('div');
    d.textContent = s || '';
    return d.innerHTML;
}

function formatDate(d) {
    if (!d) return '';
    var dt = new Date(d);
    if (isNaN(dt)) return '';
    return dt.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
}

function renderCard(v, idx) {
    var thumb = v.basics_thumbnail || '';
    var title = v.basics_title || 'Basics';
    var date = formatDate(v.basics_create);
    var audioIcon = v.basics_audio ? '<a href="/' + escHtml(v.basics_audio) + '" target="_blank" onclick="event.stopPropagation();" title="Listen to MP3" style="position:absolute;top:6px;right:6px;font-size:1.3rem;text-decoration:none;background:rgba(0,0,0,0.6);border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;z-index:2;">&#127911;</a>' : '';
    return '<div class="video-card" style="position:relative;" onclick="VideoLightbox.open(' + idx + ')">'
        + audioIcon
        + '<div class="video-thumb">'
        + '<img src="' + escHtml(thumb) + '" alt="' + escHtml(title) + '" loading="lazy">'
        + '<div class="play-btn"><svg viewBox="0 0 24 24"><polygon points="8,5 19,12 8,19"/></svg></div>'
        + '</div>'
        + '<div class="video-title">' + escHtml(title) + '</div>'
        + (date ? '<div class="video-date">' + date + '</div>' : '')
        + '</div>';
}

function loadPage() {
    if (loading) return;
    loading = true;
    var status = document.getElementById('grid-status');
    status.innerHTML = '<div class="spinner"></div>';
    status.className = 'grid-status';

    fetch('/api/basics-videos.php?grouped=1')
        .then(function(r) { return r.json(); })
        .then(function(data) {
            var container = document.getElementById('video-grid');
            var sections = data.sections || [];
            var html = '';

            // Jump links
            if (sections.length > 1) {
                html += '<div style="grid-column:1/-1;display:flex;flex-wrap:wrap;justify-content:center;gap:8px 20px;padding:12px 0 8px;">';
                for (var j = 0; j < sections.length; j++) {
                    var jc = sections[j].category || {};
                    var jslug = jc.category_slug || 'uncategorized';
                    html += '<a href="#cat-' + jslug + '" style="color:var(--heading-color, #E5C86C);font-family:\'Julius Sans One\',sans-serif;font-size:0.9rem;text-decoration:none;" onmouseover="this.style.textDecoration=\'underline\'" onmouseout="this.style.textDecoration=\'none\'">' + escHtml(jc.category_title || 'Uncategorized') + '</a>';
                }
                html += '</div>';
            }

            for (var s = 0; s < sections.length; s++) {
                var sec = sections[s];
                var cat = sec.category;
                var slug = (cat && cat.category_slug) || 'uncategorized';

                // Section header
                if (cat) {
                    html += '<div id="cat-' + slug + '" class="basics-section-header" style="grid-column:1/-1;text-align:center;padding:10px 0 4px;background:var(--heading-bg, transparent);border-radius:8px;">';
                    html += '<h2 style="font-family:\'Julius Sans One\',sans-serif;font-size:1.4rem;color:var(--heading-color, #E5C86C);margin:0;">' + escHtml(cat.category_title || '') + '</h2>';
                    if (cat.category_subtitle) {
                        html += '<p style="font-size:0.9rem;color:rgba(255,255,255,0.7);margin:6px 0 0;">' + escHtml(cat.category_subtitle) + '</p>';
                    }
                    html += '</div>';
                }

                // Videos in this section
                var vids = sec.videos || [];
                for (var i = 0; i < vids.length; i++) {
                    var globalIdx = allVideos.length;
                    allVideos.push(vids[i]);
                    html += renderCard(vids[i], globalIdx);
                }
            }

            container.innerHTML = html;
            VideoLightbox.setVideos(allVideos);
            currentPage = 1;
            totalPages = 1;
            loading = false;
            status.textContent = data.total === 0 ? 'No videos found.' : '';
        })
        .catch(function(err) {
            document.getElementById('grid-status').textContent = 'Error loading videos.';
            document.getElementById('grid-status').className = 'grid-status error';
            loading = false;
        });
}

// Load page config (cached 24h, busted on admin save)
fetch('/api/page-basics-config.php')
    .then(function(r) { return r.json(); })
    .then(function(cfg) {
        var root = document.documentElement;
        if (cfg['background'])         root.style.setProperty('--basics-bg',     cfg['background']);
        if (cfg['heading-color'])      root.style.setProperty('--heading-color', cfg['heading-color']);
        if (cfg['heading-bg'])         root.style.setProperty('--heading-bg',    cfg['heading-bg']);
        if (cfg['label-color'])        root.style.setProperty('--label-color',   cfg['label-color']);
        if (cfg['label-size'])         root.style.setProperty('--label-size',    cfg['label-size'] + 'em');
        if (cfg['columns'])            root.style.setProperty('--grid-cols',      cfg['columns']);
        if (cfg['spacing-horizontal']) root.style.setProperty('--grid-gap-h',    cfg['spacing-horizontal'] + 'px');
        if (cfg['spacing-vertical'])   root.style.setProperty('--grid-gap-v',    cfg['spacing-vertical'] + 'px');
        if (cfg['heading'])            document.getElementById('basics-heading').textContent = cfg['heading'];
        if (cfg['records'])            BASICS_RECORDS = parseInt(cfg['records']) || 0;
    });

// Infinite scroll via IntersectionObserver
var sentinel = document.getElementById('scroll-sentinel');
var observer = new IntersectionObserver(function(entries) {
    if (entries[0].isIntersecting && !loading) {
        loadPage();
    }
}, { rootMargin: '200px' });
observer.observe(sentinel);

// Lightbox
function ytEmbedUrl(videoId) {
    return 'https://www.youtube.com/embed/' + videoId + '?autoplay=1&rel=0';
}

// Configure shared lightbox
VideoLightbox.configure({
    pageCode: 'basics',
    videoSource: 'youtube',
    getVideoId: function(v) { return v.basics_video_id; },
    getTitle: function(v) { return v.basics_title || 'Basics'; },
    getThumbnail: function(v) { return v.basics_thumbnail || 'https://i.ytimg.com/vi/' + v.basics_video_id + '/hqdefault.jpg'; },
    getEmbedUrl: function(v) { return ytEmbedUrl(v.basics_video_id); }
});

// Initial load
loadPage();
</script>

<script>
(function(){fetch('/api/site-config.php').then(function(r){return r.json();}).then(function(cfg){
    var r=document.documentElement;
    if(cfg['toolbar-color-bg'])r.style.setProperty('--toolbar-bg','#'+cfg['toolbar-color-bg']);
    if(cfg['toolbar-color-text'])r.style.setProperty('--toolbar-text','#'+cfg['toolbar-color-text']);
    document.querySelectorAll('[data-config]').forEach(function(el){var k=el.getAttribute('data-config');if(cfg[k]!=null)el.textContent=cfg[k];});
});})();
</script>
