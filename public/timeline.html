        .timeline-wrap {
            width: 100%;
            max-width: 1100px;
            margin: 20px auto;
            position: relative;
            padding: 10px 0;
            flex: 0 0 auto;
            box-sizing: border-box;
        }
        html, body { overflow-x: hidden; }

        /* Vertical center line */
        .timeline-wrap::before {
            content: '';
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 4px;
            background: #000;
            transform: translateX(-50%);
        }

        /* Single event */
        .tl-event {
            display: flex;
            width: 100%;
            position: absolute;
            left: 0;
        }

        /* Circle on the center line – color set per card */
        .tl-event::before {
            content: '';
            position: absolute;
            left: 50%;
            top: 28px;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            transform: translateX(-50%);
            z-index: 2;
        }
        .tl-event.tl-gold::before { background: var(--color-row-a, #e5a800); border: 3px solid color-mix(in srgb, var(--color-row-a, #e5a800) 70%, #000); }
        .tl-event.tl-blue::before { background: var(--color-row-b, #283dd8); border: 3px solid color-mix(in srgb, var(--color-row-b, #283dd8) 70%, #000); }

        /* Left-side events */
        .tl-event.tl-left .tl-card {
            margin-right: auto;
            margin-left: 0;
            width: 45%;
        }
        .tl-event.tl-left .tl-spacer { width: 55%; }

        /* Right-side events */
        .tl-event.tl-right .tl-spacer { width: 55%; order: -1; }

            margin-left: auto;

        .tl-event.tl-blue .tl-card-header { background: var(--color-row-b, #283dd8); }
        .tl-headline {

        .tl-card-body {

        .tl-image {

            display: block;
            margin-top: 0;

            border-radius: 5px;
        }
        .tl-image.has-video { cursor: pointer; }
        .tl-image.has-video:hover { opacity: 0.85; }
        .tl-media-wrap { position: relative; }
        .tl-video { width: 100%; border-radius: 5px; display: block; }
        .tl-media-wrap + .tl-summary { margin-top: 10px; }
        .tl-image + .tl-summary { margin-top: 10px; }
        .tl-summary {
            font-size: 0.9rem;
            line-height: 1.28;
            color: #555;

        .tl-summary p { margin: 0 0 8px 0; }

        .tl-loading {

        /* Triangle connectors – arrow from center line pointing into card */
        .tl-event.tl-left .tl-card::after {
            content: '';
            position: absolute;
            top: 27px;

        }

        .page-title {

        /* Center ticker content over the 1100px timeline columns */

        /* Odd last ticker spans full width, center over whole timeline */

        .tickers-grid.multi .countdown-bar:last-child:nth-child(odd) .ticker-content {

        }
        .countdown-bar {

        }
        .ticker-content {

        }
        .countdown-label {

            font-size: var(--ticker-heading-size, 1.1em);

<script>
var API = 'api';
var TL_SPACING = 30;
var tickerTargets = [];

function esc(s) {
    if (!s) return '';
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}

function renderTimeline(events) {
    var container = document.getElementById('timeline');
    if (!events.length) {
        container.innerHTML = '<div class="tl-empty">No timeline events found.</div>';
        return;
    }

    var html = '';
    for (var i = 0; i < events.length; i++) {
        var ev = events[i];
        var side = (i % 2 === 0) ? 'tl-left' : 'tl-right';
        var color = (i % 2 === 0) ? 'tl-gold' : 'tl-blue';

        var anchorId = ev.timeline_jump ? ev.timeline_jump : '';
        html += '<div class="tl-event ' + side + ' ' + color + '"' + (anchorId ? ' id="' + esc(anchorId) + '"' : '') + '>';
        html += '<div class="tl-card">';

        // Header with headline and dates
        html += '<div class="tl-card-header">';
        html += '<div class="tl-headline">' + esc(ev.timeline_headline) + '</div>';
        if (ev.timeline_date_yah) {
            html += '<div class="tl-date-yah">' + esc(ev.timeline_date_yah) + '</div>';
        }
        if (ev.timeline_date_ce) {
            html += '<div class="tl-date-ce">' + esc(ev.timeline_date_ce) + '</div>';
        }
        html += '</div>';

        // Body with image/video and summary
        html += '<div class="tl-card-body">';
        if (ev.timeline_image) {
            var imgSrc = ev.timeline_image;
            if (imgSrc && imgSrc.charAt(0) !== '/' && imgSrc.indexOf('://') === -1) imgSrc = '/' + imgSrc;
            if (ev.timeline_video) {
                var vidSrc = ev.timeline_video;
                if (vidSrc && vidSrc.charAt(0) !== '/' && vidSrc.indexOf('://') === -1) vidSrc = '/' + vidSrc;
                html += '<div class="tl-media-wrap" data-video="' + esc(vidSrc) + '">';
                html += '<img class="tl-image has-video" src="' + esc(imgSrc) + '" alt="" loading="lazy">';
                html += '</div>';
            } else {
                html += '<img class="tl-image" src="' + esc(imgSrc) + '" alt="" loading="lazy">';
            }
        }
        if (ev.timeline_summary) {
            html += '<div class="tl-summary">' + ev.timeline_summary + '</div>';
        }
        html += '</div>';

        html += '</div>';
        html += '<div class="tl-spacer"></div>';
        html += '</div>';
    }
    container.innerHTML = html;
    positionTimeline();
    // Reposition whenever any card resizes (images loading, etc.)
    var _repoTimer = null;
    function debouncedReposition() {
        if (_repoTimer) clearTimeout(_repoTimer);
        _repoTimer = setTimeout(positionTimeline, 50);
    }
    if (window.ResizeObserver) {
        var ro = new ResizeObserver(debouncedReposition);
        var cards = container.querySelectorAll('.tl-card');
        for (var j = 0; j < cards.length; j++) ro.observe(cards[j]);
    }
    // Also reposition after images load as belt-and-suspenders
    var imgs = container.querySelectorAll('img');
    for (var j = 0; j < imgs.length; j++) {
        imgs[j].addEventListener('load', debouncedReposition);
    }
    // Attach video click handlers
    var videoImgs = container.querySelectorAll('.tl-image.has-video');
    for (var k = 0; k < videoImgs.length; k++) {
        (function(img) {
            img.addEventListener('click', function(e) {
                e.preventDefault();
                e.stopPropagation();
                var wrap = img.parentElement;
                var src = wrap.getAttribute('data-video');
                var video = document.createElement('video');
                video.className = 'tl-video';
                video.controls = true;
                video.src = src;
                wrap.replaceChild(video, img);
                video.play();
                setTimeout(positionTimeline, 300);
            });
        })(videoImgs[k]);
    }
}

function positionTimeline() {
    if (window.innerWidth <= 768) return;
    var events = document.querySelectorAll('.tl-event');
    if (!events.length) return;

    var leftBottom = -TL_SPACING, rightBottom = -TL_SPACING;
    var lastTop = -TL_SPACING;

    for (var i = 0; i < events.length; i++) {
        var ev = events[i];
        var color = (i % 2 === 0) ? 'tl-gold' : 'tl-blue';

        ev.classList.remove('tl-left', 'tl-right', 'tl-gold', 'tl-blue');

        // Place on whichever column has the most room
        var side, top;
        if (leftBottom <= rightBottom) {
            side = 'tl-left';
            top = leftBottom + TL_SPACING;
        } else {
            side = 'tl-right';
            top = rightBottom + TL_SPACING;
        }

        var minTop = lastTop + TL_SPACING;
        if (top < minTop) top = minTop;

        ev.classList.add(side, color);
        ev.style.top = top + 'px';

        var cardH = ev.querySelector('.tl-card').offsetHeight;
        if (side === 'tl-left') {
            leftBottom = top + cardH;
        } else {
            rightBottom = top + cardH;
        }
        lastTop = top;
    }

    document.getElementById('timeline').style.height =
        Math.max(leftBottom, rightBottom) + 40 + 'px';
}
window.addEventListener('resize', positionTimeline);

// Load tickers from database
fetch(API + '/tickers.php')
    .then(function(r) { return r.json(); })
    .then(function(data) {
        var grid = document.getElementById('tickers-grid');
        var tickers = data.tickers || [];
        if (tickers.length === 0) return;
        if (tickers.length > 1) grid.classList.add('multi');

        var html = '';
        for (var i = 0; i < tickers.length; i++) {
            var t = tickers[i];
            var id = 'ticker-' + t.ticker_key;
            html += '<div class="countdown-bar" style="background:' + esc(t.ticker_bg) + ';color:' + esc(t.ticker_color_countdown) + '">'
                + '<div class="ticker-content">'
                + '<div class="countdown-label" style="color:' + esc(t.ticker_color_heading) + '">' + esc(t.ticker_heading) + '</div>'
                + (t.ticker_subheading ? '<div class="countdown-sublabel">' + esc(t.ticker_subheading) + '</div>' : '')
                + '<div class="countdown-timer">'
                + '<div class="countdown-unit"><span class="countdown-value" id="' + id + '-days">--</span><span class="countdown-name" style="color:' + esc(t.ticker_color_description) + '">Days</span></div>'
                + '<div class="countdown-unit"><span class="countdown-value" id="' + id + '-hours">--</span><span class="countdown-name" style="color:' + esc(t.ticker_color_description) + '">Hours</span></div>'
                + '<div class="countdown-unit"><span class="countdown-value" id="' + id + '-mins">--</span><span class="countdown-name" style="color:' + esc(t.ticker_color_description) + '">Minutes</span></div>'
                + '<div class="countdown-unit"><span class="countdown-value" id="' + id + '-secs">--</span><span class="countdown-name" style="color:' + esc(t.ticker_color_description) + '">Seconds</span></div>'
                + '</div></div></div>';
            tickerTargets.push({ id: id, target: new Date(t.ticker_target).getTime() });
        }
        grid.innerHTML = html;
    });

// Countdown timer - updates all tickers
(function() {
    function tick() {
        for (var i = 0; i < tickerTargets.length; i++) {
            var t = tickerTargets[i];
            var diff = t.target - Date.now();
            if (diff <= 0) diff = 0;
            var d = Math.floor(diff / 86400000);
            var h = Math.floor((diff % 86400000) / 3600000);
            var m = Math.floor((diff % 3600000) / 60000);
            var s = Math.floor((diff % 60000) / 1000);
            var el;
            el = document.getElementById(t.id + '-days'); if (el) el.textContent = d;
            el = document.getElementById(t.id + '-hours'); if (el) el.textContent = h;
            el = document.getElementById(t.id + '-mins'); if (el) el.textContent = m;
            el = document.getElementById(t.id + '-secs'); if (el) el.textContent = s;
        }
    }
    setInterval(tick, 1000);
})();

// Load page config from DB
fetch(API + '/page-timeline-config.php')
    .then(function(r) { return r.json(); })
    .then(function(cfg) {
        var root = document.documentElement;
        if (cfg['color-row-a'])            root.style.setProperty('--color-row-a', cfg['color-row-a']);
        if (cfg['color-row-b'])            root.style.setProperty('--color-row-b', cfg['color-row-b']);
        if (cfg['heading'])                document.getElementById('page-heading').textContent = cfg['heading'];
        if (cfg['spacing-vertical'])       { TL_SPACING = parseInt(cfg['spacing-vertical']) || TL_SPACING; root.style.setProperty('--tl-spacing', TL_SPACING + 'px'); positionTimeline(); }
        if (cfg['ticker-heading-size'])    root.style.setProperty('--ticker-heading-size', cfg['ticker-heading-size'] + 'em');
        if (cfg['ticker-subheading-color']) root.style.setProperty('--ticker-subheading-color', cfg['ticker-subheading-color']);
        if (cfg['ticker-subheading-size']) root.style.setProperty('--ticker-subheading-size', cfg['ticker-subheading-size'] + 'em');
    });

// Load timeline data
fetch(API + '/timeline.php')
    .then(function(r) { return r.json(); })
    .then(function(d) {
        if (d.error) {
            document.getElementById('timeline').innerHTML = '<div class="tl-empty">' + esc(d.error) + '</div>';
            return;
        }
        renderTimeline(d.events);
        // Scroll to hash anchor after layout settles
        if (window.location.hash) {
            setTimeout(function() {
                var el = document.getElementById(window.location.hash.substring(1));
                if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 500);
        }
    })
    .catch(function(err) {
        document.getElementById('timeline').innerHTML = '<div class="tl-empty">Error loading timeline.</div>';
    });
</script>
