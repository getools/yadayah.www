<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <link rel="icon" href="/images/favicon-32x32.png" sizes="32x32" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Julius+Sans+One&family=Roboto+Slab:wght@400&family=Nunito+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        html, body { overflow-x: hidden; }
        html { height: 100%; }
        body { font-family: "Nunito Sans", Arial, sans-serif; margin: 0; padding: 0; background: #fff; color: #2c3e50; min-height: 100vh; display: flex; flex-direction: column; }
        a { text-decoration: none; color: inherit; }

        /* ── Header ── */
        header {
            display: flex; flex-direction: column; align-items: center;
            padding: 0;
            background: url('/images/yy-bg-bluewave.jpg') center/cover no-repeat;
            position: relative; overflow: hidden;
        }
        header .header-video {
            position: absolute; top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            transform: translate(-50%, -50%);
            object-fit: cover; z-index: 0;
        }
        header .header-inner {
            display: flex; flex-direction: column; align-items: center;
            width: 100%; max-width: 1140px; margin: 0 auto;
            position: relative; z-index: 1;
        }
        header .header-logos { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        header .header-logos img { width: auto; height: auto; }
        header nav {
            display: flex; flex-direction: column; align-items: center;
            gap: 0; padding: 0;
        }
        header nav .nav-row {
            display: flex; flex-direction: row; justify-content: center;
            gap: 0 30px; padding: 4px 0; flex-wrap: wrap;
        }
        header nav a {
            text-decoration: none; color: #E5C86C;
            font-family: "Julius Sans One", sans-serif;
            font-size: 1.1em; font-weight: 700;
        }
        header nav a:hover { color: #fff; }
        header nav a.active { color: #fff; text-decoration: underline; text-underline-offset: 5px; }

        /* ── Sub-toolbar ── */
        .sub-toolbar {
            display: flex; justify-content: center; align-items: center;
            gap: 30px; padding: 8px 0;
            background: var(--toolbar-bg, #0A333A);
        }
        .sub-toolbar .sub-toolbar-label {
            color: #6db3d4; font-family: "Julius Sans One", sans-serif;
            font-size: 0.95em; font-weight: 700; margin-right: -10px;
        }
        .sub-toolbar a {
            text-decoration: none; color: var(--toolbar-text, #8ED0EC);
            font-family: "Julius Sans One", sans-serif;
            font-size: 0.95em; font-weight: 700;
        }
        .sub-toolbar a:hover { color: #fff; }
        .sub-toolbar a.active { color: #fff; text-decoration: underline; text-underline-offset: 5px; }

        /* ── Carousel ── */
        .carousel {
            position: relative;
            background: #f8f9fa; border-bottom: 1px solid #e0e0e0;
        }
        .carousel-track {
            display: flex; transition: transform 0.6s ease;
        }
        .carousel-slide {
            min-width: 100%; display: flex; flex-direction: column;
            align-items: center; text-align: center;
            padding: 30px 20px;
            max-width: 1100px; margin: 0 auto;
        }
        .carousel-slide .slide-text {
            margin-bottom: 20px;
        }
        .carousel-slide .slide-text h2 {
            font-family: "Julius Sans One", sans-serif;
            font-size: 1.8rem; color: #2F2F29; margin: 0 0 10px;
        }
        .carousel-slide .slide-text p {
            font-size: 0.95rem; line-height: 1.7; color: #555;
            margin: 0 auto 16px; max-width: 840px;
        }
        .carousel-slide .slide-img {
            text-align: center;
        }
        .carousel-slide .slide-img img {
            max-width: 100%; width: auto; height: auto;
            max-height: 400px;
        }
        .btn-explore {
            display: inline-block; padding: 10px 24px;
            background: #295DAF; color: #fff; border: none;
            border-radius: 1.31em 0 1.31em 1.31em;
            font-size: 0.9rem; font-weight: 600;
            cursor: pointer; letter-spacing: 0.3px;
            transition: background-color 0.2s, box-shadow 0.2s;
        }
        .btn-explore:hover { background: #1e4a8f; }
        .carousel-dots {
            text-align: center; padding: 10px 0 14px;
            background: #f8f9fa;
        }
        .carousel-dots .dot {
            display: inline-block; width: 10px; height: 10px;
            border-radius: 50%; background: #ccc; margin: 0 5px;
            cursor: pointer; transition: background 0.2s;
        }
        .carousel-dots .dot.active { background: #295DAF; }
        .carousel-arrow {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(0,0,0,0.15); color: #333; border: none;
            width: 36px; height: 36px; border-radius: 50%;
            font-size: 1.1rem; cursor: pointer; z-index: 2;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s;
        }
        .carousel-arrow:hover { background: rgba(0,0,0,0.3); }
        .carousel-inner {
            position: relative;
            max-width: 1100px; margin: 0 auto;
            overflow: hidden;
        }
        .carousel-arrow.prev { left: 8px; }
        .carousel-arrow.next { right: 8px; }

        /* ── Content ── */
        .content { max-width: 1100px; margin: 0 auto; padding: 20px 20px 40px; }
        .section-title {
            font-family: "Julius Sans One", sans-serif;
            font-size: 1.5rem; color: #2F2F29; margin: 0 0 20px;
            text-align: center;
        }

        /* ── Videos ── */
        .video-hero { margin-bottom: 24px; }
        .video-hero .thumb {
            position: relative; padding-bottom: 56.25%; background: #000;
            border-radius: 8px; overflow: hidden;
        }
        .video-hero .thumb iframe {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0;
        }
        .video-hero .vid-title {
            font-size: 1.1rem; font-weight: 600; margin: 10px 0 0; color: #2c3e50;
        }
        .video-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px; margin-bottom: 24px;
        }
        .video-card {
            background: #f8f9fa; border-radius: 8px; overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: box-shadow 0.2s;
        }
        .video-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.15); }
        .video-card .thumb {
            position: relative; padding-bottom: 56.25%; background: #000;
        }
        .video-card .thumb iframe, .video-card .thumb img {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border: 0; object-fit: cover;
        }
        .video-card .thumb img { cursor: pointer; }
        .video-card .vid-info { padding: 10px 12px; }
        .video-card .vid-info h3 {
            font-size: 0.875rem; margin: 0; color: #2c3e50; line-height: 1.4;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .btn-load-more {
            display: block; margin: 0 auto 40px; padding: 12px 40px;
            background: #31345A; color: #fff; border: none;
            border-radius: 6px; font-size: 1rem; font-weight: 600;
            cursor: pointer; transition: background 0.2s;
        }
        .btn-load-more:hover { background: #4a4e7a; }
        .btn-load-more:disabled { background: #999; cursor: not-allowed; }

        /* ── Shorts ── */
        .shorts-section { margin-bottom: 40px; }
        .shorts-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px;
        }
        .short-card {
            border-radius: 12px; overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .short-card:hover { transform: translateY(-3px); box-shadow: 0 4px 16px rgba(0,0,0,0.15); }
        .short-card a { display: block; }
        .short-card img {
            width: 100%; aspect-ratio: 9/16; object-fit: cover; display: block;
        }
        .short-card .short-title {
            padding: 8px 10px; font-size: 0.8rem; color: #333;
            line-height: 1.3; background: #f8f9fa;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* ── Social Icons ── */
        .social-section {
            text-align: center; padding: 30px 0;
            border-top: 1px solid #e8e8e8;
            border-bottom: 1px solid #e8e8e8;
            margin-bottom: 30px;
        }
        .social-icons {
            display: flex; justify-content: center; gap: 24px; flex-wrap: wrap;
        }
        .social-icons a {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 4px;
        }
        .social-icons a span {
            font-size: 0.7rem; color: #999; transition: color 0.2s;
        }
        .social-icons a:hover span { color: #31345A; }
        .social-icons a svg {
            width: 32px; height: 32px; fill: #999;
            transition: fill 0.2s;
        }
        .social-icons a:hover svg { fill: #31345A; }

        /* ── Featured ── */
        .featured-section { margin-bottom: 40px; }
        .featured-grid {
            display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 24px;
            align-items: start;
        }
        .featured-card {
            background: #f8f9fa; border-radius: 8px; overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .featured-card .thumb {
            position: relative; padding-bottom: 56.25%; background: #000;

        .featured-card .thumb iframe {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0;
        }
        .featured-card .feat-info { padding: 12px 16px; }
        .featured-card .feat-info h3 {
            font-size: 0.9rem; margin: 0 0 4px; color: #2c3e50; line-height: 1.4;
        }
        .featured-card .feat-info p {
            font-size: 0.8rem; color: #888; margin: 0;
        }
        .featured-book {
            background: #f8f9fa; border-radius: 8px; overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; padding: 24px;
            min-height: 250px;
        }
        .featured-book img {
            max-height: 240px; width: auto;
            transition: transform 0.4s;
        }
        .featured-book:hover img { transform: scale(1.08); }
        .featured-book .book-label {
            margin-top: 12px; font-size: 0.85rem; color: #555;
            font-family: "Julius Sans One", sans-serif;
        }

        .footer-links {
            display: grid; grid-template-columns: 1fr; gap: 4px 20px;
        }
        .footer-links-2col { grid-template-columns: 1fr 1fr; }
        .footer-bottom {
            position: relative; z-index: 1;
            text-align: center; margin-top: 20px;
            font-size: 0.8rem; color: rgba(255,255,255,0.5);
        }

        /* ── Responsive ── */
        @media (max-width: 1024px) {
            .featured-grid { grid-template-columns: 1fr; }
        }
        @media (max-width: 767px) {
            .carousel-slide .slide-img img { max-height: 250px; }
            .carousel-arrow { display: none; }
            .video-grid { grid-template-columns: 1fr; }
            .shorts-grid { grid-template-columns: 1fr; }
        }
    </style>

<script>
// ── Carousel Data (loaded from yy_series) ──
var slides = [];
var currentSlide = 0;
var carouselTimer = null;

// Load carousel from series API
fetch('/api/series-carousel.php')
    .then(function(r) { return r.json(); })
    .then(function(data) {
        slides = data.map(function(s) {
            var name = (s.series_name || s.series_label || '').replace(/\s+/g, '_');
            return {
                title: s.series_label || s.series_name || '',
                text: s.series_summary || '',
                img: s.series_image || '',
                link: '/books#' + name
            };
        });
        if (slides.length) buildCarousel();
    });

function buildCarousel() {
    var track = document.getElementById('carousel-track');
    var dots = document.getElementById('carousel-dots');
    track.innerHTML = slides.map(function(s) {
        return '<div class="carousel-slide">'
            + '<div class="slide-text">'
            + '<h2>' + esc(s.title) + '</h2>'
            + '<p>' + esc(s.text) + '</p>'
            + '</div>'
            + '<div class="slide-img"><a href="' + s.link + '"><img src="' + s.img + '" alt="' + esc(s.title) + '"></a></div>'
            + '</div>';
    }).join('');
    dots.innerHTML = slides.map(function(_, i) {
        return '<span class="dot' + (i === 0 ? ' active' : '') + '" onclick="goToSlide(' + i + ')"></span>';
    }).join('');
    startCarouselTimer();
}

function goToSlide(i) {
    currentSlide = i;
    document.getElementById('carousel-track').style.transform = 'translateX(-' + (i * 100) + '%)';
    var dots = document.querySelectorAll('.carousel-dots .dot');
    dots.forEach(function(d, j) { d.classList.toggle('active', j === i); });
    startCarouselTimer();
}

function carouselNext() { goToSlide((currentSlide + 1) % slides.length); }
function carouselPrev() { goToSlide((currentSlide - 1 + slides.length) % slides.length); }

function startCarouselTimer() {
    if (carouselTimer) clearInterval(carouselTimer);
    carouselTimer = setInterval(function() { carouselNext(); }, 6000);
}

// ── Videos ──
var allVideos = [];
var videoOffset = 0;
var nextPageToken = null;
var INITIAL_COUNT = 7;
var LOAD_MORE_COUNT = 9;

function loadChannelVideos() {
    var url = '/api/youtube-feed.php?type=channel&limit=15';
    fetch(url).then(function(r) { return r.json(); }).then(function(data) {
        if (data.error) { console.error('YouTube feed error:', data.error); return; }
        allVideos = data.videos || [];
        nextPageToken = data.nextPageToken || null;
        renderVideos();
    }).catch(function(err) { console.error('Failed to load videos:', err); });
}

function renderVideos() {
    var shown = allVideos.slice(0, INITIAL_COUNT + videoOffset);
    if (shown.length === 0) return;

    // Hero = first video (iframe)
    var hero = shown[0];
    document.getElementById('video-hero').innerHTML =
        '<div class="video-hero"><div class="thumb">'
        + '<iframe src="https://www.youtube.com/embed/' + hero.id + '" allowfullscreen loading="lazy"></iframe>'
        + '</div><div class="vid-title">' + esc(hero.title) + '</div></div>';

    // Grid = remaining videos (thumbnails that become iframes on click)
    var grid = shown.slice(1);
    document.getElementById('video-grid').innerHTML = grid.map(function(v) {
        return '<div class="video-card">'
            + '<div class="thumb">'
            + '<img src="' + v.thumbnail + '" alt="' + esc(v.title) + '" onclick="playVideo(this,\'' + v.id + '\')" loading="lazy">'
            + '</div>'
            + '<div class="vid-info"><h3>' + esc(v.title) + '</h3>'
            + (typeof VideoComments !== 'undefined' ? VideoComments.link(v.id, 'index', 'youtube') : '')
            + '</div></div>';
    }).join('');

    // Show/hide load more
    var btn = document.getElementById('btn-load-more');
    var totalShown = INITIAL_COUNT + videoOffset;
    btn.style.display = (totalShown < allVideos.length || nextPageToken) ? '' : 'none';
}

function playVideo(img, videoId) {
    var thumb = img.parentNode;
    thumb.innerHTML = '<iframe src="https://www.youtube.com/embed/' + videoId + '?autoplay=1" allowfullscreen></iframe>';
    if (typeof VideoComments !== 'undefined') VideoComments.open(videoId, 'index', 'youtube');
}

function loadMoreVideos() {
    videoOffset += LOAD_MORE_COUNT;
    var totalNeeded = INITIAL_COUNT + videoOffset;

    if (totalNeeded <= allVideos.length) {
        renderVideos();
    } else if (nextPageToken) {
        var btn = document.getElementById('btn-load-more');
        btn.disabled = true;
        btn.textContent = 'Loading...';
        fetch('/api/youtube-feed.php?type=channel&limit=' + LOAD_MORE_COUNT + '&pageToken=' + encodeURIComponent(nextPageToken))
            .then(function(r) { return r.json(); })
            .then(function(data) {
                allVideos = allVideos.concat(data.videos || []);
                nextPageToken = data.nextPageToken || null;
                btn.disabled = false;
                btn.textContent = 'Load More';
                renderVideos();
            }).catch(function() {
                btn.disabled = false;
                btn.textContent = 'Load More';
            });
    } else {
        renderVideos();
    }
}

// ── Shorts ──
function loadShorts() {
    fetch('/api/youtube-feed.php?type=shorts&limit=4')
        .then(function(r) { return r.json(); })
        .then(function(data) {
            var vids = (data.videos || []).slice(0, 4);
            if (vids.length === 0) return;
            document.getElementById('shorts-section').style.display = '';
            document.getElementById('shorts-grid').innerHTML = vids.map(function(v) {
                return '<div class="short-card"><a href="https://www.youtube.com/shorts/' + v.id + '" target="_blank">'
                    + '<img src="' + v.thumbnail + '" alt="' + esc(v.title) + '" loading="lazy">'
                    + '<div class="short-title">' + esc(v.title) + '</div></a></div>';
            }).join('');
        }).catch(function() {});
}

// ── Featured Playlists ──
function loadFeatured() {
    var pl1VideoId = null;

    function renderFeatured(elId, v) {
        document.getElementById(elId).innerHTML =
            '<div class="thumb"><iframe src="https://www.youtube.com/embed/' + v.id + '" allowfullscreen loading="lazy"></iframe></div>'
            + '<div class="feat-info"><h3>' + esc(v.title) + '</h3></div>';
    }

    // Playlist 1 — load first, then playlist 2
    fetch('/api/youtube-feed.php?type=playlist&id=PL2remztpK0uDrhUMrHaUF4gqMXFz9hzBf&limit=1')
        .then(function(r) { return r.json(); })
        .then(function(data) {
            var v = (data.videos || [])[0];
            if (v) {
                pl1VideoId = v.id;
                renderFeatured('featured-playlist1', v);
            }
        }).catch(function() {})
        .then(function() {
            loadPlaylist2('PLW5gXgQ3YcPCy7jFNQ_4Q759SVdS0e035');
        });

    // Playlist 2 (with fallback, avoids duplicating playlist 1)
    function loadPlaylist2(plId) {
        fetch('/api/youtube-feed.php?type=playlist&id=' + plId + '&limit=5')
            .then(function(r) { return r.json(); })
            .then(function(data) {
                var videos = data.videos || [];
                var v = null;
                for (var i = 0; i < videos.length; i++) {
                    if (videos[i].id !== pl1VideoId) { v = videos[i]; break; }
                }
                if (!v) {
                    if (plId !== 'PLfuI5LuWvXsHM1YgqJ8tX2LnPmjwIPSwB') {
                        loadPlaylist2('PLfuI5LuWvXsHM1YgqJ8tX2LnPmjwIPSwB');
                    }
                    return;
                }
                renderFeatured('featured-playlist2', v);
            }).catch(function() {
                if (plId !== 'PLfuI5LuWvXsHM1YgqJ8tX2LnPmjwIPSwB') {
                    loadPlaylist2('PLfuI5LuWvXsHM1YgqJ8tX2LnPmjwIPSwB');
                }
            });
    }
}

// ── Helpers ──
function esc(s) {
    if (!s) return '';
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}

// ── Init ──
buildCarousel();
loadChannelVideos();
loadShorts();
loadFeatured();
</script>

<script>
(function(){fetch('/api/site-config.php').then(function(r){return r.json();}).then(function(cfg){
    var r=document.documentElement;
    if(cfg['toolbar-color-bg'])r.style.setProperty('--toolbar-bg','#'+cfg['toolbar-color-bg']);
    if(cfg['toolbar-color-text'])r.style.setProperty('--toolbar-text','#'+cfg['toolbar-color-text']);
    document.querySelectorAll('[data-config]').forEach(function(el){var k=el.getAttribute('data-config');if(cfg[k]!=null)el.textContent=cfg[k];});

    // Home-page component switches (set via Admin → Home). Each key is
    // namespaced 'home-' on the wire so it can't collide with global
    // config. A missing/blank value means "use the original default".
    var truthy = function(v){ return v==='1'||v==='true'||v===1||v===true; };
    function hide(sel){ document.querySelectorAll(sel).forEach(function(el){ el.style.display='none'; }); }
    if (cfg['home-carousel-show'] != null && !truthy(cfg['home-carousel-show'])) hide('.carousel, .carousel-dots');
    if (cfg['home-shorts-show']   != null &&  truthy(cfg['home-shorts-show'])) {
        // Reveal the shorts section (it ships with display:none baseline).
        var sh = document.getElementById('shorts-section'); if (sh) sh.style.display = '';
    }
    if (cfg['home-featured-show']!= null && !truthy(cfg['home-featured-show'])) hide('.featured-section');
    // Expose settings to other inline scripts that need numeric values
    // (videos-initial/loadmore counts, shorts count, featured playlist IDs).
    window.YY_HOME_CFG = cfg;
});})();
</script>
