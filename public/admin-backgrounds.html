<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="page-version" content="1778473494">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backgrounds - Yada Yah</title>
    <link rel="stylesheet" href="css/app.css?v=10">
    <link rel="stylesheet" href="css/login.css">
    <style>
        .bg-table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
        .bg-table th, .bg-table td { padding: 8px 10px; text-align: left; border-bottom: 1px solid #e0e0e0; }
        .bg-table thead th { background: #f8f9fa; font-weight: 600; color: #555; }
        .bg-table tbody tr:hover { background: #eef6fc; }
        .bg-thumb { max-height: 40px; border-radius: 3px; }
        .bg-thumb-video { max-height: 40px; border-radius: 3px; }
        .badge-active { background: #27ae60; color: #fff; padding: 2px 8px; border-radius: 10px; font-size: 0.75rem; }
        .badge-inactive { background: #95a5a6; color: #fff; padding: 2px 8px; border-radius: 10px; font-size: 0.75rem; }
        .badge-converting { background: #e67e22; color: #fff; padding: 2px 8px; border-radius: 10px; font-size: 0.75rem; animation: pulse 1.5s ease-in-out infinite; }
        .bg-processing { display: inline-flex; align-items: center; justify-content: center; width: 60px; height: 40px; background: #f0f0f0; border-radius: 3px; border: 1px solid #ddd; }
        .bg-processing .spinner { width: 18px; height: 18px; border: 2px solid #ddd; border-top-color: #e67e22; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .form-card { }
        .form-card select, .form-card input[type=number] { width: 100%; padding: 8px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.9rem; font-family: inherit; box-sizing: border-box; }
        .file-preview { margin-top: 8px; }
        .file-preview img, .file-preview video { max-height: 80px; border-radius: 4px; border: 1px solid #ddd; }
        .processing-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .processing-card { background: #fff; border-radius: 8px; padding: 32px 40px; text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
        .processing-card h3 { margin: 0 0 16px; color: #2c3e50; }
        .progress-bar { width: 260px; height: 8px; background: #e0e0e0; border-radius: 4px; overflow: hidden; margin-bottom: 8px; }
        .progress-fill { height: 100%; background: #3498db; border-radius: 4px; transition: width 0.2s; width: 0%; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
        .progress-fill.pulsing { width: 100% !important; animation: pulse 1.5s ease-in-out infinite; }
        .progress-text { font-size: 0.85rem; color: #666; }
    </style>
</head>
<body>

<div id="login-screen" class="login-screen">
    <div class="login-card">
        <h1>Admin</h1>
        <div class="field">
            <label for="login-user">Login</label>
            <input type="text" id="login-user" autocomplete="username">
        </div>
        <div class="field">
            <label for="login-pass">Password</label>
            <div class="pass-wrap">
                <input type="password" id="login-pass" autocomplete="current-password">
                <button type="button" class="pass-toggle" onclick="togglePassword()" title="Show/hide password">&#128065;</button>
            </div>
        </div>
        <div id="login-error" class="error-messages" style="display:none"></div>
        <button class="btn btn-primary" style="width:100%" onclick="doLogin()">Login</button>
    </div>
</div>

<div id="app" class="container" style="display:none">
    <div class="app-header">
        <nav class="nav-tabs"></nav>
<script src="/js/admin-nav.js?v=10"></script>
        <div class="user-info">
            <span id="user-display"></span>
            <button class="btn btn-secondary btn-sm" onclick="doLogout()">Logout</button>
        </div>
    </div>

    <h1>Backgrounds</h1>

    <div id="list-view">
        <div style="margin-bottom:16px;">
            <button class="btn btn-primary" onclick="showForm()">New Background</button>
        </div>
        <div class="card">
            <table class="bg-table">
                <thead>
                    <tr><th>Preview</th><th>Name</th><th>File</th><th>Active</th><th></th></tr>
                </thead>
                <tbody id="bg-list"></tbody>
            </table>
        </div>
    </div>

    <div id="form-view" style="display:none">
        <div class="card form-card">
            <h2 id="form-title">New Background</h2>
            <div id="form-error" class="error-messages" style="display:none"></div>
            <div class="field">
                <label for="f-name">Name</label>
                <input type="text" id="f-name">
            </div>
            <div class="field">
                <label for="f-file">Image / Video File</label>
                <input type="file" id="f-file" accept="image/*,video/*">
                <div id="f-preview" class="file-preview"></div>
            </div>
            <div id="video-settings" style="display:none">
                <div class="field" style="display:flex;gap:12px;">
                    <div style="flex:1">
                        <label for="f-vwidth">Width (px)</label>
                        <input type="number" id="f-vwidth" min="1" placeholder="auto">
                    </div>
                    <div style="flex:1">
                        <label for="f-vheight">Height (px)</label>
                        <input type="number" id="f-vheight" min="1" placeholder="auto">
                    </div>
                </div>
                <div class="field">
                    <label for="f-vspeed">Playback Speed</label>
                    <select id="f-vspeed">
                        <option value="0.25">0.25x</option>
                        <option value="0.5">0.5x</option>
                        <option value="0.75">0.75x</option>
                        <option value="1" selected>1x (normal)</option>
                        <option value="1.25">1.25x</option>
                        <option value="1.5">1.5x</option>
                        <option value="2">2x</option>
                    </select>
                </div>
            </div>
            <div class="field">
                <label>
                    <input type="checkbox" id="f-active" checked> Active
                </label>
            </div>
            <div class="button-row">
                <button class="btn btn-primary" onclick="saveRecord()">Save</button>
                <button class="btn btn-secondary" onclick="cancelForm()">Cancel</button>
                <button class="btn btn-danger" id="btn-delete" style="display:none;margin-left:auto" onclick="deleteRecord()">Delete</button>
            </div>
        </div>
    </div>
</div>

<script src="js/admin-links.js?v=4"></script>
<script>
var API = '/api';
var editingKey = null;

function checkAuth() {
    fetch(API + '/auth.php', {credentials:'include'}).then(function(r){return safeJson(r);}).then(function(d) {
        if (d.authenticated) {
            document.getElementById('app').style.display = '';
            document.getElementById('user-display').textContent = d.user_name;
            applyPagePermissions(d.pages);
            loadList();
        } else {
            document.getElementById('login-screen').classList.add('visible');
        }
    });
}

function doLogin() {
    var user = document.getElementById('login-user').value;
    var pass = document.getElementById('login-pass').value;
    var errEl = document.getElementById('login-error');
    errEl.style.display = 'none';
    fetch(API + '/auth.php', {
        method: 'POST', credentials: 'include',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({login: user, password: pass})
    }).then(function(r){return safeJson(r);}).then(function(d) {
        if (d.authenticated) {
            document.getElementById('login-screen').classList.remove('visible');
            document.getElementById('app').style.display = '';
            document.getElementById('user-display').textContent = d.user_name;
            applyPagePermissions(d.pages);
            loadList();
        } else {
            errEl.textContent = d.error || 'Login failed';
            errEl.style.display = '';
        }
    });
}

function doLogout() {
    fetch(API + '/auth.php', {method:'DELETE', credentials:'include'}).then(function() {
        location.reload();
    });
}

function togglePassword() {
    var input = document.getElementById('login-pass');
    input.type = input.type === 'password' ? 'text' : 'password';
}

function loadList() {
    fetch(API + '/backgrounds.php', {credentials:'include'}).then(function(r){return safeJson(r);}).then(function(rows) {
        var tbody = document.getElementById('bg-list');
        if (!rows.length) {
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#999;font-style:italic">No backgrounds yet</td></tr>';
            return;
        }
        tbody.innerHTML = rows.map(function(r) {
            var thumb = '';
            if (r.converting) {
                thumb = '<div class="bg-processing"><div class="spinner"></div></div>';
            } else if (r.asset_file) {
                if (r.asset_file.match(/\.(webm|mp4)$/i)) {
                    thumb = '<video src="/' + r.asset_file + '" class="bg-thumb-video" muted loop onmouseover="this.play()" onmouseout="this.pause();this.currentTime=0"></video>';
                } else {
                    thumb = '<img src="/' + r.asset_file + '" class="bg-thumb">';
                }
            }
            var badge;
            if (r.converting) {
                badge = '<span class="badge-converting">Converting</span>';
            } else {
                badge = r.asset_active_flag ? '<span class="badge-active">Active</span>' : '<span class="badge-inactive">Inactive</span>';
            }
            var fname = r.asset_file ? r.asset_file.split('/').pop() : '';
            return '<tr onclick="editRecord(' + r.asset_key + ')" style="cursor:pointer">'
                + '<td>' + thumb + '</td>'
                + '<td>' + esc(r.asset_name) + '</td>'
                + '<td>' + esc(fname) + '</td>'
                + '<td>' + badge + '</td>'
                + '<td><button class="btn btn-sm btn-primary">Edit</button></td>'
                + '</tr>';
        }).join('');
    });
}

function showForm(record) {
    editingKey = record ? record.asset_key : null;
    document.getElementById('form-title').textContent = editingKey ? 'Edit Background' : 'New Background';
    document.getElementById('f-name').value = record ? record.asset_name : '';
    document.getElementById('f-file').value = '';
    document.getElementById('f-active').checked = record ? record.asset_active_flag : true;
    document.getElementById('btn-delete').style.display = editingKey ? '' : 'none';
    document.getElementById('form-error').style.display = 'none';
    document.getElementById('f-vwidth').value = '';
    document.getElementById('f-vheight').value = '';
    document.getElementById('f-vspeed').value = '1';
    document.getElementById('video-settings').style.display = 'none';

    var preview = document.getElementById('f-preview');
    if (record && record.asset_file) {
        if (record.asset_file.match(/\.(webm|mp4)$/i)) {
            preview.innerHTML = '<video src="/' + record.asset_file + '" style="max-height:80px" muted autoplay loop></video>';
        } else {
            preview.innerHTML = '<img src="/' + record.asset_file + '">';
        }
    } else {
        preview.innerHTML = '';
    }

    document.getElementById('list-view').style.display = 'none';
    document.getElementById('form-view').style.display = '';
}

function cancelForm() {
    document.getElementById('form-view').style.display = 'none';
    document.getElementById('list-view').style.display = '';
}

function editRecord(key) {
    fetch(API + '/backgrounds.php', {credentials:'include'}).then(function(r){return safeJson(r);}).then(function(rows) {
        var rec = rows.find(function(r){ return r.asset_key == key; });
        if (rec) showForm(rec);
    });
}

function saveRecord() {
    var name = document.getElementById('f-name').value.trim();
    var errEl = document.getElementById('form-error');
    errEl.style.display = 'none';

    var fd = new FormData();
    fd.append('asset_name', name);
    fd.append('asset_active_flag', document.getElementById('f-active').checked ? '1' : '0');
    var fileInput = document.getElementById('f-file');
    if (fileInput.files.length) {
        fd.append('file', fileInput.files[0]);
        if (fileInput.files[0].type.startsWith('video/')) {
            var vw = document.getElementById('f-vwidth').value;
            var vh = document.getElementById('f-vheight').value;
            var vs = document.getElementById('f-vspeed').value;
            if (vw) fd.append('video_width', vw);
            if (vh) fd.append('video_height', vh);
            if (vs && vs !== '1') fd.append('video_speed', vs);
        }
    }

    var url = API + '/backgrounds.php';
    if (editingKey) {
        url += '?key=' + editingKey;
        fd.append('_method', 'PUT');
    }

    var hasFile = fileInput.files.length > 0;
    var isVideo = hasFile && fileInput.files[0].type.startsWith('video/');
    var overlay = showProcessing(hasFile ? 'Uploading...' : 'Saving...');

    var xhr = new XMLHttpRequest();
    xhr.open('POST', url);
    xhr.withCredentials = true;

    xhr.upload.onprogress = function(e) {
        if (e.lengthComputable) {
            var pct = Math.round(e.loaded / e.total * 100);
            overlay.fill.style.width = pct + '%';
            overlay.text.textContent = pct < 100 ? 'Uploading... ' + pct + '%' : (isVideo ? 'Converting video...' : 'Saving...');
            if (pct >= 100 && isVideo) overlay.title.textContent = 'Processing';
        }
    };

    xhr.onload = function() {
        var d;
        try { d = JSON.parse(xhr.responseText); } catch(e) { d = {error: 'Server: ' + xhr.responseText.substring(0, 500)}; }
        if (d.error) {
            hideProcessing(overlay);
            errEl.textContent = d.error;
            errEl.style.display = '';
        } else if (d.job) {
            overlay.title.textContent = 'Converting Video';
            overlay.text.textContent = 'This may take a few minutes...';
            overlay.fill.className = 'progress-fill pulsing';
            pollJob(d.job, overlay, errEl);
        } else {
            hideProcessing(overlay);
            cancelForm();
            loadList();
        }
    };

    xhr.onerror = function() {
        hideProcessing(overlay);
        errEl.textContent = 'Network error';
        errEl.style.display = '';
    };

    xhr.send(fd);
}

function pollJob(jobId, overlay, errEl) {
    var start = Date.now();
    var timer = setInterval(function() {
        var elapsed = Math.round((Date.now() - start) / 1000);
        var mins = Math.floor(elapsed / 60);
        var secs = elapsed % 60;
        overlay.text.textContent = 'Converting... ' + (mins > 0 ? mins + 'm ' : '') + secs + 's';

        fetch(API + '/backgrounds.php?job=' + jobId, {credentials:'include'})
            .then(function(r) { return safeJson(r); })
            .then(function(d) {
                if (d.status === 'done') {
                    clearInterval(timer);
                    hideProcessing(overlay);
                    cancelForm();
                    loadList();
                } else if (d.status === 'error') {
                    clearInterval(timer);
                    hideProcessing(overlay);
                    errEl.textContent = 'Video conversion failed';
                    errEl.style.display = '';
                }
            })
            .catch(function() {});
    }, 3000);
}

function deleteRecord() {
    if (!editingKey || !confirm('Delete this background?')) return;
    fetch(API + '/backgrounds.php?key=' + editingKey, {method:'DELETE', credentials:'include'}).then(function(r){return safeJson(r);}).then(function() {
        cancelForm();
        loadList();
    });
}

function showProcessing(msg) {
    var el = document.createElement('div');
    el.className = 'processing-overlay';
    el.innerHTML = '<div class="processing-card"><h3 class="proc-title">Saving</h3><div class="progress-bar"><div class="progress-fill"></div></div><div class="progress-text"></div></div>';
    document.body.appendChild(el);
    var title = el.querySelector('.proc-title');
    var fill = el.querySelector('.progress-fill');
    var text = el.querySelector('.progress-text');
    title.textContent = 'Saving';
    text.textContent = msg;
    return {el: el, title: title, fill: fill, text: text};
}

function hideProcessing(overlay) {
    if (overlay && overlay.el && overlay.el.parentNode) overlay.el.parentNode.removeChild(overlay.el);
}

function esc(s) {
    var d = document.createElement('div');
    d.textContent = s || '';
    return d.innerHTML;
}

document.getElementById('login-pass').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
});

document.getElementById('f-file').addEventListener('change', function() {
    var preview = document.getElementById('f-preview');
    var videoSettings = document.getElementById('video-settings');
    if (this.files.length) {
        var file = this.files[0];
        var url = URL.createObjectURL(file);
        if (file.type.startsWith('video/')) {
            preview.innerHTML = '<video src="' + url + '" style="max-height:80px" muted autoplay loop></video>';
            videoSettings.style.display = '';
        } else {
            preview.innerHTML = '<img src="' + url + '">';
            videoSettings.style.display = 'none';
        }
    } else {
        videoSettings.style.display = 'none';
    }
});

checkAuth();
</script>
<script src="/js/admin-login.js?v=8"></script>
<script src="/js/session-state.js?v=1"></script>
<script src="/js/error-reporter.js?v=2"></script>
</body>
</html>
