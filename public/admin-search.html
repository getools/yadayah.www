<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Admin - Yada Yah</title>
    <link rel="stylesheet" href="css/app.css">
    <link rel="stylesheet" href="css/login.css">
    <style>
        .fb-section { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 16px 20px; margin-bottom: 16px; }
        .fb-section h3 { margin: 0 0 4px; font-size: 1rem; color: #31345A; }
        .fb-section .desc { font-size: 0.82rem; color: #666; margin: 0 0 14px; }
        .fb-field { display: grid; grid-template-columns: 240px 1fr; gap: 10px; align-items: center; margin-bottom: 8px; }
        .fb-field label { font-size: 0.85rem; font-weight: 600; color: #444; }
        .fb-field input[type=text],
        .fb-field input[type=number] { padding: 6px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.88rem; font-family: inherit; max-width: 200px; box-sizing: border-box; }
        .save-row { position: sticky; bottom: 0; background: #fafafa; border-top: 1px solid #e0e0e0; padding: 12px 16px; margin: 16px -16px -16px; display: flex; justify-content: space-between; align-items: center; border-radius: 0 0 8px 8px; }
    </style>
</head>
<body>

<div id="login-screen" class="login-screen">
    <div class="login-card">
        <h1>Admin</h1>
        <div class="field"><label for="login-user">Login</label><input type="text" id="login-user" autocomplete="username"></div>
        <div class="field"><label for="login-pass">Password</label>
            <div class="pass-wrap"><input type="password" id="login-pass" autocomplete="current-password">
                <button type="button" class="pass-toggle" onclick="togglePassword()" title="Show/hide password">&#128065;</button></div>
        </div>
        <div id="login-error" class="error-messages" style="display:none"></div>
        <button class="btn btn-primary" style="width:100%" onclick="doLogin()">Login</button>
    </div>
</div>

<div id="app" class="container" style="display:none">
    <div class="app-header">
        <nav class="nav-tabs"></nav>
<script src="/js/admin-nav.js?v=11"></script>
        <div class="user-info">
            <span id="user-display"></span>
            <button class="btn btn-secondary btn-sm" onclick="doLogout()">Logout</button>
        </div>
    </div>

    <h1>Search</h1>
    <p style="color:#666;font-size:0.88rem;margin:-4px 0 16px;">Settings that control how the Books search returns and displays results. Changes apply immediately.</p>

    <div id="form-container">
        <div style="text-align:center;padding:30px;color:#888;">Loading…</div>
    </div>
</div>

<script src="/js/admin-login.js?v=8"></script>
<script src="/js/admin-links.js?v=4"></script>
<script>
var API = '/api';

function checkAuth() {
    fetch(API + '/auth.php', {credentials:'include'}).then(function(r){return safeJson(r);}).then(function(d) {
        if (d.authenticated) {
            document.getElementById('app').style.display = '';
            document.getElementById('user-display').textContent = d.user_name;
            if (typeof applyPagePermissions === 'function') applyPagePermissions(d.pages);
            load();
        } else {
            document.getElementById('login-screen').classList.add('visible');
        }
    });
}
function doLogin() {
    var user = document.getElementById('login-user').value, pass = document.getElementById('login-pass').value;
    var errEl = document.getElementById('login-error'); errEl.style.display = 'none';
    fetch(API + '/auth.php', {method:'POST', credentials:'include', headers:{'Content-Type':'application/json'}, body: JSON.stringify({login:user, password:pass})})
        .then(function(r){return safeJson(r);}).then(function(d) {
            if (d.authenticated) {
                document.getElementById('login-screen').classList.remove('visible');
                document.getElementById('app').style.display = '';
                document.getElementById('user-display').textContent = d.user_name;
                if (typeof applyPagePermissions === 'function') applyPagePermissions(d.pages);
                load();
            } else {
                errEl.textContent = d.error || 'Login failed'; errEl.style.display = '';
            }
        });
}
function doLogout() { fetch(API + '/auth.php', {method:'DELETE', credentials:'include'}).then(function() { location.reload(); }); }
function togglePassword() { var i = document.getElementById('login-pass'); i.type = i.type === 'password' ? 'text' : 'password'; }

// Section field definitions — drives both render and save payload.
var SECTIONS = [
    {
        title: 'Result Snippets',
        desc: 'How much surrounding text from paragraph_text_plain to slice into each result\'s snippet. Higher = more context but longer rows.',
        fields: [
            { code: 'snippet-length', label: 'Snippet length (chars)', type: 'number', default: '500', min: 80, max: 2000 }
        ]
    }
];

function render(values) {
    var c = document.getElementById('form-container');
    var html = '';
    SECTIONS.forEach(function(sec) {
        html += '<div class="fb-section"><h3>' + esc(sec.title) + '</h3><p class="desc">' + esc(sec.desc) + '</p>';
        sec.fields.forEach(function(f) {
            var v = (values[f.code] != null && values[f.code] !== '') ? values[f.code] : f.default;
            var input;
            if (f.type === 'number') {
                input = '<input type="number" data-code="' + esc(f.code) + '" value="' + esc(v) + '"'
                      + ' min="' + (f.min != null ? f.min : 0) + '" max="' + (f.max != null ? f.max : 999999) + '">';
            } else {
                input = '<input type="text" data-code="' + esc(f.code) + '" value="' + esc(v) + '">';
            }
            html += '<div class="fb-field"><label>' + esc(f.label) + '</label>' + input + '</div>';
        });
        html += '</div>';
    });
    html += '<div class="save-row">'
          + '<span id="save-status" style="font-size:0.85rem;color:#888;"></span>'
          + '<button class="btn btn-primary" onclick="saveAll()">Save changes</button>'
          + '</div>';
    c.innerHTML = html;
}

function esc(s) {
    if (s == null) return '';
    return String(s).replace(/[&<>"']/g, function(c) {
        return { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c];
    });
}

function load() {
    fetch(API + '/admin-search.php', { credentials: 'include' })
        .then(function(r) { return r.json(); })
        .then(function(d) {
            if (d && d.error) { alert('Load failed: ' + d.error); return; }
            render(d || {});
        })
        .catch(function(err) { alert('Load failed: ' + err.message); });
}

function saveAll() {
    var payload = {};
    document.querySelectorAll('[data-code]').forEach(function(el) { payload[el.dataset.code] = el.value; });
    var status = document.getElementById('save-status');
    status.textContent = 'Saving…';
    fetch(API + '/admin-search.php', {
        method: 'PUT', credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
    }).then(function(r) { return r.json(); })
      .then(function(d) {
          if (d && d.error) { status.textContent = '✗ ' + d.error; status.style.color = '#c0392b'; return; }
          status.textContent = '✓ Saved';
          status.style.color = '#27ae60';
          setTimeout(function() { status.textContent = ''; }, 5000);
      }).catch(function(err) {
          status.textContent = '✗ ' + err.message;
          status.style.color = '#c0392b';
      });
}

document.getElementById('login-pass').addEventListener('keydown', function(e) { if (e.key === 'Enter') doLogin(); });
checkAuth();
</script>

</body>
</html>
