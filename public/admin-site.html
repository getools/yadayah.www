<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site - Yada Yah</title>
    <link rel="stylesheet" href="css/app.css">
    <link rel="stylesheet" href="css/login.css">
    <style>
        .sub-tabs { display: flex; gap: 0; margin-bottom: 20px; border-bottom: 2px solid #ddd; }
        .sub-tab { padding: 8px 20px; font-size: 0.9rem; font-weight: 600; color: #777; text-decoration: none;
            border-bottom: 2px solid transparent; margin-bottom: -2px; cursor: pointer; }
        .sub-tab:hover { color: #333; }
        .sub-tab.active { color: #2c3e50; border-bottom-color: #3498db; }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        .setting-row { display: flex; align-items: baseline; gap: 16px; margin-bottom: 14px; }
        .setting-row label { flex: 0 0 200px; font-weight: 600; font-size: 0.875rem; color: #555; text-align: right; }
        .setting-row .setting-input { flex: 1; }
        .setting-row input[type=text],
        .setting-row input[type=number] {
            width: 100%; padding: 7px 10px; border: 1px solid #ccc; border-radius: 4px;
            font-size: 0.9rem; box-sizing: border-box;
        }
        .setting-row input:focus { outline: none; border-color: #3498db; box-shadow: 0 0 0 2px rgba(52,152,219,0.2); }
        .rgb-wrap { display: flex; gap: 8px; align-items: center; }
        .rgb-wrap input[type=text] { flex: 1; font-family: monospace; }
        .rgb-swatch { width: 32px; height: 32px; border-radius: 4px; border: 1px solid #ccc; flex-shrink: 0; }
        .img-preview-wrap { margin-bottom: 8px; }
        .img-preview-wrap img { max-height: 80px; max-width: 260px; border: 1px solid #ddd; border-radius: 4px; padding: 3px; background: #f8f8f8; vertical-align: middle; }
        .img-upload-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .img-status { font-size: 0.82rem; color: #27ae60; }
        .img-error  { font-size: 0.82rem; color: #c0392b; }
        .section-box { background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); padding: 24px; margin-bottom: 20px; }
        .section-box h2 { margin: 0 0 20px; font-size: 1.1rem; color: #31345A; border-bottom: 1px solid #e8e8e8; padding-bottom: 10px; }
        .px-wrap, .em-wrap { display: flex; align-items: center; gap: 8px; }
        .px-wrap input, .em-wrap input { width: 120px; }
        .unit-label { font-size: 0.85rem; color: #888; }
        #save-status { font-size: 0.875rem; color: #27ae60; }
        #save-error  { font-size: 0.875rem; color: #c0392b; }
    </style>
</head>
<body>

<div id="login-screen" class="login-screen">
    <div class="login-card">
        <h1>Admin</h1>
        <div class="field">
            <label for="login-user">Login</label>
            <input type="text" id="login-user" autocomplete="username">
        </div>
        <div class="field">
            <label for="login-pass">Password</label>
            <div class="pass-wrap">
                <input type="password" id="login-pass" autocomplete="current-password">
                <button type="button" class="pass-toggle" onclick="togglePassword()" title="Show/hide password">&#128065;</button>
            </div>
        </div>
        <div id="login-error" class="error-messages" style="display:none"></div>
        <button class="btn btn-primary" style="width:100%" onclick="doLogin()">Login</button>
    </div>
</div>

<div id="app" class="container" style="display:none">
    <div class="app-header">
        <nav class="nav-tabs">
            <a href="admin-site.html" class="nav-tab active">Site</a>
            <a href="admin-translation.html" class="nav-tab">Translation</a>
            <a href="admin-word.html" class="nav-tab">Word</a>
            <a href="admin-lookups.html" class="nav-tab">Lookups</a>
            <a href="admin-ask.html" class="nav-tab">Ask</a>
            <a href="admin-transcripts.html" class="nav-tab">Transcripts</a>
            <a href="admin-timeline.html" class="nav-tab">Timeline</a>
            <a href="admin-memorial.html" class="nav-tab">Memorial</a>
            <a href="admin-media.html" class="nav-tab">Media</a>
            <a href="admin-music.html" class="nav-tab">Music</a>
            <a href="admin-invite.html" class="nav-tab">Invite</a>
            <a href="admin-doyouyada.html" class="nav-tab">DoYou?</a>
            <a href="admin-backgrounds.html" class="nav-tab">Backgrounds</a>
            <a href="admin-feeds.html" class="nav-tab">Feeds</a>
            <a href="admin-redirects.html" class="nav-tab">Redirects</a>
            <a href="admin-pages.html" class="nav-tab">Pages</a>
            <a href="admin-resources.html" class="nav-tab">Resources</a>
            <a href="admin-users.html" class="nav-tab">Users</a>
            <a href="admin-misc.html" class="nav-tab">Misc</a>
        </nav>
        <div class="user-info">
            <span id="user-display"></span>
            <button class="btn btn-secondary btn-sm" onclick="doLogout()">Logout</button>
        </div>
    </div>

    <h1>Site</h1>

    <div class="sub-tabs">
        <span class="sub-tab active" onclick="switchTab('general')">General</span>
        <span class="sub-tab" onclick="switchTab('header')">Header</span>
    </div>

    <!-- General tab -->
    <div id="tab-general" class="tab-panel active">
        <div class="section-box">
            <div id="general-body"></div>
            <div class="button-row" style="margin-top:20px">
                <button class="btn btn-primary" onclick="saveGeneral()">Save</button>
                <span id="general-status" style="display:none">Saved!</span>
                <span id="general-error" style="display:none;font-size:0.875rem;color:#c0392b"></span>
            </div>
        </div>
    </div>

    <!-- Header tab -->
    <div id="tab-header" class="tab-panel">
        <div class="section-box">
            <h2>Logo</h2>
            <div id="logo-fields"></div>
        </div>
        <div class="section-box">
            <h2>Toolbar - Main</h2>
            <div id="main-fields"></div>
        </div>
        <div class="section-box">
            <h2>Toolbar - Sub</h2>
            <div id="sub-fields"></div>
        </div>
        <div class="button-row" style="margin-top:20px">
            <button class="btn btn-primary" onclick="saveHeader()">Save</button>
            <span id="header-status" style="display:none">Saved!</span>
            <span id="header-error" style="display:none;font-size:0.875rem;color:#c0392b"></span>
        </div>
    </div>
</div>

<script src="js/admin-pages.js?v=2"></script>
<script>
var API = '/api';
var _allRecords = [];
var _generalRecords = [];
var _headerSettings = {};

// Header field definitions
var LOGO_FIELDS = [
    { code: 'logo',                        label: 'Logo',          type: 'image' },
    { code: 'logo-margin-top',             label: 'Margin-Top',    type: 'px' },
    { code: 'logo-margin-bottom',          label: 'Margin-Bottom', type: 'px' },
];
var MAIN_FIELDS = [
    { code: 'toolbar-main-text-color',     label: 'Text Color',    type: 'rgb' },
    { code: 'toolbar-main-text-size',      label: 'Text Size',     type: 'em' },
    { code: 'toolbar-main-margin-top',     label: 'Margin-Top',    type: 'px' },
    { code: 'toolbar-main-margin-bottom',  label: 'Margin-Bottom', type: 'px' },
];
var SUB_FIELDS = [
    { code: 'toolbar-sub-bg-color',        label: 'Background Color', type: 'rgb' },
    { code: 'toolbar-sub-text-color',      label: 'Text Color',       type: 'rgb' },
    { code: 'toolbar-sub-text-size',       label: 'Text Size',        type: 'em' },
    { code: 'toolbar-sub-margin-top',      label: 'Margin-Top',       type: 'px' },
    { code: 'toolbar-sub-margin-bottom',   label: 'Margin-Bottom',    type: 'px' },
];

// ── Sub-tab switching ────────────────────────────────────────

function switchTab(name) {
    document.querySelectorAll('.sub-tab').forEach(function(t) { t.classList.remove('active'); });
    document.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.remove('active'); });
    document.getElementById('tab-' + name).classList.add('active');
    document.querySelector('.sub-tab[onclick*="' + name + '"]').classList.add('active');
}

// ── Auth ─────────────────────────────────────────────────────

function checkAuth() {
    fetch(API + '/auth.php', {credentials:'include'}).then(function(r){return r.json();}).then(function(d) {
        if (d.authenticated) {
            document.getElementById('app').style.display = '';
            document.getElementById('user-display').textContent = d.user_name;
            applyPagePermissions(d.pages);
            loadSettings();
        } else {
            document.getElementById('login-screen').classList.add('visible');
        }
    });
}

function doLogin() {
    var user = document.getElementById('login-user').value;
    var pass = document.getElementById('login-pass').value;
    var errEl = document.getElementById('login-error');
    errEl.style.display = 'none';
    fetch(API + '/auth.php', {
        method: 'POST', credentials: 'include',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({login: user, password: pass})
    }).then(function(r){return r.json();}).then(function(d) {
        if (d.authenticated) {
            document.getElementById('login-screen').classList.remove('visible');
            document.getElementById('app').style.display = '';
            document.getElementById('user-display').textContent = d.user_name;
            applyPagePermissions(d.pages);
            loadSettings();
        } else {
            errEl.textContent = d.error || 'Login failed';
            errEl.style.display = '';
        }
    });
}

function doLogout() {
    fetch(API + '/auth.php', {method:'DELETE', credentials:'include'}).then(function() { location.reload(); });
}

function togglePassword() {
    var input = document.getElementById('login-pass');
    input.type = input.type === 'password' ? 'text' : 'password';
}

// ── Load & render ────────────────────────────────────────────

function loadSettings() {
    fetch(API + '/admin-config-settings.php', {credentials:'include'})
        .then(function(r){return r.json();})
        .then(function(rows) {
            _allRecords = rows;
            _generalRecords = rows.filter(function(r) { return r.setting_group_code !== 'header'; });
            _headerSettings = {};
            rows.forEach(function(r) { _headerSettings[r.setting_code] = r; });

            renderGeneral();
            renderHeaderSection('logo-fields', LOGO_FIELDS);
            renderHeaderSection('main-fields', MAIN_FIELDS);
            renderHeaderSection('sub-fields', SUB_FIELDS);
        });
}

// ── General tab rendering ────────────────────────────────────

function renderGeneral() {
    var body = document.getElementById('general-body');
    var html = '';
    _generalRecords.forEach(function(r) {
        html += '<div class="setting-row">';
        html += '<label>' + esc(r.setting_label) + '</label>';
        html += '<div class="setting-input">' + renderGeneralInput(r) + '</div>';
        html += '</div>';
    });
    body.innerHTML = html;
    _generalRecords.forEach(function(r) {
        if (r.setting_value_code === 'rgb') syncSwatch('g-' + r.setting_key);
    });
}

function renderGeneralInput(r) {
    var k = r.setting_key;
    var v = r.setting_value || '';
    var id = 'g-' + k;

    if (r.setting_value_code === 'image') {
        var imgHtml = v
            ? '<img src="' + escAttr(v) + '?v=' + Date.now() + '" alt="' + escAttr(r.setting_label) + '">'
            : '<span style="color:#999;font-size:0.82rem;font-style:italic">No image set</span>';
        return '<div class="img-preview-wrap" id="img-preview-' + k + '">' + imgHtml + '</div>'
            + '<div class="img-upload-row">'
            + '<input type="file" id="img-file-' + k + '" accept="image/*" style="font-size:0.85rem" onchange="uploadImage(' + k + ')">'
            + '<span class="img-status" id="img-status-' + k + '" style="display:none">Saved!</span>'
            + '<span class="img-error" id="img-error-' + k + '" style="display:none"></span>'
            + '</div>';
    }
    if (r.setting_value_code === 'rgb') {
        return '<div class="rgb-wrap">'
            + '<input type="text" id="input-' + id + '" value="' + escAttr(v) + '" maxlength="6" oninput="syncSwatch(\'' + id + '\')">'
            + '<div class="rgb-swatch" id="swatch-' + id + '"></div>'
            + '</div>';
    }
    if (r.setting_value_code === 'int') {
        return '<input type="number" id="input-' + id + '" value="' + escAttr(v) + '" style="width:140px">';
    }
    if (r.setting_value_code === 'em') {
        return '<div class="em-wrap"><input type="number" id="input-' + id + '" value="' + escAttr(v) + '" step="0.05" min="0"><span class="unit-label">em</span></div>';
    }
    if (r.setting_value_code === 'px') {
        return '<div class="px-wrap"><input type="number" id="input-' + id + '" value="' + escAttr(v) + '" step="1" min="0"><span class="unit-label">px</span></div>';
    }
    return '<input type="text" id="input-' + id + '" value="' + escAttr(v) + '">';
}

// ── Header tab rendering ─────────────────────────────────────

function renderHeaderSection(containerId, fields) {
    var container = document.getElementById(containerId);
    var html = '';
    fields.forEach(function(f) {
        var s = _headerSettings[f.code];
        var val = s ? (s.setting_value || '') : '';
        var key = s ? s.setting_key : '';
        html += '<div class="setting-row">';
        html += '<label>' + esc(f.label) + '</label>';
        html += '<div class="setting-input">' + renderHeaderInput(f, key, val) + '</div>';
        html += '</div>';
    });
    container.innerHTML = html;
    fields.forEach(function(f) {
        if (f.type === 'rgb') syncSwatch('h-' + f.code);
    });
}

function renderHeaderInput(f, key, val) {
    var id = 'h-' + f.code;
    if (f.type === 'image') {
        var imgHtml = val
            ? '<img src="' + escAttr(val) + '?v=' + Date.now() + '" alt="' + escAttr(f.label) + '">'
            : '<span style="color:#999;font-size:0.82rem;font-style:italic">No image set</span>';
        return '<div class="img-preview-wrap" id="img-preview-' + id + '">' + imgHtml + '</div>'
            + '<div class="img-upload-row">'
            + '<input type="file" id="img-file-' + id + '" accept="image/*" style="font-size:0.85rem" onchange="uploadImage(\'' + id + '\')">'
            + '<span class="img-status" id="img-status-' + id + '" style="display:none">Saved!</span>'
            + '<span class="img-error" id="img-error-' + id + '" style="display:none"></span>'
            + '</div>';
    }
    if (f.type === 'rgb') {
        return '<div class="rgb-wrap">'
            + '<input type="text" id="input-' + id + '" data-key="' + key + '" value="' + escAttr(val) + '" maxlength="6" oninput="syncSwatch(\'' + id + '\')">'
            + '<div class="rgb-swatch" id="swatch-' + id + '"></div>'
            + '</div>';
    }
    if (f.type === 'px') {
        return '<div class="px-wrap"><input type="number" id="input-' + id + '" data-key="' + key + '" value="' + escAttr(val) + '" step="1" min="0"><span class="unit-label">px</span></div>';
    }
    if (f.type === 'em') {
        return '<div class="em-wrap"><input type="number" id="input-' + id + '" data-key="' + key + '" value="' + escAttr(val) + '" step="0.05" min="0"><span class="unit-label">em</span></div>';
    }
    return '<input type="text" id="input-' + id + '" data-key="' + key + '" value="' + escAttr(val) + '">';
}

// ── Shared helpers ───────────────────────────────────────────

function syncSwatch(id) {
    var input = document.getElementById('input-' + id);
    var swatch = document.getElementById('swatch-' + id);
    if (!input || !swatch) return;
    var hex = input.value.replace(/^#/, '');
    swatch.style.background = hex.length >= 3 ? '#' + hex : 'transparent';
}

// ── Save General ─────────────────────────────────────────────

function saveGeneral() {
    var statusEl = document.getElementById('general-status');
    var errorEl  = document.getElementById('general-error');
    statusEl.style.display = 'none';
    errorEl.style.display  = 'none';

    var promises = _generalRecords
        .filter(function(r) { return r.setting_value_code !== 'image'; })
        .map(function(r) {
            var input = document.getElementById('input-g-' + r.setting_key);
            if (!input) return Promise.resolve(null);
            return fetch(API + '/admin-config-settings.php?key=' + r.setting_key, {
                method: 'PUT', credentials: 'include',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify({
                    setting_group_code: r.setting_group_code,
                    setting_label: r.setting_label,
                    setting_code: r.setting_code,
                    setting_value_code: r.setting_value_code,
                    setting_sort: r.setting_sort,
                    setting_value: input.value
                })
            }).then(function(res){return res.json();});
        });

    Promise.all(promises).then(function(results) {
        var err = results.filter(Boolean).map(function(d){return d.error;}).filter(Boolean)[0];
        if (err) { errorEl.textContent = err; errorEl.style.display = ''; }
        else { statusEl.style.display = ''; setTimeout(function(){ statusEl.style.display = 'none'; }, 3000); loadSettings(); }
    });
}

// ── Save Header ──────────────────────────────────────────────

function saveHeader() {
    var statusEl = document.getElementById('header-status');
    var errorEl  = document.getElementById('header-error');
    statusEl.style.display = 'none';
    errorEl.style.display  = 'none';

    var allFields = LOGO_FIELDS.concat(MAIN_FIELDS).concat(SUB_FIELDS);
    var promises = allFields.filter(function(f) { return f.type !== 'image'; }).map(function(f) {
        var input = document.getElementById('input-h-' + f.code);
        if (!input) return Promise.resolve(null);
        var key = input.getAttribute('data-key');
        if (!key) return Promise.resolve(null);
        var s = _headerSettings[f.code];
        return fetch(API + '/admin-config-settings.php?key=' + key, {
            method: 'PUT', credentials: 'include',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({
                setting_group_code: s.setting_group_code,
                setting_label: s.setting_label,
                setting_code: s.setting_code,
                setting_value_code: s.setting_value_code,
                setting_sort: s.setting_sort,
                setting_value: input.value
            })
        }).then(function(res){return res.json();});
    });

    Promise.all(promises).then(function(results) {
        var err = results.filter(Boolean).map(function(d){return d.error;}).filter(Boolean)[0];
        if (err) { errorEl.textContent = err; errorEl.style.display = ''; }
        else { statusEl.style.display = ''; setTimeout(function(){ statusEl.style.display = 'none'; }, 3000); loadSettings(); }
    });
}

// ── Image upload ─────────────────────────────────────────────

function uploadImage(id) {
    var input    = document.getElementById('img-file-'   + id);
    var statusEl = document.getElementById('img-status-' + id);
    var errorEl  = document.getElementById('img-error-'  + id);
    statusEl.style.display = 'none';
    errorEl.style.display  = 'none';
    if (!input || !input.files[0]) return;
    var fd = new FormData();
    fd.append('logo_file', input.files[0]);
    fetch(API + '/admin-logo-upload.php', {method:'POST', credentials:'include', body:fd})
        .then(function(r){return r.json();}).then(function(d) {
            if (d.error) { errorEl.textContent = d.error; errorEl.style.display = ''; return; }
            input.value = '';
            var prev = document.getElementById('img-preview-' + id);
            if (prev) prev.innerHTML = '<img src="' + escAttr(d.path) + '?v=' + Date.now() + '" alt="Logo">';
            statusEl.style.display = '';
            setTimeout(function(){ statusEl.style.display = 'none'; }, 3000);
        });
}

// ── Helpers ──────────────────────────────────────────────────

function esc(s) {
    var d = document.createElement('div');
    d.textContent = s || '';
    return d.innerHTML;
}

function escAttr(s) {
    return (s || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

document.getElementById('login-pass').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
});

checkAuth();
</script>
<script src="/js/admin-login.js?v=5"></script>
</body>
</html>
