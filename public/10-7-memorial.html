        header .header-inner {

        .sub-toolbar {
            display: flex; justify-content: center; align-items: center;
            gap: 30px; padding: 8px 0;

        }

            text-decoration: none; color: var(--toolbar-text, #8ED0EC);
            font-family: "Julius Sans One", sans-serif;
            font-size: 0.95em; font-weight: 700;
        }

        .sub-toolbar a.active { color: #fff; text-decoration: underline; text-underline-offset: 2px; }
        /* ── Page Title ── */
        .page-title {

        /* ── Carousel ── */
        .memorial-carousel {
            position: relative;
            max-width: 800px; margin: 0 auto 16px;
            background: #1a1a1a;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 24px rgba(0,0,0,0.5);
        }
        .carousel-viewport {
            overflow: hidden;
        }
        .carousel-track {
            display: flex;
            transition: transform 0.6s ease;
        }
        .carousel-slide {
            min-width: 100%;
            display: flex; flex-direction: column; align-items: center;
            padding: 16px 24px;
        }
        .carousel-slide .mem-name {
            font-family: "Julius Sans One", sans-serif;
            font-size: 1.4rem; color: #E5C86C;
            margin: 0 0 10px; text-align: center;
        }
        .carousel-slide .mem-photo {
            width: 100%; max-width: 400px; max-height: 280px;
            object-fit: cover; border-radius: 8px;
            margin-bottom: 10px;
        }
        .carousel-slide .mem-summary {
            font-size: 0.85rem; line-height: 1.6; color: #ccc;
            max-width: 650px; text-align: left;
            margin-bottom: 10px;
            max-height: 120px; overflow-y: auto;
        }
        .carousel-slide .btn-bio {
            display: inline-block; padding: 8px 24px;
            background: #295DAF; color: #fff; border: none;
            border-radius: 1.31em 0 1.31em 1.31em;
            font-size: 0.85rem; font-weight: 600;
            cursor: pointer; transition: background 0.2s;
        }
        .carousel-slide .btn-bio:hover { background: #1e4a8f; }

        .carousel-arrow {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(255,255,255,0.1); color: #E5C86C; border: none;
            width: 40px; height: 40px; border-radius: 50%;
            font-size: 1.2rem; cursor: pointer; z-index: 2;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s;
        }
        .carousel-arrow:hover { background: rgba(255,255,255,0.25); }
        .carousel-arrow.prev { left: 8px; }
        .carousel-arrow.next { right: 8px; }

        .carousel-counter {
            text-align: center; padding: 4px 0 10px;
            font-size: 0.85rem; color: #777;
        }

        /* ── Grid ── */
        .content { max-width: 1200px; margin: 0 auto; padding: 0 16px 40px; flex: 1; }
        .grid-title {
            font-family: "Julius Sans One", sans-serif;
            font-size: 1.3rem; color: #E5C86C;
            text-align: center; margin: 0 0 16px;
        }
        .memorial-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 6px;
        }
        .grid-thumb {
            aspect-ratio: 1; overflow: hidden;
            border-radius: 4px; cursor: pointer;
            position: relative;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .grid-thumb:hover {
            transform: scale(1.05);
            box-shadow: 0 2px 12px rgba(229,200,108,0.3);
            z-index: 1;
        }
        .grid-thumb.active {
            outline: 3px solid #E5C86C;
            outline-offset: -3px;
        }
        .grid-thumb img {
            width: 100%; height: 100%; object-fit: cover; display: block;
        }
        .grid-thumb .grid-name {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.85));
            color: #fff; font-size: 0.6rem; padding: 14px 4px 4px;
            text-align: center; line-height: 1.2;
            opacity: 0; transition: opacity 0.2s;
        }
        .grid-thumb:hover .grid-name { opacity: 1; }

        .footer-links {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 4px 20px;
        }
        .footer-links-2col { grid-template-columns: 1fr 1fr; }
        .footer-bottom {
            position: relative; z-index: 1;
            text-align: center; margin-top: 20px;
            font-size: 0.8rem; color: rgba(255,255,255,0.5);
        }

        /* ── Responsive ── */
        @media (max-width: 1024px) {
            .memorial-grid { grid-template-columns: repeat(6, 1fr); }
        }
        @media (max-width: 767px) {

            .page-title { font-size: 1.5rem; }
        }
        @media (max-width: 480px) {

<div class="memorial-carousel">
    <button class="carousel-arrow prev" onclick="carouselPrev()">&#10094;</button>
    <button class="carousel-arrow next" onclick="carouselNext()">&#10095;</button>

<script>
var memorials = [];
var currentSlide = 0;
var autoTimer = null;
var hovering = false;
var autoScrollMs = 15000;
var gridColumns = 8;

function loadSettings() {
    fetch('/api/memorial-settings-public.php')
        .then(function(r) { return r.json(); })
        .then(function(s) {
            if (s.memorial_title) document.getElementById('page-title').textContent = s.memorial_title;
            if (s.memorial_subtitle) document.getElementById('page-subtitle').textContent = s.memorial_subtitle;
            if (s.memorial_columns && parseInt(s.memorial_columns) > 0) {
                gridColumns = parseInt(s.memorial_columns);
                document.getElementById('memorial-grid').style.gridTemplateColumns = 'repeat(' + gridColumns + ', 1fr)';
            }
            if (s.memorial_auto_scroll && parseInt(s.memorial_auto_scroll) > 0) {
                autoScrollMs = parseInt(s.memorial_auto_scroll) * 1000;
            }
        })
        .catch(function() {})
        .finally(function() { loadMemorials(); });
}

function loadMemorials() {
    fetch('/api/memorial.php')
        .then(function(r) { return r.json(); })
        .then(function(data) {
            memorials = data.items || [];
            currentSlide = Math.floor(Math.random() * memorials.length);

            // Check URL for individual identifier
            // Supports: /10-7-memorial/123 (by key), /10-7-memorial/moshe_shuva (by code)
            // Also: ?id=N, ?name=Name
            var pathMatch = window.location.pathname.match(/\/10-7-memorial\/(.+)/);
            var targetVal = pathMatch ? decodeURIComponent(pathMatch[1]) : null;
            var params = new URLSearchParams(window.location.search);
            if (!targetVal) targetVal = params.get('id') || params.get('name') || null;

            if (targetVal) {
                var isNum = /^\d+$/.test(targetVal);
                var tv = targetVal.toLowerCase().replace(/-/g, '_');
                for (var ti = 0; ti < memorials.length; ti++) {
                    if (isNum && String(memorials[ti].memorial_key) === targetVal) { currentSlide = ti; break; }
                    if (!isNum && memorials[ti].memorial_code && memorials[ti].memorial_code === tv) { currentSlide = ti; break; }
                    if (!isNum && memorials[ti].memorial_name_full.toLowerCase() === tv.replace(/_/g, ' ')) { currentSlide = ti; break; }
                }
            }

            buildCarousel();
            buildGrid();
            goToSlide(currentSlide);
            // Only auto-play if no specific person was requested
            if (!targetVal) startAutoPlay();

            var carousel = document.querySelector('.memorial-carousel');
            carousel.addEventListener('mouseenter', function() { hovering = true; if (autoTimer) clearInterval(autoTimer); });
            carousel.addEventListener('mouseleave', function() { hovering = false; startAutoPlay(); });
        })
        .catch(function(err) { console.error('Failed to load memorials:', err); });
}

function buildCarousel() {
    var track = document.getElementById('carousel-track');
    track.innerHTML = memorials.map(function(m) {
        var imgPath = '/u/10-7-memorial/' + esc(m.memorial_image_file);
        var bioBtn = m.memorial_bio_url
            ? '<a href="' + esc(m.memorial_bio_url) + '" target="_blank" class="btn-bio">Full Bio</a>'
            : '';
        return '<div class="carousel-slide">'
            + '<h2 class="mem-name">' + esc(m.memorial_name_full) + '</h2>'
            + '<img class="mem-photo" src="' + imgPath + '" alt="' + esc(m.memorial_name_full) + '" loading="lazy">'
            + '<div class="mem-summary">' + esc(m.memorial_summary) + '</div>'
            + bioBtn
            + '</div>';
    }).join('');
    updateCounter();
}

function buildGrid() {
    var grid = document.getElementById('memorial-grid');
    grid.innerHTML = memorials.map(function(m, i) {
        var imgPath = '/u/10-7-memorial/' + esc(m.memorial_image_file);
        return '<div class="grid-thumb' + (i === 0 ? ' active' : '') + '" onclick="goToSlide(' + i + ')" title="' + esc(m.memorial_name_full) + '">'
            + '<img src="' + imgPath + '" alt="' + esc(m.memorial_name_full) + '" loading="lazy">'
            + '<div class="grid-name">' + esc(m.memorial_name_full) + '</div>'
            + '</div>';
    }).join('');
}

function goToSlide(i) {
    currentSlide = i;
    document.getElementById('carousel-track').style.transform = 'translateX(-' + (i * 100) + '%)';
    updateCounter();
    updateActiveThumb();
    restartAutoPlay();

    // Update URL to reflect current person (no page reload)
    var m = memorials[i];
    if (m && m.memorial_code) {
        history.replaceState(null, '', '/10-7-memorial/' + m.memorial_code);
    }

    // Scroll carousel into view
    document.querySelector('.memorial-carousel').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function updateCounter() {
    document.getElementById('carousel-counter').textContent = (currentSlide + 1) + ' / ' + memorials.length;
}

function updateActiveThumb() {
    var thumbs = document.querySelectorAll('.grid-thumb');
    thumbs.forEach(function(t, j) { t.classList.toggle('active', j === currentSlide); });
}

function carouselNext() { goToSlide((currentSlide + 1) % memorials.length); }
function carouselPrev() { goToSlide((currentSlide - 1 + memorials.length) % memorials.length); }

function startAutoPlay() {
    if (autoTimer) clearInterval(autoTimer);
    autoTimer = setInterval(function() { carouselNext(); }, autoScrollMs);
}

function restartAutoPlay() {
    if (!hovering) startAutoPlay();
}

function esc(s) {
    if (!s) return '';
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}

loadSettings();
</script>
