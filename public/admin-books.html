<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Books Admin - Yada Yah</title>
    <link rel="stylesheet" href="css/app.css">
    <link rel="stylesheet" href="css/login.css">
    <style>
        /* Single table for the whole list — series rows span all columns so
           every series shares the same column widths. table-layout:fixed
           forces the browser to honor th widths exactly across all rows. */
        .books-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; table-layout: fixed; }
        .books-table th, .books-table td { padding: 8px 12px; text-align: left; border-bottom: 1px solid #e0e0e0; vertical-align: top; }
        .books-table th { background: #f5f5f5; font-weight: 600; font-size: 0.8rem; position: sticky; top: 0; z-index: 2; }
        .books-table tbody tr.volume-row:hover { background: #f0f4ff; cursor: pointer; }
        .books-table .actions button { padding: 3px 8px; font-size: 0.78rem; border: 1px solid #ccc; border-radius: 4px; cursor: pointer; background: #fff; margin-right: 4px; }
        .books-table .actions button:hover { background: #f0f0f0; }
        .books-table .actions button.del { color: #c0392b; border-color: #e0c0c0; }
        .books-table td { word-wrap: break-word; overflow: hidden; text-overflow: ellipsis; }

        /* Series grouping row: dark band that spans the whole table width.
           Visually replaces the old separate series-header div block. */
        .books-table tr.series-row td { background: #31345A; color: #E5C86C; padding: 10px 14px; font-weight: 700; font-size: 0.9rem; cursor: pointer; }
        .books-table tr.series-row:hover td { background: #4a4e7a; }
        .books-table tr.series-row .series-meta { font-size: 0.78rem; font-weight: 400; color: rgba(229,200,108,0.7); }
        .books-table tr.series-row .series-actions { display: inline-flex; gap: 6px; }
        .books-table tr.series-row .series-actions button { padding: 2px 8px; font-size: 0.72rem; border: 1px solid rgba(229,200,108,0.4); border-radius: 3px; cursor: pointer; background: transparent; color: #E5C86C; }
        .books-table tr.series-row .series-actions button:hover { background: rgba(229,200,108,0.15); }

        /* Per-artifact status badges (DOCX / PDF / FLIP). Stacked: big icon
           on top, small relative-time line below ("3h", "2d", etc). */
        .status-cell { text-align: center; line-height: 1.1; }
        .status-cell .status-icon { font-size: 1.05rem; }
        .status-cell .age { font-size: 0.7rem; color: #888; margin-top: 2px; font-weight: normal; }
        .status-gen   { color: #1d6b3a; font-weight: 700; }
        .status-proc  { color: #a36100; font-weight: 700; }
        .status-miss  { color: #bbb; }
        .status-stale { color: #d77900; font-weight: 700; }
        .status-cell.proc-pulse { animation: proc-pulse 1.2s ease-in-out infinite; }
        @keyframes proc-pulse { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }

        .badge-active { display: inline-block; padding: 2px 6px; border-radius: 3px; font-size: 0.7rem; font-weight: 600; background: #d4edda; color: #155724; }
        .badge-inactive { display: inline-block; padding: 2px 6px; border-radius: 3px; font-size: 0.7rem; font-weight: 600; background: #f8d7da; color: #721c24; }

        .form-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.45); z-index: 1000; justify-content: center; align-items: flex-start; padding: 60px 20px; overflow-y: auto; }
        .form-overlay.open { display: flex; }
        .form-panel { background: #fff; border-radius: 10px; box-shadow: 0 8px 32px rgba(0,0,0,0.25); width: 100%; max-width: 650px; }
        .form-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; background: #f8f8f8; border-radius: 10px 10px 0 0; border-bottom: 1px solid #ddd; }
        .form-header h3 { margin: 0; font-size: 1rem; }
        .form-header button { background: none; border: none; font-size: 1.4rem; cursor: pointer; color: #666; }
        .form-body { padding: 20px; }
        .form-body .field { margin-bottom: 14px; }
        .form-body label { display: block; font-weight: 600; font-size: 0.85rem; margin-bottom: 4px; color: #333; }
        .form-body input[type=text], .form-body input[type=number], .form-body select, .form-body textarea {
            width: 100%; padding: 8px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.9rem; font-family: inherit; box-sizing: border-box;
        }
        .form-body input[type=number] { width: 100px; }
        .form-body .form-row { display: flex; gap: 12px; }
        .form-body .form-row .field { flex: 1; }
        .form-body .form-actions { display: flex; gap: 8px; margin-top: 16px; }

        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
        .book-count { font-size: 0.85rem; color: #666; }
    </style>
</head>
<body>

<div id="login-screen" class="login-screen">
    <div class="login-card">
        <h1>Admin</h1>
        <div class="field"><label for="login-user">Login</label><input type="text" id="login-user" autocomplete="username"></div>
        <div class="field"><label for="login-pass">Password</label>
            <div class="pass-wrap"><input type="password" id="login-pass" autocomplete="current-password">
                <button type="button" class="pass-toggle" onclick="togglePassword()" title="Show/hide password">&#128065;</button></div>
        </div>
        <div id="login-error" class="error-messages" style="display:none"></div>
        <button class="btn btn-primary" style="width:100%" onclick="doLogin()">Login</button>
    </div>
</div>

<div id="app" class="container" style="display:none">
    <div class="app-header">
        <nav class="nav-tabs"></nav>
<script src="/js/admin-nav.js?v=7"></script>
        <div class="user-info">
            <span id="user-display"></span>
            <button class="btn btn-secondary btn-sm" onclick="doLogout()">Logout</button>
        </div>
    </div>

    <h1>Books</h1>

    <div class="toolbar">
        <span class="book-count" id="book-count"></span>
        <div style="display:flex;gap:8px;">
            <button class="btn btn-primary btn-sm" onclick="showVolumeForm(null)">+ Add Volume</button>
        </div>
    </div>

    <div id="table-container">
        <div style="text-align:center;padding:20px;color:#888">Loading...</div>
    </div>
</div>

<!-- Volume Form -->
<div id="form-overlay" class="form-overlay" onclick="if(event.target===this)closeForm()">
    <div class="form-panel">
        <div class="form-header">
            <h3 id="form-title">Add Volume</h3>
            <button onclick="closeForm()">&times;</button>
        </div>
        <div class="form-body">
            <input type="hidden" id="f-key">
            <div class="field"><label>Series</label>
                <select id="f-series"></select>
            </div>
            <div class="field"><label>Label</label><input type="text" id="f-label" placeholder="e.g. Dabarym-Words"></div>
            <div class="field"><label>Name</label><input type="text" id="f-name" placeholder="e.g. Dabarym-Words"></div>
            <div class="form-row">
                <div class="field"><label>Volume #</label><input type="number" id="f-number" value="0"></div>
                <div class="field"><label>Sort</label><input type="number" id="f-sort" value="0"></div>
                <div class="field"><label>Pages</label><input type="number" id="f-pages" value="0"></div>
            </div>
            <div class="field"><label>FlipHTML5 Code</label><input type="text" id="f-flip" placeholder="e.g. YY-s01v01-..."></div>
            <div class="field"><label>PDF Filename</label><input type="text" id="f-pdf" placeholder="e.g. YY-s01v01-..."></div>
            <div class="field"><label>DOCX Source</label>
                <div id="f-docx-current" style="font-size:0.82rem;color:#666;margin-bottom:6px;"></div>
                <input type="file" id="f-docx-file" accept=".docx,application/vnd.openxmlformats-officedocument.wordprocessingml.document" onchange="uploadDocx()">
                <div id="f-docx-status" style="margin-top:6px;font-size:0.82rem;"></div>
            </div>
            <div class="field">
                <label style="display:block;margin-bottom:6px;"><input type="checkbox" id="f-active" checked> Active</label>
                <label style="display:block;margin-bottom:4px;"><input type="checkbox" id="f-search-flag" checked> Include in <strong>Book Search</strong></label>
                <label style="display:block;margin-bottom:4px;"><input type="checkbox" id="f-parse-flag" checked> Parse for <strong>translations / glossary / paragraphs</strong></label>
                <label style="display:block;"><input type="checkbox" id="f-ask-yada-flag" checked> Include in <strong>Ask Yada</strong> context</label>
            </div>
            <div class="form-actions">
                <button class="btn btn-primary btn-sm" onclick="saveVolume()">Save</button>
                <button class="btn btn-secondary btn-sm" onclick="closeForm()">Cancel</button>
            </div>
        </div>
    </div>
</div>

<!-- Series Form -->
<div id="series-form-overlay" class="form-overlay" onclick="if(event.target===this)closeSeriesForm()">
    <div class="form-panel">
        <div class="form-header">
            <h3 id="series-form-title">Edit Series</h3>
            <button onclick="closeSeriesForm()">&times;</button>
        </div>
        <div class="form-body">
            <input type="hidden" id="sf-key">
            <div class="field"><label>Label</label><input type="text" id="sf-label"></div>
            <div class="field"><label>Short Name</label><input type="text" id="sf-name"></div>
            <div class="form-row">
                <div class="field"><label>Series #</label><input type="number" id="sf-number" value="0"></div>
                <div class="field"><label>Sort</label><input type="number" id="sf-sort" value="0"></div>
            </div>
            <div class="field"><label>Summary</label><textarea id="sf-summary" style="min-height:80px;"></textarea></div>
            <div class="form-actions">
                <button class="btn btn-primary btn-sm" onclick="saveSeries()">Save</button>
                <button class="btn btn-secondary btn-sm" onclick="closeSeriesForm()">Cancel</button>
            </div>
        </div>
    </div>
</div>

<script src="js/admin-links.js?v=2"></script>
<script>
var API = '/api';
var allSeries = [];
var allVolumes = [];

function esc(s) { var d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

function checkAuth() {
    fetch(API + '/auth.php', {credentials:'include'}).then(function(r){return safeJson(r);}).then(function(d) {
        if (d.authenticated) {
            document.getElementById('app').style.display = '';
            document.getElementById('user-display').textContent = d.user_name;
            applyPagePermissions(d.pages);
            loadBooks();
        } else { document.getElementById('login-screen').classList.add('visible'); }
    });
}
function doLogin() {
    var user = document.getElementById('login-user').value, pass = document.getElementById('login-pass').value;
    var errEl = document.getElementById('login-error'); errEl.style.display = 'none';
    fetch(API + '/auth.php', {method:'POST', credentials:'include', headers:{'Content-Type':'application/json'}, body: JSON.stringify({login:user, password:pass})})
    .then(function(r){return safeJson(r);}).then(function(d) {
        if (d.authenticated) { document.getElementById('login-screen').classList.remove('visible'); document.getElementById('app').style.display = ''; document.getElementById('user-display').textContent = d.user_name; applyPagePermissions(d.pages); loadBooks(); }
        else { errEl.textContent = d.error || 'Login failed'; errEl.style.display = ''; }
    });
}
function doLogout() { fetch(API + '/auth.php', {method:'DELETE', credentials:'include'}).then(function() { location.reload(); }); }
function togglePassword() { var i = document.getElementById('login-pass'); i.type = i.type === 'password' ? 'text' : 'password'; }

var _pipelineRefreshTimer = null;
function loadBooks() {
    return fetch(API + '/admin-books.php', {credentials:'include'}).then(function(r){return safeJson(r);}).then(function(d) {
        allSeries = d.series || [];
        allVolumes = d.volumes || [];
        document.getElementById('book-count').textContent = allSeries.length + ' series, ' + allVolumes.length + ' volumes';
        renderBooks();
        // Auto-refresh every 6 seconds while any volume's pipeline is queued
        // or running, so the admin watches PDF/FLIP statuses flip live as the
        // host worker picks up jobs. Stops itself once everything is settled.
        var inFlight = allVolumes.some(function(v) {
            var s = (v.volume_pipeline_status || '').toLowerCase();
            var p = (v.volume_parse_status    || '').toLowerCase();
            return PROC_STATES.indexOf(s) >= 0 || PROC_STATES.indexOf(p) >= 0;
        });
        if (_pipelineRefreshTimer) { clearTimeout(_pipelineRefreshTimer); _pipelineRefreshTimer = null; }
        if (inFlight) {
            _pipelineRefreshTimer = setTimeout(loadBooks, 6000);
        }
    });
}

// Per-artifact status cell. Combines four facts:
//   - Does the artifact exist? (truthy `field`)
//   - Is the pipeline currently working on this volume? (procStates)
//   - When was it last generated? (`mtime` ISO string)
//   - Is it stale relative to its source? (mtime < sourceMtime)
//
// Result is a stacked icon + small age line. Tooltip shows full timestamp.
var PROC_STATES = ['queued', 'processing', 'running', 'pending'];
// Stacked local-time stamp: YYMMDD on one line, HH:MM on the next.
// Returns RAW HTML (with <br>) — callers must NOT pass through esc(). Output
// is purely numeric so no escaping concerns.
function ago(iso) {
    if (!iso) return '';
    var d = new Date(iso);
    if (isNaN(d.getTime())) return '';
    function p(n) { return (n < 10 ? '0' : '') + n; }
    return p(d.getFullYear() % 100) + p(d.getMonth() + 1) + p(d.getDate())
         + '<br>' + p(d.getHours()) + ':' + p(d.getMinutes());
}
function fullDt(iso) {
    if (!iso) return '';
    try { return new Date(iso).toLocaleString(); } catch(e) { return iso; }
}
// Data cell: paragraph + translation counts pulled live from yy_paragraph
// and yy_translation, plus a parse-status indicator that mirrors the docx→
// pdf→flip pattern. "Stale" means the docx is newer than the last parse,
// i.e. the in-database paragraphs/translations are out of sync with the
// current source. Tooltip shows the last-parse timestamp + status message.
function dataCell(v) {
    var pc = v.paragraph_count_live || 0;
    var tc = v.translation_count_live || 0;
    var parseStatus = (v.volume_parse_status || '').toLowerCase();
    var inProc = PROC_STATES.indexOf(parseStatus) >= 0;
    var parseDt = v.volume_parse_dtime || null;
    var docxDt = v.volume_docx_mtime || null;
    var stale = false;
    if (parseDt && docxDt) {
        var pT = new Date(parseDt).getTime(), dT = new Date(docxDt).getTime();
        if (pT && dT && pT < dT - 1000) stale = true;
    }
    if (!parseDt && docxDt) stale = true; // never parsed but docx exists

    var icon, cls, sub, tipPrefix;
    if (inProc) {
        icon = stale ? '⟳' : '⏳';
        cls = 'status-proc';
        sub = stale ? 'reparsing' : 'parsing';
        tipPrefix = 'Paragraph + translation extraction in flight (' + esc(parseStatus) + ')';
    } else if (parseStatus === 'error') {
        icon = '✗'; cls = 'status-stale'; sub = 'error';
        tipPrefix = 'Last parse errored: ' + esc(v.volume_parse_message || '');
    } else if (stale) {
        icon = '↻'; cls = 'status-stale'; sub = 'stale';
        tipPrefix = 'DOCX is newer than the last parse — paragraphs/translations are out of date.';
    } else if (pc > 0 || tc > 0) {
        icon = '✓'; cls = 'status-gen'; sub = '';
        tipPrefix = 'Last parsed' + (parseDt ? ' on ' + fullDt(parseDt) : '');
    } else {
        icon = '—'; cls = 'status-miss'; sub = '';
        tipPrefix = 'No paragraphs or translations extracted yet';
    }
    // Stack the cell vertically — icon on top, T/P count below, then the
    // YYMMDD / HH:MM stack — to match the visual pattern of DOCX/PDF/FLIP.
    var countLine = '<div class="age" style="font-family:monospace;">'
                  + tc.toLocaleString() + 'T / ' + pc.toLocaleString() + 'P</div>';
    var ageLine = parseDt ? '<div class="age" title="' + esc(fullDt(parseDt)) + '">' + ago(parseDt) + '</div>' : (sub ? '<div class="age">' + esc(sub) + '</div>' : '');
    var pulse = inProc ? ' proc-pulse' : '';
    return '<div class="status-cell' + pulse + '" title="' + esc(tipPrefix) + '">'
         + '<span class="status-icon ' + cls + '">' + icon + '</span>'
         + countLine
         + ageLine
         + '</div>';
}

// FlipHTML5-specific cell. Distinguishes the four states that artifactCell
// collapsed into a single "—":
//   - flip_code present       → ✓ (or ↻ if stale vs. PDF, or ⏳ if regenerating)
//   - PDF present, no code, status=error    → ✗ "failed" with tooltip
//   - PDF present, no code, status=success  → ⌛ "skipped" (pipeline ran but
//                                              FlipHTML5 step was disabled at the time)
//   - PDF present, no code, no/queued status → ⌛ "pending"
//   - No PDF, no code         → — (truly missing input)
// The last three all flag "needs flipbook processing" so the operator knows
// what's queued or stuck.
function flipCell(v) {
    var ps = (v.volume_pipeline_status || '').toLowerCase();
    var inProc = PROC_STATES.indexOf(ps) >= 0;
    var hasFlip = !!v.volume_flip_code;
    var hasPdf  = !!v.volume_pdf;

    // Flip artifact exists — defer to the standard stale/✓ rendering.
    if (hasFlip) {
        return artifactCell(true, v.volume_flip_mtime, v.volume_pdf_mtime, ps, 'FlipHTML5');
    }
    // No PDF yet → nothing to flip, plain missing.
    if (!hasPdf) {
        if (inProc) {
            return '<div class="status-cell proc-pulse">'
                 + '<span class="status-icon status-proc" title="Pipeline running (' + esc(ps) + ')">⏳</span>'
                 + '<div class="age">processing</div></div>';
        }
        return '<div class="status-cell"><span class="status-icon status-miss" title="No PDF yet — upload DOCX first">—</span></div>';
    }
    // PDF exists, flip_code missing — surface the reason it's pending.
    if (inProc) {
        return '<div class="status-cell proc-pulse">'
             + '<span class="status-icon status-proc" title="FlipHTML5 upload in flight (' + esc(ps) + ')">⏳</span>'
             + '<div class="age">uploading</div></div>';
    }
    if (ps === 'error') {
        var msg = v.volume_pipeline_message || 'unknown error';
        return '<div class="status-cell">'
             + '<span class="status-icon status-stale" title="FlipHTML5 upload failed: ' + esc(msg) + '">✗</span>'
             + '<div class="age" style="color:#c0392b;">failed</div></div>';
    }
    if (ps === 'success') {
        return '<div class="status-cell">'
             + '<span class="status-icon" style="color:#a36100;" title="Pipeline finished but FlipHTML5 upload was skipped: ' + esc(v.volume_pipeline_message || '') + '">⌛</span>'
             + '<div class="age" style="color:#a36100;">skipped</div></div>';
    }
    // Default: never tried.
    return '<div class="status-cell">'
         + '<span class="status-icon" style="color:#a36100;" title="PDF ready — flipbook upload pending">⌛</span>'
         + '<div class="age" style="color:#a36100;">pending</div></div>';
}

function artifactCell(field, mtime, sourceMtime, pipelineStatus, label) {
    var ps = (pipelineStatus || '').toLowerCase();
    var inProc = PROC_STATES.indexOf(ps) >= 0;
    // Pipeline is in flight AND we don't have the artifact yet — definitively
    // "being generated right now". Pulse animation reinforces that something
    // is actively happening.
    if (inProc && !field) {
        return '<div class="status-cell proc-pulse">'
             + '<span class="status-icon status-proc" title="' + label + ' is being generated (pipeline ' + esc(ps) + ')">⏳</span>'
             + '<div class="age">processing</div></div>';
    }
    if (!field) {
        return '<div class="status-cell"><span class="status-icon status-miss" title="' + label + ' missing — no file generated">—</span></div>';
    }
    // Field exists — show age + stale indicator if applicable.
    // Stale means: this artifact's mtime predates its source's mtime, i.e. the
    // source was updated more recently and this hasn't been regenerated yet.
    // If the pipeline is currently in flight, this gets re-decided on next refresh.
    var stale = false;
    if (mtime && sourceMtime) {
        var t = new Date(mtime).getTime(), st = new Date(sourceMtime).getTime();
        if (t && st && t < st - 1000) stale = true; // 1-sec slop
    }
    if (stale && inProc) {
        return '<div class="status-cell proc-pulse">'
             + '<span class="status-icon status-proc" title="' + label + ' is being regenerated (newer source detected)">⟳</span>'
             + '<div class="age">regenerating</div></div>';
    }
    if (stale) {
        return '<div class="status-cell">'
             + '<span class="status-icon status-stale" title="' + label + ' is older than its source — needs regeneration. Last built: ' + fullDt(mtime) + '">↻</span>'
             + '<div class="age">stale<br>' + ago(mtime) + '</div></div>';
    }
    var ageTxt = mtime ? ago(mtime) : '';
    var fullTxt = mtime ? fullDt(mtime) : '';
    return '<div class="status-cell">'
         + '<span class="status-icon status-gen" title="' + label + ' generated' + (fullTxt ? ' on ' + fullTxt : '') + '">✓</span>'
         + (ageTxt ? '<div class="age" title="' + esc(fullTxt) + '">' + ageTxt + '</div>' : '')
         + '</div>';
}

function renderBooks() {
    var container = document.getElementById('table-container');
    if (!allSeries.length) { container.innerHTML = '<div style="text-align:center;padding:30px;color:#888">No series found.</div>'; return; }

    // Banner: count volumes whose flipbook upload is pending. Categorize by
    // reason so the operator knows where the work is. Click the banner to
    // jump-scroll the first pending volume into view.
    var pending = { failed: [], skipped: [], pending: [] };
    allVolumes.forEach(function(v) {
        if (v.volume_flip_code || !v.volume_pdf) return;
        var ps = (v.volume_pipeline_status || '').toLowerCase();
        if (PROC_STATES.indexOf(ps) >= 0) return; // currently processing — not "pending"
        if (ps === 'error')        pending.failed.push(v);
        else if (ps === 'success') pending.skipped.push(v);
        else                       pending.pending.push(v);
    });
    var totalPending = pending.failed.length + pending.skipped.length + pending.pending.length;
    var banner = '';
    if (totalPending > 0) {
        var firstKey = (pending.failed[0] || pending.skipped[0] || pending.pending[0]).volume_key;
        var parts = [];
        if (pending.failed.length)  parts.push('<span style="color:#c0392b;">✗ ' + pending.failed.length + ' failed</span>');
        if (pending.skipped.length) parts.push('<span style="color:#a36100;">⌛ ' + pending.skipped.length + ' skipped</span>');
        if (pending.pending.length) parts.push('<span style="color:#a36100;">⌛ ' + pending.pending.length + ' never run</span>');
        var tipLines = [];
        ['failed', 'skipped', 'pending'].forEach(function(cat) {
            pending[cat].forEach(function(v) {
                tipLines.push((cat === 'failed' ? '✗' : '⌛') + ' ' + v.volume_label
                            + (v.volume_pipeline_message ? ' — ' + v.volume_pipeline_message : ''));
            });
        });
        banner = '<div onclick="document.querySelector(\'tr[data-vol-key=&quot;' + firstKey + '&quot;]\').scrollIntoView({block:\'center\',behavior:\'smooth\'})" '
               + 'style="margin:0 0 10px;padding:10px 14px;background:#fff8e1;border:1px solid #f5d76e;border-radius:6px;font-size:0.85rem;cursor:pointer;" '
               + 'title="' + esc(tipLines.join('\n')) + '">'
               + '<strong>' + totalPending + ' flipbook' + (totalPending === 1 ? '' : 's') + ' need processing:</strong> '
               + parts.join(' &middot; ')
               + ' <span style="color:#888;">(click to jump to first)</span>'
               + '</div>';
    }

    // ONE table for all series; series rows span the whole width and act as
    // visual section dividers. Fixed column widths are honored across every
    // group so DOCX/PDF/FLIP/Status icons line up vertically down the page.
    var html = banner
        + '<table class="books-table">'
        + '<colgroup>'
        + '<col style="width:42px;">'         // #
        + '<col>'                              // Label (flex)
        + '<col style="width:160px;">'        // Name
        + '<col style="width:54px;">'         // Pages
        + '<col style="width:74px;">'         // DOCX
        + '<col style="width:74px;">'         // PDF
        + '<col style="width:74px;">'         // FLIP
        + '<col style="width:110px;">'        // Data (paragraphs + translations)
        + '<col style="width:74px;">'         // Active
        + '<col style="width:120px;">'        // Actions
        + '</colgroup>'
        + '<thead><tr>'
        + '<th>#</th>'
        + '<th>Label</th>'
        + '<th>Name</th>'
        + '<th>Pages</th>'
        + '<th class="status-cell" style="text-align:center;" title="Source .docx file uploaded">DOCX</th>'
        + '<th class="status-cell" style="text-align:center;" title="PDF generated from the .docx">PDF</th>'
        + '<th class="status-cell" style="text-align:center;" title="FlipHTML5 flipbook built">FLIP</th>'
        + '<th class="status-cell" style="text-align:center;" title="Number of Translations (T) and Paragraphs (P) pulled from the document">YY Parse</th>'
        + '<th>Active</th>'
        + '<th>Actions</th>'
        + '</tr></thead><tbody>';

    for (var si = 0; si < allSeries.length; si++) {
        var s = allSeries[si];
        var vols = allVolumes.filter(function(v) { return v.series_key == s.series_key; });

        html += '<tr class="series-row" onclick="editSeries(' + s.series_key + ')">'
            + '<td colspan="10">'
            + '<div style="display:flex;justify-content:space-between;align-items:center;">'
            + '<span>' + esc(s.series_label) + ' <span class="series-meta">(' + vols.length + ' volume' + (vols.length !== 1 ? 's' : '') + ')</span></span>'
            + '<span class="series-actions" onclick="event.stopPropagation()">'
            + '<button onclick="addVolumeToSeries(' + s.series_key + ')">+ Volume</button>'
            + '<button onclick="editSeries(' + s.series_key + ')">Edit</button>'
            + '</span>'
            + '</div>'
            + '</td>'
            + '</tr>';

        for (var vi = 0; vi < vols.length; vi++) {
            var v = vols[vi];
            var ps = v.volume_pipeline_status;
            // Source-mtime chain: PDF's source is the DOCX; FLIP's source is
            // the PDF (and transitively the DOCX). DOCX has no upstream.
            html += '<tr class="volume-row" data-vol-key="' + v.volume_key + '" onclick="editVolume(' + v.volume_key + ')">'
                + '<td>' + (v.volume_number || '') + '</td>'
                + '<td><strong>' + esc(v.volume_label) + '</strong></td>'
                + '<td style="font-size:0.8rem;color:#666;">' + esc(v.volume_name || '') + '</td>'
                + '<td>' + (v.volume_page_count || '') + '</td>'
                + '<td>' + artifactCell(!!v.volume_docx,      v.volume_docx_mtime, null,                  ps, 'DOCX')      + '</td>'
                + '<td>' + artifactCell(!!v.volume_pdf,       v.volume_pdf_mtime,  v.volume_docx_mtime,   ps, 'PDF')       + '</td>'
                + '<td>' + flipCell(v) + '</td>'
                + '<td>' + dataCell(v) + '</td>'
                + '<td>' + (v.volume_active_flag ? '<span class="badge-active">Active</span>' : '<span class="badge-inactive">Inactive</span>') + '</td>'
                + '<td class="actions" onclick="event.stopPropagation()">'
                + '<button onclick="editVolume(' + v.volume_key + ')">Edit</button>'
                + '<button class="del" onclick="deleteVolume(' + v.volume_key + ',\'' + esc(v.volume_label).replace(/'/g,"\\'") + '\')">Del</button>'
                + '</td></tr>';
        }
    }
    html += '</tbody></table>';
    container.innerHTML = html;
}

// ── Volume Form ──
function editVolume(key) { var v = allVolumes.find(function(r){return r.volume_key==key;}); if(v) showVolumeForm(v); }
function addVolumeToSeries(seriesKey) { showVolumeForm({series_key: seriesKey}); }

function showVolumeForm(record) {
    var r = record || {};
    document.getElementById('form-title').textContent = r.volume_key ? 'Edit Volume' : 'Add Volume';
    document.getElementById('f-key').value = r.volume_key || '';
    document.getElementById('f-label').value = r.volume_label || '';
    document.getElementById('f-name').value = r.volume_name || '';
    document.getElementById('f-number').value = r.volume_number || 0;
    document.getElementById('f-sort').value = r.volume_sort || 0;
    document.getElementById('f-pages').value = r.volume_page_count || 0;
    document.getElementById('f-flip').value = r.volume_flip_code || '';
    document.getElementById('f-pdf').value = r.volume_pdf || '';
    document.getElementById('f-active').checked = r.volume_active_flag !== false;
    document.getElementById('f-search-flag').checked   = r.volume_search_flag    !== false;
    document.getElementById('f-parse-flag').checked    = r.volume_parse_flag     !== false;
    document.getElementById('f-ask-yada-flag').checked = r.volume_ask_yada_flag  !== false;

    // DOCX status
    var docxCur = document.getElementById('f-docx-current');
    if (r.volume_docx) {
        docxCur.innerHTML = 'Current: <a href="/books/word/' + esc(r.volume_docx) + '" target="_blank">' + esc(r.volume_docx) + '</a>';
    } else {
        docxCur.textContent = 'No .docx uploaded yet';
    }
    var docxStatus = document.getElementById('f-docx-status');
    if (r.volume_pipeline_status) {
        var color = r.volume_pipeline_status === 'success' ? '#27ae60'
                  : r.volume_pipeline_status === 'error' ? '#c0392b' : '#888';
        var statusHtml = '<span style="color:' + color + '">Pipeline: ' + esc(r.volume_pipeline_status)
                       + (r.volume_pipeline_message ? ' &mdash; ' + esc(r.volume_pipeline_message) : '') + '</span>';
        // Manual Retry Pipeline button — surfaces next to the FlipHTML5
        // failure message when auto-retry exhausted its 3-attempt cap (or any
        // 'error'/'warning' state). Skips re-converting the docx if the PDF
        // is already on disk, so it's cheap to click.
        var ps = (r.volume_pipeline_status || '').toLowerCase();
        if (ps === 'error' || ps === 'warning') {
            statusHtml += ' <button type="button" onclick="retryPipeline(' + r.volume_key + ', this)" '
                       + 'title="Requeue the pipeline (LibreOffice + FlipHTML5 + offline package). Runs on the next host worker tick." '
                       + 'style="margin-left:8px;background:#fff3a8;border:1px solid #e0c000;color:#8a6d00;padding:3px 10px;border-radius:4px;cursor:pointer;font-size:0.78rem;font-weight:600;">⟳ Retry Pipeline</button>';
        }
        docxStatus.innerHTML = statusHtml;
    } else {
        docxStatus.textContent = '';
    }
    var fileInput = document.getElementById('f-docx-file');
    if (fileInput) fileInput.value = '';

    var sel = document.getElementById('f-series');
    sel.innerHTML = allSeries.map(function(s) {
        return '<option value="' + s.series_key + '"' + (r.series_key == s.series_key ? ' selected' : '') + '>' + esc(s.series_label) + '</option>';
    }).join('');

    document.getElementById('form-overlay').classList.add('open');
}

function closeForm() { document.getElementById('form-overlay').classList.remove('open'); }

function saveVolume() {
    var key = document.getElementById('f-key').value;
    var label = document.getElementById('f-label').value.trim();
    if (!label) { alert('Label is required'); return; }

    var payload = {
        series_key: parseInt(document.getElementById('f-series').value),
        volume_label: label,
        volume_name: document.getElementById('f-name').value.trim(),
        volume_number: parseInt(document.getElementById('f-number').value) || 0,
        volume_sort: parseInt(document.getElementById('f-sort').value) || 0,
        volume_page_count: parseInt(document.getElementById('f-pages').value) || 0,
        volume_flip_code: document.getElementById('f-flip').value.trim(),
        volume_pdf: document.getElementById('f-pdf').value.trim(),
        volume_active_flag: document.getElementById('f-active').checked,
        volume_search_flag: document.getElementById('f-search-flag').checked,
        volume_parse_flag: document.getElementById('f-parse-flag').checked,
        volume_ask_yada_flag: document.getElementById('f-ask-yada-flag').checked,
    };

    fetch(API + '/admin-books.php' + (key ? '?key=' + key : ''), {
        method: key ? 'PUT' : 'POST', credentials: 'include',
        headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload)
    }).then(function(r){return safeJson(r);}).then(function(d) { if(d.error){alert(d.error);return;} closeForm(); loadBooks(); });
}

function deleteVolume(key, label) {
    if (!confirm('Delete volume "' + label + '"?')) return;
    fetch(API + '/admin-books.php?key=' + key, {method:'DELETE', credentials:'include'})
    .then(function(r){return safeJson(r);}).then(function(d) { if(d.error){alert(d.error);return;} loadBooks(); });
}

// Manually requeue the book pipeline. Used when auto-retry exhausted its 3
// attempts or the operator wants to kick a stuck job from the edit form.
function retryPipeline(volumeKey, btn) {
    if (!confirm('Requeue the book pipeline for this volume? It will run within ~1 minute on the host worker.')) return;
    var orig = btn ? btn.textContent : '';
    if (btn) { btn.disabled = true; btn.textContent = '⏳ Queueing…'; }
    fetch(API + '/admin-books.php?action=retry_pipeline&key=' + volumeKey, {
        method: 'POST', credentials: 'include',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({action:'retry_pipeline', volume_key: volumeKey})
    }).then(function(r){return r.json();}).then(function(d) {
        if (d.error) {
            alert('Retry failed: ' + d.error);
            if (btn) { btn.disabled = false; btn.textContent = orig; }
            return;
        }
        if (btn) { btn.textContent = '✓ Queued'; btn.style.background = '#d4edda'; btn.style.borderColor = '#a3d4ad'; btn.style.color = '#155724'; }
        if (typeof loadBooks === 'function') loadBooks();
    }).catch(function(err) {
        alert('Retry failed: ' + err.message);
        if (btn) { btn.disabled = false; btn.textContent = orig; }
    });
}

function uploadDocx() {
    var key = document.getElementById('f-key').value;
    if (!key) { alert('Save the volume first before uploading a .docx'); return; }
    var fileInput = document.getElementById('f-docx-file');
    if (!fileInput || !fileInput.files[0]) { alert('Choose a .docx file first'); return; }
    var statusEl = document.getElementById('f-docx-status');
    statusEl.innerHTML = '<span style="color:#888">Uploading…</span>';

    var fd = new FormData();
    fd.append('docx', fileInput.files[0]);
    fetch(API + '/admin-books.php?action=upload_docx&key=' + key, {
        method: 'POST', credentials: 'include', body: fd
    }).then(function(r){return safeJson(r);}).then(function(d) {
        if (d.error) {
            statusEl.innerHTML = '<span style="color:#c0392b">' + esc(d.error) + '</span>';
            return;
        }
        statusEl.innerHTML = '<span style="color:#2980b9">Queued. Conversion + FlipHTML5 build runs on the host (typically 1–3 minutes).</span>';
        // Refresh books list so the new docx + status show up; reload the form too
        loadBooks().then(function() {
            var v = allVolumes.find(function(r){return r.volume_key==key;});
            if (v) showVolumeForm(v);
        });
    }).catch(function() {
        statusEl.innerHTML = '<span style="color:#c0392b">Upload failed (network)</span>';
    });
}

// ── Series Form ──
function editSeries(key) {
    var s = allSeries.find(function(r){return r.series_key==key;});
    if (!s) return;
    document.getElementById('series-form-title').textContent = 'Edit Series';
    document.getElementById('sf-key').value = s.series_key;
    document.getElementById('sf-label').value = s.series_label || '';
    document.getElementById('sf-name').value = s.series_name || '';
    document.getElementById('sf-number').value = s.series_number || 0;
    document.getElementById('sf-sort').value = s.series_sort || 0;
    document.getElementById('sf-summary').value = s.series_summary || '';
    document.getElementById('series-form-overlay').classList.add('open');
}

function closeSeriesForm() { document.getElementById('series-form-overlay').classList.remove('open'); }

function saveSeries() {
    var key = document.getElementById('sf-key').value;
    var payload = {
        series_label: document.getElementById('sf-label').value.trim(),
        series_name: document.getElementById('sf-name').value.trim(),
        series_number: parseInt(document.getElementById('sf-number').value) || 0,
        series_sort: parseInt(document.getElementById('sf-sort').value) || 0,
        series_summary: document.getElementById('sf-summary').value.trim(),
    };
    if (!payload.series_label) { alert('Label is required'); return; }

    fetch(API + '/admin-books.php?series_key=' + key, {
        method: 'PUT', credentials: 'include',
        headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload)
    }).then(function(r){return safeJson(r);}).then(function(d) { if(d.error){alert(d.error);return;} closeSeriesForm(); loadBooks(); });
}

document.getElementById('login-pass').addEventListener('keydown', function(e) { if (e.key === 'Enter') doLogin(); });
checkAuth();
</script>
