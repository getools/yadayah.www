    <div class="app-header">
        <nav class="nav-tabs"></nav>
<script src="/js/admin-nav.js?v=11"></script>

                    <tr>

<script src="js/tinymce/tinymce.min.js"></script>
<script src="js/admin-links.js?v=4"></script>
<script>
var API = '/api';
var editingPageKey = null;
var currentPageKey = null;
var deletedSections = [];
var _bodyEditorReady = false;

// ── RGBA Picker ──
function initRgbaPickers(){document.querySelectorAll('.rgba-picker').forEach(function(el){var id=el.getAttribute('data-id');el.innerHTML='<div class="color-swatch" id="'+id+'-swatch" style="background:#000;"><input type="color" id="'+id+'-hex" value="#000000"></div><div class="opacity-wrap"><input type="range" id="'+id+'-opacity" min="0" max="100" value="100" step="1"><span class="opacity-val" id="'+id+'-opval">1.00</span></div><span class="rgba-result" id="'+id+'-result"></span>';var hex=document.getElementById(id+'-hex'),opacity=document.getElementById(id+'-opacity'),swatch=document.getElementById(id+'-swatch'),opval=document.getElementById(id+'-opval'),result=document.getElementById(id+'-result');function update(){var h=hex.value,a=(parseInt(opacity.value)/100).toFixed(2);opval.textContent=a;var r=parseInt(h.substr(1,2),16),g=parseInt(h.substr(3,2),16),b=parseInt(h.substr(5,2),16);var rgba='rgba('+r+','+g+','+b+','+a+')';swatch.style.background=rgba;result.textContent=rgba;}hex.addEventListener('input',update);opacity.addEventListener('input',update);});}
function setPickerValue(id,c){if(!c)c='rgba(0,0,0,1)';var hex=document.getElementById(id+'-hex'),op=document.getElementById(id+'-opacity');if(!hex||!op)return;var r=0,g=0,b=0,a=1;var m=c.match(/rgba?\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)\s*(?:,\s*([\d.]+))?\s*\)/);if(m){r=parseInt(m[1]);g=parseInt(m[2]);b=parseInt(m[3]);a=m[4]!==undefined?parseFloat(m[4]):1;}else if(c.charAt(0)==='#'){var hx=c.replace('#','');if(hx.length===3)hx=hx[0]+hx[0]+hx[1]+hx[1]+hx[2]+hx[2];r=parseInt(hx.substr(0,2),16);g=parseInt(hx.substr(2,2),16);b=parseInt(hx.substr(4,2),16);}hex.value='#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);op.value=Math.round(a*100);hex.dispatchEvent(new Event('input'));}
function getPickerValue(id){var hex=document.getElementById(id+'-hex'),op=document.getElementById(id+'-opacity');if(!hex||!op)return'';var h=hex.value,a=(parseInt(op.value)/100).toFixed(2);var r=parseInt(h.substr(1,2),16),g=parseInt(h.substr(3,2),16),b=parseInt(h.substr(5,2),16);return'rgba('+r+','+g+','+b+','+a+')';}
initRgbaPickers();

function initBodyEditor(content) {
    _bodyEditorReady = false;
    var existing = tinymce.get('f-body');
    if (existing) existing.remove();

    tinymce.init({
        selector: '#f-body',
        base_url: '/js/tinymce',
        plugins: 'autolink link image media lists advlist codesample emoticons fullscreen table autoresize charmap code',
        toolbar: 'bold italic underline strikethrough | blocks fontfamily fontsize | forecolor backcolor | bullist numlist | blockquote codesample | link image media emoticons charmap | table | code fullscreen',
        menubar: 'file edit view insert format tools table',
        statusbar: true,
        branding: false,
        promotion: false,
        min_height: 450,
        max_height: 900,
        autoresize_bottom_margin: 20,
        skin: 'oxide',
        font_family_formats: 'Andale Mono=andale mono,times; Arial=arial,helvetica,sans-serif; Arial Black=arial black,avant garde; Book Antiqua=book antiqua,palatino; Comic Sans MS=comic sans ms,sans-serif; Courier New=courier new,courier; Georgia=georgia,palatino; Helvetica=helvetica; Impact=impact,chicago; Maven Pro=Maven Pro,sans-serif; Semitic Early=Semitic Early; Symbol=symbol; Tahoma=tahoma,arial,helvetica,sans-serif; Terminal=terminal,monaco; Times New Roman=times new roman,times; Trebuchet MS=trebuchet ms,geneva; Verdana=verdana,geneva; Yada Towrah=YadaTowrah-Times; Webdings=webdings; Wingdings=wingdings,zapf dingbats',
        content_css: 'default',
        content_style: '@font-face { font-family: "YadaTowrah-Times"; src: url("/fonts/YadaTowrah-Times.woff2") format("woff2"), url("/fonts/YadaTowrah-Times.ttf") format("truetype"); } @font-face { font-family: "Semitic Early"; src: url("/fonts/SemiticEarly.ttf") format("truetype"); } body { font-family: "Maven Pro", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 1rem; line-height: 1.7; color: #333; padding: 12px; } img { max-width: 100%; height: auto; border-radius: 6px; } a { color: #31345A; } blockquote { border-left: 3px solid #E5C86C; margin: 8px 0; padding: 8px 16px; background: #fafafa; } pre { background: #f4f4f4; padding: 12px; border-radius: 6px; overflow-x: auto; } table { border-collapse: collapse; width: 100%; } td, th { border: 1px solid #ddd; padding: 8px; }',
        images_upload_handler: function(blobInfo) {
            return new Promise(function(resolve, reject) {
                var fd = new FormData();
                fd.append('image', blobInfo.blob(), blobInfo.filename());
                fetch('/api/community-image-upload.php', {
                    method: 'POST', credentials: 'include', body: fd
                }).then(function(r) { return safeJson(r); }).then(function(data) {
                    if (data.url) resolve(data.url); else reject(data.error || 'Upload failed');
                }).catch(function() { reject('Upload failed'); });
            });
        },
        automatic_uploads: true,
        setup: function(editor) {
            editor.on('init', function() {
                editor.setContent(content || '');
                _bodyEditorReady = true;
                // Notify dirty-tracking that content changed
                editor.on('focus', function() {
                    if (typeof window.markDirty === 'function') window.markDirty();
                });
            });
        }
    });
}

function getBodyContent() {
    var editor = tinymce.get('f-body');
    return editor ? editor.getContent() : document.getElementById('f-body').value;
}

function checkAuth() {
    fetch(API + '/auth.php', {credentials:'include'}).then(function(r){return safeJson(r);}).then(function(d) {
        if (d.authenticated) {
            document.getElementById('app').style.display = '';
            document.getElementById('user-display').textContent = d.user_name;
            applyPagePermissions(d.pages);
            loadList();
        } else {
            document.getElementById('login-screen').classList.add('visible');
        }
    });
}

function doLogin() {
    var user = document.getElementById('login-user').value;
    var pass = document.getElementById('login-pass').value;
    var errEl = document.getElementById('login-error');
    errEl.style.display = 'none';
    fetch(API + '/auth.php', {
        method: 'POST', credentials: 'include',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({login: user, password: pass})
    }).then(function(r){return safeJson(r);}).then(function(d) {
        if (d.authenticated) {
            document.getElementById('login-screen').classList.remove('visible');
            document.getElementById('app').style.display = '';
            document.getElementById('user-display').textContent = d.user_name;
            applyPagePermissions(d.pages);
            loadList();
        } else {
            errEl.textContent = d.error || 'Login failed';
            errEl.style.display = '';
        }
    });
}

function doLogout() {
    fetch(API + '/auth.php', {method:'DELETE', credentials:'include'}).then(function() {
        location.reload();
    });
}

function togglePassword() {
    var input = document.getElementById('login-pass');
    input.type = input.type === 'password' ? 'text' : 'password';
}

// ── List ──
var allPages = [];
// sortStack: array of {col, dir} — index 0 = primary, 1 = secondary, etc.
var sortStack = [{col:'page_toolbar', dir:1}, {col:'page_header_sort', dir:1}];

var HEADER_LABELS = {0: 'None', 1: 'Main', 2: 'Sub'};
var FOOTER_LABELS = {0: 'N/A', 1: '1', 2: '2', 3: '3'};

function loadList() {
    fetch(API + '/pages.php', {credentials:'include'}).then(function(r){return safeJson(r);}).then(function(rows) {
        allPages = rows;
        renderList();
    });
}

function setSort(col) {
    var idx = sortStack.findIndex(function(s) { return s.col === col; });
    if (idx === 0) {
        // Already primary — toggle direction
        sortStack[0].dir = -sortStack[0].dir;
    } else if (idx > 0) {
        // Already secondary — move to primary, toggle direction
        var entry = sortStack.splice(idx, 1)[0];
        entry.dir = -entry.dir;
        sortStack.unshift(entry);
    } else {
        // New column — prepend as primary, keep others as secondary
        sortStack.unshift({col: col, dir: 1});
    }
    renderList();
}

function renderList() {
    var tbody = document.getElementById('pages-list');
    if (!allPages.length) {
        tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:#999;font-style:italic">No pages yet</td></tr>';
        return;
    }

    // Update sort indicators on headers
    document.querySelectorAll('.pages-table thead th[data-col]').forEach(function(th) {
        var col = th.getAttribute('data-col');
        var span = th.querySelector('.sort-indicator');
        var rank = sortStack.findIndex(function(s) { return s.col === col; });
        if (rank >= 0) {
            var arrow = sortStack[rank].dir === 1 ? '▲' : '▼';
            span.textContent = sortStack.length > 1 ? (rank + 1) + arrow : arrow;
            span.style.color = rank === 0 ? '#3498db' : '#aaa';
        } else {
            span.textContent = '';
            span.style.color = '';
        }
    });

    var sorted = allPages.slice().sort(function(a, b) {
        for (var i = 0; i < sortStack.length; i++) {
            var col = sortStack[i].col, dir = sortStack[i].dir;
            var av = a[col], bv = b[col];
            if (av == null) av = typeof bv === 'number' ? 0 : '';
            if (bv == null) bv = typeof av === 'number' ? 0 : '';
            if (typeof av === 'boolean') av = av ? 1 : 0;
            if (typeof bv === 'boolean') bv = bv ? 1 : 0;
            if (av < bv) return -dir;
            if (av > bv) return dir;
        }
        return 0;
    });

    tbody.innerHTML = sorted.map(function(r) {
        var badge = r.page_active_flag ? '<span class="badge-active">Active</span>' : '<span class="badge-inactive">Inactive</span>';
        var headerLabel = HEADER_LABELS[r.page_toolbar != null ? r.page_toolbar : ''] || r.page_toolbar;
        var footerLabel = FOOTER_LABELS[r.page_footer_col != null ? r.page_footer_col : 0] || 'N/A';
        return '<tr>'
            + '<td>' + esc(r.page_code) + '</td>'
            + '<td>' + esc(r.page_title) + '</td>'
            + '<td>' + headerLabel + '</td>'
            + '<td>' + (r.page_header_sort || 0) + '</td>'
            + '<td>' + footerLabel + '</td>'
            + '<td>' + (r.page_footer_sort || 0) + '</td>'
            + '<td>' + badge + '</td>'
            + '<td>'
            + '<button class="btn btn-sm btn-secondary" onclick="editPage(' + r.page_key + ')">Edit</button> '
            + '<a class="btn btn-sm btn-secondary" href="' + esc(pageViewUrl(r)) + '" target="_blank" rel="noopener" style="text-decoration:none;">View</a>'
            + '</td>'
            + '</tr>';
    }).join('');
}

// ── Page Form ──
var currentAliases = [];
var deletedAliases = [];

function showPageForm(record) {
    editingPageKey = record ? record.page_key : null;
    document.getElementById('form-title').textContent = editingPageKey ? 'Edit Page' : 'New Page';
    document.getElementById('f-code').value = record ? record.page_code : '';
    document.getElementById('f-url').value = record ? (record.page_url || '') : '';
    document.getElementById('f-title').value = record ? (record.page_title || '') : '';
    document.getElementById('f-heading').value = record ? (record.page_heading || '') : '';
    document.getElementById('f-subheading').value = record ? (record.page_subheading || '') : '';
    document.getElementById('f-description').value = record ? (record.page_description || '') : '';

    // Style fields
    setPickerValue('f-heading-color', (record && record.page_heading_color) || 'rgba(229,200,108,1)');
    document.getElementById('f-heading-size').value = (record && record.page_heading_size) || '';
    setPickerValue('f-subheading-color', (record && record.page_subheading_color) || 'rgba(102,102,102,1)');
    document.getElementById('f-subheading-size').value = (record && record.page_subheading_size) || '';
    setPickerValue('f-description-color', (record && record.page_description_color) || 'rgba(85,85,85,1)');
    document.getElementById('f-description-size').value = (record && record.page_description_size) || '';
    setPickerValue('f-background-color', (record && record.page_background_color) || 'rgba(245,245,245,1)');

    document.getElementById('f-active').checked = record ? record.page_active_flag : true;
    document.getElementById('f-item-allow').checked  = record ? !!record.page_item_allow_flag  : false;
    document.getElementById('f-item-search').checked = record ? !!record.page_item_search_flag : false;
    var toolbarVal = record ? (record.page_toolbar || 0) : 0;
    var footerVal = record ? (record.page_footer_col || 0) : 0;
    document.getElementById('f-toolbar').value = toolbarVal;
    document.getElementById('f-footer-col').value = footerVal;
    document.getElementById('f-header-sort').value = record ? (record.page_header_sort || 0) : 0;
    document.getElementById('f-footer-sort').value = record ? (record.page_footer_sort || 0) : 0;
    document.getElementById('f-header-sort').disabled = (String(toolbarVal) === '0');
    document.getElementById('f-footer-sort').disabled = (String(footerVal) === '0');
    document.getElementById('btn-delete').style.display = editingPageKey ? '' : 'none';
    var viewBtn = document.getElementById('btn-view');
    if (editingPageKey && record) {
        viewBtn.href = pageViewUrl(record);
        viewBtn.style.display = '';
    } else {
        viewBtn.style.display = 'none';
    }
    document.getElementById('form-error').style.display = 'none';

    // Aliases
    currentAliases = (record && record.aliases) ? record.aliases.filter(function(a) { return a.alias_path; }) : [];
    deletedAliases = [];
    var aliasSection = document.getElementById('aliases-section');
    aliasSection.style.display = editingPageKey ? '' : 'none';
    renderAliases();

    showView('form-view');

    // Init TinyMCE body editor after form is visible
    initBodyEditor(record ? (record.page_body || '') : '');
}

function renderAliases() {
    var container = document.getElementById('alias-list');
    if (!currentAliases.length) {
        container.innerHTML = '<div style="font-size:0.82rem;color:#999;font-style:italic;">No aliases</div>';
        return;
    }
    container.innerHTML = currentAliases.map(function(a, i) {
        return '<div style="display:flex;gap:8px;align-items:center;margin-bottom:6px;" data-idx="' + i + '">'
            + '<span style="color:#888;font-size:0.82rem;">/' + '</span>'
            + '<input type="text" class="alias-path" value="' + escAttr(a.alias_path || '') + '" placeholder="alias-path" style="flex:1;padding:6px 8px;border:1px solid #ccc;border-radius:4px;font-size:0.85rem;">'
            + '<label style="font-size:0.8rem;white-space:nowrap;"><input type="checkbox" class="alias-active" ' + (a.alias_active_flag !== false && a.alias_active_flag !== 'f' ? 'checked' : '') + '> Active</label>'
            + '<button type="button" class="btn btn-sm" style="color:#c0392b;border-color:#c0392b;font-size:0.72rem;padding:2px 6px;" onclick="removeAlias(' + i + ')">X</button>'
            + '</div>';
    }).join('');
}

function addAlias() {
    currentAliases.push({ alias_key: null, alias_path: '', alias_active_flag: true });
    renderAliases();
    // Focus the new input
    var inputs = document.querySelectorAll('#alias-list .alias-path');
    if (inputs.length) inputs[inputs.length - 1].focus();
}

function removeAlias(idx) {
    var a = currentAliases[idx];
    if (a && a.alias_key) deletedAliases.push(a.alias_key);
    currentAliases.splice(idx, 1);
    renderAliases();
}

function collectAliases() {
    var rows = document.querySelectorAll('#alias-list [data-idx]');
    var result = [];
    rows.forEach(function(row, i) {
        var path = row.querySelector('.alias-path').value.trim();
        if (!path) return;
        result.push({
            alias_key: currentAliases[i] ? currentAliases[i].alias_key : null,
            alias_path: path,
            alias_active_flag: row.querySelector('.alias-active').checked
        });
    });
    return result;
}

function editPage(key) {
    fetch(API + '/pages.php?key=' + key, {credentials:'include'}).then(function(r){return safeJson(r);}).then(function(data) {
        showPageForm(data);
    });
}

function savePage() {
    var code = document.getElementById('f-code').value.trim();
    var title = document.getElementById('f-title').value.trim();
    var active = document.getElementById('f-active').checked;
    var errEl = document.getElementById('form-error');
    errEl.style.display = 'none';

    if (!code) { errEl.textContent = 'Code is required'; errEl.style.display = ''; return; }

    var toolbar = parseInt(document.getElementById('f-toolbar').value) || 0;
    var footerCol = parseInt(document.getElementById('f-footer-col').value) || 0;
    var headerSort = parseInt(document.getElementById('f-header-sort').value) || 0;
    var url = document.getElementById('f-url').value.trim();
    var footerSort = parseInt(document.getElementById('f-footer-sort').value) || 0;
    var heading = document.getElementById('f-heading').value.trim();
    var subheading = document.getElementById('f-subheading').value.trim();
    var description = document.getElementById('f-description').value.trim();
    var pageBody = getBodyContent().trim();
    var itemAllow  = document.getElementById('f-item-allow').checked;
    var itemSearch = document.getElementById('f-item-search').checked;
    var body = {
        page_code: code, page_title: title, page_active_flag: active,
        page_item_allow_flag: itemAllow, page_item_search_flag: itemSearch,
        page_toolbar: toolbar, page_footer_col: footerCol, page_header_sort: headerSort, page_footer_sort: footerSort,
        page_url: url, page_heading: heading, page_subheading: subheading, page_description: description, page_body: pageBody,
        page_heading_color: getPickerValue('f-heading-color'),
        page_heading_size: document.getElementById('f-heading-size').value || null,
        page_subheading_color: getPickerValue('f-subheading-color'),
        page_subheading_size: document.getElementById('f-subheading-size').value || null,
        page_description_color: getPickerValue('f-description-color'),
        page_description_size: document.getElementById('f-description-size').value || null,
        page_background_color: getPickerValue('f-background-color')
    };
    var url = API + '/pages.php';
    var method = 'POST';

    if (editingPageKey) {
        url += '?key=' + editingPageKey;
        method = 'PUT';
    }

    fetch(url, {
        method: method, credentials: 'include',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify(body)
    }).then(function(r){return safeJson(r);}).then(function(d) {
        if (d.error) { errEl.textContent = d.error; errEl.style.display = ''; return; }
        var pageKey = editingPageKey || d.page_key;
        var aliases = collectAliases();
        if (pageKey && (aliases.length || deletedAliases.length)) {
            return fetch(API + '/pages.php', {
                method: 'POST', credentials: 'include',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify({ page_key: pageKey, aliases: aliases, deleted_aliases: deletedAliases })
            }).then(function(r){return safeJson(r);});
        }
    }).then(function() {
        cancelForm();
        loadList();
    });
}

function deletePage() {
    if (!editingPageKey || !confirm('Delete this page and all its sections?')) return;
    fetch(API + '/pages.php?key=' + editingPageKey, {method:'DELETE', credentials:'include'}).then(function(r){return safeJson(r);}).then(function() {
        cancelForm();
        loadList();
    });
}

function cancelForm() {
    showView('list-view');
    renderList();
}

// ── Sections ──
function editSections(key) {
    currentPageKey = key;
    deletedSections = [];
    document.getElementById('sections-error').style.display = 'none';

    fetch(API + '/pages.php?key=' + key, {credentials:'include'}).then(function(r){return safeJson(r);}).then(function(data) {
        document.getElementById('sections-title').textContent = 'Sections: ' + (data.page_title || data.page_code);
        renderSections(data.sections || []);
        showView('sections-view');
    });
}

function renderSections(sections) {
    var container = document.getElementById('sections-list');
    if (!sections.length) {
        container.innerHTML = '<p style="color:#999;font-style:italic">No sections yet. Click "Add Section" to create one.</p>';
        return;
    }
    container.innerHTML = sections.map(function(s, i) {
        var inactive = !s.page_section_active_flag ? ' inactive' : '';
        return '<div class="section-item' + inactive + '" data-key="' + (s.page_section_key || '') + '">'
            + '<div class="section-header-row">'
            + '<span class="drag-handle" title="Drag to reorder">&#9776;</span>'
            + '<input type="text" class="s-code" value="' + escAttr(s.page_section_code) + '" placeholder="Section code">'
            + '<label style="white-space:nowrap;margin:0"><input type="checkbox" class="s-active"' + (s.page_section_active_flag ? ' checked' : '') + '> Active</label>'
            + '<input type="number" class="s-sort" value="' + (s.page_section_sort || 0) + '" title="Sort order" style="width:60px">'
            + '<button class="btn btn-danger btn-sm" onclick="removeSection(this)">Remove</button>'
            + '</div>'
            + '<div class="section-value-wrap">'
            + '<textarea class="s-value" placeholder="Section content (HTML, text, JSON, etc.)">' + escHtml(s.page_section_value || '') + '</textarea>'
            + '</div>'
            + '</div>';
    }).join('');
}

function addSection() {
    var container = document.getElementById('sections-list');
    // Remove "no sections" message if present
    var p = container.querySelector('p');
    if (p) p.remove();

    var div = document.createElement('div');
    div.className = 'section-item';
    div.setAttribute('data-key', '');
    div.innerHTML = '<div class="section-header-row">'
        + '<span class="drag-handle" title="Drag to reorder">&#9776;</span>'
        + '<input type="text" class="s-code" value="" placeholder="Section code">'
        + '<label style="white-space:nowrap;margin:0"><input type="checkbox" class="s-active" checked> Active</label>'
        + '<input type="number" class="s-sort" value="0" title="Sort order" style="width:60px">'
        + '<button class="btn btn-danger btn-sm" onclick="removeSection(this)">Remove</button>'
        + '</div>'
        + '<div class="section-value-wrap">'
        + '<textarea class="s-value" placeholder="Section content (HTML, text, JSON, etc.)"></textarea>'
        + '</div>';
    container.appendChild(div);
}

function removeSection(btn) {
    var item = btn.closest('.section-item');
    var key = item.getAttribute('data-key');
    if (key) deletedSections.push(parseInt(key));
    item.remove();
}

function saveSections() {
    var errEl = document.getElementById('sections-error');
    errEl.style.display = 'none';

    var items = document.querySelectorAll('#sections-list .section-item');
    var sections = [];
    for (var i = 0; i < items.length; i++) {
        var item = items[i];
        var key = item.getAttribute('data-key');
        sections.push({
            page_section_key: key ? parseInt(key) : null,
            page_section_code: item.querySelector('.s-code').value.trim(),
            page_section_value: item.querySelector('.s-value').value,
            page_section_active_flag: item.querySelector('.s-active').checked,
            page_section_sort: parseInt(item.querySelector('.s-sort').value) || 0,
        });
    }

    fetch(API + '/pages.php', {
        method: 'POST', credentials: 'include',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
            page_key: currentPageKey,
            sections: sections,
            deleted_sections: deletedSections,
        })
    }).then(function(r){return safeJson(r);}).then(function(d) {
        if (d.error) { errEl.textContent = d.error; errEl.style.display = ''; return; }
        deletedSections = [];
        // Reload to show saved state
        editSections(currentPageKey);
    });
}

function backToList() {
    showView('list-view');
    loadList();
}

// ── Helpers ──
function showView(id) {
    ['list-view', 'form-view'].forEach(function(v) {
        document.getElementById(v).style.display = v === id ? '' : 'none';
    });
}

function esc(s) {
    var d = document.createElement('div');
    d.textContent = s || '';
    return d.innerHTML;
}

function pageViewUrl(r) {
    var url = r.page_url || r.page_code || '';
    if (url && url.charAt(0) !== '/' && url.indexOf('http') !== 0) url = '/' + url;
    return url || '/';
}

function escAttr(s) {
    return (s || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function escHtml(s) {
    return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

document.getElementById('login-pass').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
});

checkAuth();

</script>
