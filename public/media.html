<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Julius+Sans+One&family=Maven+Pro:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        html { height: 100%; }
        body {
            font-family: 'Maven Pro', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #373737;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Site header */
        header {
            display: flex; flex-direction: column; align-items: center;
            padding: 0;
            background: url('/images/yy-bg-bluewave.jpg') center/cover no-repeat;
            position: relative; overflow: hidden;
        }
        header .header-video {
            position: absolute; top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            transform: translate(-50%, -50%);
            object-fit: cover; z-index: 0;
        }
        header .header-inner {
            display: flex; flex-direction: column; align-items: center;
            width: 100%; max-width: 1140px; margin: 0 auto;
            position: relative; z-index: 1;
        }
        header .header-logos { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        header .header-logos img { width: auto; height: auto; }
        header nav { display: flex; flex-direction: column; align-items: center; gap: 0; padding: 0; }
        header nav .nav-row {
            display: flex; flex-direction: row; justify-content: center;
            gap: 0 30px; padding: 4px 0; flex-wrap: wrap;
        }
        header nav a {
            text-decoration: none; color: #E5C86C;
            font-family: "Julius Sans One", sans-serif;
            font-size: 1.1em; font-weight: 700;
        }
        header nav a:hover { color: #fff; }
        header nav a.active { color: #fff; text-decoration: underline; text-underline-offset: 5px; }



        /* ── Sub-toolbar ── */
        .sub-toolbar {
            display: flex; justify-content: center; align-items: center;
            gap: 30px; padding: 8px 0;
            background: var(--toolbar-bg, #0A333A);
        }
        .sub-toolbar a {
            text-decoration: none; color: var(--toolbar-text, #8ED0EC);
            font-family: "Julius Sans One", sans-serif;
            font-size: 0.95em; font-weight: 700;
        }
        .sub-toolbar a:hover { color: #fff; }
        .sub-toolbar a.active { color: #fff; text-decoration: underline; text-underline-offset: 5px; }
        /* Page tabs */
        .page-tabs {
            display: flex;
            justify-content: center;
            gap: 0;
            margin: 0 -20px 0 -20px;
            background: #f0f0f0;
            border-bottom: 2px solid #ddd;
        }
        .page-tabs a {
            padding: 12px 32px;
            text-decoration: none;
            font-family: "Julius Sans One", sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: #666;
            border-bottom: 3px solid transparent;
            transition: color 0.2s, border-color 0.2s;
        }
        .page-tabs a:hover { color: #31345A; }
        .page-tabs a.active {
            color: #31345A;
            border-bottom-color: #31345A;
        }
        /* Content */
        html, body { overflow-x: hidden; }
        .content {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px 60px;
            flex: 1;
            box-sizing: border-box;
        }
        /* page heading styles in site-nav.js */

        /* Media grid */
        .media-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 24px;
        }
        .media-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #fff;
            padding: 28px 16px 22px;
            border-radius: 10px;
            background: rgba(255,255,255,0.06);
            transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
        }
        .media-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            background: rgba(255,255,255,0.10);
        }
        .media-icon {
            width: 64px;
            height: 64px;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .media-icon svg {
            width: 100%;
            height: 100%;
        }
        .media-name {
            font-family: 'Julius Sans One', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: #E5C86C;
            margin-bottom: 4px;
        }
        .media-code {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.7);
        }
        .media-card:hover .media-code { color: #fff; }

        /* Loading / status */
        .grid-status {
            text-align: center;
            padding: 40px 20px;
            font-size: 1rem;
            color: rgba(255,255,255,0.5);
        }
        .grid-status.error { color: #e57373; }
        .spinner {
            display: inline-block;
            width: 32px; height: 32px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top-color: #E5C86C;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

    </style>
<script src="/js/site-nav.js?v=9"></script>
    <link rel="stylesheet" href="/css/page-heading.css?v=2">
</head>
<body>
    <header>
    <video class="header-video" autoplay muted loop playsinline>
    </video>
    <div class="header-inner">
        <div class="header-logos">
            <a href="/"><img src="/images/yy-logo-80x90.png" alt="Yada Yah"></a>
        </div>
        <nav>
            <div class="nav-row">
                <a href="books">Books</a>
                <a href="blog">Blog</a>
                <a href="resources">Resources</a>
                <a href="/Craig_Winn">Winn</a>
                <a href="/timeline">Timeline</a>
            </div>
            <div class="nav-row">
                <a href="/translations">Translations</a>
                <a href="/media">Media</a>
                <a href="/music">Music</a>
                <a href="/ask">Ask</a>
            </div>
        </nav>
    </div>
</header>

    <div class="page-tabs">
        <a href="/media" class="active">Media</a>
        <a href="/invite">Invite</a>
        <a href="/DoYouYada">Do You Yada?</a>
    </div>

    <div class="page-heading-wrap"><h1 class="page-heading">Media</h1></div>
    <div class="content">
        <div id="media-grid" class="media-grid"></div>
        <div id="grid-status" class="grid-status"><div class="spinner"></div></div>
    </div>

    <footer></footer>

<script>
function escHtml(s) {
    var d = document.createElement('div');
    d.textContent = s || '';
    return d.innerHTML;
}

function renderCard(m) {
    return '<a class="media-card" href="' + escHtml(m.media_link) + '" target="_blank" rel="noopener">'
        + '<div class="media-icon">' + (m.icon_svg || '') + '</div>'
        + '<div class="media-name">' + escHtml(m.icon_name) + '</div>'
        + '<div class="media-code">' + escHtml(m.media_code) + '</div>'
        + '</a>';
}

fetch('/api/media-links.php')
    .then(function(r) { return r.json(); })
    .then(function(data) {
        var grid = document.getElementById('media-grid');
        var html = '';
        for (var i = 0; i < data.length; i++) {
            html += renderCard(data[i]);
        }
        grid.innerHTML = html;
        document.getElementById('grid-status').textContent = data.length === 0 ? 'No media links found.' : '';
    })
    .catch(function() {
        document.getElementById('grid-status').textContent = 'Error loading media links.';
        document.getElementById('grid-status').className = 'grid-status error';
    });
</script>
<script src="/js/bg-video.js"></script>
<script>
(function(){fetch('/api/site-config.php').then(function(r){return r.json();}).then(function(cfg){
    var r=document.documentElement;
    if(cfg['toolbar-color-bg'])r.style.setProperty('--toolbar-bg','#'+cfg['toolbar-color-bg']);
    if(cfg['toolbar-color-text'])r.style.setProperty('--toolbar-text','#'+cfg['toolbar-color-text']);
    document.querySelectorAll('[data-config]').forEach(function(el){var k=el.getAttribute('data-config');if(cfg[k]!=null)el.textContent=cfg[k];});
});})();
</script>
<script src="/js/site-footer.js?v=127"></script>
</body>
</html>
