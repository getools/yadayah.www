<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feeds Admin - Yada Yah</title>
    <link rel="stylesheet" href="css/app.css">
    <link rel="stylesheet" href="css/login.css">
    <style>
        .feeds-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .feeds-table th, .feeds-table td { padding: 8px 10px; text-align: left; border-bottom: 1px solid #e0e0e0; }
        .feeds-table th { background: #f5f5f5; font-weight: 600; position: sticky; top: 0; font-size: 0.8rem; }
        .feeds-table tr:hover { background: #f0f4ff; cursor: pointer; }
        .feeds-table .actions { white-space: nowrap; }
        .feeds-table .actions button { padding: 3px 8px; font-size: 0.78rem; border: 1px solid #ccc; border-radius: 4px; cursor: pointer; background: #fff; margin-right: 4px; }
        .feeds-table .actions button:hover { background: #f0f0f0; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.75rem; font-weight: 600; }
        .badge-active { background: #d4edda; color: #155724; }
        .badge-inactive { background: #f8d7da; color: #721c24; }
        .badge-site { background: #e2e3f1; color: #383d6e; }
        .sub-tab { padding:8px 20px;border:none;background:none;cursor:pointer;font-size:0.9rem;font-weight:600;color:#666;border-bottom:3px solid transparent;margin-bottom:-2px; }
        .sub-tab.active { color:#31345A;border-bottom-color:#E5C86C; }
        .feed-tab .item-row { font-size:0.82rem; }
        .feed-tab .item-row:hover { background:#f0f4ff; }
        .feed-tab .item-row.inactive { opacity:0.4; }
        .feed-tab .thumb { width:100px;height:56px;object-fit:cover;border-radius:4px; }

        .form-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.45); z-index: 1000; justify-content: center; align-items: flex-start; padding: 40px 20px; overflow-y: auto; }
        .form-overlay.open { display: flex; }
        .form-panel { background: #fff; border-radius: 10px; box-shadow: 0 8px 32px rgba(0,0,0,0.25); width: 100%; }
        .form-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; background: #f8f8f8; border-radius: 10px 10px 0 0; border-bottom: 1px solid #ddd; }
        .form-header h3 { margin: 0; font-size: 1rem; }
        .form-header button { background: none; border: none; font-size: 1.4rem; cursor: pointer; color: #666; padding: 2px 8px; border-radius: 4px; }
        .form-header button:hover { background: #eee; }
        .form-body { padding: 20px; }
        .form-body .field { margin-bottom: 12px; }
        .form-body label { display: block; font-weight: 600; font-size: 0.85rem; margin-bottom: 3px; color: #333; }
        .form-body input[type=text], .form-body input[type=number], .form-body input[type=time], .form-body select, .form-body textarea {
            width: 100%; padding: 7px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.9rem; font-family: inherit; box-sizing: border-box;
        }
        .form-body textarea { min-height: 60px; resize: vertical; }
        .form-body .form-actions { display: flex; gap: 8px; margin-top: 16px; }
        .form-row { display: flex; gap: 12px; }
        .form-row .field { flex: 1; }

        .schedule-section { margin-top: 16px; border-top: 1px solid #ddd; padding-top: 12px; }
        .schedule-section h4 { margin: 0 0 8px; font-size: 0.9rem; }
        .schedule-row { display: flex; gap: 8px; align-items: center; margin-bottom: 6px; font-size: 0.85rem; }
        .schedule-row select, .schedule-row input { padding: 5px 8px; font-size: 0.85rem; border: 1px solid #ccc; border-radius: 4px; }
        .schedule-row .remove-sched { background: none; border: none; color: #c00; cursor: pointer; font-size: 1.1rem; padding: 0 4px; }
        .add-sched-btn { font-size: 0.82rem; color: #3498db; cursor: pointer; background: none; border: none; padding: 4px 0; }
        .add-sched-btn:hover { text-decoration: underline; }

        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .feed-count { font-size: 0.85rem; color: #666; }

        .sync-overlay { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.35); z-index:2000; justify-content:center; align-items:center; }
        .sync-overlay.open { display:flex; }
        .sync-card { background:#fff; border-radius:10px; box-shadow:0 8px 32px rgba(0,0,0,0.25); padding:28px 36px; min-width:320px; text-align:center; }
        .sync-card h3 { margin:0 0 6px; font-size:1rem; color:#31345A; }
        .sync-card .sync-sub { font-size:0.82rem; color:#888; margin-bottom:16px; }
        .sync-bar-track { width:100%; height:6px; background:#e8e8e8; border-radius:3px; overflow:hidden; }
        .sync-bar-fill { width:30%; height:100%; background:linear-gradient(90deg,#3498db,#2980b9); border-radius:3px; animation:sync-slide 1.4s ease-in-out infinite; }
        @keyframes sync-slide { 0%{transform:translateX(-100%);width:30%} 50%{transform:translateX(150%);width:50%} 100%{transform:translateX(400%);width:30%} }
    </style>
</head>
<body>

<div id="login-screen" class="login-screen">
    <div class="login-card">
        <h1>Admin</h1>
        <div class="field">
            <label for="login-user">Login</label>
            <input type="text" id="login-user" autocomplete="username">
        </div>
        <div class="field">
            <label for="login-pass">Password</label>
            <div class="pass-wrap">
                <input type="password" id="login-pass" autocomplete="current-password">
                <button type="button" class="pass-toggle" onclick="togglePassword()" title="Show/hide password">&#128065;</button>
            </div>
        </div>
        <div id="login-error" class="error-messages" style="display:none"></div>
        <button class="btn btn-primary" style="width:100%" onclick="doLogin()">Login</button>
    </div>
</div>

<div id="app" class="container" style="display:none">
    <div class="app-header">
        <nav class="nav-tabs"></nav>
<script src="/js/admin-nav.js?v=7"></script>
        <div class="user-info">
            <span id="user-display"></span>
            <button class="btn btn-secondary btn-sm" onclick="doLogout()">Logout</button>
        </div>
    </div>

    <div class="sub-tabs" style="display:flex;gap:0;margin-bottom:20px;border-bottom:2px solid #ddd;">
        <button class="sub-tab active" onclick="switchFeedTab('sources')">Sources</button>
        <button class="sub-tab" onclick="switchFeedTab('pages')">Pages</button>
        <button class="sub-tab" onclick="switchFeedTab('items')">Items</button>
    </div>

    <!-- Sources Tab -->
    <div id="tab-sources" class="feed-tab">
        <table class="feeds-table">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Site</th>
                    <th>Account ID</th>
                    <th>Status</th>
                    <th>Stream</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="feeds-body"></tbody>
        </table>
    </div>

    <!-- Pages Tab -->
    <div id="tab-pages" class="feed-tab" style="display:none;">
        <div class="toolbar">
            <span id="feed-count" class="feed-count"></span>
            <button class="btn btn-primary btn-sm" onclick="addPageMapping()">+ Add Page Mapping</button>
        </div>
        <table class="feeds-table">
            <thead>
                <tr>
                    <th>Page</th>
                    <th>Feed Source</th>
                    <th>Include Filters</th>
                    <th>Exclude Filters</th>
                    <th>Listing Type</th>
                    <th>Orientation</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="page-feeds-body"></tbody>
        </table>
    </div>

    <!-- Items Tab -->
    <div id="tab-items" class="feed-tab" style="display:none;">
        <div class="toolbar">
            <span id="items-count" class="feed-count"></span>
            <select id="items-per-page" onchange="_itemsPerPage=parseInt(this.value)||99999;loadItems(1)" style="padding:4px 8px;border:1px solid #ddd;border-radius:4px;font-size:0.82rem;">
                <option value="25">25</option>
                <option value="50">50</option>
                <option value="100" selected>100</option>
                <option value="250">250</option>
                <option value="500">500</option>
                <option value="1000">1000</option>
                <option value="99999">All</option>
            </select>
        </div>
        <div id="items-container"><div style="text-align:center;padding:20px;color:#888">Select the Items tab to load...</div></div>
    </div>
</div>

<!-- Sync progress overlay -->
<div id="sync-overlay" class="sync-overlay">
    <div class="sync-card">
        <h3 id="sync-title">Syncing...</h3>
        <div class="sync-sub" id="sync-sub">This may take a moment</div>
        <div class="sync-bar-track"><div class="sync-bar-fill"></div></div>
    </div>
</div>

<!-- Edit Feed Source Form -->
<div id="form-overlay" class="form-overlay" onclick="if(event.target===this)closeForm()">
    <div class="form-panel">
        <div class="form-header">
            <h3 id="form-title">Edit Feed Source</h3>
            <button onclick="closeForm()">&times;</button>
        </div>
        <div class="form-body">
            <input type="hidden" id="f-key">
            <div class="field"><label>Name</label><input type="text" id="f-name"></div>
            <div class="form-row">
                <div class="field"><label>Site</label>
                    <select id="f-site-code">
                        <option value="YouTube">YouTube</option>
                        <option value="Facebook">Facebook</option>
                        <option value="Rumble">Rumble</option>
                        <option value="Instagram">Instagram</option>
                        <option value="TikTok">TikTok</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="field"><label>Account / Channel ID</label><input type="text" id="f-account-id"></div>
            </div>
            <div class="field"><label>Source URL</label><input type="text" id="f-source-url" placeholder="https://..."></div>
            <div class="field"><label>API Key</label><input type="text" id="f-api-key" placeholder="API key or token"></div>
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
                <label style="display:inline;margin:0;white-space:nowrap;">Stream</label>
                <input type="checkbox" id="f-stream" onchange="onFormStreamToggle()">
                <span id="f-stream-btn-wrap" style="min-width:180px;display:inline-block;"></span>
            </div>
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
                <label style="display:inline;margin:0;">Active</label>
                <input type="checkbox" id="f-active" checked>
            </div>

            <h4 style="margin:16px 0 8px;border-top:1px solid #e0e0e0;padding-top:16px;">Schedule</h4>
            <div id="schedules-container"></div>
            <button class="add-sched-btn" onclick="addScheduleRow()">+ Add Schedule</button>

            <div class="form-actions">
                <button class="btn btn-primary" onclick="saveFeedSource()">Save</button>
                <button class="btn btn-secondary" onclick="closeForm()">Cancel</button>
            </div>
        </div>
    </div>
</div>

<!-- Edit Page Mapping Form -->
<div id="pf-form-overlay" class="form-overlay" onclick="if(event.target===this)closePfForm()">
    <div class="form-panel">
        <div class="form-header">
            <h3 id="pf-form-title">Edit Page Mapping</h3>
            <button onclick="closePfForm()">&times;</button>
        </div>
        <div class="form-body">
            <input type="hidden" id="pf-key">
            <div class="field"><label>Feed Source</label>
                <select id="pf-feed-source"></select>
            </div>
            <div class="field"><label>Page</label>
                <select id="pf-page"></select>
            </div>
            <div class="field"><label>Include Filters (+)</label><textarea id="pf-filter-pos" placeholder="Comma-separated: #Invite, #YadaYah"></textarea></div>
            <div class="field"><label>Exclude Filters (-)</label><textarea id="pf-filter-neg" placeholder="Comma-separated: Private, Deleted video"></textarea></div>
            <div class="field"><label>Listing Type</label>
                <select id="pf-listing-type">
                    <option value="">— None —</option>
                    <option value="video">Video (horizontal)</option>
                    <option value="shorts">Shorts (vertical)</option>
                    <option value="post">Post</option>
                    <option value="channel">Channel</option>
                    <option value="featured">Featured</option>
                </select>
            </div>
            <div class="field"><label>Orientation Filter</label>
                <select id="pf-orientation">
                    <option value="">— Any —</option>
                    <option value="horizontal">Horizontal</option>
                    <option value="vertical">Vertical</option>
                </select>
            </div>
            <input type="hidden" id="pf-sort" value="0">
            <div class="form-actions">
                <button class="btn btn-primary" onclick="savePageMapping()">Save</button>
                <button class="btn btn-secondary" onclick="closePfForm()">Cancel</button>
            </div>
        </div>
    </div>
</div>

<script src="js/admin-links.js?v=2"></script>
<script>
var API = '/api';
var feeds = [];
var _itemsLoaded = false;
var _itemsPage = 1;
var _itemsTotalPages = 1;
var _itemsPerPage = 100;
var _itemsSort = 'publish_dtime';
var _itemsDir = 'desc';
var _catFilterOpts = '<option value="">All</option>';
var _catFilterOptsFiltered = '<option value="">All</option>';
var _pageFilterOpts = '<option value="">All</option>';
var _allCategories = [];
var _allPages = [];

function onPageFilterChange() {
    var sel = document.getElementById('filter-page');
    _savedFilters.page = sel ? sel.value : '';
    _savedFilters.category = ''; // Reset category when page changes
    rebuildCategoryFilter();
    loadItems(1);
}

function rebuildCategoryFilter() {
    var pageVal = _savedFilters.page;
    var pageKey = pageVal ? pageVal.replace('page:', '') : '';
    var opts = '<option value="">All</option>';
    if (pageKey) {
        _allCategories.forEach(function(c) {
            if (String(c.page_key) === pageKey) {
                opts += '<option value="cat:' + c.category_key + '">' + esc(catLabel(c)) + '</option>';
            }
        });
    } else {
        opts = _catFilterOpts;
    }
    _catFilterOptsFiltered = opts;
    var catSel = document.getElementById('filter-category');
    if (catSel) { catSel.innerHTML = opts; catSel.value = _savedFilters.category; }
}
var _savedFilters = {title:'', tags:'', category:'', mp3:'', feed:'', active:'', page:'', episode:''};

function catLabel(c) {
    var label = c.category_title || '';
    if (c.category_subtitle) label += ' ~ ' + c.category_subtitle;
    return label;
}

function buildFeedFilterDropdown() {
    var opts = '<option value="">All</option>';
    feeds.forEach(function(f) { opts += '<option value="' + f.feed_key + '">' + esc(f.feed_name) + '</option>'; });
    return '<select id="filter-feed" style="font-size:0.7rem;font-weight:normal;width:100%;padding:2px;border:1px solid #ddd;border-radius:3px;" onclick="event.stopPropagation()" onchange="_savedFilters.feed=this.value;loadItems(1)">' + opts + '</select>';
}

function sortItems(col) {
    if (_itemsSort === col) {
        _itemsDir = _itemsDir === 'desc' ? 'asc' : 'desc';
    } else {
        _itemsSort = col;
        _itemsDir = (col === 'feed_name' || col === 'feed_item_title' || col === 'category_title') ? 'asc' : 'desc';
    }
    loadItems(1);
}

function switchFeedTab(tab) {
    document.querySelectorAll('.sub-tab').forEach(function(t) { t.classList.remove('active'); });
    document.querySelectorAll('.feed-tab').forEach(function(p) { p.style.display = 'none'; });
    document.querySelector('.sub-tab[onclick*="' + tab + '"]').classList.add('active');
    document.getElementById('tab-' + tab).style.display = '';
    if (tab === 'items' && !_itemsLoaded) { _itemsLoaded = true; loadItems(1); }
}

function populateItemsFeedFilter() {
    var sel = document.getElementById('items-feed-filter');
    var opts = '<option value="">All Feeds</option>';
    feeds.forEach(function(f) { opts += '<option value="' + f.feed_key + '">' + esc(f.feed_name) + '</option>'; });
    sel.innerHTML = opts;
}

function loadItems(page) {
    page = page || 1;
    _itemsPage = page;
    var ff = document.getElementById('filter-feed');
    if (ff) _savedFilters.feed = ff.value;
    var af = document.getElementById('filter-active');
    if (af) _savedFilters.active = af.value;
    var pf = document.getElementById('filter-page');
    if (pf) _savedFilters.page = pf.value;
    var feedKey = _savedFilters.feed;
    var search = '';
    // Save current filter values before re-render destroys the inputs
    var tf = document.getElementById('filter-title');
    var tgf = document.getElementById('filter-tags');
    var cf = document.getElementById('filter-category');
    var mf = document.getElementById('filter-mp3');
    if (tf) _savedFilters.title = tf.value;
    if (tgf) _savedFilters.tags = tgf.value;
    if (cf) _savedFilters.category = cf.value;
    if (mf) _savedFilters.mp3 = mf.value;
    var ef = document.getElementById('filter-episode');
    if (ef) _savedFilters.episode = ef.value;
    var titleFilter = _savedFilters.title;
    var tagsFilter = _savedFilters.tags;
    var catFilter = _savedFilters.category;
    var url = API + '/admin-feeds.php?items=1&page=' + page + '&limit=' + _itemsPerPage + '&sort=' + _itemsSort + '&dir=' + _itemsDir;
    if (feedKey) url += '&feed_key=' + feedKey;
    if (search) url += '&search=' + encodeURIComponent(search);
    if (titleFilter) url += '&title=' + encodeURIComponent(titleFilter);
    if (tagsFilter) url += '&tags=' + encodeURIComponent(tagsFilter);
    var pageFilter = _savedFilters.page;
    if (pageFilter) url += '&page_key=' + pageFilter.replace('page:','');
    if (catFilter) {
        if (catFilter.indexOf('cat:') === 0) url += '&category_key=' + catFilter.replace('cat:','');
    }
    var mp3Filter = _savedFilters.mp3;
    if (mp3Filter) url += '&has_mp3=' + mp3Filter;
    var episodeFilter = _savedFilters.episode;
    if (episodeFilter) url += '&episode=' + encodeURIComponent(episodeFilter);
    var activeFilter = _savedFilters.active;
    if (activeFilter) url += '&active=' + activeFilter;
    document.getElementById('items-container').innerHTML = '<div style="text-align:center;padding:20px;color:#888">Loading...</div>';
    fetch(url, {credentials:'include'}).then(function(r) { return safeJson(r); }).then(function(d) {
        if (d.error) { document.getElementById('items-container').innerHTML = '<div style="color:#c00;padding:12px;">' + esc(d.error) + '</div>'; return; }
        var items = d.items || [];
        _allItems = items;
        _itemsTotalPages = d.total_pages || 1;
        // Build page and category filter dropdowns (only on first load)
        if (d.pages && _pageFilterOpts === '<option value="">All</option>') {
            _allCategories = d.categories || [];
            _allPages = d.pages || [];

            // Page dropdown — flat list of pages
            var pOpts = '<option value="">All</option>';
            _allPages.forEach(function(pg) {
                pOpts += '<option value="page:' + pg.page_key + '">' + esc(pg.page_title) + '</option>';
            });
            _pageFilterOpts = pOpts;
            var pSel = document.getElementById('filter-page');
            if (pSel) pSel.innerHTML = pOpts;

            // Category dropdown — grouped by page
            var catsByPage = {};
            _allCategories.forEach(function(c) { var pk = c.page_key; if (!catsByPage[pk]) catsByPage[pk] = []; catsByPage[pk].push(c); });
            var cOpts = '<option value="">All</option>';
            _allPages.forEach(function(pg) {
                var pgCats = catsByPage[pg.page_key] || [];
                if (pgCats.length) {
                    cOpts += '<option disabled style="font-weight:700;color:#31345A;">── ' + esc(pg.page_title) + ' ──</option>';
                    pgCats.forEach(function(c) {
                        cOpts += '<option value="cat:' + c.category_key + '">&nbsp;&nbsp;&nbsp;' + esc(catLabel(c)) + '</option>';
                    });
                }
            });
            _catFilterOpts = cOpts;
            _catFilterOptsFiltered = _savedFilters.page ? '' : cOpts;
            rebuildCategoryFilter();
        }
        document.getElementById('items-count').textContent = (d.total || items.length) + ' item(s) — page ' + (d.page || 1) + '/' + _itemsTotalPages;
        if (!items.length) { document.getElementById('items-container').innerHTML = '<div style="text-align:center;padding:20px;color:#888">No items found.</div>'; return; }
        var ths = 'cursor:pointer;user-select:none;';
        var iarr = function(col) { return _itemsSort === col ? (_itemsDir === 'asc' ? ' ▲' : ' ▼') : ''; };
        var html = '<table class="feeds-table"><thead><tr>'
            + '<th>Thumb</th>'
            + '<th style="' + ths + '" onclick="sortItems(\'feed_name\')">Feed' + iarr('feed_name') + '<br>' + buildFeedFilterDropdown() + '</th>'
            + '<th style="' + ths + '" onclick="sortItems(\'feed_item_title\')">Title' + iarr('feed_item_title') + '<br><input type="text" id="filter-title" placeholder="Filter..." style="font-size:0.7rem;font-weight:normal;width:100%;padding:2px 4px;border:1px solid #ddd;border-radius:3px;box-sizing:border-box;" onclick="event.stopPropagation()" onkeydown="if(event.key===\'Enter\')loadItems(1)"></th>'
            + '<th style="' + ths + '" onclick="sortItems(\'feed_item_tags\')">Tags' + iarr('feed_item_tags') + '<br><input type="text" id="filter-tags" placeholder="Filter..." style="font-size:0.7rem;font-weight:normal;width:100%;padding:2px 4px;border:1px solid #ddd;border-radius:3px;box-sizing:border-box;" onclick="event.stopPropagation()" onkeydown="if(event.key===\'Enter\')loadItems(1)"></th>'
            + '<th>Page<br><select id="filter-page" style="font-size:0.7rem;font-weight:normal;width:100%;padding:2px;border:1px solid #ddd;border-radius:3px;" onclick="event.stopPropagation()" onchange="onPageFilterChange()">' + _pageFilterOpts + '</select></th>'
            + '<th style="' + ths + '" onclick="sortItems(\'category_title\')">Category' + iarr('category_title') + '<br><select id="filter-category" style="font-size:0.7rem;font-weight:normal;width:100%;padding:2px;border:1px solid #ddd;border-radius:3px;" onclick="event.stopPropagation()" onchange="_savedFilters.category=this.value;loadItems(1)">' + _catFilterOptsFiltered + '</select></th>'
            + '<th style="' + ths + '" onclick="sortItems(\'feed_item_episode\')">Episode' + iarr('feed_item_episode') + '<br><input type="text" id="filter-episode" placeholder="Filter..." style="font-size:0.7rem;font-weight:normal;width:100%;padding:2px 4px;border:1px solid #ddd;border-radius:3px;box-sizing:border-box;" onclick="event.stopPropagation()" onkeydown="if(event.key===\'Enter\'){_savedFilters.episode=this.value;loadItems(1);}"></th>'
            + '<th>MP3<br><select id="filter-mp3" style="font-size:0.7rem;font-weight:normal;width:100%;padding:2px;border:1px solid #ddd;border-radius:3px;" onclick="event.stopPropagation()" onchange="loadItems(1)"><option value="">All</option><option value="yes">Yes</option><option value="no">No</option></select></th>'
            + '<th style="' + ths + '" onclick="sortItems(\'feed_item_active_flag\')">Active' + iarr('feed_item_active_flag') + '<br><select id="filter-active" style="font-size:0.7rem;font-weight:normal;width:100%;padding:2px;border:1px solid #ddd;border-radius:3px;" onclick="event.stopPropagation()" onchange="_savedFilters.active=this.value;loadItems(1)"><option value="">All</option><option value="yes">Yes</option><option value="no">No</option></select></th>'
            + '<th></th>'
            + '</tr></thead><tbody>';
        items.forEach(function(it) {
            var inactive = it.feed_item_active_flag === false || it.feed_item_active_flag === 'f';
            html += '<tr class="item-row' + (inactive ? ' inactive' : '') + '">'
                + '<td>' + (it.feed_item_url ? '<a href="' + esc(it.feed_item_url) + '" target="_blank">' : '') + '<img class="thumb" src="' + esc(it.feed_item_thumbnail || '') + '" alt="">' + (it.feed_item_url ? '</a>' : '') + '</td>'
                + '<td style="font-size:0.75rem;color:#888;">' + esc(it.feed_name || '') + '</td>'
                + '<td style="max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + esc(it.feed_item_title || '') + '</td>'
                + '<td style="font-size:0.7rem;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#888;">' + esc(it.feed_item_tags || '') + '</td>'
                + '<td style="font-size:0.75rem;color:#888;">' + esc(it.page_codes || '') + '</td>'
                + '<td style="font-size:0.75rem;color:#888;">' + esc(it.category_title || '') + '</td>'
                + '<td style="font-size:0.75rem;color:#888;">' + (it.feed_item_episode || '') + '</td>'
                + '<td style="text-align:center;">' + (it.feed_item_audio_file ? '<a href="/' + esc(it.feed_item_audio_file) + '" target="_blank" title="MP3">&#127911;</a>' : '') + '</td>'
                + '<td style="text-align:center;">' + (inactive ? '<span style="color:#c00;">No</span>' : '<span style="color:#27ae60;">Yes</span>') + '</td>'
                + '<td class="actions"><button onclick="editItem(' + it.feed_item_key + ')">Edit</button></td>'
                + '</tr>';
        });
        html += '</tbody></table>';
        if (_itemsTotalPages > 1) {
            var btnStyle = 'padding:4px 10px;border:1px solid #ccc;border-radius:4px;background:#fff;cursor:pointer;font-size:0.82rem;';
            var activeStyle = 'padding:4px 10px;border:1px solid #31345A;border-radius:4px;background:#31345A;color:#fff;font-size:0.82rem;';
            html += '<div style="display:flex;gap:4px;justify-content:center;align-items:center;padding:12px 0;flex-wrap:wrap;">';
            html += '<button ' + (page <= 1 ? 'disabled' : 'onclick="loadItems(' + (page-1) + ')"') + ' style="' + btnStyle + '">&laquo;</button>';
            // Build page numbers: always show 1, last, current, and neighbors
            var pages = [1];
            for (var p = page - 2; p <= page + 2; p++) { if (p > 1 && p < _itemsTotalPages) pages.push(p); }
            if (_itemsTotalPages > 1) pages.push(_itemsTotalPages);
            var seen = {};
            var unique = [];
            pages.forEach(function(pg) { if (!seen[pg]) { seen[pg] = true; unique.push(pg); } });
            unique.sort(function(a,b) { return a - b; });
            for (var k = 0; k < unique.length; k++) {
                if (k > 0 && unique[k] - unique[k-1] > 1) html += '<span style="padding:0 4px;color:#999;">...</span>';
                html += '<button ' + (unique[k] === page ? 'style="' + activeStyle + '"' : 'onclick="loadItems(' + unique[k] + ')" style="' + btnStyle + '"') + '>' + unique[k] + '</button>';
            }
            html += '<button ' + (page >= _itemsTotalPages ? 'disabled' : 'onclick="loadItems(' + (page+1) + ')"') + ' style="' + btnStyle + '">&raquo;</button>';
            html += '</div>';
        }
        document.getElementById('items-container').innerHTML = html;
        // Restore filter values after re-render
        var rt = document.getElementById('filter-title'); if (rt) rt.value = _savedFilters.title;
        var rtg = document.getElementById('filter-tags'); if (rtg) rtg.value = _savedFilters.tags;
        var rc = document.getElementById('filter-category'); if (rc) rc.value = _savedFilters.category;
        var rm = document.getElementById('filter-mp3'); if (rm) rm.value = _savedFilters.mp3;
        var rff = document.getElementById('filter-feed'); if (rff) rff.value = _savedFilters.feed;
        var rpf = document.getElementById('filter-page'); if (rpf) rpf.value = _savedFilters.page;
        var ref = document.getElementById('filter-episode'); if (ref) ref.value = _savedFilters.episode;
        var raf = document.getElementById('filter-active'); if (raf) raf.value = _savedFilters.active;
    });
}

var pageMappings = [];

function loadFeeds() {
    Promise.all([
        fetch(API + '/admin-feeds.php', {credentials:'include'}).then(function(r) { return safeJson(r); }),
        fetch(API + '/admin-feeds.php?page_feeds=1&feed_key=0', {credentials:'include'}).then(function(r) { return safeJson(r); }).catch(function() { return {pages:[]}; }),
        fetch(API + '/admin-feeds.php?all_page_feeds=1', {credentials:'include'}).then(function(r) { return safeJson(r); }).catch(function() { return {page_feeds:[]}; })
    ]).then(function(results) {
        feeds = Array.isArray(results[0]) ? results[0] : [];
        allPages = (results[1] && results[1].pages) ? results[1].pages : [];
        pageMappings = (results[2] && results[2].page_feeds) ? results[2].page_feeds : [];
        renderAll();
    });
}

            + '<button onclick="deletePageMapping(' + pf.feed_page_key + ')">Del</button>'
            + '</td></tr>';

function addScheduleRow(data) {
    var d = data || {};
    var container = document.getElementById('schedules-container');
    var row = document.createElement('div');
    row.className = 'schedule-row';

    var daySelect = '<select class="sched-day"><option value="">Every day</option>';
    for (var i = 0; i < 7; i++) {
        daySelect += '<option value="' + i + '"' + (d.schedule_day_of_week == i ? ' selected' : '') + '>' + DAYS[i] + '</option>';
    }
    daySelect += '</select>';

    row.innerHTML = daySelect
        + ' <input type="time" class="sched-time" value="' + (d.schedule_time || '').substring(0,5) + '" style="width:110px" placeholder="Time">'
        + ' or every <input type="number" class="sched-interval" value="' + (d.schedule_interval_minutes || '') + '" style="width:70px" placeholder="min"> min'
        + ' <label style="font-size:0.8rem"><input type="checkbox" class="sched-active"' + (d.schedule_active_flag !== false ? ' checked' : '') + '> On</label>'
        + ' <button class="remove-sched" onclick="this.parentElement.remove()">&times;</button>';

function collectSchedules() {
    var rows = document.querySelectorAll('#schedules-container .schedule-row');
    var schedules = [];
    for (var i = 0; i < rows.length; i++) {
        var day = rows[i].querySelector('.sched-day').value;
        var time = rows[i].querySelector('.sched-time').value;
        var interval = rows[i].querySelector('.sched-interval').value;
        var active = rows[i].querySelector('.sched-active').checked;
        schedules.push({
            schedule_day_of_week: day === '' ? null : parseInt(day),
            schedule_time: time || null,
            schedule_interval_minutes: interval ? parseInt(interval) : null,
            schedule_active_flag: active
        });
    }
    return schedules;
}

function formatSyncResult(data) {
    var lines = [];
    var sr = data.sync_result || {};
    if (sr.found !== undefined) lines.push('Found: ' + sr.found);
    if (sr.inserted !== undefined) lines.push('Inserted: ' + sr.inserted);
    if (sr.updated !== undefined) lines.push('Updated: ' + sr.updated);
    if (sr.results && Array.isArray(sr.results)) {
        sr.results.forEach(function(r) {
            lines.push((r.feed || '') + ': ' + (r.inserted || 0) + ' new, ' + (r.updated || 0) + ' updated');
        });
    }
    if (sr.status === 'started') lines.push(sr.message || 'Running in background');
    if (data.error) lines.push('Error: ' + data.error);
    return lines.join('\n');
}

        overlay.onclick = function(ev) { if (ev.target === overlay) overlay.style.display = 'none'; };
        overlay.innerHTML = '<div style="background:#fff;border-radius:10px;width:100%;max-width:1000px;box-shadow:0 8px 32px rgba(0,0,0,0.25);">'
            + '<div style="display:flex;justify-content:space-between;align-items:center;padding:12px 20px;background:#f8f8f8;border-radius:10px 10px 0 0;border-bottom:1px solid #ddd;">'
            + '<h3 style="margin:0;font-size:1rem;color:#31345A;">Edit Feed Item</h3>'
            + '<button onclick="document.getElementById(\'item-edit-overlay\').style.display=\'none\'" style="background:none;border:none;font-size:1.3rem;cursor:pointer;">&times;</button></div>'
            + '<div id="item-edit-body" style="padding:20px;"></div></div>';
        document.body.appendChild(overlay);
    }

    function fld(label, key, val, opts) {
        opts = opts || {};
        if (opts.type === 'checkbox') {
            var ck = val === true || val === 't';
            return '<div style="margin-bottom:8px;display:flex;align-items:center;gap:6px;"><label style="font-size:0.82rem;font-weight:600;color:#555;">' + label + '</label><input type="checkbox" data-item-field="' + key + '"' + (ck ? ' checked' : '') + '></div>';
        }
        if (opts.type === 'select') {
            var so = '';
            (opts.options || []).forEach(function(o) { so += '<option value="' + esc(o.v) + '"' + (String(val||'') === o.v ? ' selected' : '') + '>' + esc(o.l) + '</option>'; });
            return '<div style="margin-bottom:8px;"><label style="display:block;font-weight:600;font-size:0.82rem;color:#555;margin-bottom:2px;">' + label + '</label><select data-item-field="' + key + '" style="width:100%;padding:5px 8px;border:1px solid #ccc;border-radius:4px;font-size:0.82rem;box-sizing:border-box;">' + so + '</select></div>';
        }
        var roStyle = opts.readonly ? 'background:#f5f5f5;color:#888;' : '';
        var roAttr = opts.readonly ? ' readonly' : '';
        var inputType = opts.type || 'text';
        var inputVal = val != null ? String(val) : '';
        // datetime-local needs formatted value
        if (inputType === 'datetime-local' && inputVal) {
            inputVal = inputVal.replace(/\+.*$/, '').replace(/Z$/, '').replace(' ', 'T').substring(0, 16);
        }
        return '<div style="margin-bottom:8px;"><label style="display:block;font-weight:600;font-size:0.82rem;color:#555;margin-bottom:2px;">' + label + '</label><input type="' + inputType + '" data-item-field="' + key + '" value="' + esc(inputVal) + '" style="width:100%;padding:5px 8px;border:1px solid #ccc;border-radius:4px;font-size:0.82rem;font-family:inherit;box-sizing:border-box;' + roStyle + '"' + roAttr + '></div>';
    }

    var thumbSrc = item.feed_item_thumbnail || '';
    var isActive = item.feed_item_active_flag === true || item.feed_item_active_flag === 't';

    var html = '<div style="display:grid;grid-template-columns:200px 1fr 1fr;gap:16px;">';

    // Column 1: Thumbnail + Active + Save/Cancel at bottom
    html += '<div style="display:flex;flex-direction:column;">'
        + (thumbSrc ? '<img src="' + esc(thumbSrc.indexOf('http')===0 ? thumbSrc : '/'+thumbSrc) + '" style="width:100%;border-radius:6px;margin-bottom:8px;" alt="">' : '<div style="width:100%;height:120px;background:#eee;border-radius:6px;margin-bottom:8px;display:flex;align-items:center;justify-content:center;color:#999;">No image</div>')
        + fld('Thumbnail', 'feed_item_thumbnail', thumbSrc)
        + '<div style="margin-bottom:8px;"><label style="font-size:0.82rem;font-weight:600;color:#555;">Upload Image</label><input type="file" id="item-thumb-file" accept="image/*" style="font-size:0.78rem;margin-top:2px;"></div>'
        + fld('Active', 'feed_item_active_flag', item.feed_item_active_flag, {type:'checkbox'})
        + '<div style="margin-top:auto;padding-top:12px;">'
        + '<button onclick="saveItem()" style="padding:8px 16px;background:#31345A;color:#fff;border:none;border-radius:4px;font-weight:600;cursor:pointer;width:100%;margin-bottom:6px;">Save</button>'
        + '<button onclick="document.getElementById(\'item-edit-overlay\').style.display=\'none\'" style="padding:8px 16px;background:#f0f0f0;border:none;border-radius:4px;cursor:pointer;width:100%;">Cancel</button>'
        + '<div id="item-save-status" style="font-size:0.82rem;color:#27ae60;text-align:center;margin-top:4px;"></div>'
        + '</div>'
        + '</div>';

    // Column 2: Imported fields
    html += '<div>'
        + fld('Title (imported)', 'feed_item_title_import', item.feed_item_title_import, {readonly:true})
        + fld('Published (imported)', 'feed_item_publish_import_dtime', item.feed_item_publish_import_dtime, {readonly:true})
        + fld('Feed', 'feed_name', item.feed_name, {readonly:true})
        + '<div style="display:flex;gap:8px;margin-bottom:8px;"><div style="flex:1;">' + fld('ID', 'feed_item_key', item.feed_item_key, {readonly:true}) + '</div><div style="flex:2;">' + fld('External', 'feed_item_external_id', item.feed_item_external_id, {readonly:true}) + '</div></div>'
        + fld('Type', 'feed_item_type', item.feed_item_type)
        + fld('URL', 'feed_item_url', item.feed_item_url)
        + '</div>';

    // Column 3: Override + editable fields
    html += '<div>'
        + fld('Title (override)', 'feed_item_title_override', item.feed_item_title_override)
        + fld('Published (override)', 'feed_item_publish_override_dtime', item.feed_item_publish_override_dtime, {type:'datetime-local'})
        + fld('Tags', 'feed_item_tags', item.feed_item_tags)
        + fld('Orientation', 'feed_item_orientation', item.feed_item_orientation, {type:'select', options:[{v:'',l:''},{v:'horizontal',l:'Horizontal'},{v:'vertical',l:'Vertical'}]})
        + fld('Episode', 'feed_item_episode', item.feed_item_episode)
        + fld('Sort', 'feed_item_sort', item.feed_item_sort, {type:'number'})
        + fld('Duration', 'feed_item_duration', item.feed_item_duration, {readonly:true})
        + '</div>';

    // Page / Category assignment (spans columns 2-3 within the grid)
    var itemPages = [];
    try { itemPages = typeof item.page_list === 'string' ? JSON.parse(item.page_list) : (item.page_list || []); } catch(e) {}
    if (itemPages && itemPages.length) {
        html += '<div style="grid-column:2/4;margin-top:4px;border-top:1px solid #eee;padding-top:10px;">'
            + '<div style="display:flex;gap:8px;margin-bottom:6px;">'
            + '<span style="min-width:90px;font-weight:600;font-size:0.85rem;color:#555;">Page</span>'
            + '<span style="flex:1;font-weight:600;font-size:0.85rem;color:#555;">Category</span>'
            + '</div>';
        // Build category options grouped by page
        var catsByPk = {};
        _allCategories.forEach(function(c) {
            if (!catsByPk[c.page_key]) catsByPk[c.page_key] = [];
            catsByPk[c.page_key].push(c);
        });
        itemPages.forEach(function(pg) {
            var pgCats = catsByPk[pg.page_key] || [];
            html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">'
                + '<a href="/' + esc(pg.page_code) + '" target="_blank" style="min-width:90px;font-size:0.82rem;font-weight:600;color:#31345A;text-decoration:none;" onmouseover="this.style.textDecoration=\'underline\'" onmouseout="this.style.textDecoration=\'none\'">' + esc(pg.page_title) + '</a>';
            if (pgCats.length) {
                html += '<select data-page-cat="' + pg.page_key + '" style="flex:1;padding:4px 8px;border:1px solid #ccc;border-radius:4px;font-size:0.82rem;">'
                    + '<option value="">— None —</option>';
                pgCats.forEach(function(c) {
                    html += '<option value="' + c.category_key + '"' + (item.feed_item_category_key == c.category_key ? ' selected' : '') + '>' + esc(catLabel(c)) + '</option>';
                });
                html += '</select>';
            } else {
                html += '<span style="font-size:0.78rem;color:#999;">No categories</span>';
            }
            html += '</div>';
        });
        html += '</div>';
    }

    // MP3 upload (spans columns 2-3)
    var audioFile = item.feed_item_audio_file;
    html += '<div style="grid-column:2/4;margin-top:4px;border-top:1px solid #eee;padding-top:10px;">'
        + '<label style="display:block;font-weight:600;font-size:0.85rem;color:#555;margin-bottom:6px;">MP3 Audio</label>';
    if (audioFile) {
        html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">'
            + '<a href="/' + esc(audioFile) + '" target="_blank" style="font-size:0.82rem;">&#127911; ' + esc(audioFile) + '</a>'
            + '<button type="button" onclick="removeItemMp3(' + key + ')" style="padding:2px 8px;font-size:0.75rem;border:1px solid #e0c0c0;border-radius:3px;background:#fff;color:#c0392b;cursor:pointer;">Remove</button>'
            + '</div>';
    }
    html += '<div style="display:flex;align-items:center;gap:8px;">'
        + '<input type="file" id="item-mp3-file" accept=".mp3" style="font-size:0.82rem;" onchange="uploadItemMp3(' + key + ')">'
        + '<span id="item-mp3-status" style="font-size:0.78rem;color:#27ae60;"></span>'
        + '</div></div>';

    html += '</div>'; // close grid

    document.getElementById('item-edit-body').innerHTML = html;
    overlay.style.display = 'flex';
}

function saveItem() {
    if (!_editItemKey) return;
    var data = {feed_item_key: _editItemKey};
    document.querySelectorAll('[data-item-field]').forEach(function(el) {
        var f = el.getAttribute('data-item-field');
        if (el.readOnly || el.disabled) return;
        if (el.type === 'checkbox') data[f] = el.checked;
        else if (el.type === 'number') data[f] = el.value ? parseInt(el.value) : null;
        else data[f] = el.value || null;
    });
    // Cast booleans
    if (typeof data.feed_item_active_flag === 'boolean') data.feed_item_active_flag = data.feed_item_active_flag;
    // Capture category from page/category dropdowns (last non-empty selection wins)
    var catSelects = document.querySelectorAll('[data-page-cat]');
    var selectedCat = null;
    catSelects.forEach(function(sel) { if (sel.value) selectedCat = parseInt(sel.value); });
    data.feed_item_category_key = selectedCat;

    fetch(API + '/admin-feeds.php?item_update=1', {
        method: 'PUT', credentials: 'include',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify(data)
    }).then(function(r) { return safeJson(r); }).then(function(d) {
        var st = document.getElementById('item-save-status');
        if (d.error) { st.textContent = d.error; st.style.color = '#c00'; }
        else { st.textContent = 'Saved!'; st.style.color = '#27ae60'; setTimeout(function() { st.textContent = ''; }, 2000); loadItems(_itemsPage); }
    });
}

function uploadItemMp3(itemKey) {
    var input = document.getElementById('item-mp3-file');
    if (!input || !input.files[0]) return;
    var fd = new FormData();
    fd.append('audio', input.files[0]);
    var st = document.getElementById('item-mp3-status');
    st.textContent = 'Uploading...';
    st.style.color = '#888';
    fetch(API + '/admin-vlog.php?type=audio&key=' + itemKey, { method: 'POST', credentials: 'include', body: fd })
    .then(function(r) { return safeJson(r); }).then(function(d) {
        if (d.error) { st.textContent = d.error; st.style.color = '#c00'; }
        else { st.textContent = 'Uploaded!'; st.style.color = '#27ae60'; loadItems(_itemsPage); editItem(itemKey); }
    });
}

function removeItemMp3(itemKey) {
    fetch(API + '/admin-vlog.php?type=audio&key=' + itemKey, { method: 'DELETE', credentials: 'include' })
    .then(function(r) { return safeJson(r); }).then(function(d) {
        if (d.error) alert(d.error);
        else { loadItems(_itemsPage); editItem(itemKey); }
    });
}

function syncFeed(key) {
    if (!confirm('Force sync this feed now?')) return;
    var feedName = '';
    for (var i = 0; i < feeds.length; i++) {
        if (feeds[i].feed_key == key) { feedName = feeds[i].feed_name; break; }
    }
    showSyncProgress(feedName);
    fetch(API + '/admin-feeds.php', {
        method: 'PUT',
        credentials: 'include',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({feed_key: key})
    })
    .then(function(r) { return safeJson(r); })
    .then(function(data) {
        hideSyncProgress();
        alert(formatSyncResult(data));
        loadFeeds();
    })
    .catch(function(err) {
        hideSyncProgress();
        alert('Sync failed: ' + err.message);
    });
}

// Init
checkAuth();
</script>
<script src="/js/admin-login.js?v=8"></script>
<script src="/js/error-reporter.js?v=2"></script>
</body>
