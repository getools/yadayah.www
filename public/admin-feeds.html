<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feeds Admin - Yada Yah</title>
    <link rel="stylesheet" href="css/app.css">
    <link rel="stylesheet" href="css/login.css">
    <style>
        .feeds-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .feeds-table th, .feeds-table td { padding: 8px 10px; text-align: left; border-bottom: 1px solid #e0e0e0; }
        .feeds-table th { background: #f5f5f5; font-weight: 600; position: sticky; top: 0; font-size: 0.8rem; }
        .feeds-table tr:hover { background: #f0f4ff; cursor: pointer; }
        .feeds-table .actions { white-space: nowrap; }
        .feeds-table .actions button { padding: 3px 8px; font-size: 0.78rem; border: 1px solid #ccc; border-radius: 4px; cursor: pointer; background: #fff; margin-right: 4px; }
        .feeds-table .actions button:hover { background: #f0f0f0; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.75rem; font-weight: 600; }
        .badge-active { background: #d4edda; color: #155724; }
        .badge-inactive { background: #f8d7da; color: #721c24; }
        .badge-site { background: #e2e3f1; color: #383d6e; }

        .form-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.45); z-index: 1000; justify-content: center; align-items: flex-start; padding: 40px 20px; overflow-y: auto; }
        .form-overlay.open { display: flex; }
        .form-panel { background: #fff; border-radius: 10px; box-shadow: 0 8px 32px rgba(0,0,0,0.25); width: 100%; }
        .form-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; background: #f8f8f8; border-radius: 10px 10px 0 0; border-bottom: 1px solid #ddd; }
        .form-header h3 { margin: 0; font-size: 1rem; }
        .form-header button { background: none; border: none; font-size: 1.4rem; cursor: pointer; color: #666; padding: 2px 8px; border-radius: 4px; }
        .form-header button:hover { background: #eee; }
        .form-body { padding: 20px; }
        .form-body .field { margin-bottom: 12px; }
        .form-body label { display: block; font-weight: 600; font-size: 0.85rem; margin-bottom: 3px; color: #333; }
        .form-body input[type=text], .form-body input[type=number], .form-body input[type=time], .form-body select, .form-body textarea {
            width: 100%; padding: 7px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.9rem; font-family: inherit; box-sizing: border-box;
        }
        .form-body textarea { min-height: 60px; resize: vertical; }
        .form-body .form-actions { display: flex; gap: 8px; margin-top: 16px; }
        .form-row { display: flex; gap: 12px; }
        .form-row .field { flex: 1; }

        .schedule-section { margin-top: 16px; border-top: 1px solid #ddd; padding-top: 12px; }
        .schedule-section h4 { margin: 0 0 8px; font-size: 0.9rem; }
        .schedule-row { display: flex; gap: 8px; align-items: center; margin-bottom: 6px; font-size: 0.85rem; }
        .schedule-row select, .schedule-row input { padding: 5px 8px; font-size: 0.85rem; border: 1px solid #ccc; border-radius: 4px; }
        .schedule-row .remove-sched { background: none; border: none; color: #c00; cursor: pointer; font-size: 1.1rem; padding: 0 4px; }
        .add-sched-btn { font-size: 0.82rem; color: #3498db; cursor: pointer; background: none; border: none; padding: 4px 0; }
        .add-sched-btn:hover { text-decoration: underline; }

        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .feed-count { font-size: 0.85rem; color: #666; }

        .sync-overlay { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.35); z-index:2000; justify-content:center; align-items:center; }
        .sync-overlay.open { display:flex; }
        .sync-card { background:#fff; border-radius:10px; box-shadow:0 8px 32px rgba(0,0,0,0.25); padding:28px 36px; min-width:320px; text-align:center; }
        .sync-card h3 { margin:0 0 6px; font-size:1rem; color:#31345A; }
        .sync-card .sync-sub { font-size:0.82rem; color:#888; margin-bottom:16px; }
        .sync-bar-track { width:100%; height:6px; background:#e8e8e8; border-radius:3px; overflow:hidden; }
        .sync-bar-fill { width:30%; height:100%; background:linear-gradient(90deg,#3498db,#2980b9); border-radius:3px; animation:sync-slide 1.4s ease-in-out infinite; }
        @keyframes sync-slide { 0%{transform:translateX(-100%);width:30%} 50%{transform:translateX(150%);width:50%} 100%{transform:translateX(400%);width:30%} }
    </style>
</head>
<body>

<div id="login-screen" class="login-screen">
    <div class="login-card">
        <h1>Admin</h1>
        <div class="field">
            <label for="login-user">Login</label>
            <input type="text" id="login-user" autocomplete="username">
        </div>
        <div class="field">
            <label for="login-pass">Password</label>
            <div class="pass-wrap">
                <input type="password" id="login-pass" autocomplete="current-password">
                <button type="button" class="pass-toggle" onclick="togglePassword()" title="Show/hide password">&#128065;</button>
            </div>
        </div>
        <div id="login-error" class="error-messages" style="display:none"></div>
        <button class="btn btn-primary" style="width:100%" onclick="doLogin()">Login</button>
    </div>
</div>

<div id="app" class="container" style="display:none">
    <div class="app-header">
        <nav class="nav-tabs"></nav>
<script src="/js/admin-nav.js?v=7"></script>
        <div class="user-info">
            <span id="user-display"></span>
            <button class="btn btn-secondary btn-sm" onclick="doLogout()">Logout</button>
        </div>
    </div>

    <h2 style="font-size:1rem;color:#31345A;margin:0 0 12px;">Feed Sources</h2>
    <table class="feeds-table">
        <thead>
            <tr>
                <th>Name</th>
                <th>Site</th>
                <th>Account ID</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="feeds-body"></tbody>
    </table>

    <h2 style="font-size:1rem;color:#31345A;margin:20px 0 12px;">Page Mappings</h2>
    <div class="toolbar">
        <span id="feed-count" class="feed-count"></span>
        <button class="btn btn-primary btn-sm" onclick="addPageMapping()">+ Add Page Mapping</button>
    </div>
    <table class="feeds-table">
        <thead>
            <tr>
                <th>Page</th>
                <th>Feed Source</th>
                <th>Include Filters</th>
                <th>Exclude Filters</th>
                <th>Listing Type</th>
                <th>Orientation</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="page-feeds-body"></tbody>
    </table>
</div>

<!-- Sync progress overlay -->
<div id="sync-overlay" class="sync-overlay">
    <div class="sync-card">
        <h3 id="sync-title">Syncing...</h3>
        <div class="sync-sub" id="sync-sub">This may take a moment</div>
        <div class="sync-bar-track"><div class="sync-bar-fill"></div></div>
    </div>
</div>

<!-- Edit Feed Source Form -->
<div id="form-overlay" class="form-overlay" onclick="if(event.target===this)closeForm()">
    <div class="form-panel">
        <div class="form-header">
            <h3 id="form-title">Edit Feed Source</h3>
            <button onclick="closeForm()">&times;</button>
        </div>
        <div class="form-body">
            <input type="hidden" id="f-key">
            <div class="field"><label>Name</label><input type="text" id="f-name"></div>
            <div class="form-row">
                <div class="field"><label>Site</label>
                    <select id="f-site-code">
                        <option value="YouTube">YouTube</option>
                        <option value="Facebook">Facebook</option>
                        <option value="Rumble">Rumble</option>
                        <option value="Instagram">Instagram</option>
                        <option value="TikTok">TikTok</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="field"><label>Account / Channel ID</label><input type="text" id="f-account-id"></div>
            </div>
            <div class="field"><label>Source URL</label><input type="text" id="f-source-url" placeholder="https://..."></div>
            <div class="field"><label>API Key</label><input type="text" id="f-api-key" placeholder="API key or token"></div>
            <div class="field"><label><input type="checkbox" id="f-active" checked> Active</label></div>

            <h4 style="margin:16px 0 8px;border-top:1px solid #e0e0e0;padding-top:16px;">Schedule</h4>
            <div id="schedules-container"></div>
            <button class="add-sched-btn" onclick="addScheduleRow()">+ Add Schedule</button>

            <div class="form-actions">
                <button class="btn btn-primary" onclick="saveFeedSource()">Save</button>
                <button class="btn btn-secondary" onclick="closeForm()">Cancel</button>
            </div>
        </div>
    </div>
</div>

<!-- Edit Page Mapping Form -->
<div id="pf-form-overlay" class="form-overlay" onclick="if(event.target===this)closePfForm()">
    <div class="form-panel">
        <div class="form-header">
            <h3 id="pf-form-title">Edit Page Mapping</h3>
            <button onclick="closePfForm()">&times;</button>
        </div>
        <div class="form-body">
            <input type="hidden" id="pf-key">
            <div class="field"><label>Feed Source</label>
                <select id="pf-feed-source"></select>
            </div>
            <div class="field"><label>Page</label>
                <select id="pf-page"></select>
            </div>
            <div class="field"><label>Include Filters (+)</label><textarea id="pf-filter-pos" placeholder="Comma-separated: #Invite, #YadaYah"></textarea></div>
            <div class="field"><label>Exclude Filters (-)</label><textarea id="pf-filter-neg" placeholder="Comma-separated: Private, Deleted video"></textarea></div>
            <div class="field"><label>Listing Type</label>
                <select id="pf-listing-type">
                    <option value="">— None —</option>
                    <option value="video">Video (horizontal)</option>
                    <option value="shorts">Shorts (vertical)</option>
                    <option value="post">Post</option>
                    <option value="channel">Channel</option>
                    <option value="featured">Featured</option>
                </select>
            </div>
            <div class="field"><label>Orientation Filter</label>
                <select id="pf-orientation">
                    <option value="">— Any —</option>
                    <option value="horizontal">Horizontal</option>
                    <option value="vertical">Vertical</option>
                </select>
            </div>
            <input type="hidden" id="pf-sort" value="0">
            <div class="form-actions">
                <button class="btn btn-primary" onclick="savePageMapping()">Save</button>
                <button class="btn btn-secondary" onclick="closePfForm()">Cancel</button>
            </div>
        </div>
    </div>
</div>

<script src="js/admin-links.js?v=2"></script>
<script>
var API = '/api';
var feeds = [];
var DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function checkAuth() {
    fetch(API + '/auth.php', {credentials:'include'}).then(r=>r.json()).then(function(d) {
        if (d.authenticated) {
            document.getElementById('app').style.display = '';
            document.getElementById('user-display').textContent = d.user_name;
            applyPagePermissions(d.pages);
            loadFeeds();
        } else {
            document.getElementById('login-screen').classList.add('visible');
        }
    });
}

function doLogin() {
    var user = document.getElementById('login-user').value;
    var pass = document.getElementById('login-pass').value;
    var errEl = document.getElementById('login-error');
    errEl.style.display = 'none';
    fetch(API + '/auth.php', {
        method: 'POST', credentials: 'include',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({login: user, password: pass})
    }).then(r=>r.json()).then(function(d) {
        if (d.authenticated) {
            document.getElementById('login-screen').classList.remove('visible');
            document.getElementById('app').style.display = '';
            document.getElementById('user-display').textContent = d.user_name;
            applyPagePermissions(d.pages);
            loadFeeds();
        } else {
            errEl.textContent = d.error || 'Login failed';
            errEl.style.display = '';
        }
    });
}

function doLogout() {
    fetch(API + '/auth.php', {method:'DELETE', credentials:'include'}).then(function() {
        location.reload();
    });
}

function togglePassword() {
    var input = document.getElementById('login-pass');
    input.type = input.type === 'password' ? 'text' : 'password';
}

var allPages = [];
var pageMappings = [];

function loadFeeds() {
    Promise.all([
        fetch(API + '/admin-feeds.php', {credentials:'include'}).then(function(r) { return safeJson(r); }),
        fetch(API + '/admin-feeds.php?page_feeds=1&feed_key=0', {credentials:'include'}).then(function(r) { return safeJson(r); }).catch(function() { return {pages:[]}; }),
        fetch(API + '/admin-feeds.php?all_page_feeds=1', {credentials:'include'}).then(function(r) { return safeJson(r); }).catch(function() { return {page_feeds:[]}; })
    ]).then(function(results) {
        feeds = Array.isArray(results[0]) ? results[0] : [];
        allPages = (results[1] && results[1].pages) ? results[1].pages : [];
        pageMappings = (results[2] && results[2].page_feeds) ? results[2].page_feeds : [];
        renderAll();
    });
}

function renderAll() {
    // Feed Sources table
    var body = document.getElementById('feeds-body');
    var html = '';
    for (var i = 0; i < feeds.length; i++) {
        var f = feeds[i];
        var statusBadge = f.feed_active_flag ? '<span class="badge badge-active">Active</span>' : '<span class="badge badge-inactive">Inactive</span>';
        html += '<tr onclick="editFeedSource(' + f.feed_key + ')">'
            + '<td><strong>' + esc(f.feed_name) + '</strong></td>'
            + '<td><span class="badge badge-site">' + esc(f.feed_site_code) + '</span></td>'
            + '<td style="font-size:0.8rem">' + (f.feed_source_url ? '<a href="' + esc(f.feed_source_url) + '" target="_blank" style="color:#31345A">' + esc(f.feed_source_url.replace(/https?:\/\/(www\.)?/, '').substring(0,40)) + '</a>' : esc(f.feed_account_id || '')) + '</td>'
            + '<td>' + statusBadge + '</td>'
            + '<td class="actions" onclick="event.stopPropagation()">'
            + '<button onclick="editFeedSource(' + f.feed_key + ')">Edit</button>'
            + '<button onclick="syncFeed(' + f.feed_key + ')" style="background:#e8f4fd">Sync</button>'
            + '</td></tr>';
    }
    body.innerHTML = html;

    // Page Mappings table
    var pfBody = document.getElementById('page-feeds-body');
    var pfHtml = '';
    var feedMap = {};
    feeds.forEach(function(f) { feedMap[f.feed_key] = f.feed_name + ' (' + f.feed_site_code + ')'; });
    for (var i = 0; i < pageMappings.length; i++) {
        var pf = pageMappings[i];
        pfHtml += '<tr onclick="editPageMapping(' + pf.feed_page_key + ')">'
            + '<td><strong>' + esc(pf.page_code || '') + '</strong></td>'
            + '<td>' + esc(feedMap[pf.feed_key] || 'Unknown') + '</td>'
            + '<td>' + esc(pf.feed_page_filter_include || '') + '</td>'
            + '<td>' + esc(pf.feed_page_filter_exclude || '') + '</td>'
            + '<td>' + esc(pf.feed_page_listing_type || '') + '</td>'
            + '<td>' + esc(pf.feed_page_filter_orientation || '') + '</td>'
            + '<td class="actions" onclick="event.stopPropagation()">'
            + '<button onclick="editPageMapping(' + pf.feed_page_key + ')">Edit</button>'
            + '<button onclick="deletePageMapping(' + pf.feed_page_key + ')">Del</button>'
            + '</td></tr>';
    }
    pfBody.innerHTML = pfHtml;
    document.getElementById('feed-count').textContent = pageMappings.length + ' mapping(s)';

    // Populate dropdowns in page mapping form
    var pfFeedSelect = document.getElementById('pf-feed-source');
    var opts = '<option value="">— Select Feed Source —</option>';
    feeds.forEach(function(f) {
        opts += '<option value="' + f.feed_key + '">' + esc(f.feed_name + ' (' + f.feed_site_code + ')') + '</option>';
    });
    pfFeedSelect.innerHTML = opts;

    var pfPageSelect = document.getElementById('pf-page');
    var pOpts = '<option value="">— Select Page —</option>';
    allPages.forEach(function(p) {
        pOpts += '<option value="' + p.page_key + '">' + esc(p.page_code) + '</option>';
    });
    pfPageSelect.innerHTML = pOpts;
}

function esc(s) {
    var d = document.createElement('div');
    d.textContent = s || '';
    return d.innerHTML;
}

// ── Feed Source form ──
function editFeedSource(key) {
    fetch(API + '/admin-feeds.php?feed_key=' + key, {credentials:'include'})
        .then(function(r) { return safeJson(r); })
        .then(function(d) { openFeedSourceForm(d); });
}

function openFeedSourceForm(data) {
    var d = data || {};
    document.getElementById('form-title').textContent = d.feed_key ? 'Edit Feed Source' : 'Add Feed Source';
    document.getElementById('f-key').value = d.feed_key || '';
    document.getElementById('f-name').value = d.feed_name || '';
    document.getElementById('f-site-code').value = d.feed_site_code || 'YouTube';
    document.getElementById('f-account-id').value = d.feed_site_id || d.feed_account_id || '';
    document.getElementById('f-source-url').value = d.feed_source_url || '';
    document.getElementById('f-api-key').value = d.feed_api_key || '';
    document.getElementById('f-active').checked = d.feed_active_flag !== false;

    var container = document.getElementById('schedules-container');
    container.innerHTML = '';
    if (d.schedules && d.schedules.length) {
        for (var i = 0; i < d.schedules.length; i++) {
            addScheduleRow(d.schedules[i]);
        }
    }

    document.getElementById('form-overlay').classList.add('open');
}

function closeForm() {
    document.getElementById('form-overlay').classList.remove('open');
}

function addScheduleRow(data) {
    var d = data || {};
    var container = document.getElementById('schedules-container');
    var row = document.createElement('div');
    row.className = 'schedule-row';

    var daySelect = '<select class="sched-day"><option value="">Every day</option>';
    for (var i = 0; i < 7; i++) {
        daySelect += '<option value="' + i + '"' + (d.schedule_day_of_week == i ? ' selected' : '') + '>' + DAYS[i] + '</option>';
    }
    daySelect += '</select>';

    row.innerHTML = daySelect
        + ' <input type="time" class="sched-time" value="' + (d.schedule_time || '').substring(0,5) + '" style="width:110px" placeholder="Time">'
        + ' or every <input type="number" class="sched-interval" value="' + (d.schedule_interval_minutes || '') + '" style="width:70px" placeholder="min"> min'
        + ' <label style="font-size:0.8rem"><input type="checkbox" class="sched-active"' + (d.schedule_active_flag !== false ? ' checked' : '') + '> On</label>'
        + ' <button class="remove-sched" onclick="this.parentElement.remove()">&times;</button>';

    container.appendChild(row);
}

function collectSchedules() {
    var rows = document.querySelectorAll('#schedules-container .schedule-row');
    var schedules = [];
    for (var i = 0; i < rows.length; i++) {
        var day = rows[i].querySelector('.sched-day').value;
        var time = rows[i].querySelector('.sched-time').value;
        var interval = rows[i].querySelector('.sched-interval').value;
        var active = rows[i].querySelector('.sched-active').checked;
        schedules.push({
            schedule_day_of_week: day === '' ? null : parseInt(day),
            schedule_time: time || null,
            schedule_interval_minutes: interval ? parseInt(interval) : null,
            schedule_active_flag: active
        });
    }
    return schedules;
}

function saveFeedSource() {
    var payload = {
        feed_key: document.getElementById('f-key').value || null,
        feed_name: document.getElementById('f-name').value,
        feed_site_code: document.getElementById('f-site-code').value,
        feed_account_id: document.getElementById('f-account-id').value,
        feed_source_url: document.getElementById('f-source-url').value,
        feed_api_key: document.getElementById('f-api-key').value,
        feed_active_flag: document.getElementById('f-active').checked,
        schedules: collectSchedules()
    };
    fetch(API + '/admin-feeds.php', {
        method: 'POST', credentials: 'include',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify(payload)
    }).then(function(r) { return safeJson(r); })
    .then(function() { closeForm(); loadFeeds(); });
}

// ── Page Mapping form ──
function addPageMapping() { openPageMappingForm({}); }

function editPageMapping(key) {
    var pf = pageMappings.find(function(p) { return p.feed_page_key == key; });
    openPageMappingForm(pf || {});
}

function openPageMappingForm(d) {
    document.getElementById('pf-form-title').textContent = d.feed_page_key ? 'Edit Page Mapping' : 'Add Page Mapping';
    document.getElementById('pf-key').value = d.feed_page_key || '';
    document.getElementById('pf-feed-source').value = d.feed_key || '';
    document.getElementById('pf-page').value = d.page_key || '';
    document.getElementById('pf-filter-pos').value = d.feed_page_filter_include || '';
    document.getElementById('pf-filter-neg').value = d.feed_page_filter_exclude || '';
    document.getElementById('pf-listing-type').value = d.feed_page_listing_type || '';
    document.getElementById('pf-orientation').value = d.feed_page_filter_orientation || '';
    document.getElementById('pf-sort').value = d.feed_page_sort || 0;
    document.getElementById('pf-form-overlay').classList.add('open');
}

function closePfForm() { document.getElementById('pf-form-overlay').classList.remove('open'); }

function savePageMapping() {
    var key = document.getElementById('pf-key').value;
    var payload = {
        feed_page_action: key ? 'update' : 'create',
        feed_page_key: key || undefined,
        feed_key: parseInt(document.getElementById('pf-feed-source').value),
        page_key: parseInt(document.getElementById('pf-page').value),
        feed_page_filter_include: document.getElementById('pf-filter-pos').value,
        feed_page_filter_exclude: document.getElementById('pf-filter-neg').value,
        feed_page_listing_type: document.getElementById('pf-listing-type').value,
        feed_page_filter_orientation: document.getElementById('pf-orientation').value,
        feed_page_sort: parseInt(document.getElementById('pf-sort').value) || 0
    };
    fetch(API + '/admin-feeds.php', {
        method: 'POST', credentials: 'include',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify(payload)
    }).then(function(r) { return safeJson(r); })
    .then(function(d) {
        if (d.error) { alert(d.error); return; }
        closePfForm(); loadFeeds();
    }).catch(function(e) { alert('Save failed: ' + e.message); });
}

function deletePageMapping(key) {
    if (!confirm('Delete this page mapping?')) return;
    fetch(API + '/admin-feeds.php', {
        method: 'DELETE', credentials: 'include',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ feed_page_key: key })
    }).then(function() { loadFeeds(); });
}

function deleteFeed(key, name) {
    if (!confirm('Delete feed "' + name + '"?')) return;
    fetch(API + '/admin-feeds.php', {
        method: 'DELETE',
        credentials: 'include',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({feed_key: key})
    })
    .then(function() { loadFeeds(); });
}

function showSyncProgress(feedName) {
    document.getElementById('sync-title').textContent = 'Syncing ' + (feedName || '...');
    document.getElementById('sync-sub').textContent = 'This may take a moment';
    document.getElementById('sync-overlay').classList.add('open');
}

function hideSyncProgress() {
    document.getElementById('sync-overlay').classList.remove('open');
}

function formatSyncResult(data) {
    var lines = [];
    var sr = data.sync_result || {};
    if (sr.found !== undefined) lines.push('Found: ' + sr.found);
    if (sr.inserted !== undefined) lines.push('Inserted: ' + sr.inserted);
    if (sr.updated !== undefined) lines.push('Updated: ' + sr.updated);
    if (sr.results && Array.isArray(sr.results)) {
        sr.results.forEach(function(r) {
            lines.push((r.feed || '') + ': ' + (r.inserted || 0) + ' new, ' + (r.updated || 0) + ' updated');
        });
    }
    if (sr.status === 'started') lines.push(sr.message || 'Running in background');
    if (data.error) lines.push('Error: ' + data.error);
    return lines.join('\n');
}

function syncFeed(key) {
    if (!confirm('Force sync this feed now?')) return;
    var feedName = '';
    for (var i = 0; i < feeds.length; i++) {
        if (feeds[i].feed_key == key) { feedName = feeds[i].feed_name; break; }
    }
    showSyncProgress(feedName);
    fetch(API + '/admin-feeds.php', {
        method: 'PUT',
        credentials: 'include',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({feed_key: key})
    })
    .then(function(r) { return safeJson(r); })
    .then(function(data) {
        hideSyncProgress();
        alert(formatSyncResult(data));
        loadFeeds();
    })
    .catch(function(err) {
        hideSyncProgress();
        alert('Sync failed: ' + err.message);
    });
}

// Init
checkAuth();
