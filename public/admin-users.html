<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="page-version" content="1778306403">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users Admin - Yada Yah</title>
    <link rel="stylesheet" href="css/app.css?v=10">
    <link rel="stylesheet" href="css/login.css">
    <style>
        .users-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .users-table th, .users-table td { padding: 8px 12px; text-align: left; border-bottom: 1px solid #e0e0e0; }
        .users-table th { background: #f5f5f5; font-weight: 600; position: sticky; top: 0; font-size: 0.8rem; }
        .users-table tr:hover { background: #f0f4ff; cursor: pointer; }
        .users-table .actions { white-space: nowrap; }
        .users-table .actions button { padding: 3px 8px; font-size: 0.78rem; border: 1px solid #ccc; border-radius: 4px; cursor: pointer; background: #fff; margin-right: 4px; }
        .users-table .actions button:hover { background: #f0f0f0; }
        .users-table .actions button.ban { color: #c0392b; border-color: #e0c0c0; }
        .users-table .actions button.ban:hover { background: #fde8e8; }
        .users-table .actions button.unban { color: #27ae60; border-color: #b0e0b0; }
        .users-table .actions button.unban:hover { background: #e8fde8; }
        .users-table tr.banned { background: #fef0f0; }
        .badge-banned { display: inline-block; font-size: 0.7rem; background: #c0392b; color: #fff; padding: 1px 6px; border-radius: 3px; font-weight: 600; margin-left: 6px; }
        .badge-muted { display: inline-block; font-size: 0.7rem; background: #e67e22; color: #fff; padding: 1px 6px; border-radius: 3px; font-weight: 600; margin-left: 6px; }

        .form-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.45); z-index: 1000; justify-content: center; align-items: flex-start; padding: 40px 20px; overflow-y: auto; }
        .form-overlay.open { display: flex; }
        .form-panel { background: #fff; border-radius: 10px; box-shadow: 0 8px 32px rgba(0,0,0,0.25); width: 100%; max-width: 800px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0 20px; }
        .form-grid .field-full { grid-column: 1 / -1; }
        .form-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; background: #f8f8f8; border-radius: 10px 10px 0 0; border-bottom: 1px solid #ddd; }
        .form-header h3 { margin: 0; font-size: 1rem; }
        .form-header button { background: none; border: none; font-size: 1.4rem; cursor: pointer; color: #666; padding: 2px 8px; border-radius: 4px; }
        .form-header button:hover { background: #eee; }
        .form-body { padding: 20px; }
        .form-body .field { margin-bottom: 14px; }
        .form-body label { display: block; font-weight: 600; font-size: 0.85rem; margin-bottom: 4px; color: #333; }
        .form-body input[type=text], .form-body input[type=password], .form-body input[type=email] {
            width: 100%; padding: 8px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.9rem; font-family: inherit; box-sizing: border-box;
        }
        .form-body .form-actions { display: flex; gap: 8px; margin-top: 16px; }

        .page-perms { margin-top: 4px; }
        .page-perms label { display: inline-flex; align-items: center; gap: 6px; font-weight: 400; font-size: 0.85rem; margin-right: 16px; margin-bottom: 6px; cursor: pointer; }
        .page-perms input[type=checkbox] { margin: 0; cursor: pointer; }

        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .user-count { font-size: 0.85rem; color: #666; }
    </style>
</head>
<body>

<div id="login-screen" class="login-screen">
    <div class="login-card">
        <h1>Admin</h1>
        <div class="field">
            <label for="login-user">Login</label>
            <input type="text" id="login-user" autocomplete="username">
        </div>
        <div class="field">
            <label for="login-pass">Password</label>
            <div class="pass-wrap">
                <input type="password" id="login-pass" autocomplete="current-password">
                <button type="button" class="pass-toggle" onclick="togglePassword()" title="Show/hide password">&#128065;</button>
            </div>
        </div>
        <div id="login-error" class="error-messages" style="display:none"></div>
        <button class="btn btn-primary" style="width:100%" onclick="doLogin()">Login</button>
    </div>
</div>

<div id="app" class="container" style="display:none">
    <div class="app-header">
        <nav class="nav-tabs"></nav>
<script src="/js/admin-nav.js?v=10"></script>
        <div class="user-info">
            <span id="user-display"></span>
            <button class="btn btn-secondary btn-sm" onclick="doLogout()">Logout</button>
        </div>
    </div>

    <h1>Users</h1>

    <div class="toolbar">
        <span class="user-count" id="user-count"></span>
        <button class="btn btn-primary btn-sm" onclick="showForm(null)">+ Add User</button>
    </div>

    <div id="table-container">
        <div style="text-align:center;padding:20px;color:#888">Loading...</div>
    </div>
</div>

<div class="form-overlay" id="form-overlay">
    <div class="form-panel">
        <div class="form-header">
            <h3 id="form-title">Edit User</h3>
            <button onclick="closeForm()">&times;</button>
        </div>
        <div class="form-body">
            <input type="hidden" id="f-key">
            <div class="form-grid">
            <div class="field" id="f-key-display-wrap" style="display:none">
                <label>User Key</label>
                <input type="text" id="f-key-display" disabled style="background:#f0f0f0;color:#666;width:80px;">
            </div>
            <div class="field">
                <label>Login Code</label>
                <input type="text" id="f-code">
            </div>
            <div class="field">
                <label>Name</label>
                <input type="text" id="f-display-name">
            </div>
            <div class="field">
                <label>Handle</label>
                <input type="text" id="f-handle" placeholder="@handle">
            </div>
            <div class="field">
                <label>Email</label>
                <input type="email" id="f-email">
            </div>
            <div class="field">
                <label>New Password <span style="font-weight:400;color:#999">(leave blank to keep)</span></label>
                <input type="password" id="f-password" autocomplete="new-password">
            </div>
            <div class="field field-full">
                <label>Bio</label>
                <textarea id="f-bio" rows="2" style="resize:vertical;"></textarea>
            </div>
            <div class="field field-full" id="f-auth-methods-wrap" style="display:none">
                <label>Linked Accounts</label>
                <div id="f-auth-methods" style="font-size:0.85rem;color:#555;"></div>
            </div>
            </div>
            <div class="field">
                <label>Roles</label>
                <div class="page-perms" id="f-roles"></div>
            </div>
            <div class="field" id="f-ban-section">
                <label>Chat Status</label>
                <div style="display:flex;gap:12px;align-items:center;margin-bottom:8px;">
                    <label style="font-weight:400;display:inline-flex;align-items:center;gap:6px;cursor:pointer;"><input type="checkbox" id="f-banned"> Banned</label>
                    <label style="font-weight:400;display:inline-flex;align-items:center;gap:6px;cursor:pointer;"><input type="checkbox" id="f-muted"> Muted</label>
                </div>
                <div id="f-ban-details" style="display:none;">
                    <select id="f-ban-duration" style="width:100%;padding:6px 8px;border:1px solid #ccc;border-radius:4px;font-size:0.85rem;margin-bottom:8px;">
                        <option value="">Permanent</option>
                        <option value="1">1 hour</option>
                        <option value="24">24 hours</option>
                        <option value="168">7 days</option>
                        <option value="720">30 days</option>
                    </select>
                    <input type="text" id="f-ban-reason" placeholder="Reason (optional)" style="width:100%;padding:6px 8px;border:1px solid #ccc;border-radius:4px;font-size:0.85rem;box-sizing:border-box;">
                </div>
            </div>
            <div class="field">
                <label>Admin Page Access</label>
                <div class="page-perms" id="f-page-perms"></div>
            </div>
            <div class="form-actions">
                <button class="btn btn-primary" onclick="saveUser()">Save</button>
                <button class="btn btn-secondary" onclick="closeForm()">Cancel</button>
            </div>
        </div>
    </div>
</div>

<script src="js/admin-links.js?v=4"></script>
<script>
var API = '/api';
var allUsers = [];
var allSettings = [];
var allRoles = [];

function esc(s) {
    var d = document.createElement('div');
    d.textContent = s || '';
    return d.innerHTML;
}

function checkAuth() {
    fetch(API + '/auth.php', {credentials:'include'}).then(r=>r.json()).then(function(d) {
        if (d.authenticated) {
            document.getElementById('app').style.display = '';
            document.getElementById('user-display').textContent = d.user_name;
            applyPagePermissions(d.pages);
            loadUsers();
        } else {
            document.getElementById('login-screen').classList.add('visible');
        }
    });
}

function doLogin() {
    var user = document.getElementById('login-user').value;
    var pass = document.getElementById('login-pass').value;
    var errEl = document.getElementById('login-error');
    errEl.style.display = 'none';
    fetch(API + '/auth.php', {
        method: 'POST', credentials: 'include',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({login: user, password: pass})
    }).then(r=>r.json()).then(function(d) {
        if (d.authenticated) {
            document.getElementById('login-screen').classList.remove('visible');
            document.getElementById('app').style.display = '';
            document.getElementById('user-display').textContent = d.user_name;
            applyPagePermissions(d.pages);
            loadUsers();
        } else {
            errEl.textContent = d.error || 'Login failed';
            errEl.style.display = '';
        }
    });
}

function doLogout() {
    fetch(API + '/auth.php', {method:'DELETE', credentials:'include'}).then(function() {
        location.reload();
    });
}

function togglePassword() {
    var input = document.getElementById('login-pass');
    input.type = input.type === 'password' ? 'text' : 'password';
}

function loadUsers() {
    fetch(API + '/admin-users.php', {credentials:'include'})
        .then(r => r.json())
        .then(function(d) {
            if (d.error) { document.getElementById('table-container').innerHTML = '<div style="color:#c00;padding:20px">' + esc(d.error) + '</div>'; return; }
            allUsers = d.users || [];
            allSettings = d.settings || [];
            allRoles = d.roles || [];
            document.getElementById('user-count').textContent = allUsers.length + ' user' + (allUsers.length !== 1 ? 's' : '');
            renderTable();
        });
}

function renderTable() {
    if (!allUsers.length) {
        document.getElementById('table-container').innerHTML = '<div style="text-align:center;padding:20px;color:#888">No users.</div>';
        return;
    }
    // Build role lookup from allRoles
    var roleMap = {};
    if (window.allRoles) {
        for (var r = 0; r < allRoles.length; r++) {
            roleMap[allRoles[r].role_key] = allRoles[r].role_label || allRoles[r].role_code;
        }
    }

    var html = '<table class="users-table"><thead><tr>'
        + '<th>Key</th><th>Login</th><th>Name</th><th>Email</th><th>Roles</th><th>Status</th><th>Pages</th><th>Actions</th>'
        + '</tr></thead><tbody>';
    for (var i = 0; i < allUsers.length; i++) {
        var u = allUsers[i];
        var userHasAdmin = false;
        var adminRoleKey = null;
        for (var ar = 0; ar < allRoles.length; ar++) {
            if (allRoles[ar].role_code === 'admin') { adminRoleKey = parseInt(allRoles[ar].role_key); break; }
        }
        if (adminRoleKey && (u.role_keys || []).indexOf(adminRoleKey) >= 0) userHasAdmin = true;
        var pagesDisplay;
        if (!userHasAdmin) {
            pagesDisplay = '<span style="color:#999">--</span>';
        } else {
            var pages = (u.page_settings || []).filter(function(p) { return p.enabled; }).map(function(p) {
                return p.setting_code.charAt(0).toUpperCase() + p.setting_code.slice(1);
            }).join(', ');
            var allEnabled = (u.page_settings || []).every(function(p) { return p.enabled; });
            pagesDisplay = allEnabled ? '<span style="color:#27ae60">All</span>' : (pages || '<span style="color:#c00">None</span>');
        }
        var rolesDisplay = (u.role_keys || []).map(function(rk) { return esc(roleMap[rk] || rk); }).join(', ') || '<span style="color:#999">—</span>';
        var isBanned = u.user_banned_flag === true || u.user_banned_flag === 't';
        var isMuted = u.user_muted_flag === true || u.user_muted_flag === 't';
        var statusHtml = isBanned ? '<span class="badge-banned">Banned</span>' : (isMuted ? '<span class="badge-muted">Muted</span>' : '<span style="color:#27ae60;font-size:0.8rem">Active</span>');
        if (isBanned && u.user_ban_reason) statusHtml += '<br><span style="font-size:0.7rem;color:#999">' + esc(u.user_ban_reason) + '</span>';
        html += '<tr class="' + (isBanned ? 'banned' : '') + '" onclick="editUser(' + u.user_key + ')">'
            + '<td>' + u.user_key + '</td>'
            + '<td>' + esc(u.user_code) + '</td>'
            + '<td>' + esc(u.user_name_display || '') + '</td>'
            + '<td>' + esc(u.user_email || '') + '</td>'
            + '<td style="font-size:0.8rem">' + rolesDisplay + '</td>'
            + '<td style="font-size:0.8rem">' + statusHtml + '</td>'
            + '<td style="font-size:0.8rem">' + pagesDisplay + '</td>'
            + '<td class="actions">'
            + '<button onclick="event.stopPropagation();editUser(' + u.user_key + ')">Edit</button>'
            + (isBanned
                ? '<button class="unban" onclick="event.stopPropagation();toggleBan(' + u.user_key + ',false)">Unban</button>'
                : '<button class="ban" onclick="event.stopPropagation();toggleBan(' + u.user_key + ',true)">Ban</button>')
            + '</td></tr>';
    }
    html += '</tbody></table>';
    document.getElementById('table-container').innerHTML = html;
}

function editUser(key) {
    var user = allUsers.find(function(u) { return u.user_key == key; });
    if (user) showForm(user);
}

function showForm(user) {
    document.getElementById('form-title').textContent = user ? 'Edit User' : 'Add User';
    document.getElementById('f-key').value = user ? user.user_key : '';
    document.getElementById('f-key-display').value = user ? user.user_key : '';
    document.getElementById('f-key-display-wrap').style.display = user ? '' : 'none';
    document.getElementById('f-code').value = user ? user.user_code : '';
    document.getElementById('f-display-name').value = user ? user.user_name_display || '' : '';
    document.getElementById('f-handle').value = user ? user.user_handle || '' : '';
    document.getElementById('f-email').value = user ? user.user_email || '' : '';
    document.getElementById('f-bio').value = user ? user.user_bio || '' : '';
    document.getElementById('f-password').value = '';

    // Linked accounts (read-only display)
    var authWrap = document.getElementById('f-auth-methods-wrap');
    var authDiv = document.getElementById('f-auth-methods');
    if (user && user.auth_methods && user.auth_methods.length) {
        authWrap.style.display = '';
        authDiv.innerHTML = user.auth_methods.map(function(am) {
            return '<div style="padding:3px 0;"><strong>' + esc(am.provider) + '</strong>' + (am.email ? ' — ' + esc(am.email) : '') + '</div>';
        }).join('');
    } else {
        authWrap.style.display = 'none';
        authDiv.innerHTML = '';
    }

    // Render role checkboxes
    var rolesHtml = '';
    var userRoleKeys = user ? (user.role_keys || []) : [];
    for (var r = 0; r < allRoles.length; r++) {
        var role = allRoles[r];
        var checked = user ? userRoleKeys.indexOf(parseInt(role.role_key)) >= 0 || userRoleKeys.indexOf(role.role_key) >= 0 : role.role_code === 'public';
        rolesHtml += '<label><input type="checkbox" data-rk="' + role.role_key + '"'
            + (checked ? ' checked' : '') + '> ' + esc(role.role_label || role.role_code) + '</label>';
    }
    document.getElementById('f-roles').innerHTML = rolesHtml;

    // Toggle page perms visibility when admin role checkbox changes
    document.querySelectorAll('#f-roles input[type=checkbox]').forEach(function(cb) {
        cb.addEventListener('change', function() {
            var adminRoleKey = null;
            for (var ar = 0; ar < allRoles.length; ar++) {
                if (allRoles[ar].role_code === 'admin') { adminRoleKey = allRoles[ar].role_key; break; }
            }
            if (adminRoleKey && this.getAttribute('data-rk') == adminRoleKey) {
                var permsSection = document.getElementById('f-page-perms').parentElement;
                permsSection.style.display = this.checked ? '' : 'none';
            }
        });
    });

    // Render page permission checkboxes — only for users with admin role
    var hasAdminRole = false;
    for (var ar = 0; ar < allRoles.length; ar++) {
        if (allRoles[ar].role_code === 'admin' && userRoleKeys.indexOf(parseInt(allRoles[ar].role_key)) >= 0) {
            hasAdminRole = true; break;
        }
    }
    var permsSection = document.getElementById('f-page-perms').parentElement;
    if (hasAdminRole) {
        permsSection.style.display = '';
        var permsHtml = '';
        var settings = user ? user.page_settings : allSettings.map(function(s) {
            return { setting_key: s.setting_key, setting_code: s.setting_code, enabled: true };
        });
        for (var i = 0; i < settings.length; i++) {
            var s = settings[i];
            var label = s.setting_label || (s.setting_code.charAt(0).toUpperCase() + s.setting_code.slice(1));
            permsHtml += '<label><input type="checkbox" data-sk="' + s.setting_key + '"'
                + (s.enabled ? ' checked' : '') + '> ' + esc(label) + '</label>';
        }
        document.getElementById('f-page-perms').innerHTML = permsHtml;
    } else {
        permsSection.style.display = 'none';
        document.getElementById('f-page-perms').innerHTML = '';
    }

    // Ban/mute fields
    var isBanned = user && (user.user_banned_flag === true || user.user_banned_flag === 't');
    var isMuted = user && (user.user_muted_flag === true || user.user_muted_flag === 't');
    document.getElementById('f-banned').checked = isBanned;
    document.getElementById('f-muted').checked = isMuted;
    document.getElementById('f-ban-reason').value = user ? (user.user_ban_reason || '') : '';
    document.getElementById('f-ban-duration').value = '';
    document.getElementById('f-ban-details').style.display = isBanned ? '' : 'none';
    document.getElementById('f-banned').onchange = function() {
        document.getElementById('f-ban-details').style.display = this.checked ? '' : 'none';
    };

    document.getElementById('form-overlay').classList.add('open');
    // Reset change-tracking baseline so Save button works
    setTimeout(function() { if (window.rearmForm) rearmForm(); }, 50);
}

function closeForm() {
    document.getElementById('form-overlay').classList.remove('open');
}

function saveUser() {
    var key = document.getElementById('f-key').value;
    var data = {
        user_code: document.getElementById('f-code').value.trim(),
        user_name_display: document.getElementById('f-display-name').value.trim(),
        user_handle: document.getElementById('f-handle').value.trim(),
        user_email: document.getElementById('f-email').value.trim(),
        user_bio: document.getElementById('f-bio').value.trim(),
        new_password: document.getElementById('f-password').value,
    };

    if (!data.user_code) { alert('Login code is required.'); return; }

    // Collect roles
    var roleChecks = document.querySelectorAll('#f-roles input[type=checkbox]');
    var roleKeys = [];
    for (var r = 0; r < roleChecks.length; r++) {
        if (roleChecks[r].checked) roleKeys.push(parseInt(roleChecks[r].getAttribute('data-rk')));
    }
    data.role_keys = roleKeys;

    // Ban/mute
    data.banned = document.getElementById('f-banned').checked;
    data.muted = document.getElementById('f-muted').checked;
    if (data.banned) {
        data.ban_duration = document.getElementById('f-ban-duration').value || null;
        data.ban_reason = document.getElementById('f-ban-reason').value.trim() || null;
    }

    // Collect page settings
    var checks = document.querySelectorAll('#f-page-perms input[type=checkbox]');
    var pageSettings = [];
    for (var i = 0; i < checks.length; i++) {
        pageSettings.push({
            setting_key: parseInt(checks[i].getAttribute('data-sk')),
            enabled: checks[i].checked,
        });
    }
    data.page_settings = pageSettings;

    if (key) {
        data.user_key = parseInt(key);
        fetch(API + '/admin-users.php', {
            method: 'PUT', credentials: 'include',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify(data)
        }).then(r => r.json()).then(function(d) {
            if (d.saved) { closeForm(); loadUsers(); }
            else if (d.error) alert(d.error);
        });
    } else {
        fetch(API + '/admin-users.php', {
            method: 'POST', credentials: 'include',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify(data)
        }).then(r => r.json()).then(function(d) {
            if (d.saved) { closeForm(); loadUsers(); }
            else if (d.error) alert(d.error);
        });
    }
}

function toggleBan(userKey, ban) {
    var reason = '';
    if (ban) {
        reason = prompt('Ban reason (optional):');
        if (reason === null) return; // cancelled
    } else {
        if (!confirm('Unban this user?')) return;
    }
    fetch(API + '/admin-users.php', {
        method: 'PUT', credentials: 'include',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ user_key: userKey, banned: ban, ban_reason: reason || null })
    }).then(function(r) { return safeJson(r); }).then(function(d) {
        if (d.saved) loadUsers();
        else if (d.error) alert(d.error);
    });
}

document.getElementById('login-pass').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
});

checkAuth();
</script>
<script src="/js/admin-login.js?v=8"></script>
<script src="/js/session-state.js?v=1"></script>
<script src="/js/error-reporter.js?v=2"></script>
</body>
</html>
