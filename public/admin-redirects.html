<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="page-version" content="1778533136">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirects Admin - Yada Yah</title>
    <link rel="stylesheet" href="css/app.css?v=10">
    <link rel="stylesheet" href="css/login.css">
    <style>
        .redir-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .redir-table th, .redir-table td { padding: 8px 10px; text-align: left; border-bottom: 1px solid #e0e0e0; }
        .redir-table th { background: #f5f5f5; font-weight: 600; position: sticky; top: 0; font-size: 0.8rem; }
        .redir-table tr:hover { background: #f0f4ff; }
        .redir-table .actions { white-space: nowrap; }
        .redir-table .actions button { padding: 3px 8px; font-size: 0.78rem; border: 1px solid #ccc; border-radius: 4px; cursor: pointer; background: #fff; margin-right: 4px; }
        .redir-table .actions button:hover { background: #f0f0f0; }
        .redir-table td.url-cell { max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-family: monospace; font-size: 0.8rem; position: relative; cursor: default; }
        .redir-table td.url-cell:hover { overflow: visible; white-space: normal; word-break: break-all; z-index: 10; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.75rem; font-weight: 600; }
        .badge-active { background: #d4edda; color: #155724; }
        .badge-inactive { background: #f8d7da; color: #721c24; }
        .badge-queue { background: #fff3cd; color: #856404; }

        .form-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.45); z-index: 1000; justify-content: center; align-items: flex-start; padding: 40px 20px; overflow-y: auto; }
        .form-overlay.open { display: flex; }
        .form-panel { background: #fff; border-radius: 10px; box-shadow: 0 8px 32px rgba(0,0,0,0.25); width: 100%; }
        .form-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; background: #f8f8f8; border-radius: 10px 10px 0 0; border-bottom: 1px solid #ddd; }
        .form-header h3 { margin: 0; font-size: 1rem; }
        .form-header button { background: none; border: none; font-size: 1.4rem; cursor: pointer; color: #666; padding: 2px 8px; border-radius: 4px; }
        .form-header button:hover { background: #eee; }
        .form-body { padding: 20px; }
        .form-body .field { margin-bottom: 12px; }
        .form-body label { display: block; font-weight: 600; font-size: 0.85rem; margin-bottom: 3px; color: #333; }
        .form-body input[type=text] { width: 100%; padding: 7px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.9rem; font-family: monospace; box-sizing: border-box; }
        .form-body .form-actions { display: flex; gap: 8px; margin-top: 16px; }
        .form-body .checkbox-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .form-body .checkbox-row input[type=checkbox] { width: 16px; height: 16px; }
        .form-body .checkbox-row label { margin: 0; font-weight: normal; }

        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
        .toolbar-left { display: flex; gap: 8px; align-items: center; }
        .filter-tabs { display: flex; gap: 0; }
        .filter-tabs button { padding: 5px 14px; font-size: 0.82rem; border: 1px solid #ccc; background: #fff; cursor: pointer; }
        .filter-tabs button:first-child { border-radius: 4px 0 0 4px; }
        .filter-tabs button:last-child { border-radius: 0 4px 4px 0; }
        .filter-tabs button + button { border-left: none; }
        .filter-tabs button.active { background: #31345A; color: #fff; border-color: #31345A; }
        .redir-count { font-size: 0.85rem; color: #666; }
    </style>
</head>
<body>

<div id="login-screen" class="login-screen">
    <div class="login-card">
        <h1>Admin</h1>
        <div class="field">
            <label for="login-user">Login</label>
            <input type="text" id="login-user" autocomplete="username">
        </div>
        <div class="field">
            <label for="login-pass">Password</label>
            <div class="pass-wrap">
                <input type="password" id="login-pass" autocomplete="current-password">
                <button type="button" class="pass-toggle" onclick="togglePassword()" title="Show/hide password">&#128065;</button>
            </div>
        </div>
        <div id="login-error" class="error-messages" style="display:none"></div>
        <button class="btn btn-primary" style="width:100%" onclick="doLogin()">Login</button>
    </div>
</div>

<div id="app" class="container" style="display:none">
    <div class="app-header">
        <nav class="nav-tabs"></nav>
<script src="/js/admin-nav.js?v=11"></script>
        <div class="user-info">
            <span id="user-display"></span>
            <button class="btn btn-secondary btn-sm" onclick="doLogout()">Logout</button>
        </div>
    </div>

    <div class="toolbar">
        <div class="toolbar-left">
            <div class="filter-tabs">
                <button onclick="setFilter('all')">All</button>
                <button class="active" onclick="setFilter('queue')">Queue</button>
                <button onclick="setFilter('active')">Active</button>
                <button onclick="setFilter('inactive')">Inactive</button>
                <button onclick="setFilter('bot')">Bot</button>
            </div>
            <span id="redir-count" class="redir-count"></span>
            <input type="text" id="redir-search" placeholder="Search..." style="padding:5px 10px;border:1px solid #ccc;border-radius:4px;font-size:0.82rem;width:180px;" onkeydown="if(event.key==='Enter'){searchTerm=this.value.trim();loadRedirects(1);}">
        </div>
        <button class="btn btn-primary btn-sm" onclick="openForm()">+ Add Redirect</button>
    </div>

    <table class="redir-table">
        <thead>
            <tr>
                <th style="cursor:pointer;user-select:none;" onclick="toggleSort('url')">Request URL <span id="sort-url"></span></th>
                <th>Target URL</th>
                <th style="cursor:pointer;user-select:none;" onclick="toggleSort('hits')">Hits <span id="sort-hits"></span></th>
                <th>Status</th>
                <th style="cursor:pointer;user-select:none;" onclick="toggleSort('date')">Created <span id="sort-date"></span></th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="redir-body"></tbody>
    </table>
</div>

<!-- Edit Form -->
<div id="form-overlay" class="form-overlay" onclick="if(event.target===this)closeForm()">
    <div class="form-panel">
        <div class="form-header">
            <h3 id="form-title">Add Redirect</h3>
            <button onclick="closeForm()">&times;</button>
        </div>
        <div class="form-body">
            <input type="hidden" id="f-key">
            <div class="field">
                <label>Request URL</label>
                <input type="text" id="f-request" placeholder="/old-path">
            </div>
            <div class="field">
                <label>Target URL</label>
                <input type="text" id="f-target" placeholder="/new-path or https://...">
            </div>
            <div class="field">
                <label for="f-active">Status</label>
                <select id="f-active" style="padding:8px 10px;border:1px solid #ccc;border-radius:4px;font-size:0.9rem;">
                    <option value="null">Queue</option>
                    <option value="true">Active</option>
                    <option value="false">Inactive</option>
                </select>
            </div>
            <div class="form-actions">
                <button class="btn btn-primary" onclick="saveForm()">Save</button>
                <button class="btn btn-secondary" onclick="closeForm()">Cancel</button>
            </div>
        </div>
    </div>
</div>

<script src="js/admin-links.js?v=4"></script>
<script>
var API = '/api';
var redirects = [];
var currentFilter = 'queue';

function checkAuth() {
    fetch(API + '/auth.php', {credentials:'include'}).then(r=>r.json()).then(function(d) {
        if (d.authenticated) {
            document.getElementById('app').style.display = '';
            document.getElementById('user-display').textContent = d.user_name;
            applyPagePermissions(d.pages);
            loadRedirects();
        } else {
            document.getElementById('login-screen').classList.add('visible');
        }
    });
}

function doLogin() {
    var user = document.getElementById('login-user').value;
    var pass = document.getElementById('login-pass').value;
    var errEl = document.getElementById('login-error');
    errEl.style.display = 'none';
    fetch(API + '/auth.php', {
        method: 'POST', credentials: 'include',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({login: user, password: pass})
    }).then(r=>r.json()).then(function(d) {
        if (d.authenticated) {
            document.getElementById('login-screen').classList.remove('visible');
            document.getElementById('app').style.display = '';
            document.getElementById('user-display').textContent = d.user_name;
            applyPagePermissions(d.pages);
            loadRedirects();
        } else {
            errEl.textContent = d.error || 'Login failed';
            errEl.style.display = '';
        }
    });
}

function doLogout() {
    fetch(API + '/auth.php', {method:'DELETE', credentials:'include'}).then(function() {
        location.reload();
    });
}

function togglePassword() {
    var input = document.getElementById('login-pass');
    input.type = input.type === 'password' ? 'text' : 'password';
}

var currentPage = 1;
var totalPages = 1;
var totalCount = 0;
var searchTerm = '';
var currentSort = 'date';
var currentDir = 'DESC';

function toggleSort(col) {
    if (currentSort === col) {
        currentDir = currentDir === 'DESC' ? 'ASC' : 'DESC';
    } else {
        currentSort = col;
        currentDir = col === 'url' ? 'ASC' : 'DESC';
    }
    loadRedirects(1);
}

function loadRedirects(page) {
    page = page || currentPage || 1;
    var url = API + '/redirects.php?page=' + page + '&limit=100&sort=' + currentSort + '&dir=' + currentDir;
    if (currentFilter && currentFilter !== 'all') url += '&filter=' + encodeURIComponent(currentFilter);
    if (searchTerm) url += '&search=' + encodeURIComponent(searchTerm);
    fetch(url, {credentials:'include'})
        .then(function(r) { return safeJson(r); })
        .then(function(data) {
            redirects = data.redirects || data;
            currentPage = data.page || 1;
            totalPages = data.total_pages || 1;
            totalCount = data.total || redirects.length;
            renderRedirects();
        });
}

function setFilter(f) {
    currentFilter = f;
    document.querySelectorAll('.filter-tabs button').forEach(function(btn) {
        btn.classList.toggle('active', btn.textContent.toLowerCase() === f);
    });
    loadRedirects(1);
}

function renderRedirects() {
    var filtered = redirects;

    document.getElementById('redir-count').textContent = totalCount + ' redirect' + (totalCount !== 1 ? 's' : '') + ' (page ' + currentPage + '/' + totalPages + ')';
    var arrow = function(col) { return currentSort === col ? (currentDir === 'DESC' ? ' ▼' : ' ▲') : ''; };
    document.getElementById('sort-url').textContent = arrow('url');
    document.getElementById('sort-hits').textContent = arrow('hits');
    document.getElementById('sort-date').textContent = arrow('date');

    var html = '';
    filtered.forEach(function(r) {
        var status = '';
        if (r.redirect_attack_flag === true || r.redirect_attack_flag === 't') status = '<span class="badge" style="background:#c0392b;color:#fff;">Bot</span>';
        else if (r.redirect_active_flag === null || r.redirect_active_flag === undefined) status = '<span class="badge badge-queue">Queue</span>';
        else if (r.redirect_active_flag === false || r.redirect_active_flag === 'f') status = '<span class="badge badge-inactive">Inactive</span>';
        else status = '<span class="badge badge-active">Active</span>';

        var created = r.redirect_dtime ? new Date(r.redirect_dtime).toLocaleDateString() : '';

        html += '<tr data-rk="' + r.redirect_key + '">'
            + '<td class="url-cell" title="Click to copy" style="cursor:pointer;" onclick="navigator.clipboard.writeText(\'' + esc(r.redirect_request).replace(/'/g, "\\'") + '\');this.style.background=\'#d4edda\';var t=this;setTimeout(function(){t.style.background=\'\';},500);">' + esc(r.redirect_request) + '</td>'
            + '<td><input type="text" value="' + esc(r.redirect_target || '') + '" placeholder="Target URL" style="width:100%;padding:4px 6px;border:1px solid #ddd;border-radius:3px;font-size:0.82rem;font-family:inherit;" onchange="inlineSave(' + r.redirect_key + ',this)"></td>'
            + '<td>' + (r.redirect_hit_count || 0) + '</td>'
            + '<td>' + status + '</td>'
            + '<td>' + created + '</td>'
            + '<td class="actions">'
            + '<button onclick="markBot(' + r.redirect_key + ',' + (r.redirect_attack_flag === true || r.redirect_attack_flag === 't' ? 'true' : 'false') + ')" style="color:' + (r.redirect_attack_flag === true || r.redirect_attack_flag === 't' ? '#c0392b;font-weight:700;' : '#888;') + '">Bot</button>'
            + (r.redirect_active_flag !== false && r.redirect_active_flag !== 'f' && r.redirect_attack_flag !== true && r.redirect_attack_flag !== 't' ? '<button onclick="deactivateRedirect(' + r.redirect_key + ')">Ignore</button>' : '')
            + '</td>'
            + '</tr>';
    });

    document.getElementById('redir-body').innerHTML = html;

    // Pagination
    var pagHtml = '';
    if (totalPages > 1) {
        pagHtml += '<div style="display:flex;gap:6px;justify-content:center;padding:12px 0;">';
        pagHtml += '<button ' + (currentPage <= 1 ? 'disabled' : 'onclick="loadRedirects(' + (currentPage-1) + ')"') + ' style="padding:4px 10px;border:1px solid #ccc;border-radius:4px;background:#fff;cursor:pointer;">&laquo; Prev</button>';
        pagHtml += '<span style="padding:4px 8px;font-size:0.85rem;color:#666;">Page ' + currentPage + ' of ' + totalPages + '</span>';
        pagHtml += '<button ' + (currentPage >= totalPages ? 'disabled' : 'onclick="loadRedirects(' + (currentPage+1) + ')"') + ' style="padding:4px 10px;border:1px solid #ccc;border-radius:4px;background:#fff;cursor:pointer;">Next &raquo;</button>';
        pagHtml += '</div>';
    }
    var pagEl = document.getElementById('redir-pagination');
    if (!pagEl) {
        pagEl = document.createElement('div');
        pagEl.id = 'redir-pagination';
        document.getElementById('redir-body').parentNode.parentNode.appendChild(pagEl);
    }
    pagEl.innerHTML = pagHtml;
}

function esc(s) {
    if (s == null) return '';
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}

function openForm(data) {
    document.getElementById('f-key').value = data ? data.redirect_key : '';
    document.getElementById('f-request').value = data ? data.redirect_request : '';
    document.getElementById('f-target').value = data ? (data.redirect_target || '') : '';
    var activeVal = data ? (data.redirect_active_flag === null || data.redirect_active_flag === undefined ? 'null' : data.redirect_active_flag ? 'true' : 'false') : 'null';
    document.getElementById('f-active').value = activeVal;
    document.getElementById('form-title').textContent = data ? 'Edit Redirect' : 'Add Redirect';
    document.getElementById('form-overlay').classList.add('open');
}

function closeForm() {
    document.getElementById('form-overlay').classList.remove('open');
}

function saveForm() {
    var key = document.getElementById('f-key').value;
    var payload = {
        redirect_request: document.getElementById('f-request').value,
        redirect_target: document.getElementById('f-target').value || null,
        redirect_active_flag: document.getElementById('f-active').value === 'true' ? true : document.getElementById('f-active').value === 'false' ? false : null,
    };

    if (key) {
        payload.redirect_key = parseInt(key);
        fetch(API + '/redirects.php', {
            method: 'PUT', credentials: 'include',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify(payload)
        }).then(function() { closeForm(); loadRedirects(); });
    } else {
        fetch(API + '/redirects.php', {
            method: 'POST', credentials: 'include',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify(payload)
        }).then(function() { closeForm(); loadRedirects(); });
    }
}

function editRedirect(key) {
    var r = redirects.find(function(x) { return x.redirect_key === key; });
    if (r) openForm(r);
}

function makeEditable(el, key) {
    var td = el.parentNode;
    var current = el.textContent === '+ New URL' ? '' : el.textContent;
    var input = document.createElement('input');
    input.type = 'text';
    input.value = current;
    input.style.cssText = 'width:100%;padding:4px 6px;border:1px solid #3498db;border-radius:3px;font-size:0.82rem;font-family:inherit;';
    input.onblur = function() { inlineSave(key, input); };
    input.onkeydown = function(e) { if (e.key === 'Enter') { e.preventDefault(); input.blur(); } };
    td.innerHTML = '';
    td.appendChild(input);
    input.focus();
}

var _inlineTimers = {};
function inlineSave(key, el) {
    if (_inlineTimers[key]) clearTimeout(_inlineTimers[key]);
    _inlineTimers[key] = setTimeout(function() {
        var target = el.value.trim();
        var payload = { redirect_key: key, redirect_target: target };
        // If target was just set and status is queue (null), auto-activate
        if (target) payload.redirect_active_flag = true;
        el.style.borderColor = '#f0ad4e';
        fetch(API + '/redirects.php', {
            method: 'PUT', credentials: 'include',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify(payload)
        }).then(function(r) { return safeJson(r); }).then(function(d) {
            el.style.borderColor = d.error ? '#c00' : '#27ae60';
            setTimeout(function() { el.style.borderColor = '#ddd'; }, 1500);
            if (!d.error && target) {
                // Update status badge inline without reloading
                var row = el.closest('tr');
                if (row) {
                    var statusCell = row.querySelectorAll('td')[3];
                    if (statusCell) statusCell.innerHTML = '<span class="badge badge-active">Active</span>';
                }
            }
        });
    }, 500);
}

function markBot(key, currentlyBot) {
    var payload = currentlyBot
        ? {redirect_key: key, redirect_attack_flag: null}
        : {redirect_key: key, redirect_active_flag: false, redirect_attack_flag: true};
    fetch(API + '/redirects.php', {
        method: 'PUT', credentials: 'include',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify(payload)
    }).then(function() { loadRedirects(); });
}

function deactivateRedirect(key) {
    fetch(API + '/redirects.php', {
        method: 'PUT', credentials: 'include',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({redirect_key: key, redirect_active_flag: false})
    }).then(function() { loadRedirects(); });
}

document.getElementById('login-pass').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
});

checkAuth();
</script>
<script src="/js/admin-login.js?v=8"></script>
<script src="/js/session-state.js?v=1"></script>
<script src="/js/error-reporter.js?v=2"></script>
</body>
</html>
