<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Record — Yada Yah</title>
    <style>
        :root {
            --primary: #31345A;
            --green: #27ae60;
            --red: #c00;
            --gray: #888;
            --amber: #a36100;
            --bg: #f5f7fa;
            --card: #ffffff;
        }
        * { box-sizing: border-box; }
        body {
            font: 14px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
            margin: 0;
            background: var(--bg);
            color: #222;
        }
        .card {
            max-width: 900px;
            margin: 14px auto;
            background: var(--card);
            border-radius: 10px;
            padding: 16px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        }
        header { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
        h1 {
            margin: 0; font-size: 1rem; color: var(--primary);
            flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        #player-wrap {
            background: #000; border-radius: 6px; overflow: hidden;
            aspect-ratio: 16/9; margin-bottom: 10px;
            position: relative;
        }
        #yt-player { width: 100%; height: 100%; }
        /* Click-blocker overlay — sits on top of the YT iframe so the user
           can't interact with it directly (play/pause/scrub). All control
           goes through our own buttons so the recording stays in sync with
           video position. Hidden when not recording so the user can still
           manually interact with the player if they ever need to. */
        #player-blocker {
            position: absolute; inset: 0; z-index: 5;
            cursor: not-allowed; background: transparent;
            display: none;
        }
        #banner {
            margin-bottom: 10px; padding: 8px 12px;
            background: #fff3a8; border: 1px solid #e0c000;
            border-radius: 6px; font-size: 0.9rem; color: #7a5c00;
        }
        #controls {
            display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
        }
        button {
            padding: 8px 16px; border-radius: 4px; cursor: pointer;
            font-weight: 600; font-size: 0.95rem; border: none;
        }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        #continue-btn { background: var(--green); color: #fff; }
        #pause-btn { background: #444; color: #fff; }
        #restart-btn { background: #fff; color: var(--red); border: 1px solid var(--red); padding: 8px 12px; font-size: 0.85rem; }
        #status { font-size: 0.9rem; color: #666; flex: 1; }
        #time { font-family: monospace; font-size: 0.95rem; color: #444; margin-left: auto; }
        .hint {
            margin-top: 10px; font-size: 0.78rem; color: #888;
            border-top: 1px solid #eee; padding-top: 8px;
        }
        .hint strong { color: #444; }
    </style>
</head>
<body>
    <div class="card">
        <header>
            <h1 id="title">Loading…</h1>
            <span id="time">—</span>
        </header>
        <div id="player-wrap">
            <div id="yt-player"></div>
            <div id="player-blocker" title="Video is locked while recording — use the buttons below"></div>
        </div>
        <div id="banner" style="display:none;"></div>
        <div id="controls">
            <button id="continue-btn" style="display:none;" onclick="continueRecording()">▶ Continue Recording</button>
            <button id="pause-btn" style="display:none;" onclick="pauseRecording()">⏸ Pause Recording</button>
            <button id="restart-btn" style="display:none;" onclick="restartRecording()">⟲ Restart from Beginning</button>
            <span id="status"></span>
        </div>
        <div class="hint">
            This is a <strong>dedicated recording window</strong>. You can keep the original admin tab open and navigate it freely — recording continues here as long as this window stays open. Playback is locked at 1× to ensure natural-rate audio.
        </div>
    </div>

    <script>
    // ── State ──
    var API = '/api';
    var itemKey = parseInt(new URLSearchParams(location.search).get('item') || '0', 10);
    var ytPlayer = null, ytReady = false;
    var stream = null, recorder = null, chunks = [], startedMs = 0;
    var partCount = 0;
    var suppressAutoStart = false;
    var durationTimer = null;
    var initialResumeSec = 0;
    // Position where the last recorded part ended. Used by Continue Recording
    // to snap the video back so the next part begins exactly where the last
    // one left off, even if the player drifted or the user happened to move
    // it (the blocker overlay normally prevents that, but defensive anyway).
    var lastRecordedSeconds = 0;
    // Tracks the post-Pause upload so beforeunload can warn the user if they
    // try to close the window while the part is still being POSTed. Without
    // this, a fast Pause→Close cancels the in-flight fetch silently and the
    // server never persists resume_seconds.
    var uploadInFlight = false;
    var pendingBlob = null, pendingSeconds = 0;
    // Periodic auto-checkpoint: every CHECKPOINT_MS while recording, we
    // programmatically pause→upload→resume so the user can never lose more
    // than CHECKPOINT_MS of audio if their browser ignores the unload prompt
    // or the network drops. The user sees a brief 1-2 sec hiccup in playback
    // when this fires; that's the cost of the safety net.
    var CHECKPOINT_MS = 5 * 60 * 1000;
    var checkpointTimer = null;
    var autoCheckpointPending = false;

    if (!itemKey) { document.getElementById('status').textContent = '✗ Missing ?item=N in URL'; }
    document.getElementById('status').textContent = 'Loading YouTube player API…';

    // ── Helpers ──
    function $(id) { return document.getElementById(id); }
    function fmt(s) {
        s = Math.max(0, Math.floor(s || 0));
        var h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), x = s % 60;
        return (h < 10 ? '0' : '') + h + ':' + (m < 10 ? '0' : '') + m + ':' + (x < 10 ? '0' : '') + x;
    }
    function setStatus(msg) { $('status').textContent = msg || ''; }
    function setTitle(t) { $('title').textContent = t; document.title = 'Record — ' + t; }

    // ── YT IFrame API ──
    // Called by the IFrame API script once it has loaded. We also need this
    // function defined BEFORE the API script tag — it's declared at the top
    // of this <script> block which runs before the API loads, so the global
    // `onYouTubeIframeAPIReady` is in place when YT fires its callback.
    function onYouTubeIframeAPIReady() {
        ytReady = true;
        setStatus('Fetching video info…');
        bootstrap();
    }

    async function bootstrap() {
        if (!ytReady || !itemKey) { return; }
        try {
            var resp = await fetch(API + '/admin-transcript.php?item_key=' + itemKey + '&_=' + Date.now(),
                                   { credentials: 'include', cache: 'no-store' });
            if (resp.status === 401) throw new Error('Not signed in to admin. Open admin-feeds.html in another tab and sign in, then reload this page.');
            var d = await resp.json();
            if (d.error || !d.item) throw new Error(d.error || 'Item not found');
            setTitle((d.item.title || 'Item ' + itemKey).substring(0, 90));
            setStatus('Reading any saved progress…');
            // Read partial state
            var pResp = await fetch(API + '/admin-transcript-upload.php?item_key=' + itemKey + '&_=' + Date.now(),
                                    { credentials: 'include', cache: 'no-store' });
            var pData = await pResp.json();
            var p = pData.partial || {};
            partCount = p.part_count || 0;
            initialResumeSec = (p.part_count > 0 && p.resume_seconds > 0) ? p.resume_seconds : 0;
            lastRecordedSeconds = initialResumeSec;
            if (initialResumeSec > 0) {
                $('banner').style.display = '';
                $('banner').innerHTML = bannerText(initialResumeSec);
                setStatus('Loading video and seeking to ' + fmt(initialResumeSec) + '…');
            } else {
                setStatus('Loading video…');
            }
            // Spin up player. controls:1 keeps the YT progress bar visible
            // (useful visual feedback) but the click-blocker overlay above it
            // intercepts clicks during recording. disablekb:1 prevents the
            // iframe from responding to keyboard shortcuts (space/arrows).
            ytPlayer = new YT.Player('yt-player', {
                videoId: d.item.feed_item_external_id,
                width: '100%', height: '100%',
                playerVars: { rel: 0, modestbranding: 1, playsinline: 1, controls: 1, disablekb: 1 },
                events: {
                    onReady: onPlayerReady,
                    onStateChange: onPlayerStateChange,
                    onPlaybackRateChange: function(e) {
                        if (e.target.getPlaybackRate() !== 1) {
                            try { e.target.setPlaybackRate(1); } catch (err) {}
                        }
                    }
                }
            });
        } catch (e) {
            setStatus('✗ ' + e.message);
        }
    }
    function bannerText(sec) {
        var dur = 0;
        try { dur = Math.floor(ytPlayer && ytPlayer.getDuration ? ytPlayer.getDuration() : 0); } catch (e) {}
        var pos = fmt(sec);
        if (dur > 0) {
            var pct = Math.round((sec / dur) * 100);
            return '⏸ Recorded up to <strong>' + pos + '</strong> of ' + fmt(dur) + ' (' + pct + '%)';
        }
        return '⏸ Recorded up to <strong>' + pos + '</strong>';
    }

    function onPlayerReady(e) {
        try { e.target.setPlaybackRate(1); } catch (err) {}
        try {
            var dur = Math.floor(e.target.getDuration() || 0);
            if (dur > 0) $('time').textContent = (initialResumeSec > 0 ? fmt(initialResumeSec) : '0:00:00') + ' / ' + fmt(dur);
        } catch (err) {}
        // DELIBERATELY do not call seekTo() here. YT's seekTo(t, true) on an
        // UNSTARTED player auto-starts playback — which would let video audio
        // play out the speakers BEFORE the user has clicked Allow on the share
        // prompt, meaning the first few seconds wouldn't be captured. The seek
        // happens after permission is granted, in tryAutoStart() below.
        setStatus('Requesting tab share permission…');
        tryAutoStart();
    }
    function onPlayerStateChange(e) {
        var st = e && e.data;
        var rec = !!(recorder && recorder.state === 'recording');
        if (st === 1) {
            if (rec) { setStatus('🔴 Recording — capturing tab audio…'); updateControls(); return; }
            // Stream cached and live? Begin recording NOW — at the exact
            // moment YT reports the video is actually playing. No buffer or
            // seek silence gets captured because the recorder didn't exist
            // until this instant.
            if (stream && stream.getAudioTracks().length
                && stream.getAudioTracks()[0].readyState === 'live') {
                beginRecording();
                updateControls();
                return;
            }
            // No stream. If a prompt is pending or already shown once, pause
            // immediately — playing audio that isn't being recorded would
            // result in skipped audio in the saved MP3. The user has to click
            // Continue Recording to retry.
            if (streamAcquiring || streamPromptedOnce) {
                try { ytPlayer.pauseVideo(); } catch (err) {}
                return;
            }
            // First-time PLAYING with no stream: kick off the auto-start flow
            // (which also pauses the video before awaiting the share dialog).
            tryAutoStart();
        } else if (st === 2) {
            if (rec) stopRecorderNow();
            else updateControls();
        } else if (st === 0) {
            if (rec) stopRecorderNow();
            else updateControls();
        }
    }

    // ── Capture stream ──
    // Two layers of dedup so we never show stacked tab-share prompts:
    //
    //  1. streamAcquiring (singleton promise) — concurrent callers all await
    //     the same in-flight getDisplayMedia call. Without this, onPlayerReady
    //     + onPlayerStateChange(PLAYING) firing back-to-back each call
    //     getDisplayMedia independently and you see two prompts at once.
    //
    //  2. streamPromptedOnce — once we've shown the prompt for this popout
    //     session, we won't auto-show it again from any background path
    //     (PLAYING state change, etc). The user has to explicitly click
    //     Continue Recording to retry, which clears the flag. This stops a
    //     SEQUENTIAL second prompt if the first one was cancelled or didn't
    //     produce a valid audio track.
    var streamAcquiring = null;
    var streamPromptedOnce = false;
    async function ensureStream(opts) {
        opts = opts || {};
        if (stream && stream.getAudioTracks().length
            && stream.getAudioTracks()[0].readyState === 'live') {
            return stream;
        }
        if (streamAcquiring) return streamAcquiring;
        if (!navigator.mediaDevices || !navigator.mediaDevices.getDisplayMedia) {
            setStatus('✗ Browser does not support tab audio capture.');
            return null;
        }
        if (streamPromptedOnce && !opts.userInitiated) {
            setStatus('Tab share was cancelled. Click ▶ Continue Recording to try again.');
            return null;
        }
        streamPromptedOnce = true;
        streamAcquiring = (async function() {
            var s;
            try {
                s = await navigator.mediaDevices.getDisplayMedia({
                    video: { displaySurface: 'browser' }, audio: true, preferCurrentTab: true
                });
            } catch (e) {
                setStatus('✗ Tab capture cancelled: ' + (e.message || e));
                return null;
            }
            if (!s.getAudioTracks().length) {
                setStatus('✗ No audio track. Make sure to check Share tab audio.');
                s.getTracks().forEach(function(t){ t.stop(); });
                return null;
            }
            s.getVideoTracks().forEach(function(t){ t.stop(); });
            s.getAudioTracks()[0].addEventListener('ended', stopRecorderNow);
            stream = s;
            return s;
        })();
        try {
            return await streamAcquiring;
        } finally {
            streamAcquiring = null;
        }
    }

    // ── Recording ──
    async function tryAutoStart(opts) {
        if (recorder && recorder.state === 'recording') return;
        // Defensive pause in case the player was started by some path other
        // than ours (e.g. user clicking YT's play button while waiting).
        try { ytPlayer.pauseVideo(); } catch (e) {}
        var s = await ensureStream(opts);
        if (!s) return;
        if (recorder && recorder.state === 'recording') return;
        // Seek + play — but DON'T start the recorder here. The PLAYING state
        // change handler starts it once YT reports the audio is actually
        // flowing. That way the 1-2 sec of buffer/seek time doesn't land as
        // silence at the start of the first recorded part.
        try {
            ytPlayer.setPlaybackRate(1);
            if (initialResumeSec > 0) {
                ytPlayer.seekTo(initialResumeSec, true);
                initialResumeSec = 0; // only seek once per popout session
            } else {
                ytPlayer.playVideo();
            }
        } catch (e) {}
        setStatus('Waiting for video to start playing…');
    }
    function beginRecording() {
        var audioOnly = new MediaStream(stream.getAudioTracks());
        var mime = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus' : 'audio/webm';
        var rec = new MediaRecorder(audioOnly, { mimeType: mime });
        chunks = [];
        rec.ondataavailable = function(e) { if (e.data && e.data.size > 0) chunks.push(e.data); };
        rec.onstop = onRecorderStopped;
        rec.start(1000);
        recorder = rec;
        startedMs = Date.now();
        startCheckpointTimer();
        // Authoritative status update so any stale prompt-related text
        // ("Requesting tab share permission…", "Loading video…", etc.) is
        // replaced once the recorder is actually running.
        setStatus('🔴 Recording — capturing tab audio…');
        updateControls();
    }
    function startCheckpointTimer() {
        if (checkpointTimer) clearInterval(checkpointTimer);
        checkpointTimer = setInterval(function() {
            if (recorder && recorder.state === 'recording') {
                autoCheckpointPending = true;
                try { ytPlayer.pauseVideo(); } catch (e) {}
            }
        }, CHECKPOINT_MS);
    }
    function stopCheckpointTimer() {
        if (checkpointTimer) { clearInterval(checkpointTimer); checkpointTimer = null; }
    }
    function stopRecorderNow() {
        if (recorder && recorder.state === 'recording') {
            try { recorder.stop(); } catch (e) {}
        }
    }
    async function onRecorderStopped() {
        stopCheckpointTimer();
        updateControls();
        var blob = new Blob(chunks, { type: 'audio/webm' });
        chunks = [];
        recorder = null;
        var nowSec = 0;
        try { nowSec = Math.floor(ytPlayer.getCurrentTime() || 0); } catch (e) {}
        var dur = 0;
        try { dur = Math.floor(ytPlayer.getDuration() || 0); } catch (e) {}
        var atEnd = (dur > 0 && nowSec >= dur - 2);
        var wasAutoCheckpoint = autoCheckpointPending;

        // Mark in-flight so beforeunload can guard against the user closing
        // the window mid-POST (which silently aborts the upload).
        pendingBlob = blob;
        pendingSeconds = nowSec;
        uploadInFlight = true;

        setStatus((wasAutoCheckpoint ? '💾 Auto-saving progress' : '⬆ Saving recording')
                  + ' — do NOT close the window… (' + (blob.size/1024/1024).toFixed(1) + ' MB)');
        var fd = new FormData();
        fd.append('item_key', String(itemKey));
        fd.append('partial', '1');
        fd.append('seconds', String(nowSec));
        fd.append('file', blob, 'rec_' + itemKey + '_' + Date.now() + '.webm');
        try {
            var res = await fetch(API + '/admin-transcript-upload.php',
                                  { method: 'POST', credentials: 'include', body: fd });
            var d = await res.json();
            if (d.error) { setStatus('✗ ' + d.error); return; }
            partCount = (d.partial && d.partial.part_count) || partCount + 1;
            lastRecordedSeconds = nowSec;
            $('banner').style.display = '';
            $('banner').innerHTML = bannerText(nowSec);
            pendingBlob = null;
            if (atEnd) {
                setStatus('🎬 Video ended — finalizing audio…');
                await finalizeNow(true);
            } else if (wasAutoCheckpoint) {
                setStatus('💾 Auto-saved at ' + fmt(nowSec) + ' — resuming…');
                autoCheckpointPending = false;
                // Resume playback; PLAYING handler will restart the recorder
                // using the cached stream (no new permission prompt).
                try { ytPlayer.playVideo(); } catch (e) {}
            } else {
                setStatus('✓ Saved part at ' + fmt(nowSec) + ' — safe to close window.');
            }
        } catch (err) {
            setStatus('✗ Upload failed: ' + err.message);
        } finally {
            uploadInFlight = false;
            autoCheckpointPending = false;
        }
        updateControls();
    }
    async function finalizeNow(autoCalled) {
        if (!autoCalled && !confirm('Concatenate all parts into the final MP3 and start transcription?')) return;
        stopCheckpointTimer();
        setStatus('🔧 Concatenating parts + encoding MP3…');
        $('continue-btn').disabled = true;
        $('restart-btn').disabled = true;
        try {
            var res = await fetch(API + '/admin-transcript-upload.php', {
                method: 'POST', credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'finalize', item_key: itemKey, auto_transcribe: 1 })
            });
            var d = await res.json();
            if (d.error) { setStatus('✗ ' + d.error); return; }
            setStatus('✓ Saved final MP3 — transcription started. You can close this window.');
            partCount = 0;
            $('banner').style.display = 'none';
            updateControls();
        } catch (err) {
            setStatus('✗ Finalize failed: ' + err.message);
        } finally {
            $('continue-btn').disabled = false;
            $('restart-btn').disabled = false;
        }
    }

    // ── Buttons ──
    function continueRecording() {
        // User-initiated: if a prior auto-prompt was cancelled, allow a retry.
        // Reset the once-prompted flag and explicitly request a stream so the
        // user gets the share dialog if we don't have one yet.
        streamPromptedOnce = false;
        if (!stream || !stream.getAudioTracks().length
            || stream.getAudioTracks()[0].readyState !== 'live') {
            tryAutoStart({ userInitiated: true });
            return;
        }
        // Snap the player back to where the last recorded part ended, so the
        // next part picks up at exactly that point. This way even if the
        // video position drifted (or somehow got moved despite the blocker),
        // recording resumes seamlessly from the bookmark.
        if (ytPlayer && ytPlayer.seekTo && lastRecordedSeconds > 0) {
            try {
                var current = Math.floor(ytPlayer.getCurrentTime() || 0);
                if (Math.abs(current - lastRecordedSeconds) > 1) {
                    ytPlayer.seekTo(lastRecordedSeconds, true);
                }
            } catch (e) {}
        }
        if (ytPlayer && ytPlayer.playVideo) {
            try { ytPlayer.setPlaybackRate(1); ytPlayer.playVideo(); } catch (e) {}
        }
    }
    function pauseRecording() {
        if (ytPlayer && ytPlayer.pauseVideo) {
            try { ytPlayer.pauseVideo(); } catch (e) {}
        }
    }
    async function restartRecording() {
        if (!confirm('Discard all recorded parts and start over from 0:00?')) return;
        try {
            await fetch(API + '/admin-transcript-upload.php?item_key=' + itemKey,
                        { method: 'DELETE', credentials: 'include' });
        } catch (e) {}
        partCount = 0;
        $('banner').style.display = 'none';
        if (ytPlayer && ytPlayer.seekTo) {
            try { ytPlayer.seekTo(0, true); ytPlayer.pauseVideo(); } catch (e) {}
        }
        setStatus('Restarting…');
        streamPromptedOnce = false;
        setTimeout(function(){ tryAutoStart({ userInitiated: true }); }, 300);
    }

    // ── UI ──
    function updateControls() {
        var pauseBtn = $('pause-btn'), continueBtn = $('continue-btn'), restartBtn = $('restart-btn');
        var blocker = $('player-blocker');
        var rec = !!(recorder && recorder.state === 'recording');
        if (rec) {
            pauseBtn.style.display = '';
            continueBtn.style.display = 'none';
            restartBtn.style.display = 'none';
            if (blocker) blocker.style.display = 'block';
            if (durationTimer) clearInterval(durationTimer);
            durationTimer = setInterval(updateTime, 500);
        } else {
            pauseBtn.style.display = 'none';
            if (partCount > 0) {
                continueBtn.style.display = '';
                restartBtn.style.display = '';
            } else {
                continueBtn.style.display = 'none';
                restartBtn.style.display = 'none';
            }
            if (blocker) blocker.style.display = 'none';
            if (durationTimer) { clearInterval(durationTimer); durationTimer = null; }
            updateTime();
        }
    }
    function updateTime() {
        var cur = 0, dur = 0;
        if (ytPlayer && ytPlayer.getCurrentTime) {
            try { cur = Math.floor(ytPlayer.getCurrentTime() || 0); } catch (e) {}
            try { dur = Math.floor(ytPlayer.getDuration() || 0); } catch (e) {}
        }
        var prefix = (recorder && recorder.state === 'recording') ? '🔴 ' : '';
        $('time').textContent = prefix + fmt(cur) + ' / ' + (dur > 0 ? fmt(dur) : '?:??:??');
    }

    // ── Closing-tab safety net ──
    // Two-layer protection so partial recordings are never silently lost:
    //
    // 1. beforeunload — browser shows its built-in "Leave site?" Stay/Leave
    //    prompt when a recording is in progress. (Browsers ignore custom
    //    message text these days — the prompt itself is the warning.)
    //
    // 2. pagehide — fires after the user confirms leaving. We still have
    //    the in-memory chunks at this point, so we use navigator.sendBeacon
    //    to fire-and-forget upload them as a partial. The browser keeps the
    //    request alive past page unload. Worst case we lose ~1 second of
    //    audio at the very end (the in-flight chunk that hadn't yet been
    //    flushed into chunks[]).
    window.addEventListener('beforeunload', function(e) {
        if ((recorder && recorder.state === 'recording') || uploadInFlight) {
            e.preventDefault();
            e.returnValue = '';
        }
    });
    window.addEventListener('pagehide', function() {
        savePartialOnExit();
    });
    function savePartialOnExit() {
        if (!recorder || recorder.state !== 'recording') return;
        if (!chunks.length) return;
        try { recorder.requestData(); } catch (e) {} // best-effort flush of in-flight buffer
        var blob = new Blob(chunks, { type: 'audio/webm' });
        var nowSec = 0;
        try { nowSec = Math.floor(ytPlayer.getCurrentTime() || 0); } catch (e) {}
        var fd = new FormData();
        fd.append('item_key', String(itemKey));
        fd.append('partial', '1');
        fd.append('seconds', String(nowSec));
        fd.append('file', blob, 'rec_unload_' + itemKey + '_' + Date.now() + '.webm');
        if (navigator.sendBeacon) {
            try { navigator.sendBeacon(API + '/admin-transcript-upload.php', fd); } catch (e) {}
        }
    }
    </script>
    <script src="https://www.youtube.com/iframe_api"></script>
</body>
</html>
