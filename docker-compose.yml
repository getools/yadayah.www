services:
  rsshub:
    image: diygod/rsshub:chromium-bundled
    restart: always
    expose:
      - "1200"
    volumes:
      - ./rumble-scraper:/scraper
      - ./public/pdf:/host_pdf:ro
      - ./public/flipbook:/host_flip
      - ./public/u/books-word:/host_word:ro
      - ./public/jobs:/host_jobs
    environment:
      NODE_ENV: production
      CACHE_TYPE: memory
      CACHE_EXPIRE: '3600'
      REQUEST_RETRY: '3'
      PUPPETEER_WS_ENDPOINT: ''
      TZ: America/New_York

  caddy:
    image: caddy:2
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./certs:/certs:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - itcoge-web

  web:
    build: .
    restart: always
    expose:
      - "80"
    volumes:
      - ./public:/var/www/html
      - ./api:/var/www/html/api
    environment:
      PG_HOST: postgres
      PG_PORT: "5432"
      PG_DB: yada
      PG_USER: postgres
      PG_PASS: yada_password
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY}
      FB_PAGE_TOKEN: ${FB_PAGE_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy

  itcoge-web:
    build: /opt/itcoge-www
    restart: always
    expose:
      - "80"
    volumes:
      - /opt/itcoge-www/public:/var/www/html
    container_name: itcoge-web

  postgres:
    image: postgres:15-alpine
    container_name: yada-postgres-prod
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: yada_password
      POSTGRES_DB: yada
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    external: true
    name: yada-translations_postgres_data
  caddy_data:
  caddy_config:
