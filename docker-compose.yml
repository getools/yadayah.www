services:
  rsshub:
    image: diygod/rsshub:chromium-bundled
    restart: always
    # Chrome is the highest-leak risk on the box (we hit 240 zombie chromes
    # once when cron-fliphtml5-match.sh leaked procs). Container caps mean
    # the leak can't melt the host even if process cleanup fails. pids_limit
    # acts as a fork-bomb circuit breaker — Chrome with many tabs uses ~50
    # PIDs; 256 leaves room while still catching runaways early.
    mem_limit: 800m
    cpus: 0.75
    pids_limit: 256
    expose:
      - "1200"
    volumes:
      - ./rumble-scraper:/scraper
      - ./public/pdf:/host_pdf:ro
      - ./public/flipbook:/host_flip
      - ./public/u/books-word:/host_word:ro
      - ./public/jobs:/host_jobs
    environment:
      NODE_ENV: production
      CACHE_TYPE: memory
      CACHE_EXPIRE: '3600'
      REQUEST_RETRY: '3'
      PUPPETEER_WS_ENDPOINT: ''
      TZ: America/New_York

  caddy:
    image: caddy:2
    restart: always
    mem_limit: 128m
    cpus: 0.5
    pids_limit: 64
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./certs:/certs:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - itcoge-web

  web:
    build: .
    restart: always
    # Hard cap so a runaway worker (yt-dlp, ffmpeg, embed-paragraphs) can't
    # peg the host or trip Hostinger's abuse heuristic. cpus=1.5 lets workers
    # use 1.5 cores while user-facing PHP-FPM still has scheduling headroom
    # on the remaining 0.5. mem_limit=2g matches the per-worker ulimit -v
    # (1.5g) plus headroom for FPM master + concurrent requests. Sized for
    # a 4GB / 2-core VPS — bump alongside any instance upgrade.
    mem_limit: 2g
    cpus: 1.5
    pids_limit: 512
    expose:
      - "80"
    volumes:
      - ./public:/var/www/html
      - ./api:/var/www/html/api
    environment:
      PG_HOST: postgres
      PG_PORT: "5432"
      PG_DB: yada
      PG_USER: postgres
      PG_PASS: yada_password
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY}
      FB_PAGE_TOKEN: ${FB_PAGE_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy

  itcoge-web:
    build: /opt/itcoge-www
    restart: always
    mem_limit: 256m
    cpus: 0.5
    pids_limit: 128
    expose:
      - "80"
    volumes:
      - /opt/itcoge-www/public:/var/www/html
    container_name: itcoge-web

  postgres:
    image: postgres:15-alpine
    container_name: yada-postgres-prod
    restart: always
    # 1g cap leaves room for the OS page cache to absorb large queries
    # (the new live-count UPDATE triggers fire on every paragraph insert,
    # which is bursty during parser runs). Bump if pg_stat_statements
    # shows hot-set spilling to disk.
    mem_limit: 1g
    cpus: 1.0
    pids_limit: 256
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: yada_password
      POSTGRES_DB: yada
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    external: true
    name: yada-translations_postgres_data
  caddy_data:
  caddy_config:
