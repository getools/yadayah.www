services:
  rsshub:
    image: diygod/rsshub:chromium-bundled
    restart: always
    # Chrome is the highest-leak risk on the box (we hit 240 zombie chromes
    # once when cron-fliphtml5-match.sh leaked procs). Container caps mean
    # the leak can't melt the host even if process cleanup fails. pids_limit
    # acts as a fork-bomb circuit breaker — Chrome with many tabs uses ~50
    # PIDs; 256 leaves room while still catching runaways early.
    mem_limit: 800m
    cpus: 0.75
    pids_limit: 256
    expose:
      - "1200"
    volumes:
      - ./rumble-scraper:/scraper
      - ./public/pdf:/host_pdf:ro
      - ./public/flipbook:/host_flip
      - ./public/u/books-word:/host_word:ro
      # Custom fonts for DOCX->PDF conversion. Drop new .ttf/.otf into
      # /usr/local/share/fonts/yada/ on the host, then run
      # /opt/yada-www/onlyoffice-fonts-refresh.sh to regenerate the
      # ONLYOFFICE AllFonts.js cache. No container restart needed.
      - /usr/local/share/fonts/yada:/usr/share/fonts/truetype/yada-custom:ro
      - ./public/jobs:/host_jobs
    environment:
      NODE_ENV: production
      CACHE_TYPE: memory
      CACHE_EXPIRE: '3600'
      REQUEST_RETRY: '3'
      PUPPETEER_WS_ENDPOINT: ''
      TZ: America/New_York

  caddy:
    image: caddy:2
    restart: always
    mem_limit: 128m
    cpus: 0.5
    pids_limit: 64
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./certs:/certs:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - itcoge-web

  web:
    build: .
    restart: always
    # NO container-level mem/cpu caps on the web tier — this is the
    # user-facing PHP-FPM, and we don't want to throttle real traffic. The
    # per-worker ulimits in api/spawn-helpers.php (cpu_secs + mem_mb) and
    # cpu-watchdog.sh kill runaway workers individually instead, so a
    # buggy job can't escape but legitimate requests still get full use of
    # the host's resources during traffic spikes.
    expose:
      - "80"
    volumes:
      - ./public:/var/www/html
      - ./api:/var/www/html/api
    environment:
      PG_HOST: postgres
      PG_PORT: "5432"
      PG_DB: yada
      PG_USER: postgres
      PG_PASS: yada_password
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY}
      FB_PAGE_TOKEN: ${FB_PAGE_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy

  itcoge-web:
    build: /opt/itcoge-www
    restart: always
    mem_limit: 256m
    cpus: 0.5
    pids_limit: 128
    expose:
      - "80"
    volumes:
      - /opt/itcoge-www/public:/var/www/html
    container_name: itcoge-web

  postgres:
    image: postgres:15-alpine
    container_name: yada-postgres-prod
    restart: always
    # NO container-level caps on Postgres — it's the data tier, and a heavy
    # query (REINDEX, VACUUM FULL, parser bulk-insert with the new live-count
    # triggers) should be free to use whatever shared_buffers / page cache
    # the host can spare. Caps would just push the working set onto disk
    # and make user queries slow.
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: yada_password
      POSTGRES_DB: yada
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ONLYOFFICE Document Server — used by book-pipeline-worker.sh as a
  # primary DOCX->PDF path. Keeps a tighter memory profile than LibreOffice
  # on Yada Yah's complex DOCXs (s02v01/v06/v07 OOM-killed soffice at 7+GB;
  # ONLYOFFICE plateaus around 800MB). Internal-only; conversion endpoint
  # is /ConvertService.ashx authenticated by JWT.
  onlyoffice:
    image: onlyoffice/documentserver:latest
    restart: always
    mem_limit: 1500m
    cpus: 1.5
    pids_limit: 256
    expose:
      - 80
    volumes:
      - onlyoffice_data:/var/www/onlyoffice/Data
      - onlyoffice_log:/var/log/onlyoffice
      - onlyoffice_lib:/var/lib/onlyoffice
      - onlyoffice_db:/var/lib/postgresql
      - ./public/u/books-word:/host_word:ro
    environment:
      JWT_ENABLED: 'true'
      JWT_SECRET: '78a30d906dc3820165ceff4b5aaa411e17f7b346f83714b08550d62329ec594d'
      JWT_HEADER: 'Authorization'


volumes:
  postgres_data:
    external: true
    name: yada-translations_postgres_data
  caddy_data:
  caddy_config:
  onlyoffice_data:
  onlyoffice_log:
  onlyoffice_lib:
  onlyoffice_db:
