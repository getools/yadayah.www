name: Build Yada Yah Book PDF Generator

# Builds the desktop .exe on a Windows runner and ships it directly to the
# yadayah.com server's private staging dir via a restricted SSH key. The
# artifact is NOT published to a public release; admins download it through
# /api/admin-uploader-download.php which requireAuth()'s.

on:
  push:
    branches: [master]
    paths:
      - 'desktop/**'
      - '.github/workflows/build-uploader.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller PySide6 requests requests-toolbelt pywin32 Pillow

      - name: Generate icon.ico from icon.png
        run: |
          python -c "from PIL import Image; Image.open('icon.png').save('icon.ico', sizes=[(16,16),(24,24),(32,32),(48,48),(64,64),(128,128),(256,256)])"

      - name: Build .exe with PyInstaller
        run: |
          python -m PyInstaller --noconfirm --windowed --onefile --name "YadaYahBookPDFGenerator" --icon icon.ico --add-data "icon.png;." yada_uploader.py

      - name: Show artifact
        run: dir dist

      - name: Deploy to yadayah.com private staging
        shell: bash
        env:
          DEPLOY_SSH_KEY:         ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_SSH_KNOWN_HOSTS: ${{ secrets.DEPLOY_SSH_KNOWN_HOSTS }}
          DEPLOY_HOST:            ${{ secrets.DEPLOY_HOST }}
        run: |
          mkdir -p ~/.ssh
          # Strip any CR that Git Bash on Windows may have introduced; the
          # OpenSSH key parser rejects CRLF and quietly fails as
          # "error in libcrypto: unsupported". Ensure trailing newline too.
          printf '%s\n' "$DEPLOY_SSH_KEY"         | tr -d '\r' > ~/.ssh/deploy_key
          printf '%s\n' "$DEPLOY_SSH_KNOWN_HOSTS" | tr -d '\r' > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/deploy_key ~/.ssh/known_hosts
          # Sanity-check that the key parsed (private-key fingerprint).
          ssh-keygen -lf ~/.ssh/deploy_key
          # The deploy key on the server has a forced command that pipes
          # whatever it receives on stdin into a fixed destination file
          # (uploader-deploy.sh). So we just stream the .exe over SSH stdin.
          ssh -i ~/.ssh/deploy_key \
              -o UserKnownHostsFile=~/.ssh/known_hosts \
              -o StrictHostKeyChecking=yes \
              -o IdentitiesOnly=yes \
              "root@${DEPLOY_HOST}" 'cat' < dist/YadaYahBookPDFGenerator.exe
          echo "Deployed $(stat -c%s dist/YadaYahBookPDFGenerator.exe 2>/dev/null || wc -c < dist/YadaYahBookPDFGenerator.exe) bytes"
