name: Build Yada Yah Book PDF Generator

on:
  push:
    branches: [master]
    paths:
      - 'desktop/**'
      - '.github/workflows/build-uploader.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller PySide6 requests requests-toolbelt pywin32 Pillow

      - name: Generate icon.ico from icon.png
        run: |
          python -c "from PIL import Image; Image.open('icon.png').save('icon.ico', sizes=[(16,16),(24,24),(32,32),(48,48),(64,64),(128,128),(256,256)])"

      - name: Build .exe with PyInstaller
        run: |
          python -m PyInstaller --noconfirm --windowed --onefile --name "YadaYahBookPDFGenerator" --icon icon.ico --add-data "icon.png;." yada_uploader.py

      - name: Show artifact
        run: |
          dir dist

      - name: Publish to GitHub Releases (uploader-latest)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: uploader-latest
          name: Yada Yah Book PDF Generator (latest)
          body: |
            Automated build of the Yada Yah Book PDF Generator desktop app.

            Built from commit ${{ github.sha }} on ${{ github.ref_name }}.

            Download: YadaYahBookPDFGenerator.exe
          files: desktop/dist/YadaYahBookPDFGenerator.exe
          make_latest: 'true'
